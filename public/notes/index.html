<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NB Quiz — Notes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
button, input, select, textarea { font-family: inherit; }
:root {
  --bg: #f7f5f0;
  --surface: #ffffff;
  --surface-2: #f0ede6;
  --border: #e2ddd5;
  --text: #1a1714;
  --text-2: #5a534a;
  --text-3: #9a8f83;
  --accent: #2563a8;
  --accent-light: #dbeafe;
  --mark: #b45309;
  --mark-bg: #fef3c7;
  --radius: 10px;
  --radius-lg: 16px;
  --shadow: 0 1px 3px rgba(0,0,0,.07), 0 4px 16px rgba(0,0,0,.06);
  --font-serif: 'Crimson Pro', Georgia, serif;
  --font-sans: 'DM Sans', 'Helvetica Neue', Helvetica, sans-serif;
  --font-mono: 'DM Mono', monospace;
}
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* Login overlay */
#loginScreen {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  padding: 24px;
}
#loginScreen.hidden { display: none; }
.login-logo {
  font-family: var(--font-serif);
  font-size: 2.4rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 6px;
  text-align: center;
}
.login-logo span { color: var(--accent); }
.login-sub {
  font-size: .85rem;
  color: var(--text-3);
  margin-bottom: 40px;
  text-align: center;
}
.google-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 13px 28px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 99px;
  font-family: var(--font-sans);
  font-size: .9rem;
  font-weight: 600;
  color: var(--text);
  cursor: pointer;
}
.google-btn:hover { border-color: var(--accent); background: var(--accent-light); }
.login-error { margin-top: 16px; font-size: .8rem; color: #991b1b; min-height: 1em; text-align: center; }

/* Header */
.page-header {
  max-width: 1400px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 24px 24px 18px;
  border-bottom: 1.5px solid var(--border);
  gap: 16px;
  flex-wrap: wrap;
}
.logo {
  font-family: var(--font-serif);
  font-size: 2rem;
  font-weight: 600;
  color: var(--text);
}
.logo span { color: var(--accent); }
.header-right { display: flex; gap: 16px; align-items: center; }
.back-link {
  text-decoration: none;
  color: var(--accent);
  font-size: .8rem;
  font-family: var(--font-mono);
  border: 1px solid var(--accent);
  border-radius: 99px;
  padding: 4px 12px;
}
.user-info { font-size: .75rem; color: var(--text-3); font-family: var(--font-mono); }
.signout-btn {
  font-size: .72rem;
  color: var(--text-3);
  background: none;
  border: none;
  cursor: pointer;
  font-family: var(--font-mono);
}
.signout-btn:hover { color: var(--accent); }

/* Main app layout */
.layout {
  max-width: 1400px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 300px 220px 1fr;
  gap: 20px;
  padding: 20px 24px 40px;
  align-items: start;
}
.panel {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow);
}

/* Sidebar */
.sidebar {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: sticky;
  top: 20px;
  max-height: calc(100vh - 40px);
}
body.outline-in-sidebar .sidebar .note-list {
  max-height: 30vh;
  flex: none;
}
.panel-head {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--surface-2);
  font-size: .7rem;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--text-3);
  font-family: var(--font-mono);
  font-weight: 500;
}
.collapsible-panel-head {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  border: none;
  font: inherit;
  text-align: left;
  transition: background .12s ease;
}
.collapsible-panel-head:hover { background: #e8e4db; }
.collapsible-chevron {
  flex-shrink: 0;
  font-size: .55rem;
  color: var(--text-3);
  line-height: 1;
  transition: transform .15s ease;
}
.collapsible-panel-head[aria-expanded="false"] .collapsible-chevron {
  transform: rotate(-90deg);
}
.composer.is-collapsed { display: none; }
.note-folder-wrap { border-bottom: 1px solid var(--border); }
.note-folder-row {
  display: flex;
  align-items: center;
  gap: 7px;
  width: 100%;
  border: none;
  background: var(--surface-2);
  padding: 9px 14px;
  cursor: pointer;
  font-family: var(--font-sans);
  font-size: .78rem;
  font-weight: 600;
  color: var(--text-2);
  text-align: left;
  transition: background .12s ease;
}
.note-folder-row:hover { background: #e8e4db; }
.note-folder-chevron {
  flex-shrink: 0;
  width: .85em;
  font-size: .6rem;
  color: var(--text-3);
  line-height: 1;
}
.note-folder-name {
  flex: 1;
  min-width: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.composer {
  padding: 14px;
  border-bottom: 1px solid var(--border);
}
.label {
  font-size: .7rem;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--text-3);
  font-family: var(--font-mono);
  margin-bottom: 6px;
  display: block;
}
.input, .textarea {
  width: 100%;
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 12px;
  font-family: var(--font-sans);
  color: var(--text);
  outline: none;
}
.input:focus, .textarea:focus { border-color: var(--accent); }
.textarea {
  min-height: 180px;
  resize: vertical;
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
  font-size: .8rem;
  line-height: 1.5;
}
.row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 10px;
}
.btn {
  border-radius: 99px;
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--text-2);
  font-size: .78rem;
  padding: 7px 12px;
  font-family: var(--font-sans);
  cursor: pointer;
  font-weight: 600;
}
.btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
.btn-primary {
  border-color: var(--accent);
  background: var(--accent);
  color: #fff;
}
.btn-primary:hover { background: #1d4f8a; color: #fff; }
.status {
  margin-top: 10px;
  min-height: 1em;
  font-size: .75rem;
  color: var(--text-3);
}
.note-list { overflow-y: auto; flex: 1; }
.note-item {
  display: block;
  width: 100%;
  text-align: left;
  border: none;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  padding: 12px 14px;
  cursor: pointer;
  font-family: var(--font-sans);
}
.note-item:hover { background: var(--accent-light); }
.note-item.active { background: #eef6ff; }
.note-title {
  font-size: .86rem;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  font-family: var(--font-sans);
}
.note-meta {
  margin-top: 2px;
  font-size: .67rem;
  color: var(--text-3);
  font-family: var(--font-mono);
}
.empty-list {
  padding: 18px 14px;
  color: var(--text-3);
  font-size: .84rem;
  font-family: var(--font-sans);
}

/* Outline panel (standalone column) */
.outline-panel {
  position: sticky;
  top: 20px;
  max-height: calc(100vh - 40px);
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}
.outline-head {
  padding: 11px 12px 10px;
  border-bottom: 1px solid var(--border);
  font-size: .67rem;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--text-3);
  font-family: var(--font-mono);
  background: var(--surface-2);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
}
.outline-body {
  overflow-y: auto;
  padding: 8px;
  flex: 1;
}
.outline-empty {
  color: var(--text-3);
  font-size: .78rem;
  padding: 10px 8px;
  font-family: var(--font-sans);
}
.outline-item {
  width: 100%;
  border: 1px solid transparent;
  background: transparent;
  border-radius: 8px;
  padding: 6px 8px;
  text-align: left;
  cursor: pointer;
  color: var(--text-2);
  display: flex;
  align-items: center;
  gap: 7px;
  margin-bottom: 3px;
  font-family: var(--font-sans);
  transition: transform .12s cubic-bezier(.2,.8,.2,1), box-shadow .12s cubic-bezier(.2,.8,.2,1), background .12s ease, border-color .12s ease;
  user-select: none;
}
.outline-item:hover {
  border-color: var(--border);
  background: var(--surface);
}
.outline-item:active {
  transform: translateY(1px);
  box-shadow: inset 0 1px 0 rgba(26, 23, 20, .10);
  background: #f7f4ee;
  border-color: #d8d1c7;
}
.outline-item:focus-visible {
  outline: 2px solid rgba(37, 99, 168, .35);
  outline-offset: 2px;
}
.outline-item-level {
  flex-shrink: 0;
  font-size: .6rem;
  color: var(--text-3);
  font-family: var(--font-mono);
}
.outline-item-title {
  font-size: .82rem;
  line-height: 1.3;
  font-family: var(--font-sans);
}
.outline-item.ancestor {
  color: var(--text-3);
}
.outline-item.ancestor .outline-item-level {
  color: #b7aea2;
}
.outline-item.marked {
  border-color: #f59e0b;
  background: #fffbeb;
  color: var(--mark);
}

/* Reader */
.reader {
  display: flex;
  flex-direction: column;
  min-height: 70vh;
}
.reader-top {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 8px 12px;
  position: sticky;
  top: 0;
  z-index: 10;
  background: var(--surface);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
}
.reader-title {
  font-family: var(--font-serif);
  font-size: 1.35rem;
  font-weight: 600;
}
.chip {
  font-size: .68rem;
  color: var(--text-3);
  font-family: var(--font-mono);
  border: 1px solid var(--border);
  border-radius: 99px;
  padding: 4px 10px;
}
.toggle-wrap {
  margin-left: auto;
  display: flex;
  gap: 8px;
  align-items: center;
  font-size: .75rem;
  color: var(--text-2);
  font-family: var(--font-sans);
}
.reader-body {
  padding: 16px;
}
.empty-reader {
  padding: 50px 20px;
  text-align: center;
  color: var(--text-3);
  font-size: .95rem;
  font-family: var(--font-sans);
}

/* Tiles */
.tile {
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
  margin-bottom: 12px;
  overflow: hidden;
}
.tile.marked {
  border-color: #f59e0b;
  background: #fffbeb;
}
.tile.mark-sweep {
  position: relative;
  animation: markLift .75s cubic-bezier(.22,.61,.36,1) both;
  will-change: transform;
}
.tile.mark-sweep::before {
  content: '';
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: linear-gradient(120deg, rgba(254, 243, 199, 0) 0%, rgba(254, 243, 199, .95) 35%, rgba(255, 251, 235, 0) 70%);
  transform: translate3d(-120%, 0, 0);
  animation: markSheen .6s cubic-bezier(.22,.61,.36,1) both;
  will-change: transform, opacity;
}
@keyframes markLift {
  0% { transform: translate3d(0, 0, 0); }
  40% { transform: translate3d(0, -1px, 0); }
  100% { transform: translate3d(0, 0, 0); }
}
@keyframes markSheen {
  0% { transform: translate3d(-120%, 0, 0); opacity: 0; }
  15% { opacity: 1; }
  100% { transform: translate3d(120%, 0, 0); opacity: 0; }
}
.tile.tile-context-only .tile-head {
  background: #f7f4ee;
}
.tile.tile-context-only .tile-title,
.tile.tile-context-only .tile-level {
  color: var(--text-3);
}
.tile-flash {
  animation: tileFlash 1.2s ease;
}
@keyframes tileFlash {
  0% { box-shadow: 0 0 0 0 rgba(245, 158, 11, .55); }
  100% { box-shadow: 0 0 0 14px rgba(245, 158, 11, 0); }
}
.tile-head {
  border-bottom: 1px solid var(--border);
  background: var(--surface-2);
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 11px;
}
.tile-level {
  font-size: .63rem;
  font-family: var(--font-mono);
  color: var(--text-3);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 2px 6px;
}
.tile-title {
  font-weight: 600;
  font-size: .95rem;
  font-family: var(--font-sans);
  color: var(--text);
}
.mark-btn {
  margin-left: auto;
  border: 1px solid var(--border);
  border-radius: 99px;
  background: var(--surface);
  color: var(--text-2);
  cursor: pointer;
  font-size: .68rem;
  font-family: var(--font-mono);
  padding: 4px 10px;
  transition: transform .2s ease, background .2s ease, color .2s ease, border-color .2s ease, box-shadow .2s ease;
  position: relative;
  overflow: hidden;
}
.mark-btn:hover {
  border-color: #f59e0b;
  color: var(--mark);
  background: #fef3c7;
  transform: scale(1.08);
  box-shadow: 0 2px 8px rgba(245, 158, 11, .25);
}
.mark-btn.marked {
  border-color: #d97706;
  color: var(--mark);
  background: var(--mark-bg);
}
.mark-btn.marked:hover {
  background: #fde68a;
  border-color: #b45309;
  transform: scale(1.08);
  box-shadow: 0 2px 8px rgba(180, 83, 9, .3);
}
.unmark-progress {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, #f59e0b, #dc2626);
  transform-origin: left center;
  transform: scaleX(0);
  animation: unmarkFill .8s linear forwards;
  border-radius: 0 0 99px 99px;
  will-change: transform;
}
@keyframes unmarkFill {
  0% { transform: scaleX(0); }
  100% { transform: scaleX(1); }
}
.tile-content { padding: 10px 12px; margin-top: 2px; }
.tile-content:empty { display: none; }
.tile-content > :first-child { margin-top: 0; }
.tile-content > :last-child { margin-bottom: 0; }
.tile-content p, .tile-content ul, .tile-content ol, .tile-content pre, .tile-content blockquote {
  margin: 0 0 .7em;
  line-height: 1.5;
  font-size: .95rem;
  font-family: var(--font-sans);
}
.tile-content code {
  background: #f4f1ea;
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 1px 4px;
  font-size: .82em;
}
.tile-content pre code {
  border: none;
  background: transparent;
  padding: 0;
}
.tile-content pre {
  background: #f4f1ea;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px;
  overflow-x: auto;
}
.tile-content ul, .tile-content ol { padding-left: 1.8em; }
.tile-content table { border-collapse: collapse; width: 100%; margin: 0 0 .7em; font-size: .95rem; font-family: var(--font-sans); }
.tile-content th, .tile-content td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; font-size: .95rem; }
.tile-content th { background: var(--surface-2); font-weight: 600; }
.tile-content a { color: var(--accent); }
.tile-children {
  padding: 8px 10px 10px 22px;
  border-left: 4px solid #ece8df;
  margin-left: 14px;
}
.doc-content {
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
  padding: 12px;
  margin-bottom: 14px;
  font-family: var(--font-sans);
}
.doc-content h1, .doc-content h2, .doc-content h3, .doc-content h4, .doc-content h5, .doc-content h6 {
  margin-bottom: .6em;
}
.doc-content p, .doc-content ul, .doc-content ol, .doc-content pre, .doc-content blockquote {
  margin: 0 0 .7em;
}

/* iOS-style toggle switch */
.ios-toggle-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: .75rem;
  color: var(--text-2);
  font-family: var(--font-sans);
  cursor: pointer;
  user-select: none;
}
.ios-toggle-wrap input[type="checkbox"] {
  display: none;
}
.ios-switch {
  position: relative;
  width: 36px;
  height: 20px;
  background: #c7c0b8;
  border-radius: 99px;
  transition: background .25s ease;
  flex-shrink: 0;
}
.ios-switch::after {
  content: '';
  position: absolute;
  top: 2px;
  left: 2px;
  width: 16px;
  height: 16px;
  background: #fff;
  border-radius: 50%;
  box-shadow: 0 1px 4px rgba(0,0,0,.22);
  transition: transform .25s cubic-bezier(.4,0,.2,1);
}
.ios-toggle-wrap input:checked + .ios-switch {
  background: var(--accent);
}
.ios-toggle-wrap input:checked + .ios-switch::after {
  transform: translateX(16px);
}

/* Sidebar outline section (shown when outline-in-sidebar mode) */
.sidebar-outline-section {
  display: none;
  flex-direction: column;
  border-top: 1px solid var(--border);
  min-height: 0;
  flex: 1;
  overflow: hidden;
}
.sidebar-outline-section .outline-body {
  overflow-y: auto;
  padding: 8px;
  flex: 1;
}

/* Reader outline strip (shown on mobile when NOT in sidebar mode) */
.reader-outline-strip {
  display: none;
  border-bottom: 1px solid var(--border);
  background: #fcfbf8;
}
.reader-outline-strip .outline-head {
  border-radius: 0;
}
.reader-outline-strip .outline-body {
  max-height: 200px;
  overflow-y: auto;
  padding: 8px;
}

/* outline-in-sidebar mode */
body.outline-in-sidebar .outline-panel { display: none !important; }
body.outline-in-sidebar .layout { grid-template-columns: 300px 1fr; }
body.outline-in-sidebar .sidebar-outline-section { display: flex; }

/* non-sidebar mode on mobile: show reader strip */
@media (max-width: 1000px) {
  body:not(.outline-in-sidebar) .reader-outline-strip { display: block; }
}

/* Mobile sidebar toggle button — hidden on desktop */
.sidebar-toggle {
  display: none;
  align-items: center;
  justify-content: center;
  width: 34px;
  height: 34px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
  cursor: pointer;
  color: var(--text-2);
  font-size: 1.1rem;
  transition: border-color .2s, background .2s;
  flex-shrink: 0;
}
.sidebar-toggle:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

/* Drawer backdrop */
.drawer-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.35);
  z-index: 900;
  opacity: 0;
  transition: opacity .3s ease;
}
.drawer-backdrop.visible {
  display: block;
  opacity: 1;
}

@media (max-width: 1200px) {
  body:not(.outline-in-sidebar) .layout { grid-template-columns: 280px 1fr; }
  body:not(.outline-in-sidebar) .outline-panel { display: none; }
}

/* "Vertical mode" (portrait tablets): stack panels full-width */
@media (max-width: 1200px) and (orientation: portrait) {
  .sidebar-toggle { display: none; }
  .drawer-backdrop { display: none !important; }
  body.outline-in-sidebar .layout,
  body:not(.outline-in-sidebar) .layout { grid-template-columns: 1fr; }
  .layout > .sidebar {
    position: static;
    top: auto;
    left: auto;
    width: 100%;
    max-width: none;
    height: auto;
    z-index: auto;
    border-radius: var(--radius-lg);
    transform: none;
    transition: none;
    overflow: hidden;
    max-height: none;
  }
  .layout > .sidebar.drawer-open { transform: none; }
  body:not(.outline-in-sidebar) .outline-panel { display: none; }
  body:not(.outline-in-sidebar) .reader-outline-strip { display: block; }
}

@media (max-width: 1000px) {
  .sidebar-toggle { display: flex; }
  body.outline-in-sidebar .layout,

<body>

  <div class="login-logo">NB <span>Quiz</span></div>

  <button class="google-btn" onclick="signInWithGoogle()">

    Continue with Google

  <div class="login-error" id="loginError"></div>

<header class="page-header">
  <div class="logo">NB <span>Notes</span></div>
  <div class="header-right">
    <label class="ios-toggle-wrap" title="Move heading outline into the sidebar">
      <input type="checkbox" id="outlineInSidebarToggle" onchange="toggleOutlineInSidebar()">

<main class="layout">
  <aside class="panel sidebar">
    <button type="button" class="panel-head collapsible-panel-head" id="composerSectionToggle" aria-expanded="true" onclick="toggleComposerSection()">
      <span class="collapsible-chevron" aria-hidden="true">▾</span>
      Create or Import Note
    </button>
    <div class="composer" id="composerSectionBody">
      <label class="label" for="noteTitle">Title</label>
      <input class="input" id="noteTitle" placeholder="e.g. Endocrine summary">
      <label class="label" style="margin-top:10px;" for="noteMarkdown">Markdown</label>
      <textarea class="textarea" id="noteMarkdown" placeholder="# Topic&#10;## Subtopic&#10;Content..."></textarea>
      <div class="row">
        <button class="btn btn-primary" onclick="createNote()">Create note</button>
        <button class="btn" onclick="triggerFileImport()">Import .md file</button>
        <button class="btn" onclick="saveCurrentNote()">Save changes</button>
        <button class="btn" onclick="deleteCurrentNote()">Delete note</button>
      </div>

  <div class="drawer-backdrop" id="drawerBackdrop" onclick="closeSidebar()"></div>

        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>

<script>
firebase.initializeApp({
  apiKey:            'AIzaSyCNnvrEli5lzU3sUFvttTsQPIYQXYK1_WE',
  authDomain:        'nbquiz-6faf9.firebaseapp.com',
  projectId:         'nbquiz-6faf9',
  storageBucket:     'nbquiz-6faf9.firebasestorage.app',
  messagingSenderId: '913114740758',
  appId:             '1:913114740758:web:a856bb9c8eedf3cd629d37',
});
const auth = firebase.auth();
const db = firebase.firestore();
const provider = new firebase.auth.GoogleAuthProvider();

let currentUid = null;
let notes = [];
let currentNoteId = null;
let markedOnly = false;
let outlineInSidebar = localStorage.getItem('outlineInSidebar') === 'true';
let renderedTree = null;
let renderedMarkedCount = 0;
let suppressComposerWrite = false;
let composerCollapsed = localStorage.getItem('notesComposerCollapsed') === 'true';
let folderCollapsedPaths = new Set(
  JSON.parse(localStorage.getItem('notesFoldersCollapsed') || '[]').filter(p => typeof p === 'string')
);

function applyComposerCollapsed() {
  const btn = document.getElementById('composerSectionToggle');
  const body = document.getElementById('composerSectionBody');
  if (!btn || !body) return;
  btn.setAttribute('aria-expanded', composerCollapsed ? 'false' : 'true');
  body.classList.toggle('is-collapsed', composerCollapsed);
}

function toggleComposerSection() {
  composerCollapsed = !composerCollapsed;
  localStorage.setItem('notesComposerCollapsed', composerCollapsed ? 'true' : 'false');
  applyComposerCollapsed();
}

function toggleFolderCollapse(folderPath) {
  if (folderCollapsedPaths.has(folderPath)) folderCollapsedPaths.delete(folderPath);
  else folderCollapsedPaths.add(folderPath);
  localStorage.setItem('notesFoldersCollapsed', JSON.stringify([...folderCollapsedPaths]));
  renderNotesList();
}

function applyOutlineInSidebar() {
  document.getElementById('outlineInSidebarToggle').checked = outlineInSidebar;
  if (outlineInSidebar) {
    document.body.classList.add('outline-in-sidebar');
  } else {
    document.body.classList.remove('outline-in-sidebar');
  }
}

function toggleOutlineInSidebar() {
  outlineInSidebar = document.getElementById('outlineInSidebarToggle').checked;
  localStorage.setItem('outlineInSidebar', outlineInSidebar);
  applyOutlineInSidebar();
  renderReader();
}

applyOutlineInSidebar();
applyComposerCollapsed();

function signInWithGoogle() {
  document.getElementById('loginError').textContent = '';
  auth.signInWithPopup(provider).catch(() => {
    document.getElementById('loginError').textContent = 'Sign-in failed. Please try again.';
  });
}
function signOut() { auth.signOut(); }
function notesCollection() {
  return db.collection('quizSessions').doc(currentUid).collection('notesDocuments');
}

auth.onAuthStateChanged(async user => {
  if (!user) {
    document.getElementById('loginScreen').classList.remove('hidden');
    document.getElementById('userInfo').textContent = '';
    currentUid = null;
    notes = [];
    currentNoteId = null;
    renderNotesList();
    renderReader();
    return;
  }
  currentUid = user.uid;
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('userInfo').textContent = user.email;
  await loadNotes();
});

async function loadNotes() {
  try {
    const snap = await notesCollection().orderBy('updatedAt', 'desc').get();
    notes = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    if (currentNoteId && !notes.some(n => n.id === currentNoteId)) {
      currentNoteId = null;
    }
    if (!currentNoteId && notes.length) currentNoteId = notes[0].id;
    renderNotesList();
    syncComposerToCurrent();
    renderReader();
  } catch (err) {
    setComposerStatus('Error loading notes: ' + err.message, true);
  }
}

function splitNoteTitlePath(title) {
  return String(title || '')
    .split('/')
    .map(s => s.trim())
    .filter(Boolean);
}

function noteUpdatedMs(note) {
  const ts = note.updatedAt;
  if (ts && typeof ts.toDate === 'function') {
    const d = ts.toDate();
    return d instanceof Date && !Number.isNaN(d.getTime()) ? d.getTime() : 0;
  }
  return 0;
}

function buildNotesFolderTree(notesList) {
  const root = { folders: new Map(), entries: [] };
  for (const note of notesList) {
    const parts = splitNoteTitlePath(note.title);
    const displayTitle = parts.length ? parts[parts.length - 1] : 'Untitled note';
    const pathParts = parts.length > 1 ? parts.slice(0, -1) : [];
    let node = root;
    for (const seg of pathParts) {
      if (!node.folders.has(seg)) {
        node.folders.set(seg, { folders: new Map(), entries: [] });
      }
      node = node.folders.get(seg);
    }
    node.entries.push({ note, displayTitle });
  }
  return root;
}

function renderNotesTreeHtml(tree, depth, pathPrefix) {
  const padLeft = 14 + depth * 12;
  const folderNames = [...tree.folders.keys()].sort((a, b) => a.localeCompare(b, undefined, { sensitivity: 'base' }));
  const sortedNotes = [...tree.entries].sort((a, b) => noteUpdatedMs(b.note) - noteUpdatedMs(a.note));
  let html = '';
  for (const name of folderNames) {
    const child = tree.folders.get(name);
    const folderPath = pathPrefix ? `${pathPrefix}/${name}` : name;
    const collapsed = folderCollapsedPaths.has(folderPath);
    const chev = collapsed ? '▸' : '▾';
    html += `<div class="note-folder-wrap">
      <button type="button" class="note-folder-row" style="padding-left:${padLeft}px" onclick="toggleFolderCollapse('${escAttr(folderPath)}')" aria-expanded="${!collapsed}">
        <span class="note-folder-chevron" aria-hidden="true">${chev}</span>
        <span class="note-folder-name">${escHtml(name)}</span>
      </button>`;
    if (!collapsed) {
      html += `<div class="note-folder-children">${renderNotesTreeHtml(child, depth + 1, folderPath)}</div>`;
    }
    html += '</div>';
  }
  for (const { note, displayTitle } of sortedNotes) {
    const active = note.id === currentNoteId ? 'active' : '';
    const fullTitle = note.title || 'Untitled note';
    const metaTitle = displayTitle !== fullTitle ? escHtml(fullTitle) + ' · ' : '';
    html += `<button type="button" class="note-item ${active}" style="padding-left:${padLeft}px" onclick="selectNote('${escAttr(note.id)}')">
      <div class="note-title">${escHtml(displayTitle)}</div>
      <div class="note-meta">${metaTitle}${formatDate(note.updatedAt)} · ${countHeadings(note.markdown || '')} headings</div>
    </button>`;
  }
  return html;
}

function renderNotesList() {
  const list = document.getElementById('noteList');
  if (!notes.length) {
    list.innerHTML = '<div class="empty-list">No notes yet.</div>';
    return;
  }
  const tree = buildNotesFolderTree(notes);
  list.innerHTML = renderNotesTreeHtml(tree, 0, '');
}

function selectNote(noteId) {
  currentNoteId = noteId;
  renderNotesList();
  syncComposerToCurrent();
  renderReader();
  if (window.innerWidth <= 1000) closeSidebar();
}

function getCurrentNote() {
  return notes.find(n => n.id === currentNoteId) || null;
}

function syncComposerToCurrent() {
  if (suppressComposerWrite) return;
  const note = getCurrentNote();
  if (!note) return;
  document.getElementById('noteTitle').value = note.title || '';
  document.getElementById('noteMarkdown').value = note.markdown || '';
}

function setComposerStatus(msg, isErr = false) {
  const el = document.getElementById('composerStatus');
  el.textContent = msg || '';
  el.style.color = isErr ? '#991b1b' : 'var(--text-3)';
}

async function createNote() {
  const titleInput = document.getElementById('noteTitle').value.trim();
  const markdown = document.getElementById('noteMarkdown').value;
  if (!markdown.trim()) {
    setComposerStatus('Markdown is empty.', true);
    return;
  }
  const title = titleInput || deriveTitleFromMarkdown(markdown);
  const parsed = parseMarkdownHierarchy(markdown);
  const markedHeadingIds = flattenNodes(parsed.root.children).filter(n => n.isMarked).map(n => n.id);
  setComposerStatus('Creating note...');
  try {
    const ref = await notesCollection().add({
      title,
      markdown,
      markedHeadingIds,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
    });
    setComposerStatus('Created.');
    await loadNotes();
    currentNoteId = ref.id;
    renderNotesList();
    renderReader();
  } catch (err) {
    setComposerStatus('Create failed: ' + err.message, true);
  }
}

async function saveCurrentNote() {
  const note = getCurrentNote();
  if (!note) {
    setComposerStatus('Select a note first.', true);
    return;
  }
  const titleInput = document.getElementById('noteTitle').value.trim();
  const markdown = document.getElementById('noteMarkdown').value;
  if (!markdown.trim()) {
    setComposerStatus('Markdown is empty.', true);
    return;
  }
  const title = titleInput || deriveTitleFromMarkdown(markdown);
  const parsed = parseMarkdownHierarchy(markdown);
  const filteredMarked = flattenNodes(parsed.root.children).filter(n => n.isMarked).map(n => n.id);

  setComposerStatus('Saving changes...');
  try {
    await notesCollection().doc(note.id).update({
      title,
      markdown,
      markedHeadingIds: filteredMarked,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
    });
    setComposerStatus('Saved.');
    const localNote = notes.find(n => n.id === note.id);
    if (localNote) {
      localNote.title = title;
      localNote.markdown = markdown;
      localNote.markedHeadingIds = filteredMarked;
      localNote.updatedAt = { toDate: () => new Date() };
    }
    renderNotesList();
    renderReader();
  } catch (err) {
    setComposerStatus('Save failed: ' + err.message, true);
  }
}

async function deleteCurrentNote() {
  const note = getCurrentNote();
  if (!note) {
    setComposerStatus('Select a note first.', true);
    return;
  }
  const ok = window.confirm(`Delete "${note.title || 'Untitled note'}"?`);
  if (!ok) return;
  setComposerStatus('Deleting note...');
  try {
    await notesCollection().doc(note.id).delete();
    notes = notes.filter(n => n.id !== note.id);
    currentNoteId = notes.length ? notes[0].id : null;
    setComposerStatus('Deleted.');
    renderNotesList();
    syncComposerToCurrent();
    renderReader();
  } catch (err) {
    setComposerStatus('Delete failed: ' + err.message, true);
  }
}

function triggerFileImport() {
  document.getElementById('fileInput').click();
}

async function handleFileImport(event) {
  const file = event.target.files && event.target.files[0];
  event.target.value = '';
  if (!file) return;
  try {
    const text = await file.text();
    const inferredTitle = file.name.replace(/\.[^.]+$/, '');
    document.getElementById('noteTitle').value = inferredTitle;
    document.getElementById('noteMarkdown').value = text;
    setComposerStatus('Imported file into editor. Click "Create note".');
  } catch (err) {
    setComposerStatus('Import failed: ' + err.message, true);
  }
}

function toggleMarkedOnly() {
  markedOnly = document.getElementById('markedOnlyToggle').checked;
  renderReader();
}

function renderReader() {
  try {
  const readerBody = document.getElementById('readerBody');
  const readerTitle = document.getElementById('readerTitle');
  const tileChip = document.getElementById('tileCountChip');
  const markedChip = document.getElementById('markedCountChip');

  const note = getCurrentNote();
  if (!note) {
    readerTitle.textContent = 'No note selected';
    tileChip.textContent = '0 tiles';
    markedChip.textContent = '0 marked';
    readerBody.innerHTML = '<div class="empty-reader">Create or import a markdown note to start.</div>';
    const emptyOutline = '<div class="outline-empty">No headings to show.</div>';
    ['outlineBody', 'sidebarOutlineBody', 'readerOutlineBody'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.innerHTML = emptyOutline;
    });
    return;
  }

  const markdown = note.markdown || '';
  const parseResult = parseMarkdownHierarchy(markdown);
  renderedTree = parseResult.root;
  const allNodes = flattenNodes(renderedTree.children);
  const markedSet = new Set(allNodes.filter(n => n.isMarked).map(n => n.id));
  const legacyMarked = Array.isArray(note.markedHeadingIds) ? note.markedHeadingIds : [];
  for (const legacyId of legacyMarked) markedSet.add(legacyId);
  renderedMarkedCount = allNodes.filter(n => markedSet.has(n.id)).length;

  readerTitle.textContent = note.title || 'Untitled note';
  tileChip.textContent = `${allNodes.length} tiles`;
  markedChip.textContent = `${renderedMarkedCount} marked`;

  const setAllOutlines = (html) => {
    ['outlineBody', 'sidebarOutlineBody', 'readerOutlineBody'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.innerHTML = html;
    });
  };

  if (!allNodes.length) {
    const html = markdownToHtml(markdown);
    readerBody.innerHTML = html
      ? `<div class="doc-content">${html}</div>`
      : '<div class="empty-reader">This note has no headings yet. Add markdown headings like #, ##, ### to create tiles.</div>';
    setAllOutlines('<div class="outline-empty">This note has no headings yet.</div>');
    return;
  }

  const displayRoot = markedOnly ? pruneTreeToMarked(renderedTree, markedSet) : cloneTree(renderedTree);
  const visibleNodes = flattenNodes(displayRoot.children);
  if (markedOnly && !visibleNodes.length) {
    readerBody.innerHTML = '<div class="empty-reader">No marked headings yet. Mark tiles to build your filtered document view.</div>';
    setAllOutlines('<div class="outline-empty">No marked headings yet.</div>');
    return;
  }

  renderOutline(displayRoot, markedSet, markedOnly);

  let html = '';
  const rootContent = (displayRoot.contentLines || []).join('\n').trim();
  if (rootContent && !markedOnly) {
    html += `<div class="doc-content">${markdownToHtml(rootContent)}</div>`;
  }
  html += displayRoot.children.map(node => renderTile(node, markedSet, markedOnly)).join('');
  readerBody.innerHTML = html;
  } finally {
    syncNotesDrawerTop();
  }
}

function renderOutline(root, markedSet, isMarkedOnly) {
  const containers = [
    document.getElementById('outlineBody'),
    document.getElementById('sidebarOutlineBody'),
    document.getElementById('readerOutlineBody'),
  ];
  if (!root.children || !root.children.length) {
    const empty = '<div class="outline-empty">No headings to show.</div>';
    containers.forEach(c => { if (c) c.innerHTML = empty; });
    return;
  }

  const nearestMarkedMap = isMarkedOnly ? computeNearestMarkedMap(root, markedSet) : new Map();
  const html = root.children.map(node => renderOutlineNode(node, 1, markedSet, isMarkedOnly, nearestMarkedMap)).join('');
  containers.forEach(c => { if (c) c.innerHTML = html; });
}

function renderOutlineNode(node, depth, markedSet, isMarkedOnly, nearestMarkedMap) {
  const isDirectMarked = markedSet.has(node.id);
  const isAncestorOnly = isMarkedOnly && !isDirectMarked;
  const targetNodeId = isAncestorOnly ? (nearestMarkedMap.get(node.id) || node.id) : node.id;
  const titleHtml = markdownToInlineHtml(node.title);
  const classes = [
    'outline-item',
    isDirectMarked ? 'marked' : '',
    isAncestorOnly ? 'ancestor' : '',
  ].filter(Boolean).join(' ');
  const padding = 8 + Math.max(0, depth - 1) * 14;

  return `<div>
    <button class="${classes}" style="padding-left:${padding}px;" onclick="jumpToTile('${escAttr(targetNodeId)}')">
      <span class="outline-item-level">H${node.level}</span>
      <span class="outline-item-title">${titleHtml}</span>
    </button>
    ${node.children.map(child => renderOutlineNode(child, depth + 1, markedSet, isMarkedOnly, nearestMarkedMap)).join('')}
  </div>`;
}

function computeNearestMarkedMap(root, markedSet) {
  const map = new Map();
  function walk(node) {
    let best = markedSet.has(node.id) ? { id: node.id, distance: 0 } : null;
    for (const child of node.children) {
      const childBest = walk(child);
      if (!childBest) continue;
      const candidate = { id: childBest.id, distance: childBest.distance + 1 };
      if (!best || candidate.distance < best.distance) best = candidate;
    }
    map.set(node.id, best ? best.id : null);
    return best;
  }
  for (const child of root.children || []) walk(child);
  return map;
}

function jumpToTile(nodeId) {
  if (window.innerWidth <= 1000) closeSidebar();
  const tile = document.getElementById(domTileId(nodeId));
  if (!tile) return;
  scrollToTile(tile, 120);
  tile.classList.add('tile-flash');
  window.setTimeout(() => tile.classList.remove('tile-flash'), 1200);
}

function scrollToTile(tileEl, durationMs) {
  const prefersReduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const rect = tileEl.getBoundingClientRect();
  const targetY = window.scrollY + rect.top - 10;
  if (prefersReduced || !durationMs || durationMs <= 0) {
    window.scrollTo(0, targetY);
    return;
  }

  const startY = window.scrollY;
  const delta = targetY - startY;
  const startT = performance.now();
  const easeOutCubic = (t) => 1 - Math.pow(1 - t, 3);

  function step(now) {
    const t = Math.min(1, (now - startT) / durationMs);
    const y = startY + delta * easeOutCubic(t);
    window.scrollTo(0, y);
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function domTileId(nodeId) {
  return 'tile_' + encodeURIComponent(String(nodeId || '')).replace(/%/g, '_');
}

function renderTile(node, markedSet, isMarkedOnly) {
  const titleHtml = markdownToInlineHtml(node.title);
  const contentMd = (node.contentLines || []).join('\n').trim();
  const contentHtml = contentMd ? `<div class="tile-content">${markdownToHtml(contentMd)}</div>` : '';
  const isMarked = markedSet.has(node.id);
  const markBtnClass = isMarked ? 'mark-btn marked' : 'mark-btn';
  const tileClass = isMarked ? 'tile marked' : 'tile';
  const contextualAncestorClass = isMarkedOnly && !isMarked ? ' tile-context-only' : '';

  return `<article class="${tileClass}${contextualAncestorClass}" id="${domTileId(node.id)}">
    <div class="tile-head">
      <span class="tile-level">H${node.level}</span>
      <div class="tile-title">${titleHtml}</div>
      <button class="${markBtnClass}" onmousedown="startUnmark(event, '${escAttr(node.id)}')" onmouseup="cancelUnmark('${escAttr(node.id)}')" onmouseleave="cancelUnmark('${escAttr(node.id)}')" ontouchstart="startUnmark(event, '${escAttr(node.id)}')" ontouchend="cancelUnmark('${escAttr(node.id)}')">${isMarked ? 'Marked' : 'Mark'}</button>
    </div>
    ${contentHtml}
    ${node.children.length ? `<div class="tile-children">${node.children.map(child => renderTile(child, markedSet, isMarkedOnly)).join('')}</div>` : ''}
  </article>`;
}

let unmarkTimers = {};
let unmarkProgressEls = {};

function startUnmark(e, nodeId) {
  const note = getCurrentNote();
  if (!note) return;
  const parsed = parseMarkdownHierarchy(note.markdown || '');
  const set = new Set(flattenNodes(parsed.root.children).filter(n => n.isMarked).map(n => n.id));
  const legacyMarked = Array.isArray(note.markedHeadingIds) ? note.markedHeadingIds : [];
  for (const legacyId of legacyMarked) set.add(legacyId);
  if (!set.has(nodeId)) {
    doMark(nodeId);
    return;
  }
  const btn = e.currentTarget;
  const progress = document.createElement('span');
  progress.className = 'unmark-progress';
  btn.appendChild(progress);
  unmarkProgressEls[nodeId] = progress;

  unmarkTimers[nodeId] = setTimeout(() => {
    doUnmark(nodeId);
    clearUnmarkProgress(nodeId);
  }, 800);
}

function cancelUnmark(nodeId) {
  if (unmarkTimers[nodeId]) {
    clearTimeout(unmarkTimers[nodeId]);
    delete unmarkTimers[nodeId];
  }
  clearUnmarkProgress(nodeId);
}

function clearUnmarkProgress(nodeId) {
  if (unmarkProgressEls[nodeId]) {
    unmarkProgressEls[nodeId].remove();
    delete unmarkProgressEls[nodeId];
  }
}

async function doMark(nodeId) {
  const note = getCurrentNote();
  if (!note) return;
  const updatedMarkdown = updateHeadingMarkInMarkdown(note.markdown || '', nodeId, true);
  if (!updatedMarkdown) return;
  note.markdown = updatedMarkdown;
  const markdownEl = document.getElementById('noteMarkdown');
  if (markdownEl) markdownEl.value = updatedMarkdown;
  const parsed = parseMarkdownHierarchy(updatedMarkdown);
  const markedHeadingIds = flattenNodes(parsed.root.children).filter(n => n.isMarked).map(n => n.id);
  note.markedHeadingIds = markedHeadingIds;
  renderReader();
  const tile = document.getElementById(domTileId(nodeId));
  if (tile) {
    tile.classList.add('mark-sweep');
    setTimeout(() => tile.classList.remove('mark-sweep'), 750);
  }
  try {
    await notesCollection().doc(note.id).update({
      markdown: updatedMarkdown,
      markedHeadingIds,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
    });
  } catch (err) {
    setComposerStatus('Mark update failed: ' + err.message, true);
  }
}

async function doUnmark(nodeId) {
  const note = getCurrentNote();
  if (!note) return;
  const updatedMarkdown = updateHeadingMarkInMarkdown(note.markdown || '', nodeId, false);
  if (!updatedMarkdown) return;
  note.markdown = updatedMarkdown;
  const markdownEl = document.getElementById('noteMarkdown');
  if (markdownEl) markdownEl.value = updatedMarkdown;
  const parsed = parseMarkdownHierarchy(updatedMarkdown);
  const markedHeadingIds = flattenNodes(parsed.root.children).filter(n => n.isMarked).map(n => n.id);
  note.markedHeadingIds = markedHeadingIds;
  renderReader();
  try {
    await notesCollection().doc(note.id).update({
      markdown: updatedMarkdown,
      markedHeadingIds,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
    });
  } catch (err) {
    setComposerStatus('Mark update failed: ' + err.message, true);
  }
}

function parseMarkdownHierarchy(markdown) {
  const lines = String(markdown || '').replace(/\r\n/g, '\n').split('\n');
  const root = { id: 'root', level: 0, title: '', contentLines: [], children: [], childSlugCounts: {} };
  const stack = [root];
  let inFence = false;

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    if (/^(```|~~~)/.test(line.trim())) {
      inFence = !inFence;
      stack[stack.length - 1].contentLines.push(line);
      continue;
    }
    if (!inFence) {
      const match = line.match(/^(#{1,6})\s+(⭐\s*)?(.+?)\s*#*\s*$/);
      if (match) {
        const level = match[1].length;
        const isMarked = Boolean(match[2]);
        const rawTitle = match[3].trim();
        while (stack.length > 1 && stack[stack.length - 1].level >= level) stack.pop();
        const parent = stack[stack.length - 1];
        const slug = slugify(rawTitle) || 'section';
        const count = (parent.childSlugCounts[slug] || 0) + 1;
        parent.childSlugCounts[slug] = count;
        const id = parent.id === 'root' ? `${slug}-${count}` : `${parent.id}/${slug}-${count}`;
        const node = {
          id,
          level,
          title: rawTitle,
          isMarked,
          lineIndex: i,
          contentLines: [],
          children: [],
          childSlugCounts: {},
        };
        parent.children.push(node);
        stack.push(node);
        continue;
      }
    }
    stack[stack.length - 1].contentLines.push(line);
  }
  return { root };
}

function updateHeadingMarkInMarkdown(markdown, nodeId, shouldMark) {
  const source = String(markdown || '').replace(/\r\n/g, '\n');
  const lines = source.split('\n');
  const parsed = parseMarkdownHierarchy(source);
  const allNodes = flattenNodes(parsed.root.children);
  const node = allNodes.find(n => n.id === nodeId);
  if (!node || typeof node.lineIndex !== 'number') return source;
  const line = lines[node.lineIndex] || '';
  const headingMatch = line.match(/^(\s*)(#{1,6})(\s+)(⭐\s*)?(.+?)(\s*#*\s*)$/);
  if (!headingMatch) return source;
  const leading = headingMatch[1] || '';
  const hashes = headingMatch[2] || '';
  const spacing = headingMatch[3] || ' ';
  const title = (headingMatch[5] || '').trim();
  const trailing = headingMatch[6] || '';
  lines[node.lineIndex] = shouldMark
    ? `${leading}${hashes}${spacing}⭐ ${title}${trailing}`
    : `${leading}${hashes}${spacing}${title}${trailing}`;
  return lines.join('\n');
}

function pruneTreeToMarked(root, markedSet) {
  const cloneRoot = {
    id: root.id,
    level: root.level,
    title: root.title,
    contentLines: root.contentLines ? [...root.contentLines] : [],
    children: [],
  };
  cloneRoot.children = root.children.map(child => pruneNode(child, markedSet)).filter(Boolean);
  return cloneRoot;
}

function pruneNode(node, markedSet) {
  if (markedSet.has(node.id)) {
    // Node is marked: include it with all its descendants (not just marked ones)
    return cloneTree(node);
  }
  const children = node.children.map(child => pruneNode(child, markedSet)).filter(Boolean);
  if (!children.length) return null;
  return {
    id: node.id,
    level: node.level,
    title: node.title,
    contentLines: [...(node.contentLines || [])],
    children,
  };
}

function cloneTree(node) {
  return {
    id: node.id,
    level: node.level,
    title: node.title,
    isMarked: Boolean(node.isMarked),
    lineIndex: node.lineIndex,
    contentLines: [...(node.contentLines || [])],
    children: (node.children || []).map(cloneTree),
  };
}

function flattenNodes(nodes) {
  const list = [];
  for (const node of nodes) {
    list.push(node);
    if (node.children && node.children.length) {
      list.push(...flattenNodes(node.children));
    }
  }
  return list;
}

function slugify(text) {
  return String(text || '')
    .toLowerCase()
    .trim()
    .replace(/[^\w\s-]/g, '')
    .replace(/\s+/g, '-')
    .replace(/-+/g, '-')
    .replace(/^-|-$/g, '');
}

function markdownToHtml(md) {
  if (!String(md || '').trim()) return '';
  return DOMPurify.sanitize(marked.parse(md, { breaks: true, gfm: true, headerIds: false, mangle: false }));
}

function markdownToInlineHtml(md) {
  if (!String(md || '').trim()) return '';
  return DOMPurify.sanitize(marked.parseInline(md, { gfm: true, headerIds: false, mangle: false }));
}

function deriveTitleFromMarkdown(markdown) {
  const lines = String(markdown || '').split(/\r?\n/);
  for (const line of lines) {
    const heading = line.match(/^#{1,6}\s+(?:⭐\s*)?(.+?)\s*#*\s*$/);
    if (heading && heading[1]) return heading[1].trim();
  }
  for (const line of lines) {
    if (line.trim()) return line.trim().slice(0, 60);
  }
  return 'Untitled note';
}

function countHeadings(markdown) {
  return String(markdown || '').split(/\r?\n/).filter(line => /^#{1,6}\s+/.test(line)).length;
}

function formatDate(ts) {
  if (!ts || typeof ts.toDate !== 'function') return 'just now';
  const d = ts.toDate();
  if (!(d instanceof Date) || Number.isNaN(d.getTime())) return 'just now';
  return d.toLocaleString(undefined, {
    year: 'numeric',
    month: 'short',
    day: 'numeric',
    hour: '2-digit',
    minute: '2-digit',
  });
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
function escAttr(s) {
  return String(s).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
}

/** Offset for the mobile drawer so it clears the header and reader chrome (incl. hamburger row). */
function syncNotesDrawerTop() {
  const header = document.querySelector('.page-header');
  const outlineStrip = document.getElementById('readerOutlineStrip');
  const readerTop = document.querySelector('.reader-top');
  let h = header ? header.offsetHeight : 0;
  if (outlineStrip && getComputedStyle(outlineStrip).display !== 'none') {
    h += outlineStrip.offsetHeight;
  }
  if (readerTop) h += readerTop.offsetHeight;
  document.documentElement.style.setProperty('--notes-drawer-top', `${h}px`);
}

let notesDrawerTopSyncScheduled = false;
function scheduleSyncNotesDrawerTop() {
  if (notesDrawerTopSyncScheduled) return;
  notesDrawerTopSyncScheduled = true;
  requestAnimationFrame(() => {
    notesDrawerTopSyncScheduled = false;
    syncNotesDrawerTop();
  });
}

function toggleSidebar() {
  const sidebar = document.querySelector('.sidebar');
  const backdrop = document.getElementById('drawerBackdrop');
  const isOpen = sidebar.classList.contains('drawer-open');
  if (isOpen) {
    closeSidebar();
  } else {
    sidebar.classList.add('drawer-open');
    backdrop.classList.add('visible');
  }
}

function closeSidebar() {
  const sidebar = document.querySelector('.sidebar');
  const backdrop = document.getElementById('drawerBackdrop');
  sidebar.classList.remove('drawer-open');
  backdrop.classList.remove('visible');
}

(function initNotesMobileDrawer() {
  const reader = document.querySelector('.reader');
  if (reader) {
    reader.addEventListener('click', (e) => {
      if (window.innerWidth > 1000) return;
      const sidebar = document.querySelector('.sidebar');
      if (!sidebar.classList.contains('drawer-open')) return;
      if (e.target.closest('.sidebar-toggle')) return;
      closeSidebar();
    });
  }
  window.addEventListener('resize', scheduleSyncNotesDrawerTop);
  window.addEventListener('orientationchange', () => window.setTimeout(syncNotesDrawerTop, 250));
  syncNotesDrawerTop();
})();
</script>
