<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="NB Quiz">
<meta name="theme-color" content="#f7f5f0">
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="manifest" href="/manifest.json">

<title>NB Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
  onload="renderMathInElement(document.body, {
    delimiters: [
      {left: '$$', right: '$$', display: true},
      {left: '$',  right: '$',  display: false},
      {left: '\\(', right: '\\)', display: false},
      {left: '\\[', right: '\\]', display: true}
    ]
  })"></script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:           #f7f5f0;
  --surface:      #ffffff;
  --border:       #e2ddd5;
  --text:         #1a1714;
  --text-2:       #5a534a;
  --text-3:       #9a8f83;
  --accent:       #2563a8;
  --accent-light: #dbeafe;
  --correct-bar:  #4ade80;
  --wrong-bar:    #f87171;
  --radius:       10px;
  --radius-lg:    16px;
  --shadow:       0 1px 3px rgba(0,0,0,.07), 0 4px 16px rgba(0,0,0,.06);
  --font-serif:   'Crimson Pro', Georgia, serif;
  --font-sans:    'DM Sans', system-ui, sans-serif;
  --font-mono:    'DM Mono', monospace;

  /* Liquid Glass theme variables */
  --c-glass: #bbbbbc;
  --c-light: #fff;
  --c-dark: #000;
  --glass-reflex-dark: 1;
  --glass-reflex-light: 1;
  --saturation: 150%;
}
body { font-family: var(--font-sans); background: var(--bg); color: var(--text); min-height: 100vh; padding: 48px 24px 80px; transition: padding-bottom 0.2s ease; }
body.has-parent-selection-bar { padding-bottom: calc(88px + env(safe-area-inset-bottom, 0px)); }

/* ── Header ── */
.page-header { max-width: 760px; margin: 0 auto 0; display: flex; align-items: baseline; justify-content: space-between; padding-bottom: 20px; border-bottom: 1.5px solid var(--border); }
.logo { font-family: var(--font-serif); font-size: 2rem; font-weight: 600; color: var(--text); }
.logo span { color: var(--accent); }
.header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
.credit { font-size: .72rem; color: var(--text-3); font-family: var(--font-mono); }
.user-info  { font-size: .75rem; color: var(--text-3); font-family: var(--font-mono); display: none; }
.signout-btn { font-size: .72rem; color: var(--text-3); background: none; border: none; cursor: pointer; font-family: var(--font-mono); padding: 0; display: none; }
.signout-btn:hover { color: var(--accent); }
.admin-link { font-size: .72rem; font-family: var(--font-mono); font-weight: 500; color: var(--accent); text-decoration: none; border: 1px solid var(--accent); border-radius: 99px; padding: 3px 10px; display: none; align-items: center; gap: 4px; transition: background 150ms; }
.admin-link:hover { background: var(--accent-light); }

/* ── Section Tabs ── */
.section-tabs {
  max-width: 760px;
  margin: 0 auto 32px;
  display: flex;
  gap: 0;
  border-bottom: 1.5px solid var(--border);
  padding-top: 2px;
}
.section-tab {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 12px 20px 11px;
  font-family: var(--font-sans);
  font-size: .875rem;
  font-weight: 500;
  color: var(--text-3);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  margin-bottom: -1.5px;
  cursor: pointer;
  transition: color 150ms, border-color 150ms;
  white-space: nowrap;
}
.section-tab:hover { color: var(--text-2); }
.section-tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
  font-weight: 600;
}
.tab-icon { font-size: 1rem; line-height: 1; }

/* ── Grid ── */
.grid { max-width: 760px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; }

/* ── Resources panel ── */
.resources-panel {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow);
  overflow: hidden;
}
.resources-label {
  font-family: var(--font-mono);
  font-size: .7rem;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--text-3);
  padding: 14px 20px 10px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  display: flex;
  align-items: center;
  gap: 8px;
}
.resources-label::before {
  content: '';
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--accent);
  opacity: .6;
}
.resource-cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 0;
}
.resource-card {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 20px;
  text-decoration: none;
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  transition: background 150ms;
  position: relative;
}
.resource-card:last-child { border-bottom: none; border-right: none; }
.resource-card:hover { background: var(--accent-light); }
.resource-icon {
  flex-shrink: 0;
  width: 38px;
  height: 38px;
  border-radius: 9px;
  background: var(--accent-light);
  border: 1.5px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
}
.resource-info { flex: 1; min-width: 0; }
.resource-name {
  font-size: .88rem;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.resource-desc {
  font-size: .7rem;
  color: var(--text-3);
  font-family: var(--font-mono);
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.resource-arrow {
  font-size: .75rem;
  color: var(--text-3);
  flex-shrink: 0;
  transition: transform 150ms, color 150ms;
}
.resource-card:hover .resource-arrow { transform: translateX(3px); color: var(--accent); }

/* ── Quiz week cards ── */
.week-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--shadow); overflow: hidden; }
.week-label { font-family: var(--font-mono); font-size: .7rem; font-weight: 500; text-transform: uppercase; letter-spacing: .1em; color: var(--text-3); padding: 14px 20px 10px; border-bottom: 1px solid var(--border); background: var(--bg); }
.parent-pills-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 10px 20px 12px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.parent-pill {
  display: inline-flex;
  align-items: center;
  padding: 5px 12px;
  border-radius: 99px;
  border: 1.5px solid var(--accent);
  background: var(--accent-light);
  color: var(--accent);
  font-size: .78rem;
  font-weight: 600;
  font-family: var(--font-sans);
  text-decoration: none;
  transition: background 150ms, color 150ms, box-shadow 150ms;
  cursor: pointer;
}
.parent-pill:hover {
  background: var(--accent);
  color: #fff;
}
.parent-pill.selected {
  background: var(--accent);
  color: #fff;
  box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--accent);
}
.parent-pill.selected:hover {
  filter: brightness(1.05);
}

/* ── Multi parent selection bar ── */
.parent-selection-bar {
  display: none;
  position: fixed;
  left: 50%;
  bottom: 0;
  transform: translateX(-50%);
  width: min(760px, calc(100% - 32px));
  max-width: calc(100% - 32px);
  margin-bottom: max(12px, env(safe-area-inset-bottom, 0px));
  padding: 10px 14px;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
  /* Liquid glass pill shape - bright white frosted glass */
  background: color-mix(in srgb, var(--c-light) 45%, transparent);
  backdrop-filter: blur(2px) saturate(var(--saturation));
  -webkit-backdrop-filter: blur(2px) saturate(var(--saturation));
  border: 1px solid color-mix(in srgb, var(--c-light) 60%, transparent);
  border-radius: 99em;
  /* Elevated shadow with more depth */
  box-shadow:
    inset 0 1px 1px color-mix(in srgb, var(--c-light) 80%, transparent),
    inset 0 -1px 1px color-mix(in srgb, var(--c-dark) 8%, transparent),
    0 2px 8px color-mix(in srgb, var(--c-dark) 8%, transparent),
    0 6px 20px color-mix(in srgb, var(--c-dark) 10%, transparent),
    0 12px 28px color-mix(in srgb, var(--c-dark) 6%, transparent);
  z-index: 900;
  font-family: var(--font-sans);
}
.parent-selection-bar.visible { display: flex; }
.parent-selection-bar-text {
  font-size: .85rem;
  color: var(--text-2);
  font-family: var(--font-mono);
}
.parent-selection-bar-text strong { color: var(--text); font-weight: 600; }
.parent-selection-bar-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.parent-selection-bar button {
  font-family: var(--font-sans);
  font-size: .78rem;
  font-weight: 600;
  cursor: pointer;
  border-radius: 99px;
  padding: 8px 16px;
  border: none;
  /* Engraved appearance - recessed into the glass surface */
  background: color-mix(in srgb, var(--c-dark) 8%, transparent);
  color: var(--text-2);
  box-shadow:
    inset 0 1px 2px color-mix(in srgb, var(--c-dark) 20%, transparent),
    inset 0 -1px 1px color-mix(in srgb, var(--c-light) 40%, transparent),
    0 1px 0 color-mix(in srgb, var(--c-light) 30%, transparent);
  transition: background 200ms ease, color 200ms ease, box-shadow 200ms ease;
}
.parent-selection-bar button:hover {
  background: color-mix(in srgb, var(--c-dark) 12%, transparent);
  color: var(--text);
}
.parent-selection-bar button:active {
  box-shadow:
    inset 0 2px 4px color-mix(in srgb, var(--c-dark) 25%, transparent),
    inset 0 -1px 1px color-mix(in srgb, var(--c-light) 20%, transparent),
    0 0 0 transparent;
}
.parent-selection-bar .parent-selection-start {
  background: color-mix(in srgb, var(--accent) 85%, transparent);
  color: #fff;
  box-shadow:
    inset 0 1px 2px color-mix(in srgb, var(--c-dark) 30%, transparent),
    inset 0 -1px 1px color-mix(in srgb, var(--c-light) 30%, transparent),
    0 1px 0 color-mix(in srgb, var(--c-light) 20%, transparent);
}
.parent-selection-bar .parent-selection-start:hover {
  background: color-mix(in srgb, var(--accent) 92%, transparent);
  filter: brightness(1.05);
}
.parent-selection-bar .parent-selection-start:active {
  box-shadow:
    inset 0 2px 4px color-mix(in srgb, var(--c-dark) 35%, transparent),
    inset 0 -1px 1px color-mix(in srgb, var(--c-light) 15%, transparent),
    0 0 0 transparent;
}
.topic-list { padding: 8px 0; }
.topic-row { display: flex; align-items: flex-start; padding: 12px 20px; gap: 16px; border-bottom: 1px solid var(--border); }
.topic-row:last-child { border-bottom: none; }
.topic-name { font-size: .95rem; font-weight: 500; color: var(--text); min-width: 100px; padding-top: 10px; }
.pill-group { display: flex; gap: 10px; flex-wrap: wrap; flex: 1; }
.quiz-pill { display: flex; flex-direction: column; gap: 5px; min-width: 130px; max-width: 200px; flex: 1; }
.pill-link { display: flex; align-items: center; justify-content: space-between; padding: 7px 12px; border: 1.5px solid var(--border); border-radius: var(--radius); text-decoration: none; background: var(--bg); transition: border-color .15s, background .15s; }
.pill-link:hover { border-color: var(--accent); background: var(--accent-light); }
.pill-name  { font-family: var(--font-mono); font-size: .8rem; font-weight: 500; color: var(--accent); }
.pill-count { font-size: .68rem; color: var(--text-3); font-family: var(--font-mono); }

/* ── Progress bars ── */
.progress-wrap { display: flex; flex-direction: column; gap: 2px; }
.prog-bar { display: flex; height: 8px; border-radius: 99px; overflow: hidden; background: #e2ddd5; }
.seg { height: 100%; transition: width .4s ease; }
.seg-correct { background: var(--correct-bar); }
.seg-wrong   { background: var(--wrong-bar); }
.seg-unans   { background: #e2ddd5; }
.flag-bar { height: 3px; border-radius: 99px; background: linear-gradient(90deg,#f59e0b,#fbbf24,#fde68a,#f59e0b,#fbbf24); background-size: 200% 100%; animation: shimmer 2s linear infinite; width: 0%; transition: width .4s ease; }
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
.prog-labels { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 2px; }
.prog-label  { font-size: .65rem; font-family: var(--font-mono); color: var(--text-3); display: flex; align-items: center; gap: 3px; }
.prog-label .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.dot-correct { background: var(--correct-bar); }
.dot-wrong   { background: var(--wrong-bar); }
.dot-unans   { background: #b4b0a8; }
.dot-flag    { background: #f59e0b; }
.prog-pct    { font-size: .65rem; font-family: var(--font-mono); color: var(--text-3); margin-left: auto; }
.empty { text-align: center; color: var(--text-3); font-size: .9rem; padding: 48px; }

/* ── Skeleton loading ── */
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.skel { animation: pulse 1.5s ease infinite; background: var(--border); border-radius: 6px; }
.skel-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius-lg); padding: 20px; }
.skel-bar  { height: 10px; margin-bottom: 8px; }
.skel-pill { height: 36px; border-radius: var(--radius); flex: 1; min-width: 120px; max-width: 180px; }

/* ── Login overlay ── */
#bootScreen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1100; padding: 24px; gap: 14px; }
#bootScreen.hidden { display: none; }
.boot-spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.boot-label { font-family: var(--font-mono); font-size: .8rem; color: var(--text-3); }
#loginScreen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; padding: 24px; }
#loginScreen.hidden { display: none; }
.login-logo { font-family: var(--font-serif); font-size: 2.4rem; font-weight: 600; color: var(--text); margin-bottom: 6px; text-align: center; }
.login-logo span { color: var(--accent); }
.login-sub  { font-size: .85rem; color: var(--text-3); margin-bottom: 48px; text-align: center; }
.google-btn { display: flex; align-items: center; gap: 10px; padding: 13px 28px; background: var(--surface); border: 1.5px solid var(--border); border-radius: 99px; font-family: var(--font-sans); font-size: .9rem; font-weight: 600; color: var(--text); cursor: pointer; transition: border-color .15s, background .15s; }
.google-btn:hover { border-color: var(--accent); background: var(--accent-light); }
.login-error { margin-top: 16px; font-size: .8rem; color: #991b1b; min-height: 1em; text-align: center; }
.made-by-login { position: fixed; bottom: 20px; font-size: .72rem; color: var(--text-3); font-family: var(--font-mono); }

@media (max-width: 520px) {
  .topic-row { flex-direction: column; gap: 8px; }
  .topic-name { min-width: unset; padding-top: 0; }
  .quiz-pill { max-width: 100%; }
  .resource-cards { grid-template-columns: 1fr; }
  .resource-card { border-right: none; }
  .resource-card:nth-last-child(-n+2):nth-child(2n+1),
  .resource-card:nth-last-child(-n+2):nth-child(2n+1) ~ .resource-card { border-bottom: 1px solid var(--border); }
  .resource-card:last-child { border-bottom: none; }
  .section-tabs { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .section-tab { padding: 12px 14px 11px; font-size: .82rem; }
}
</style>
</head>
<body>

<div id="bootScreen">
  <div class="boot-spinner"></div>
  <div class="boot-label">Loading quizzes…</div>
</div>

<div id="loginScreen" class="hidden">
  <div class="login-logo">NB <span>Quiz</span></div>
  <div class="login-sub">Your personal medical study companion</div>
  <button class="google-btn" onclick="signInWithGoogle()">
    <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
    Continue with Google
  </button>
  <div class="login-error" id="loginError"></div>
  <div class="made-by-login">made by Zi Lin</div>
</div>

<header class="page-header">
  <div class="logo">NB <span>Quiz</span></div>
  <div class="header-right">
    <a class="admin-link" id="adminLink" href="/admin">⚙ Admin</a>
    <div class="credit">made by Zi Lin</div>
    <div class="user-info"  id="userInfo"></div>
    <button class="signout-btn" id="signoutBtn" onclick="signOut()">sign out</button>
  </div>
</header>

<nav class="section-tabs" id="sectionTabs">
  <button class="section-tab active" data-section-id="surgery" onclick="switchSection('surgery', this)">
    <span class="tab-icon">🔪</span> Surgery
  </button>
  <button class="section-tab" data-section-id="gp" onclick="switchSection('gp', this)">
    <span class="tab-icon">🩺</span> GP
  </button>
  <button class="section-tab" data-section-id="medicine" onclick="switchSection('medicine', this)">
    <span class="tab-icon">💊</span> Medicine
  </button>
</nav>

<main class="grid" id="grid">
  <div class="resources-panel" id="resourcesPanel">
    <div class="resources-label">Resources</div>
    <div class="resource-cards" id="resourceCards"></div>
  </div>

  <div class="skel-card" id="skeleton">
    <div class="skel skel-bar" style="width:40px;margin-bottom:16px;"></div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;">
      <div class="skel skel-pill"></div>
      <div class="skel skel-pill"></div>
      <div class="skel skel-pill"></div>
    </div>
  </div>
</main>

<div id="parentSelectionBar" class="parent-selection-bar" role="region" aria-label="Selected week themes">
  <span class="parent-selection-bar-text" id="parentSelectionBarText"></span>
  <div class="parent-selection-bar-actions">
    <button type="button" id="parentSelectionClear">Clear</button>
    <button type="button" class="parent-selection-start" id="parentSelectionStart">Start quiz</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:            'AIzaSyCNnvrEli5lzU3sUFvttTsQPIYQXYK1_WE',
  authDomain:        'nbquiz-6faf9.firebaseapp.com',
  projectId:         'nbquiz-6faf9',
  storageBucket:     'nbquiz-6faf9.firebasestorage.app',
  messagingSenderId: '913114740758',
  appId:             '1:913114740758:web:a856bb9c8eedf3cd629d37',
});
const auth = firebase.auth();
const db   = firebase.firestore();

const provider = new firebase.auth.GoogleAuthProvider();
function signInWithGoogle() {
  document.getElementById('loginError').textContent = '';
  auth.signInWithPopup(provider).catch(() => {
    document.getElementById('loginError').textContent = 'Sign-in failed. Please try again.';
  });
}
function signOut() { auth.signOut(); }

// ── Section state (keys = stable sectionId slugs; URLs use #surgery, #gp, #medicine) ──
const SECTIONS = {
  surgery: {
    label: 'Surgery',
    resources: [
      { href: '/notes',                  icon: '📝', name: 'Notes',              desc: 'Markdown note-taking app' },
      { href: '/wba',                    icon: '📋', name: 'WBA Requirements',   desc: 'Workplace-based assessments' },
      { href: '/surgery',                icon: '🔪', name: 'Surgery Handbook',   desc: 'Year 4 MD · 2026' },
      { href: '/lecture_sched',          icon: '📅', name: 'Lecture Schedule',   desc: 'Year 4 Surgery · 2026' },
      { href: '/surgery_master_reference', icon: '📌', name: 'Master List',      desc: 'Everything Schedule' },
      { href: '/promptmx/surgery-study-os.html', icon: '📚', name: 'OS Manager',       desc: 'Study pipeline & OS cases' },
    ]
  },
  gp: {
    label: 'GP',
    resources: [
      { href: '/notes',        icon: '📝', name: 'Notes',            desc: 'Markdown note-taking app' },
      { href: '/gp_handbook',  icon: '🩺', name: 'GP Handbook',       desc: 'Year 4 MD · 2026' },
      { href: '/gp_schedule',  icon: '📅', name: 'GP Schedule',       desc: 'Rotation timetable' },
      { href: '/gp_resources', icon: '📋', name: 'GP Resources',      desc: 'Clinical guidelines' },
    ]
  },
  medicine: {
    label: 'Medicine',
    resources: [
      { href: '/notes',        icon: '📝', name: 'Notes',             desc: 'Markdown note-taking app' },
      { href: '/med_handbook', icon: '💊', name: 'Medicine Handbook', desc: 'Year 4 MD · 2026' },
      { href: '/med_schedule', icon: '📅', name: 'Med Schedule',      desc: 'Ward rotation timetable' },
      { href: '/med_resources',icon: '📋', name: 'Med Resources',     desc: 'Clinical guidelines' },
    ]
  }
};

/** Maps legacy #Surgery / #GP / #Medicine hashes to sectionId. */
const LEGACY_SECTION_HASH = { Surgery: 'surgery', GP: 'gp', Medicine: 'medicine' };

function canonicalSectionIdFromLabel(sectionDisplay) {
  const s = String(sectionDisplay || 'Surgery')
    .trim()
    .toLowerCase();
  if (s === 'surgery') return 'surgery';
  if (s === 'gp') return 'gp';
  if (s === 'medicine') return 'medicine';
  return (
    s
      .replace(/[^a-z0-9_-]+/g, '-')
      .replace(/^-+|-+$/g, '')
      .slice(0, 48) || 'unknown'
  );
}

function normalizeHashToSectionId(raw) {
  const h = String(raw || '').trim();
  if (SECTIONS[h]) return h;
  if (LEGACY_SECTION_HASH[h]) return LEGACY_SECTION_HASH[h];
  const low = h.toLowerCase();
  if (SECTIONS[low]) return low;
  return 'surgery';
}

let currentSectionId = 'surgery';
let currentUid     = null;
// Cache of all quiz docs so we don't re-fetch on tab switch
let allQuizDocs    = null;

/** @type {Map<string, { week: string, weekId?: string, parentSlug: string, label: string }>} key = stable parent key */
const parentPillSelection = new Map();
const PARENT_MULTI_SESSION_KEY = 'nbquiz_multi_parent_sel';
const PARENT_SEL_MAX_URL = 1500;

auth.onAuthStateChanged(async user => {
  const boot = document.getElementById('bootScreen');
  if (user) {
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('userInfo').textContent = user.email;
    document.getElementById('userInfo').style.display = 'block';
    document.getElementById('signoutBtn').style.display = 'block';
    try {
      const snap = await db.collection('admins').doc(user.email).get();
      if (snap.exists) document.getElementById('adminLink').style.display = 'inline-flex';
    } catch(e) {}
    currentUid = user.uid;
    const hashRaw = window.location.hash.replace('#', '');
    let sid = normalizeHashToSectionId(hashRaw);
    if (LEGACY_SECTION_HASH[hashRaw]) {
      history.replaceState(null, '', '#' + sid);
    }
    currentSectionId = sid;
    document.querySelectorAll('.section-tab').forEach((btn) => {
      btn.classList.toggle('active', btn.dataset.sectionId === currentSectionId);
    });
    try {
      await loadQuizzes(user.uid);
    } finally {
      if (boot) boot.classList.add('hidden');
    }
  } else {
    document.getElementById('loginScreen').classList.remove('hidden');
    document.getElementById('userInfo').style.display = 'none';
    document.getElementById('signoutBtn').style.display = 'none';
    document.getElementById('adminLink').style.display = 'none';
    if (boot) boot.classList.add('hidden');
  }
});

// ── Tab switching ──────────────────────────────────────────────────────────────
async function switchSection(sectionId, btn) {
  if (sectionId === currentSectionId) return;
  currentSectionId = sectionId;
  window.location.hash = sectionId;

  clearParentPillSelection();

  document.querySelectorAll('.section-tab').forEach((b) => b.classList.remove('active'));
  btn.classList.add('active');

  renderResources(sectionId);

  clearQuizCards();
  if (allQuizDocs) {
    await renderSectionGrid(allQuizDocs, currentUid);
  }
}

// ── Load quizzes from Firestore (once) ────────────────────────────────────────
async function loadQuizzes(uid) {
  try {
    const snap = await db.collection('quizzes').get();
    allQuizDocs = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));

    renderResources(currentSectionId);
    await renderSectionGrid(allQuizDocs, uid);
  } catch(e) {
    document.getElementById('skeleton').outerHTML = `<p class="empty">Error loading quizzes: ${escHtml(e.message)}</p>`;
  }
}

function renderResources(sectionId) {
  const sec = SECTIONS[sectionId] || SECTIONS.surgery;
  const cards = sec.resources;
  document.getElementById('resourceCards').innerHTML = cards.map(c => `
    <a class="resource-card" href="${c.href}" target="_blank">
      <div class="resource-icon">${c.icon}</div>
      <div class="resource-info">
        <div class="resource-name">${c.name}</div>
        <div class="resource-desc">${c.desc}</div>
      </div>
      <div class="resource-arrow">→</div>
    </a>
  `).join('');
}

function clearQuizCards() {
  clearParentPillSelection();
  // Remove all week-cards but leave the resources panel
  document.querySelectorAll('#grid .week-card, #grid .empty').forEach(el => el.remove());
  // Re-add a skeleton
  const skel = document.createElement('div');
  skel.className = 'skel-card'; skel.id = 'skeleton';
  skel.innerHTML = `<div class="skel skel-bar" style="width:40px;margin-bottom:16px;"></div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;">
      <div class="skel skel-pill"></div><div class="skel skel-pill"></div><div class="skel skel-pill"></div>
    </div>`;
  document.getElementById('grid').appendChild(skel);
}

async function renderSectionGrid(docs, uid) {
  const filtered = docs.filter(
    (d) => (d.sectionId || canonicalSectionIdFromLabel(d.section)) === currentSectionId
  );

  const skel = document.getElementById('skeleton');
  if (skel) skel.remove();
  document.querySelectorAll('#grid .empty').forEach(el => el.remove());

  const sectionLabel = (SECTIONS[currentSectionId] || SECTIONS.surgery).label;

  if (!filtered.length) {
    const empty = document.createElement('p');
    empty.className = 'empty';
    empty.textContent = `No quizzes yet for ${sectionLabel}.`;
    document.getElementById('grid').appendChild(empty);
    return;
  }

  const groups = {};
  filtered.forEach((d) => {
    const wkDisplay = (d.week || 'Unknown').toUpperCase();
    const wid = d.weekId && String(d.weekId).trim() ? String(d.weekId).trim() : '';
    const gid = wid ? `id:${wid}` : `legacy:${(d.week || 'Unknown').toUpperCase()}`;
    if (!groups[gid]) groups[gid] = { weekLabel: wkDisplay, weekId: wid, topics: {} };
    groups[gid].weekLabel = wkDisplay;
    if (wid) groups[gid].weekId = wid;
    const tid = d.topicId && String(d.topicId).trim() ? String(d.topicId).trim() : '';
    const topicKey = tid || `legacy:${normalizeTopicKey(d.topic)}`;
    if (!groups[gid].topics[topicKey]) groups[gid].topics[topicKey] = { label: d.topic || 'General', rows: [] };
    groups[gid].topics[topicKey].label = d.topic || 'General';
    groups[gid].topics[topicKey].rows.push({
      id: d.id,
      name: d.name || d.id,
      questionCount: d.questionCount || 0,
    });
  });

  const sortedGids = Object.keys(groups).sort((a, b) => {
    const labelA = groups[a].weekLabel;
    const labelB = groups[b].weekLabel;
    const numA = weekSortKey(labelA);
    const numB = weekSortKey(labelB);
    // If both are W-prefixed numbers, sort numerically
    if (numA !== 9999 && numB !== 9999) return numA - numB;
    // If only one is W-prefixed, it comes first
    if (numA !== 9999) return -1;
    if (numB !== 9999) return 1;
    // Otherwise, alphanumerical sort
    return labelA.localeCompare(labelB, undefined, { numeric: true, sensitivity: 'base' });
  });
  const weekParentByGid = await fetchWeekParentDataByGid(
    currentSectionId,
    sectionLabel,
    groups,
    sortedGids
  );
  renderGrid(groups, sortedGids, weekParentByGid, currentSectionId, sectionLabel);

  if (uid) {
    const meta = filtered.map(d => ({ id: d.id, questionCount: d.questionCount || 0 }));
    loadAllProgress(uid, meta);
  }
}

function weekSortKey(w) {
  const m = w.match(/^W(\d+)$/i);
  return m ? parseInt(m[1]) : 9999;
}

function normalizeWeekKey(w) {
  return String(w || 'Unknown').trim().replace(/\//g, '_').toUpperCase() || 'UNKNOWN';
}

function normalizeTopicKey(t) {
  return String(t || 'General').trim().toUpperCase();
}

/** Stable doc id: {sectionId}__{weekId}. Aligns with Cloud Functions. */
function weekParentPillsDocId(sectionId, weekId) {
  const sid = String(sectionId || '').trim();
  const wid = String(weekId || '').trim();
  if (!sid || !wid) return weekParentPillsDocIdLegacy('Surgery', 'Unknown');
  return `${sid}__${wid}`;
}

function weekParentPillsDocIdLegacy(sectionDisplay, week) {
  const sec = String(sectionDisplay || 'Surgery').trim() || 'Surgery';
  return `${sec}__${normalizeWeekKey(week)}`;
}

async function fetchWeekParentDataByGid(sectionIdSlug, sectionLabel, groups, sortedGids) {
  const out = {};
  await Promise.all(
    sortedGids.map(async (gid) => {
      try {
        const g = groups[gid];
        const docId = g.weekId
          ? weekParentPillsDocId(sectionIdSlug, g.weekId)
          : weekParentPillsDocIdLegacy(sectionLabel, g.weekLabel);
        let snap = await db.collection('weekParentPills').doc(docId).get();
        if (!snap.exists && g.weekId) {
          snap = await db.collection('weekParentPills').doc(weekParentPillsDocIdLegacy(sectionLabel, g.weekLabel)).get();
        }
        out[gid] = snap.exists ? snap.data() : null;
      } catch (e) {
        console.warn('weekParentPills', gid, e);
        out[gid] = null;
      }
    })
  );
  return out;
}

function parentPillStableKey(weekId, weekDisplay, slug) {
  if (weekId && String(weekId).trim()) return `${String(weekId).trim()}::${slug}`;
  return `${weekDisplay}::${slug}`;
}

function parentPillsRowHtml(gid, weekDisplay, sectionIdSlug, sectionLabel, weekId, docData) {
  if (!docData || !Array.isArray(docData.parents) || !docData.parents.length) return '';
  const links = docData.parents
    .filter((p) => p && p.slug && p.label)
    .map((p) => {
      const key = parentPillStableKey(weekId, weekDisplay, p.slug);
      const sel = parentPillSelection.has(key) ? ' selected' : '';
      const wIdAttr = weekId ? ` data-week-id="${escHtml(weekId)}"` : '';
      return `<button type="button" class="parent-pill${sel}" data-parent-key="${escHtml(key)}" data-week="${escHtml(weekDisplay)}"${wIdAttr} data-section-id="${escHtml(sectionIdSlug)}" data-section="${escHtml(sectionLabel)}" data-slug="${escHtml(p.slug)}" data-label="${escHtml(p.label)}">${escHtml(p.label)}</button>`;
    })
    .join('');
  if (!links) return '';
  return `<div class="parent-pills-row" aria-label="Week themes">${links}</div>`;
}

function parentPillKey(weekId, weekDisplay, slug) {
  return parentPillStableKey(weekId, weekDisplay, slug);
}

function syncParentPillDomClasses() {
  document.querySelectorAll('.parent-pill[data-parent-key]').forEach((btn) => {
    const key = btn.getAttribute('data-parent-key');
    btn.classList.toggle('selected', !!(key && parentPillSelection.has(key)));
  });
}

function updateParentSelectionBar() {
  const bar = document.getElementById('parentSelectionBar');
  const textEl = document.getElementById('parentSelectionBarText');
  const n = parentPillSelection.size;
  if (!bar || !textEl) return;
  if (n === 0) {
    bar.classList.remove('visible');
    document.body.classList.remove('has-parent-selection-bar');
    return;
  }
  const noun = n === 1 ? 'theme' : 'themes';
  textEl.innerHTML = `<strong>${n}</strong> ${noun} selected`;
  bar.classList.add('visible');
  document.body.classList.add('has-parent-selection-bar');
}

function clearParentPillSelection() {
  parentPillSelection.clear();
  syncParentPillDomClasses();
  updateParentSelectionBar();
}

function toggleParentPillFromButton(btn) {
  const week = btn.getAttribute('data-week');
  const weekId = btn.getAttribute('data-week-id') || '';
  const slug = btn.getAttribute('data-slug');
  const label = btn.getAttribute('data-label');
  const sectionIdAttr = btn.getAttribute('data-section-id') || '';
  if (!week || !slug || !label || sectionIdAttr !== currentSectionId) return;
  const key = parentPillKey(weekId, week, slug);
  if (parentPillSelection.has(key)) {
    parentPillSelection.delete(key);
  } else {
    const entry = { week, parentSlug: slug, label };
    if (weekId) entry.weekId = weekId;
    parentPillSelection.set(key, entry);
  }
  btn.classList.toggle('selected', parentPillSelection.has(key));
  updateParentSelectionBar();
}

function encodeParentMultiPayload() {
  const arr = Array.from(parentPillSelection.values()).map(({ week, weekId, parentSlug, label }) => {
    const o = { week, parentSlug, label };
    if (weekId) o.weekId = weekId;
    return o;
  });
  return JSON.stringify(arr);
}

function navigateToMultiParentQuiz() {
  if (parentPillSelection.size === 0) return;
  const json = encodeParentMultiPayload();
  const base64url = btoa(unescape(encodeURIComponent(json)))
    .replace(/\+/g, '-')
    .replace(/\//g, '_')
    .replace(/=+$/g, '');
  const params = new URLSearchParams({ mode: 'multi', section: currentSectionId });
  if (base64url.length <= PARENT_SEL_MAX_URL) {
    params.set('sel', base64url);
  } else {
    try {
      sessionStorage.setItem(PARENT_MULTI_SESSION_KEY, json);
    } catch (e) {
      console.warn('sessionStorage', e);
      return;
    }
    params.set('src', 'session');
  }
  window.location.href = `/quiz.html?${params.toString()}`;
}

document.getElementById('parentSelectionClear').addEventListener('click', clearParentPillSelection);
document.getElementById('parentSelectionStart').addEventListener('click', navigateToMultiParentQuiz);

document.getElementById('grid').addEventListener('click', (ev) => {
  const btn = ev.target.closest('.parent-pill[data-parent-key]');
  if (!btn || !document.getElementById('grid').contains(btn)) return;
  ev.preventDefault();
  toggleParentPillFromButton(btn);
});

function renderGrid(groups, sortedGids, weekParentByGid, sectionIdSlug, sectionLabel) {
  const grid = document.getElementById('grid');

  sortedGids.forEach((gid) => {
    const g = groups[gid];
    const week = g.weekLabel;
    let rows = '';
    Object.keys(g.topics)
      .sort((a, b) => g.topics[a].label.localeCompare(g.topics[b].label))
      .forEach((topicKey) => {
      const topicLabel = g.topics[topicKey].label;
      const versions = g.topics[topicKey].rows.sort((a,b) => a.name.localeCompare(b.name));
      let pills = '';
      versions.forEach(q => {
        const safe = q.id.replace(/__/g, '_');
        const quizQs = new URLSearchParams({ id: q.id }).toString();
        pills += `<div class="quiz-pill" data-quiz-id="${escHtml(q.id)}">
          <a href="/quiz.html?${quizQs}" class="pill-link">
            <span class="pill-name">${q.name}</span>
            <span class="pill-count">${q.questionCount}q</span>
          </a>
          <div class="progress-wrap" id="prog_${safe}">
            <div class="prog-bar">
              <div class="seg seg-correct" id="seg_c_${safe}"></div>
              <div class="seg seg-wrong"   id="seg_w_${safe}"></div>
              <div class="seg seg-unans"   id="seg_u_${safe}"></div>
            </div>
            <div class="flag-bar" id="seg_f_${safe}"></div>
            <div class="prog-labels" id="lbl_${safe}"></div>
          </div>
        </div>`;
      });
      rows += `<div class="topic-row">
        <span class="topic-name">${escHtml(topicLabel)}</span>
        <div class="pill-group">${pills}</div>
      </div>`;
    });

    const parentRow = parentPillsRowHtml(
      gid,
      week,
      sectionIdSlug,
      sectionLabel,
      g.weekId,
      weekParentByGid && weekParentByGid[gid]
    );
    const card = document.createElement('div');
    card.className = 'week-card';
    card.innerHTML = `<div class="week-label">${escHtml(week)}</div>${parentRow}<div class="topic-list">${rows}</div>`;
    grid.appendChild(card);
  });
  
  // Re-render KaTeX after building the grid
  if (window.renderMathInElement) {
    renderMathInElement(document.getElementById('grid'), {
      delimiters: [
        {left: '$$', right: '$$', display: true},
        {left: '$',  right: '$',  display: false},
        {left: '\\(', right: '\\)', display: false},
        {left: '\\[', right: '\\]', display: true}
      ]
    });
  }
}

// ── Progress bars ─────────────────────────────────────────────────────────────
async function loadAllProgress(uid, quizMeta) {
  const fetches = quizMeta.map(async ({ id, questionCount }) => {
    try {
      const snap = await db.collection('quizSessions').doc(uid)
        .collection('quizzes').doc(id).get();
      return { id, questionCount, data: snap.exists ? snap.data() : null };
    } catch(e) {
      return { id, questionCount, data: null };
    }
  });
  const results = await Promise.all(fetches);
  results.forEach(r => renderBar(r.id, r.questionCount, r.data));
}

function renderBar(quizId, total, data) {
  const safe = quizId.replace(/__/g, '_');
  if (!document.getElementById('prog_' + safe)) return;
  if (!data || !total) return;

  const results = data.results || [];
  const flagged = data.flagged || [];

  const correct = results.filter(r => r && r.wasCorrect).length;
  const wrong   = results.filter(r => r && !r.wasCorrect && !r.skipped).length;
  const unans   = total - correct - wrong;
  const flags   = flagged.filter(Boolean).length;
  const pct     = Math.round(correct / total * 100);

  document.getElementById('seg_c_' + safe).style.width = (correct/total*100).toFixed(1) + '%';
  document.getElementById('seg_w_' + safe).style.width = (wrong/total*100).toFixed(1)   + '%';
  document.getElementById('seg_u_' + safe).style.width = (unans/total*100).toFixed(1)   + '%';
  document.getElementById('seg_f_' + safe).style.width = (flags/total*100).toFixed(1)   + '%';

  document.getElementById('lbl_' + safe).innerHTML = `
    <span class="prog-label"><span class="dot dot-correct"></span>${correct} correct</span>
    <span class="prog-label"><span class="dot dot-wrong"></span>${wrong} wrong</span>
    <span class="prog-label"><span class="dot dot-unans"></span>${unans} left</span>
    ${flags > 0 ? `<span class="prog-label"><span class="dot dot-flag"></span>${flags} flagged</span>` : ''}
    <span class="prog-pct">${pct}%</span>
  `;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
