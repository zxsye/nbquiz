<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="NB Quiz">
<meta name="theme-color" content="#f7f5f0">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="manifest" href="/manifest.json">

<title>NB Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
  onload="renderMathInElement(document.body, {
    delimiters: [
      {left: '$$', right: '$$', display: true},
      {left: '$',  right: '$',  display: false},
      {left: '\\(', right: '\\)', display: false},
      {left: '\\[', right: '\\]', display: true}
    ]
  })"></script>

<style>
/* New Button Animations */
@property --angle-1 {
  syntax: "<angle>";
  inherits: false;
  initial-value: -75deg;
}
@property --angle-2 {
  syntax: "<angle>";
  inherits: false;
  initial-value: -45deg;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:           #f7f5f0;
  --surface:      #ffffff;
  --border:       #e2ddd5;
  --text:         #1a1714;
  --text-2:       #5a534a;
  --text-3:       #9a8f83;
  --accent:       #2563a8;
  --accent-light: #dbeafe;
  --correct-bar:  #4ade80;
  --wrong-bar:    #f87171;
  --radius:       10px;
  --radius-lg:    16px;
  --shadow:       0 1px 3px rgba(0,0,0,.07), 0 4px 16px rgba(0,0,0,.06);
  --font-serif:   'Crimson Pro', Georgia, serif;
  --font-sans:    'DM Sans', system-ui, sans-serif;
  --font-mono:    'DM Mono', monospace;
  
  --anim--hover-time: 400ms;
  --anim--hover-ease: cubic-bezier(0.25, 1, 0.5, 1);

  /* Liquid Glass theme variables */
  --c-glass: #bbbbbc;
  --c-light: #fff;
  --c-dark: #000;
  --c-content: #224;
  --c-action: #0052f5;
  --glass-reflex-dark: 1;
  --glass-reflex-light: 1;
  --saturation: 150%;
}

body { font-family: var(--font-sans); background: var(--bg); color: var(--text); min-height: 100vh; padding: 48px 24px 80px; }

/* ── Header ── */
.page-header { max-width: 760px; margin: 0 auto 0; display: flex; align-items: baseline; justify-content: space-between; padding-bottom: 20px; border-bottom: 1.5px solid var(--border); }
.logo { font-family: var(--font-serif); font-size: 2rem; font-weight: 600; color: var(--text); }
.logo span { color: var(--accent); }
.header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
.credit { font-size: .72rem; color: var(--text-3); font-family: var(--font-mono); }
.user-info  { font-size: .75rem; color: var(--text-3); font-family: var(--font-mono); display: none; }
.signout-btn { font-size: .72rem; color: var(--text-3); background: none; border: none; cursor: pointer; font-family: var(--font-mono); padding: 0; display: none; }
.signout-btn:hover { color: var(--accent); }
.admin-link { font-size: .72rem; font-family: var(--font-mono); font-weight: 500; color: var(--accent); text-decoration: none; border: 1px solid var(--accent); border-radius: 99px; padding: 3px 10px; display: none; align-items: center; gap: 4px; transition: background 150ms; }
.admin-link:hover { background: var(--accent-light); }


/* ── Liquid Glass Tab Switcher ── */
.switcher-container {
  display: flex;
  justify-content: center;
  margin: 24px 0 32px;
}

.switcher {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  gap: 8px;
  width: 100%;
  max-width: 340px; 
  height: 60px;
  box-sizing: border-box;
  padding: 8px 12px;
  margin: 0;
  border: none;
  border-radius: 99em;
  font-size: var(--fz);
  background-color: color-mix(in srgb, var(--c-glass) 12%, transparent);
  backdrop-filter: blur(8px) url(#switcher) saturate(var(--saturation));
  -webkit-backdrop-filter: blur(8px) saturate(var(--saturation));
  box-shadow: 
    inset 0 0 0 1px color-mix(in srgb, var(--c-light) calc(var(--glass-reflex-light) * 10%), transparent),
    inset 1.8px 3px 0px -2px color-mix(in srgb, var(--c-light) calc(var(--glass-reflex-light) * 90%), transparent), 
    inset -2px -2px 0px -2px color-mix(in srgb, var(--c-light) calc(var(--glass-reflex-light) * 80%), transparent), 
    inset -3px -8px 1px -6px color-mix(in srgb, var(--c-light) calc(var(--glass-reflex-light) * 60%), transparent), 
    inset -0.3px -1px 4px 0px color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 12%), transparent), 
    inset -1.5px 2.5px 0px -2px color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 20%), transparent), 
    inset 0px 3px 4px -2px color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 20%), transparent), 
    inset 2px -6.5px 1px -4px color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 10%), transparent), 
    0px 1px 5px 0px color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 10%), transparent), 
    0px 6px 16px 0px color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 8%), transparent);
  transition: background-color 400ms cubic-bezier(1, 0.0, 0.4, 1), box-shadow 400ms cubic-bezier(1, 0.0, 0.4, 1);
}

.switcher__legend {
  position: absolute; width: 1px; height: 1px; margin: -1px; border: 0; padding: 0;
  white-space: nowrap; clip-path: inset(100%); clip: rect(0 0 0 0); overflow: hidden;
}

.switcher__input {
  clip: rect(0 0 0 0); clip-path: inset(100%); height: 1px; width: 1px;
  overflow: hidden; position: absolute; white-space: nowrap;
}

.switcher__filter { position: absolute; width: 0; height: 0; z-index: -1; }

.switcher__option {
  --c: var(--text-3);
  display: flex; justify-content: center; align-items: center;
  padding: 0; width: 100px; height: 100%;
  box-sizing: border-box; border-radius: 99em;
  opacity: 1; transition: all 160ms;
  font-family: var(--font-sans); font-size: 0.85rem; font-weight: 600;
  color: var(--c); cursor: pointer;
  white-space: nowrap;
  /* NEW: Keep text above the bouncing pill */
  position: relative;
  z-index: 2; 
}

.switcher__option:hover { --c: var(--text-2); }
.switcher__option:has(input:checked) { --c: var(--text); cursor: auto; font-weight: 700; }
.switcher__option span { display: flex; align-items: center; gap: 6px; transition: transform 200ms cubic-bezier(0.5, 0, 0, 1); }
.switcher__option:hover span { transform: scale(1.05); }
.switcher__option:has(input:checked) span { transform: scale(1); }

.switcher::after {
  content: ''; position: absolute;
  left: 12px; top: 8px; display: block;
  width: 100px; height: calc(100% - 16px);
  border-radius: 99em;
  background-color: color-mix(in srgb, var(--c-glass) 36%, transparent);
  /* NEW: Render pill on top of container shadows, but behind text */
  z-index: 1; 
  box-shadow: 
    inset 0 0 0 1px color-mix(in srgb, var(--c-light) calc(var(--glass-reflex-light) * 10%), transparent),
    inset 2px 1px 0px -1px color-mix(in srgb, var(--c-light) calc(var(--glass-reflex-light) * 90%), transparent), 
    inset -1.5px -1px 0px -1px color-mix(in srgb, var(--c-light) calc(var(--glass-reflex-light) * 80%), transparent), 
    inset -2px -6px 1px -5px color-mix(in srgb, var(--c-light) calc(var(--glass-reflex-light) * 60%), transparent), 
    inset -1px 2px 3px -1px color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 20%), transparent), 
    inset 0px -4px 1px -2px color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 10%), transparent), 
    0px 3px 6px 0px color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 8%), transparent);
}

.switcher:has(input[c-option="1"]:checked)::after {
  translate: 0 0;
  transform-origin: center;
  transition: background-color 500ms ease, box-shadow 500ms ease, translate 550ms cubic-bezier(0.34, 1.6, 0.64, 1);
  animation: floatAndSettle 550ms cubic-bezier(0.34, 1.6, 0.64, 1); 
}

.switcher:has(input[c-option="2"]:checked)::after {
  translate: 108px 0;
  transform-origin: center;
  transition: background-color 500ms ease, box-shadow 500ms ease, translate 550ms cubic-bezier(0.34, 1.6, 0.64, 1);
  animation: floatAndSettle 550ms cubic-bezier(0.34, 1.6, 0.64, 1); 
}

.switcher:has(input[c-option="3"]:checked)::after {
  translate: 216px 0;
  transform-origin: center;
  transition: background-color 500ms ease, box-shadow 500ms ease, translate 550ms cubic-bezier(0.34, 1.6, 0.64, 1);
  animation: floatAndSettle 550ms cubic-bezier(0.34, 1.6, 0.64, 1); 
}

@keyframes floatAndSettle {
  0% { 
    scale: 1; 
  }
  40% { 
    scale: 1.45; /* Dramatically larger than the container bounds */
  }
  100% { 
    scale: 1; 
  }
}

/* ── Grid ── */
.grid { max-width: 760px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; position: relative; }

/* ── STICKY GLASS RESOURCES PANEL ── */
.resources-panel {
  position: sticky;
  top: 16px;
  z-index: 50;
  margin-bottom: 8px;
  background: transparent;
  border: none;
  box-shadow: none;
}
.resources-label { display: none; } 

.resource-cards {
  display: flex;
  gap: 16px; 
  overflow-x: auto;
  padding: 16px 4px 24px 4px; 
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  mask-image: linear-gradient(to right, black 90%, transparent 100%);
  -webkit-mask-image: linear-gradient(to right, black 95%, transparent 100%);
}
.resource-cards::-webkit-scrollbar { display: none; }

/* ========== EXACT COMPLEX BUTTON IMPLEMENTATION ========== */

.button-wrap {
  position: relative;
  z-index: 2;
  border-radius: 999vw;
  background: transparent;
  pointer-events: none;
  transition: all var(--anim--hover-time) var(--anim--hover-ease);
  flex-shrink: 0;
  display: flex;
}

.quiz-pill .button-wrap { width: 100%; }

.button-shadow {
  --shadow-cuttoff-fix: 2em;
  position: absolute;
  width: calc(100% + var(--shadow-cuttoff-fix));
  height: calc(100% + var(--shadow-cuttoff-fix));
  top: calc(0% - var(--shadow-cuttoff-fix) / 2);
  left: calc(0% - var(--shadow-cuttoff-fix) / 2);
  filter: blur(clamp(2px, 0.125em, 12px));
  -webkit-filter: blur(clamp(2px, 0.125em, 12px));
  overflow: visible;
  pointer-events: none;
}

.button-shadow::after {
  content: "";
  position: absolute;
  z-index: 0;
  inset: 0;
  border-radius: 999vw;
  background: linear-gradient(180deg, rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.1));
  width: calc(100% - var(--shadow-cuttoff-fix) - 0.25em);
  height: calc(100% - var(--shadow-cuttoff-fix) - 0.25em);
  top: calc(var(--shadow-cuttoff-fix) - 0.5em);
  left: calc(var(--shadow-cuttoff-fix) - 0.875em);
  padding: 0.125em;
  box-sizing: border-box;
  mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  mask-composite: exclude;
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  transition: all var(--anim--hover-time) var(--anim--hover-ease);
  overflow: visible;
  opacity: 1;
}

.nb-btn {
  --border-width: 2px;
  all: unset;
  display: block;
  width: 100%;
  box-sizing: border-box;
  cursor: pointer;
  position: relative;
  -webkit-tap-highlight-color: rgba(0, 0, 0, 0);
  pointer-events: auto;
  z-index: 3;
  text-decoration: none;
  background: linear-gradient(
    -75deg,
    rgba(255, 255, 255, 0.05),
    rgba(255, 255, 255, 0.4),
    rgba(255, 255, 255, 0.05)
  );
  border-radius: 999vw;
  box-shadow: inset 0 0.125em 0.125em rgba(0, 0, 0, 0.05),
    inset 0 -0.125em 0.125em rgba(255, 255, 255, 0.8),
    0 0.25em 0.125em -0.125em rgba(0, 0, 0, 0.2),
    0 0 0.1em 0.25em inset rgba(255, 255, 255, 0.2),
    0 0 0 0 rgba(255, 255, 255, 1);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  transition: all var(--anim--hover-time) var(--anim--hover-ease);
}

.nb-btn:hover, .nb-btn:focus-visible {
  transform: scale(0.975);
  backdrop-filter: blur(0.01em);
  -webkit-backdrop-filter: blur(0.01em);
  box-shadow: inset 0 0.125em 0.125em rgba(0, 0, 0, 0.05),
    inset 0 -0.125em 0.125em rgba(255, 255, 255, 1),
    0 0.15em 0.05em -0.1em rgba(0, 0, 0, 0.25),
    0 0 0.05em 0.1em inset rgba(255, 255, 255, 0.8),
    0 0 0 0 rgba(255, 255, 255, 1);
}

.nb-btn:focus-visible { outline: 2px solid rgba(0, 0, 0, 0.5); outline-offset: 4px; }

.nb-btn > span {
  position: relative;
  width: 100%;
  box-sizing: border-box;
  user-select: none;
  -webkit-user-select: none;
  text-shadow: 0em 0.25em 0.05em rgba(0, 0, 0, 0.1);
  transition: all var(--anim--hover-time) var(--anim--hover-ease);
}

.quiz-pill .nb-btn > span { display: flex; align-items: center; justify-content: space-between; padding: 7px 12px; }
.resource-card.nb-btn > span { display: flex; align-items: center; gap: 10px; padding: 10px 16px; }

.nb-btn:hover > span, .nb-btn:focus-visible > span { text-shadow: 0.025em 0.025em 0.025em rgba(0, 0, 0, 0.12); }

.nb-btn > span::after {
  content: ""; display: block; position: absolute;
  width: calc(100% - var(--border-width)); height: calc(100% - var(--border-width));
  top: calc(0% + var(--border-width) / 2); left: calc(0% + var(--border-width) / 2);
  box-sizing: border-box; border-radius: 999vw; overflow: clip;
  background: linear-gradient( var(--angle-2), rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.7) 40% 50%, rgba(255, 255, 255, 0) 55% );
  z-index: 3; mix-blend-mode: screen; pointer-events: none;
  background-size: 200% 200%; background-position: 0% 50%; background-repeat: no-repeat;
  transition: background-position calc(var(--anim--hover-time) * 1.25) var(--anim--hover-ease), --angle-2 calc(var(--anim--hover-time) * 1.25) var(--anim--hover-ease);
}

.nb-btn:hover > span::after, .nb-btn:focus-visible > span::after { background-position: 25% 50%; }
.nb-btn:active > span::after { background-position: 50% 15%; --angle-2: -15deg; }

@media (hover: none) and (pointer: coarse) {
  .nb-btn > span::after, .nb-btn:active > span::after { --angle-2: -45deg; }
}

.nb-btn::after {
  content: ""; position: absolute; z-index: 1; inset: 0; border-radius: 999vw;
  width: calc(100% + var(--border-width)); height: calc(100% + var(--border-width));
  top: calc(0% - var(--border-width) / 2); left: calc(0% - var(--border-width) / 2);
  padding: var(--border-width); box-sizing: border-box;
  background: conic-gradient( from var(--angle-1) at 50% 50%, rgba(0, 0, 0, 0.25), rgba(0, 0, 0, 0) 5% 40%, rgba(0, 0, 0, 0.25) 50%, rgba(0, 0, 0, 0) 60% 95%, rgba(0, 0, 0, 0.25) ),
    linear-gradient(180deg, rgba(255, 255, 255, 0.8), rgba(255, 255, 255, 0.8));
  mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  mask-composite: exclude; -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0); -webkit-mask-composite: xor;
  transition: all var(--anim--hover-time) var(--anim--hover-ease), --angle-1 500ms ease;
  box-shadow: inset 0 0 0 calc(var(--border-width) / 2) rgba(255, 255, 255, 0.5);
}

.nb-btn:hover::after, .nb-btn:focus-visible::after { --angle-1: -125deg; }
.nb-btn:active::after { --angle-1: -75deg; }

@media (hover: none) and (pointer: coarse) {
  .nb-btn::after, .nb-btn:hover::after, .nb-btn:active::after { --angle-1: -75deg; }
}

.button-wrap:has(.nb-btn:hover) .button-shadow,
.button-wrap:has(.nb-btn:focus-visible) .button-shadow {
  filter: blur(clamp(2px, 0.0625em, 6px)); -webkit-filter: blur(clamp(2px, 0.0625em, 6px));
  transition: filter var(--anim--hover-time) var(--anim--hover-ease);
}

.button-wrap:has(.nb-btn:hover) .button-shadow::after,
.button-wrap:has(.nb-btn:focus-visible) .button-shadow::after { top: calc(var(--shadow-cuttoff-fix) - 0.875em); opacity: 1; }
.button-wrap:has(.nb-btn:active) { transform: rotate3d(1, 0, 0, 25deg); }
.button-wrap:has(.nb-btn:active) .nb-btn {
  box-shadow: inset 0 0.125em 0.125em rgba(0, 0, 0, 0.05), inset 0 -0.125em 0.125em rgba(255, 255, 255, 0.5),
    0 0.125em 0.125em -0.125em rgba(0, 0, 0, 0.2), 0 0 0.1em 0.25em inset rgba(255, 255, 255, 0.2),
    0 0.225em 0.05em 0 rgba(0, 0, 0, 0.05), 0 0.25em 0 0 rgba(255, 255, 255, 0.75), inset 0 0.25em 0.05em 0 rgba(0, 0, 0, 0.15);
}

.button-wrap:has(.nb-btn:active) .button-shadow { filter: blur(clamp(2px, 0.125em, 12px)); -webkit-filter: blur(clamp(2px, 0.125em, 12px)); }
.button-wrap:has(.nb-btn:active) .button-shadow::after { top: calc(var(--shadow-cuttoff-fix) - 0.5em); opacity: 0.75; }
.button-wrap:has(.nb-btn:active) > .nb-btn > span { text-shadow: 0.025em 0.25em 0.05em rgba(0, 0, 0, 0.12); }

.resource-icon { font-size: 1.1rem; line-height: 1; display: flex; align-items: center; justify-content: center; }
.resource-info { display: flex; flex-direction: column; }
.resource-name { font-size: .88rem; font-weight: 600; color: var(--text); white-space: nowrap; }
.resource-desc { font-size: .68rem; color: var(--text-3); font-family: var(--font-mono); margin-top: 1px; white-space: nowrap; }

.pill-name  { font-family: var(--font-mono); font-size: .8rem; font-weight: 500; color: var(--text); }
.pill-count { font-size: .68rem; color: var(--text-3); font-family: var(--font-mono); }


/* ── Quiz week cards ── */
.week-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--shadow); overflow: hidden; }
.week-label { font-family: var(--font-mono); font-size: .7rem; font-weight: 500; text-transform: uppercase; letter-spacing: .1em; color: var(--text-3); padding: 14px 20px 10px; border-bottom: 1px solid var(--border); background: var(--bg); }
.topic-list { padding: 8px 0; }
.topic-row { display: flex; align-items: flex-start; padding: 12px 20px; gap: 16px; border-bottom: 1px solid var(--border); }
.topic-row:last-child { border-bottom: none; }
.topic-name { font-size: .95rem; font-weight: 500; color: var(--text); min-width: 100px; padding-top: 10px; }
.pill-group { display: flex; gap: 10px; flex-wrap: wrap; flex: 1; }
.quiz-pill { display: flex; flex-direction: column; gap: 5px; min-width: 130px; max-width: 200px; flex: 1; }

/* ── Progress bars ── */
.progress-wrap { display: flex; flex-direction: column; gap: 2px; }
.prog-bar { display: flex; height: 8px; border-radius: 99px; overflow: hidden; background: #e2ddd5; }
.seg { height: 100%; transition: width .4s ease; }
.seg-correct { background: var(--correct-bar); }
.seg-wrong   { background: var(--wrong-bar); }
.seg-unans   { background: #e2ddd5; }
.flag-bar { height: 3px; border-radius: 99px; background: linear-gradient(90deg,#f59e0b,#fbbf24,#fde68a,#f59e0b,#fbbf24); background-size: 200% 100%; animation: shimmer 2s linear infinite; width: 0%; transition: width .4s ease; }
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
.prog-labels { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 2px; }
.prog-label  { font-size: .65rem; font-family: var(--font-mono); color: var(--text-3); display: flex; align-items: center; gap: 3px; }
.prog-label .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.dot-correct { background: var(--correct-bar); }
.dot-wrong   { background: var(--wrong-bar); }
.dot-unans   { background: #b4b0a8; }
.dot-flag    { background: #f59e0b; }
.prog-pct    { font-size: .65rem; font-family: var(--font-mono); color: var(--text-3); margin-left: auto; }
.empty { text-align: center; color: var(--text-3); font-size: .9rem; padding: 48px; }

/* ── Skeleton loading ── */
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.skel { animation: pulse 1.5s ease infinite; background: var(--border); border-radius: 6px; }
.skel-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius-lg); padding: 20px; }
.skel-bar  { height: 10px; margin-bottom: 8px; }
.skel-pill { height: 36px; border-radius: var(--radius); flex: 1; min-width: 120px; max-width: 180px; }

/* ── Login overlay ── */
#loginScreen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; padding: 24px; }
#loginScreen.hidden { display: none; }
.login-logo { font-family: var(--font-serif); font-size: 2.4rem; font-weight: 600; color: var(--text); margin-bottom: 6px; text-align: center; }
.login-logo span { color: var(--accent); }
.login-sub  { font-size: .85rem; color: var(--text-3); margin-bottom: 48px; text-align: center; }

.login-error { margin-top: 16px; font-size: .8rem; color: #991b1b; min-height: 1em; text-align: center; }
.made-by-login { position: fixed; bottom: 20px; font-size: .72rem; color: var(--text-3); font-family: var(--font-mono); }

@media (max-width: 520px) {
  .topic-row { flex-direction: column; gap: 8px; }
  .topic-name { min-width: unset; padding-top: 0; }
  .quiz-pill { max-width: 100%; }
  
  .resource-cards {
    flex-wrap: nowrap;
    mask-image: linear-gradient(to right, black 85%, transparent 100%);
    -webkit-mask-image: linear-gradient(to right, black 85%, transparent 100%);
  }
}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-logo">NB <span>Quiz</span></div>
  <div class="login-sub">Your personal medical study companion</div>
  
  <div class="button-wrap">
    <button class="nb-btn" onclick="signInWithGoogle()" style="padding: 14px 32px; font-weight: 600;">
      <span style="display: flex; gap: 10px; align-items: center;">
        <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
        Continue with Google
      </span>
    </button>
    <div class="button-shadow"></div>
  </div>

  <div class="login-error" id="loginError"></div>
  <div class="made-by-login">made by Zi Lin</div>
</div>

<header class="page-header">
  <div class="logo">NB <span>Quiz</span></div>
  <div class="header-right">
    <a class="admin-link" id="adminLink" href="/admin">⚙ Admin</a>
    <div class="credit">made by Zi Lin</div>
    <div class="user-info"  id="userInfo"></div>
    <button class="signout-btn" id="signoutBtn" onclick="signOut()">sign out</button>
  </div>
</header>

<div class="switcher-container">
  <fieldset class="switcher" id="sectionTabs">
    <legend class="switcher__legend">Choose Section</legend>
    
    <label class="switcher__option">
      <input class="switcher__input" type="radio" name="section" value="Surgery" c-option="1" onchange="switchSection('Surgery')" checked/>
      <span>🔪 Surgery</span>
    </label>
    
    <label class="switcher__option">
      <input class="switcher__input" type="radio" name="section" value="GP" c-option="2" onchange="switchSection('GP')" />
      <span>🩺 GP</span>
    </label>
    
    <label class="switcher__option">
      <input class="switcher__input" type="radio" name="section" value="Medicine" c-option="3" onchange="switchSection('Medicine')" />
      <span>💊 Medicine</span>
    </label>

    <div class="switcher__filter">
      <svg>
        <filter id="switcher" primitiveUnits="objectBoundingBox">
          <feImage result="map" width="100%" height="100%" x="0" y="0" href="data:image/webp;base64,..." />

          <feGaussianBlur in="SourceGraphic" stdDeviation="0.04" result="blur"/>
          <feDisplacementMap 
                             id="disp" 
                             in="blur" 
                             in2="map" 
                             scale="0.5" 
                             xChannelSelector="R" 
                             yChannelSelector="G">
          </feDisplacementMap>
        </filter>
        
        <filter id="toggler" primitiveUnits="objectBoundingBox">
          <feImage result="map" width="100%" height="100%" x="0" y="0" href="data:image/webp;base64,..." />

          <feGaussianBlur in="SourceGraphic" stdDeviation="0.01" result="blur"/>
          <feDisplacementMap 
                             id="disp" 
                             in="blur" 
                             in2="map" 
                             scale="0.5" 
                             xChannelSelector="R" 
                             yChannelSelector="G">
          </feDisplacementMap>
        </filter>
      </svg>
    </div>
  </fieldset>
</div>

<main class="grid" id="grid">
  <div class="resources-panel" id="resourcesPanel">
    <div class="resources-label">Resources</div>
    <div class="resource-cards" id="resourceCards"></div>
  </div>

  <div class="skel-card" id="skeleton">
    <div class="skel skel-bar" style="width:40px;margin-bottom:16px;"></div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;">
      <div class="skel skel-pill"></div>
      <div class="skel skel-pill"></div>
      <div class="skel skel-pill"></div>
    </div>
  </div>
</main>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:            'AIzaSyCNnvrEli5lzU3sUFvttTsQPIYQXYK1_WE',
  authDomain:        'nbquiz-6faf9.firebaseapp.com',
  projectId:         'nbquiz-6faf9',
  storageBucket:     'nbquiz-6faf9.firebasestorage.app',
  messagingSenderId: '913114740758',
  appId:             '1:913114740758:web:a856bb9c8eedf3cd629d37',
});
const auth = firebase.auth();
const db   = firebase.firestore();

const provider = new firebase.auth.GoogleAuthProvider();
function signInWithGoogle() {
  document.getElementById('loginError').textContent = '';
  auth.signInWithPopup(provider).catch(() => {
    document.getElementById('loginError').textContent = 'Sign-in failed. Please try again.';
  });
}
function signOut() { auth.signOut(); }

// ── Section state ─────────────────────────────────────────────────────────────
const SECTIONS = {
  Surgery: {
    resources: [
      { href: '/wba',                    icon: '📋', name: 'WBA Requirements',   desc: 'Workplace-based assessments' },
      { href: '/surgery',                icon: '🔪', name: 'Surgery Handbook',   desc: 'Year 4 MD · 2026' },
      { href: '/lecture_sched',          icon: '📅', name: 'Lecture Schedule',   desc: 'Year 4 Surgery · 2026' },
      { href: '/surgery_master_reference', icon: '📌', name: 'Master List',      desc: 'Everything Schedule' },
    ]
  },
  GP: {
    resources: [
      { href: '/gp_handbook',  icon: '🩺', name: 'GP Handbook',       desc: 'Year 4 MD · 2026' },
      { href: '/gp_schedule',  icon: '📅', name: 'GP Schedule',       desc: 'Rotation timetable' },
      { href: '/gp_resources', icon: '📋', name: 'GP Resources',      desc: 'Clinical guidelines' },
    ]
  },
  Medicine: {
    resources: [
      { href: '/med_handbook', icon: '💊', name: 'Medicine Handbook', desc: 'Year 4 MD · 2026' },
      { href: '/med_schedule', icon: '📅', name: 'Med Schedule',      desc: 'Ward rotation timetable' },
      { href: '/med_resources',icon: '📋', name: 'Med Resources',     desc: 'Clinical guidelines' },
    ]
  }
};

let currentSection = 'Surgery';
let currentUid     = null;
let allQuizDocs    = null;

auth.onAuthStateChanged(async user => {
  if (user) {
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('userInfo').textContent = user.email;
    document.getElementById('userInfo').style.display = 'block';
    document.getElementById('signoutBtn').style.display = 'block';
    try {
      const snap = await db.collection('admins').doc(user.email).get();
      if (snap.exists) document.getElementById('adminLink').style.display = 'inline-flex';
    } catch(e) {}
    currentUid = user.uid;
    const hash = window.location.hash.replace('#','');
    if (SECTIONS[hash]) {
      currentSection = hash;
      const radio = document.querySelector(`.switcher__input[value="${hash}"]`);
      if (radio) radio.checked = true;
    }
    await loadQuizzes(user.uid);
  } else {
    document.getElementById('loginScreen').classList.remove('hidden');
    document.getElementById('userInfo').style.display = 'none';
    document.getElementById('signoutBtn').style.display = 'none';
    document.getElementById('adminLink').style.display = 'none';
  }
});

// ── Tab switching ──────────────────────────────────────────────────────────────
function switchSection(section) {
  if (section === currentSection) return;
  currentSection = section;
  window.location.hash = section;
  renderResources(section);
  clearQuizCards();
  if (allQuizDocs) {
    renderSectionGrid(allQuizDocs, currentUid);
  }
}

// ── Load quizzes ────────────────────────────────────────
async function loadQuizzes(uid) {
  try {
    const snap = await db.collection('quizzes').get();
    allQuizDocs = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));

    renderResources(currentSection);
    renderSectionGrid(allQuizDocs, uid);
  } catch(e) {
    document.getElementById('skeleton').outerHTML = `<p class="empty">Error loading quizzes: ${escHtml(e.message)}</p>`;
  }
}

function renderResources(section) {
  const cards = SECTIONS[section].resources;
  document.getElementById('resourceCards').innerHTML = cards.map(c => `
    <div class="button-wrap">
      <a class="nb-btn resource-card" href="${c.href}" target="_blank">
        <span>
          <span class="resource-icon">${c.icon}</span>
          <span class="resource-info">
            <span class="resource-name">${c.name}</span>
            <span class="resource-desc">${c.desc}</span>
          </span>
        </span>
      </a>
      <div class="button-shadow"></div>
    </div>
  `).join('');
}

function clearQuizCards() {
  document.querySelectorAll('#grid .week-card, #grid .empty').forEach(el => el.remove());
  const skel = document.createElement('div');
  skel.className = 'skel-card'; skel.id = 'skeleton';
  skel.innerHTML = `<div class="skel skel-bar" style="width:40px;margin-bottom:16px;"></div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;">
      <div class="skel skel-pill"></div><div class="skel skel-pill"></div><div class="skel skel-pill"></div>
    </div>`;
  document.getElementById('grid').appendChild(skel);
}

function renderSectionGrid(docs, uid) {
  const filtered = docs.filter(d => {
    const s = (d.section || 'Surgery');
    return s.toLowerCase() === currentSection.toLowerCase();
  });

  const skel = document.getElementById('skeleton');
  if (skel) skel.remove();
  document.querySelectorAll('#grid .empty').forEach(el => el.remove());

  if (!filtered.length) {
    const empty = document.createElement('p');
    empty.className = 'empty';
    empty.textContent = `No quizzes yet for ${currentSection}.`;
    document.getElementById('grid').appendChild(empty);
    return;
  }

  const groups = {};
  filtered.forEach(d => {
    const w = (d.week  || 'Unknown').toUpperCase();
    const t =  d.topic || 'General';
    if (!groups[w])    groups[w]    = {};
    if (!groups[w][t]) groups[w][t] = [];
    groups[w][t].push({ id: d.id, name: d.name || d.id, questionCount: d.questionCount || 0 });
  });

  renderGrid(groups);

  if (uid) {
    const meta = filtered.map(d => ({ id: d.id, questionCount: d.questionCount || 0 }));
    loadAllProgress(uid, meta);
  }
}

function weekSortKey(w) {
  const m = w.match(/^W(\d+)$/i);
  return m ? parseInt(m[1]) : 9999;
}

function renderGrid(groups) {
  const sortedWeeks = Object.keys(groups).sort((a, b) => weekSortKey(a) - weekSortKey(b));
  const grid = document.getElementById('grid');

  sortedWeeks.forEach(week => {
    let rows = '';
    Object.keys(groups[week]).sort().forEach(topic => {
      const versions = groups[week][topic].sort((a,b) => a.name.localeCompare(b.name));
      let pills = '';
      versions.forEach(q => {
        const safe = q.id.replace(/__/g, '_');
        pills += `<div class="quiz-pill" data-quiz-id="${q.id}">
          
          <div class="button-wrap">
            <a href="/quiz?id=${q.id}" class="nb-btn">
              <span>
                <span class="pill-name">${q.name}</span>
                <span class="pill-count">${q.questionCount}q</span>
              </span>
            </a>
            <div class="button-shadow"></div>
          </div>

          <div class="progress-wrap" id="prog_${safe}" style="margin-top: 6px;">
            <div class="prog-bar">
              <div class="seg seg-correct" id="seg_c_${safe}"></div>
              <div class="seg seg-wrong"   id="seg_w_${safe}"></div>
              <div class="seg seg-unans"   id="seg_u_${safe}"></div>
            </div>
            <div class="flag-bar" id="seg_f_${safe}"></div>
            <div class="prog-labels" id="lbl_${safe}"></div>
          </div>
        </div>`;
      });
      rows += `<div class="topic-row">
        <span class="topic-name">${topic}</span>
        <div class="pill-group">${pills}</div>
      </div>`;
    });

    const card = document.createElement('div');
    card.className = 'week-card';
    card.innerHTML = `<div class="week-label">${week}</div><div class="topic-list">${rows}</div>`;
    grid.appendChild(card);
  });
  
  if (window.renderMathInElement) {
    renderMathInElement(document.getElementById('grid'), {
      delimiters: [
        {left: '$$', right: '$$', display: true},
        {left: '$',  right: '$',  display: false},
        {left: '\\(', right: '\\)', display: false},
        {left: '\\[', right: '\\]', display: true}
      ]
    });
  }
}

// ── Progress bars ─────────────────────────────────────────────────────────────
async function loadAllProgress(uid, quizMeta) {
  const fetches = quizMeta.map(async ({ id, questionCount }) => {
    try {
      const snap = await db.collection('quizSessions').doc(uid)
        .collection('quizzes').doc(id).get();
      return { id, questionCount, data: snap.exists ? snap.data() : null };
    } catch(e) {
      return { id, questionCount, data: null };
    }
  });
  const results = await Promise.all(fetches);
  results.forEach(r => renderBar(r.id, r.questionCount, r.data));
}

function renderBar(quizId, total, data) {
  const safe = quizId.replace(/__/g, '_');
  if (!document.getElementById('prog_' + safe)) return;
  if (!data || !total) return;

  const results = data.results || [];
  const flagged = data.flagged || [];

  const correct = results.filter(r => r && r.wasCorrect).length;
  const wrong   = results.filter(r => r && !r.wasCorrect && !r.skipped).length;
  const unans   = total - correct - wrong;
  const flags   = flagged.filter(Boolean).length;
  const pct     = Math.round(correct / total * 100);

  document.getElementById('seg_c_' + safe).style.width = (correct/total*100).toFixed(1) + '%';
  document.getElementById('seg_w_' + safe).style.width = (wrong/total*100).toFixed(1)   + '%';
  document.getElementById('seg_u_' + safe).style.width = (unans/total*100).toFixed(1)   + '%';
  document.getElementById('seg_f_' + safe).style.width = (flags/total*100).toFixed(1)   + '%';

  document.getElementById('lbl_' + safe).innerHTML = `
    <span class="prog-label"><span class="dot dot-correct"></span>${correct} correct</span>
    <span class="prog-label"><span class="dot dot-wrong"></span>${wrong} wrong</span>
    <span class="prog-label"><span class="dot dot-unans"></span>${unans} left</span>
    ${flags > 0 ? `<span class="prog-label"><span class="dot dot-flag"></span>${flags} flagged</span>` : ''}
    <span class="prog-pct">${pct}%</span>
  `;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Liquid Glass Switcher Script ──────────────────────────────────────────────
const switcher = document.querySelector('.switcher');

const trackPrevious = (el) => {
  const radios = el.querySelectorAll('input[type="radio"]');
  let previousValue = null;

  const initiallyChecked = el.querySelector('input[type="radio"]:checked');
  if (initiallyChecked) {
    previousValue = initiallyChecked.getAttribute("c-option");
    el.setAttribute('c-previous', previousValue);
  }

  radios.forEach(radio => {
    radio.addEventListener('change', () => {
      if (radio.checked) {
        el.setAttribute('c-previous', previousValue ?? '');
        previousValue = radio.getAttribute("c-option");
      }
    });
  });
}

if (switcher) {
  trackPrevious(switcher);
}

// ── Horizontal Mouse Scroll for Resources ─────────────────────────────────────
const resourceCards = document.getElementById('resourceCards');

if (resourceCards) {
  resourceCards.addEventListener('wheel', (e) => {
    // Only intercept if scrolling vertically
    if (e.deltaY !== 0) {
      e.preventDefault();
      // Translate the vertical scroll wheel movement to horizontal scrolling
      resourceCards.scrollLeft += e.deltaY;
    }
  }, { passive: false });
}

</script>
</body>
</html>
