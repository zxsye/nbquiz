// ============================================================
// HANDLERS
// ============================================================
function setTab(id) { setState({ activeTab: id, openStepId: null }); }

function setSection(section) { setState({ selectedSection: section }); }

function updateImportPreview() {
  const weekId = document.getElementById('importWeekId')?.value;
  const format = document.querySelector('input[name="importFormat"]:checked')?.value || 'json';
  const previewEl = document.getElementById('importPreview');
  
  if (!weekId) {
    previewEl.textContent = 'Select a week to see preview...';
    return;
  }
  
  const content = format === 'json' ? generateWeekJson(weekId) : generateWeekMarkdown(weekId);
  previewEl.textContent = content || 'Error generating preview';
}

function handleRawImport() {
  const weekId = document.getElementById('importWeekId')?.value;
  const format = document.querySelector('input[name="importFormat"]:checked')?.value || 'json';
  
  if (!weekId) { alert('Select a week first.'); return; }
  
  importRawWeek(weekId, state.selectedSection, format);
  document.getElementById('importWeekId').value = '';
  document.getElementById('importPreview').textContent = 'Select a week to see preview...';
}

function selectRawWeek(rawWeekId) {
  setState({ activeRawWeekId: rawWeekId });
}

function copyCurriculumPrompt(btn) {
  const content = document.getElementById('curriculumPromptContent')?.textContent;
  if (!content) return;
  
  navigator.clipboard.writeText(content).then(() => {
    const orig = btn.innerHTML;
    btn.innerHTML = '✅ Copied!';
    btn.style.color = '#4ade80';
    setTimeout(() => { btn.innerHTML = orig; btn.style.color = ''; }, 2000);
  });
}

function handleProcessRawWeek(rawWeekId) {
  const aiOutput = document.getElementById('aiOutputText')?.value || '';
  
  // Hide any previous error first
  hideAIOutputError();
  
  if (!aiOutput.trim()) {
    showAIOutputError({
      type: 'empty_input',
      message: 'No AI output provided.',
      details: 'The text area is empty. Please paste the AI JSON response first.',
      hint: 'Copy the JSON output from Claude and paste it into the text area above.'
    });
    return;
  }
  
  processRawWeek(rawWeekId, aiOutput);
}

function goToWeek(weekId) {
  const w = state.weeks.find(w => w.id === weekId);
  if (!w || !w.topics.length) return;
  const t = w.topics.find(t => topicStatus(t) !== 'studied') || w.topics[0];
  setState({ activeTab: 'workflow', activeTopicId: t.id, openStepId: null });
}

function openWorkflow(topicId) {
  setState({ activeTab: 'workflow', activeTopicId: topicId, openStepId: null });
}

function selectTopic(topicId) {
  // Fast update: don't re-render entire UI, just update sidebar active state and swap pipeline
  const prevActiveId = state.activeTopicId;
  if (prevActiveId === topicId) return;

  // Update state without triggering full render
  state.activeTopicId = topicId;
  state.openStepId = null;
  persist();

  // Update sidebar: remove active from previous, add to new
  const sidebar = document.querySelector('.workflow-sidebar');
  if (sidebar) {
    const prevEl = sidebar.querySelector(`.sidebar-topic[data-topic-id="${prevActiveId}"]`) ||
                   sidebar.querySelector('.sidebar-topic.active');
    const newEl = sidebar.querySelector(`.sidebar-topic[data-topic-id="${topicId}"]`);
    if (prevEl) prevEl.classList.remove('active');
    if (newEl) newEl.classList.add('active');
  }

  // Update pipeline content only
  const topic = findTopic(topicId);
  const pipelineContainer = document.querySelector('.workflow-layout > div:last-child');
  if (pipelineContainer && topic) {
    pipelineContainer.innerHTML = buildPipeline(topic);
  }
}

function toggleStep(stepId) {
  // Check actual DOM state, not state.openStepId (which may be stale)
  const card = document.getElementById(`sc-${stepId}`);
  if (!card) return;

  const stepBody = card.querySelector('.step-body');
  const chevron = card.querySelector('.step-chevron');

  // Check if this specific card is currently open
  const isOpen = stepBody && stepBody.classList.contains('open');

  // Toggle this card
  if (stepBody) {
    if (isOpen) {
      stepBody.classList.remove('open');
    } else {
      stepBody.classList.add('open');
    }
  }
  if (chevron) {
    chevron.textContent = isOpen ? '▼' : '▲';
  }

  // Update state to track the currently open step (or null if closing)
  state.openStepId = isOpen ? null : stepId;
  persist();
}

function saveResult(topicId, key, value) {
  mutateTopic(topicId, { [key]: value });
}

function copyPrompt(stepId, topicId, btn) {
  const topic = findTopic(topicId);
  if (!topic) return;
  navigator.clipboard.writeText(promptForStep(stepId, topic)).then(() => {
    const orig = btn.innerHTML;
    btn.innerHTML = '✅ Copied!';
    btn.style.color = '#4ade80';
    setTimeout(() => { btn.innerHTML = orig; btn.style.color = ''; }, 2000);
  });
}

function copyNotesResult(topicId, btn) {
  const topic = findTopic(topicId);
  if (!topic) return;
  const notes = topic.notes || '';
  if (!notes.trim()) {
    alert('No notes to copy. Paste the AI response into the notes box first.');
    return;
  }
  navigator.clipboard.writeText(notes).then(() => {
    const orig = btn.innerHTML;
    btn.innerHTML = '✅ Copied!';
    btn.style.color = '#4ade80';
    setTimeout(() => { btn.innerHTML = orig; btn.style.color = ''; }, 2000);
  });
}

function computeDiff(oldText, newText) {
  const oldLines = oldText.split('\n');
  const newLines = newText.split('\n');
  const added = [];
  const removed = [];
  
  // Simple line-based diff
  for (let i = 0; i < Math.max(oldLines.length, newLines.length); i++) {
    const oldLine = oldLines[i] || '';
    const newLine = newLines[i] || '';
    if (oldLine !== newLine) {
      if (oldLine) removed.push('- ' + oldLine);
      if (newLine) added.push('+ ' + newLine);
    }
  }
  
  if (added.length === 0 && removed.length === 0) return 'No changes detected';
  return [...removed, ...added].slice(0, 50).join('\n') + (removed.length + added.length > 50 ? '\n... (truncated)' : '');
}

function showTemplateStatus(key, message, type = 'info', diff = null) {
  const statusEl = document.getElementById('status-' + key);
  const diffEl = document.getElementById('diff-' + key);
  
  if (statusEl) {
    statusEl.textContent = message;
    statusEl.style.opacity = '1';
    if (type === 'success') statusEl.style.color = 'var(--success, #22c55e)';
    else if (type === 'error') statusEl.style.color = 'var(--error, #ef4444)';
    else statusEl.style.color = 'var(--text-3)';
    
    // Fade out status after delay (but keep diff visible)
    setTimeout(() => { statusEl.style.opacity = '0'; }, 3000);
  }
  
  // Diff persists until next save (no auto-hide)
  if (diffEl) {
    if (diff) {
      diffEl.textContent = diff;
      diffEl.style.display = 'block';
    }
    // If no diff provided, keep existing diff visible (don't hide it)
  }
}

async function saveTemplate(key) {
  const textarea = document.getElementById('tpl-' + key);
  const val = (textarea || {}).value || '';
  const oldVal = state.promptTemplates?.[key] || '';
  
  // Calculate diff before saving
  const diff = computeDiff(oldVal, val);
  
  // Save without triggering full render
  const current = state.promptTemplates || {};
  setStateNoRender({
    promptTemplates: {
      ...current,
      [key]: val
    }
  });
  
  // Show local save success with diff
  showTemplateStatus(key, '✓ Saved locally', 'success', diff);
  
  // Handle cloud sync
  if (!pmxDb || !pmxUser) {
    showTemplateStatus(key, 'Sign in to sync to cloud', 'info');
    return;
  }
  
  // Clear any pending cloud save timer and force immediate save
  clearTimeout(pmxCloudSaveTimer);
  
  try {
    await saveUserStudyOsStateToFirestore();
    showTemplateStatus(key, '✓ Synced to cloud', 'success');
  } catch (e) {
    console.error('Cloud save failed:', e);
    showTemplateStatus(key, '✗ Cloud sync failed - saved locally', 'error');
  }
}

async function saveTemplates() {
  const get = id => (document.getElementById(id) || {}).value || '';
  const keys = ['curriculumExpansion', 'notes', 'mcqStyleGuide'];
  const oldTemplates = { ...state.promptTemplates };
  
  const newTemplates = {
    curriculumExpansion: get('tpl-curriculumExpansion'),
    notes: get('tpl-notes'),
    mcqStyleGuide: get('tpl-mcqStyleGuide')
  };
  
  // Save without triggering full render
  setStateNoRender({ promptTemplates: newTemplates });
  
  // Show status for each template with diffs
  for (const key of keys) {
    const diff = computeDiff(oldTemplates[key] || '', newTemplates[key] || '');
    if (diff !== 'No changes detected') {
      showTemplateStatus(key, '✓ Saved locally', 'success', diff);
    } else {
      showTemplateStatus(key, 'No changes', 'info');
    }
  }
  
  // Handle cloud sync
  if (!pmxDb || !pmxUser) {
    keys.forEach(key => showTemplateStatus(key, 'Sign in to sync to cloud', 'info'));
    return;
  }
  
  // Clear any pending cloud save timer and force immediate save
  clearTimeout(pmxCloudSaveTimer);
  
  try {
    await saveUserStudyOsStateToFirestore();
    keys.forEach(key => {
      const diff = computeDiff(oldTemplates[key] || '', newTemplates[key] || '');
      if (diff !== 'No changes detected') {
        showTemplateStatus(key, '✓ Synced to cloud', 'success');
      }
    });
  } catch (e) {
    console.error('Cloud save failed:', e);
    keys.forEach(key => showTemplateStatus(key, '✗ Cloud sync failed - saved locally', 'error'));
  }
  
  // Button feedback
  const btns = document.querySelectorAll('.btn-primary');
  btns.forEach(b => { if (b.textContent.includes('Save All')) { const o=b.innerHTML; b.innerHTML='✅ Saved All!'; setTimeout(()=>{b.innerHTML=o;},1500); }});
}

function resetTemplates() {
  if (!confirm('Factory reset all templates? This will restore the original built-in prompts and discard your edits.')) return;
  
  const keys = ['curriculumExpansion', 'notes', 'mcqStyleGuide'];
  const oldTemplates = { ...state.promptTemplates };
  const newTemplates = {
    curriculumExpansion: DEFAULT_CURRICULUM_EXPANSION,
    notes: DEFAULT_NOTES,
    mcqStyleGuide: DEFAULT_MCQ_STYLE_GUIDE
  };
  
  // Save without triggering full render
  setStateNoRender({ promptTemplates: newTemplates });
  
  // Update textareas directly and show diffs
  keys.forEach(key => {
    const textarea = document.getElementById('tpl-' + key);
    if (textarea) textarea.value = newTemplates[key];
    const diff = computeDiff(oldTemplates[key] || '', newTemplates[key]);
    showTemplateStatus(key, '✓ Factory reset complete', 'success', diff);
  });
}

// ============================================================
// BOOT
// ============================================================
render();
</script>
