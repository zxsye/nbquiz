<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>W7 · Trauma · v4</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:           #f7f5f0;
  --surface:      #ffffff;
  --surface-2:    #f0ede6;
  --border:       #e2ddd5;
  --text:         #1a1714;
  --text-2:       #5a534a;
  --text-3:       #9a8f83;
  --accent:       #2563a8;
  --accent-light: #dbeafe;
  --correct:      #166534;
  --correct-bg:   #dcfce7;
  --correct-ring: #4ade80;
  --wrong:        #991b1b;
  --wrong-bg:     #fee2e2;
  --wrong-ring:   #f87171;
  --hint:         #92400e;
  --hint-bg:      #fef3c7;
  --radius:       10px;
  --radius-lg:    16px;
  --shadow:       0 1px 3px rgba(0,0,0,.07), 0 4px 16px rgba(0,0,0,.06);
  --shadow-lg:    0 4px 6px rgba(0,0,0,.07), 0 12px 32px rgba(0,0,0,.1);
  --font-serif:   'Crimson Pro', Georgia, serif;
  --font-sans:    'DM Sans', system-ui, sans-serif;
  --font-mono:    'DM Mono', monospace;
  --transition:   200ms cubic-bezier(.4,0,.2,1);
}

body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: row;
  align-items: flex-start;
  overflow: hidden;
}

/* ── Sidebar ── */
.sidebar {
  width: 320px;
  height: 100vh;
  overflow-y: auto;
  background: var(--surface);
  border-right: 1.5px solid var(--border);
  padding: 24px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
}
.home-btn {
  display: inline-flex;
  align-items: center;
  font-size: .8rem;
  font-weight: 500;
  color: var(--text-3);
  text-decoration: none;
  margin-bottom: 16px;
  transition: color var(--transition);
}
.home-btn:hover { color: var(--accent); }
.sidebar-header {
  font-family: var(--font-serif);
  font-size: 1.3rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.q-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(42px, 1fr));
  gap: 8px;
  margin-bottom: 24px;
}
.q-grid-item {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 6px;
  border: 1.5px solid var(--border);
  font-family: var(--font-mono);
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  position: relative;
  color: var(--text-2);
  background: var(--bg);
  transition: all 0.2s;
}
.q-grid-item:hover { border-color: var(--text-3); }
.q-grid-item.active { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); color: var(--accent); }
.q-grid-item.correct { background: var(--correct-bg); border-color: var(--correct-ring); color: var(--correct); }
.q-grid-item.wrong { background: var(--wrong-bg); border-color: var(--wrong-ring); color: var(--wrong); }
.q-grid-item.skipped { background: var(--surface-2); border-color: var(--text-3); color: var(--text-2); opacity: 0.8; }

.flag-icon {
  position: absolute;
  top: -6px;
  right: -6px;
  font-size: 12px;
  background: #fff;
  border-radius: 50%;
  box-shadow: 0 1px 2px rgba(0,0,0,0.2);
  display: none;
  width: 16px;
  height: 16px;
  align-items: center;
  justify-content: center;
}
.q-grid-item.flagged .flag-icon { display: flex; }

/* ── Main Content ── */
.main-content {
  flex: 1;
  height: 100vh;
  overflow-y: auto;
  padding: 24px 32px 80px;
}

/* ── Header ── */
.app-header {
  width: 100%;
  max-width: 780px;
  margin: 0 auto 32px auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 0 24px;
  border-bottom: 1.5px solid var(--border);
}
.app-title {
  font-family: var(--font-serif);
  font-size: 1.5rem;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -.01em;
}
.app-title span { color: var(--accent); }
.score-badge {
  font-family: var(--font-mono);
  font-size: .8rem;
  font-weight: 500;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 99px;
  padding: 6px 14px;
  color: var(--text-2);
  display: flex;
  gap: 6px;
  align-items: center;
}
.score-badge .score-num { color: var(--text); font-weight: 600; }

/* ── Progress bar ── */
.progress-wrap { 
  width: 100%; 
  max-width: 780px; 
  margin: 0 auto 28px auto; 
}
.progress-meta { display: flex; justify-content: space-between; font-size: .78rem; color: var(--text-3); margin-bottom: 7px; font-family: var(--font-mono); }
.progress-track { height: 5px; background: var(--border); border-radius: 99px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width 400ms cubic-bezier(.4,0,.2,1); }

/* ── Card ── */
.card {
  width: 100%;
  max-width: 1060px;
  margin: 0 auto;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow);
  overflow: hidden;
  animation: fadeUp .3s ease both;
  display: grid;
  grid-template-columns: minmax(0, 1fr) 260px;
  grid-template-rows: auto auto auto 1fr auto;
}
@keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

.card-header { grid-column: 1; padding: 20px 28px 0; display: flex; align-items: center; gap: 10px; }
.q-label { font-family: var(--font-mono); font-size: .7rem; font-weight: 500; color: var(--text-3); text-transform: uppercase; letter-spacing: .08em; }
.part-tag { font-family: var(--font-mono); font-size: .65rem; font-weight: 500; background: var(--surface-2); border: 1px solid var(--border); border-radius: 4px; padding: 2px 7px; color: var(--text-3); }

.stem { grid-column: 1; font-family: var(--font-serif); font-size: 1.25rem; line-height: 1.65; color: var(--text); padding: 16px 28px 24px; border-bottom: 1px solid var(--border); }

/* ── Hint ── */
.hint-wrap { grid-column: 1; padding: 0 28px; margin-top: 20px; }
.hint-toggle { display: inline-flex; align-items: center; gap: 7px; font-size: .8rem; font-weight: 500; color: var(--hint); cursor: pointer; background: none; border: 1.5px solid #d97706; border-radius: 99px; padding: 5px 14px; transition: background var(--transition); }
.hint-toggle:hover { background: var(--hint-bg); }
.hint-body { margin-top: 10px; padding: 12px 16px; background: var(--hint-bg); border-left: 3px solid #f59e0b; border-radius: 0 var(--radius) var(--radius) 0; font-size: .9rem; color: var(--hint); line-height: 1.55; display: none; }
.hint-body.open { display: block; animation: fadeIn .2s ease; }

/* ── Notes ── */
.note-wrap {
  grid-column: 2;
  grid-row: 1 / -1;
  border-left: 1.5px solid var(--border);
  padding: 20px 18px;
  display: flex;
  flex-direction: column;
  background: var(--surface-2);
}
.note-side-header {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: .72rem;
  font-weight: 600;
  color: var(--text-3);
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: .07em;
  margin-bottom: 10px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}
.note-toggle { display: none; }
.note-body { display: flex; flex-direction: column; flex: 1; margin-top: 0; }
.note-textarea { flex: 1; min-height: 140px; width: 100%; padding: 10px 12px; font-family: var(--font-sans); font-size: .85rem; color: var(--text); background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); resize: none; outline: none; transition: border-color var(--transition); line-height: 1.55; box-sizing: border-box; }
.note-textarea:focus { border-color: var(--accent); }
.note-save-status { font-size: .7rem; color: var(--text-3); margin-top: 5px; text-align: right; font-family: var(--font-mono); min-height: 1em; }
.note-icon { position: absolute; top: -5px; left: -5px; font-size: 9px; background: var(--accent-light); border: 1px solid var(--accent); border-radius: 50%; display: none; width: 14px; height: 14px; align-items: center; justify-content: center; }
.q-grid-item.has-note .note-icon { display: flex; }
.review-note { margin-top: 8px; padding: 8px 12px; background: var(--accent-light); border-radius: 6px; font-size: .82rem; color: var(--text-2); line-height: 1.45; border-left: 3px solid var(--accent); white-space: pre-wrap; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

/* ── Options ── */
.options { grid-column: 1; padding: 20px 28px 28px; display: flex; flex-direction: column; gap: 10px; }
.option { display: flex; align-items: flex-start; gap: 14px; padding: 14px 16px; border: 1.5px solid var(--border); border-radius: var(--radius); cursor: pointer; background: var(--surface); transition: border-color var(--transition), background var(--transition), box-shadow var(--transition); text-align: left; width: 100%; position: relative; }
.option:hover:not(.locked) { border-color: var(--accent); background: var(--accent-light); box-shadow: 0 0 0 3px rgba(37,99,168,.1); }
.option.selected:not(.locked) { border-color: var(--accent); background: var(--accent-light); box-shadow: 0 0 0 3px rgba(37,99,168,.15); }
.option.correct { border-color: var(--correct-ring); background: var(--correct-bg); box-shadow: 0 0 0 3px rgba(74,222,128,.2); }
.option.wrong { border-color: var(--wrong-ring); background: var(--wrong-bg); box-shadow: 0 0 0 3px rgba(248,113,113,.2); }
.option.dimmed { opacity: .5; }

.opt-letter { flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%; background: var(--surface-2); border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: .78rem; font-weight: 500; color: var(--text-2); transition: background var(--transition), border-color var(--transition), color var(--transition); }
.option.correct .opt-letter { background:#4ade80; border-color:#4ade80; color:#14532d; }
.option.wrong   .opt-letter { background:#f87171; border-color:#f87171; color:#7f1d1d; }
.option.selected:not(.locked) .opt-letter { background:var(--accent); border-color:var(--accent); color:#fff; }

.opt-body { flex: 1; }
.opt-text { font-size: .95rem; line-height: 1.5; color: var(--text); }
.opt-rationale { margin-top: 8px; font-size: .83rem; color: var(--text-2); line-height: 1.5; padding-top: 8px; border-top: 1px solid rgba(0,0,0,.06); display: none; }
.opt-rationale.visible { display: block; animation: fadeIn .25s ease; }

.opt-icon { flex-shrink: 0; font-size: 1.1rem; margin-top: 2px; display: none; }
.option.correct .opt-icon, .option.wrong .opt-icon { display:block; }

/* ── Actions ── */
.card-footer { grid-column: 1; padding: 0 28px 28px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.btn { font-family: var(--font-sans); font-size: .9rem; font-weight: 600; border-radius: 99px; padding: 11px 26px; cursor: pointer; border: 1.5px solid transparent; transition: all var(--transition); display: inline-flex; align-items: center; gap: 8px; justify-content: center; }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover { background: #1d4f8a; border-color: #1d4f8a; box-shadow: 0 4px 14px rgba(37,99,168,.3); }
.btn-primary:disabled { opacity:.4; cursor:not-allowed; box-shadow:none; }
.btn-ghost { background: transparent; color: var(--text-2); border-color: var(--border); }
.btn-ghost:hover { background: var(--surface-2); color: var(--text); }

.feedback-msg { font-size: .88rem; font-weight: 600; display: flex; align-items: center; gap: 6px; }
.feedback-msg.correct { color: var(--correct); }
.feedback-msg.wrong   { color: var(--wrong); }

/* ── Results screen ── */
.results-screen { 
  width: 100%; 
  max-width: 780px; 
  margin: 0 auto;
  display: none; 
  flex-direction: column; 
  gap: 24px; 
  animation: fadeUp .4s ease both; 
}
.results-screen.visible { display: flex; }
.results-hero { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); padding: 48px 40px; text-align: center; }
.results-grade { font-family: var(--font-serif); font-size: 5rem; font-weight: 600; line-height: 1; margin-bottom: 8px; background: linear-gradient(135deg, #1a1714 0%, #2563a8 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.results-label { font-size: 1.05rem; color: var(--text-2); margin-bottom: 32px; }
.results-stats { display: flex; justify-content: center; gap: 40px; flex-wrap: wrap; }
.stat { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.stat-num { font-family: var(--font-mono); font-size: 1.8rem; font-weight: 500; color: var(--text); }
.stat-num.green { color: var(--correct); }
.stat-num.red   { color: var(--wrong); }
.stat-label { font-size: .78rem; color: var(--text-3); text-transform: uppercase; letter-spacing: .06em; }
.results-actions { display: flex; justify-content: center; gap: 12px; margin-top: 32px; flex-wrap: wrap; }

/* Review list */
.filter-btn { padding: 5px 14px; font-size: 0.8rem; font-weight: 600; border-radius: 99px; cursor: pointer; border: 1.5px solid var(--border); background: transparent; color: var(--text-2); transition: all var(--transition); }
.filter-btn.active { background: var(--surface-2); color: var(--text); border-color: var(--text-3); }
.review-list { display: flex; flex-direction: column; gap: 12px; }
.review-item { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 16px 20px; cursor: pointer; display: flex; align-items: flex-start; gap: 14px; transition: box-shadow var(--transition); }
.review-item:hover { box-shadow: var(--shadow); }
.review-dot { flex-shrink: 0; width: 10px; height: 10px; border-radius: 50%; margin-top: 6px; }
.review-dot.correct { background: var(--correct-ring); }
.review-dot.wrong   { background: var(--wrong-ring); }
.review-text { flex: 1; font-size: .9rem; color: var(--text-2); line-height: 1.4; }
.review-answer { font-size: .8rem; font-weight: 600; font-family: var(--font-mono); color: var(--text-3); flex-shrink: 0; }
.status-Unanswered { color: var(--text-3); }
.status-Correct { color: var(--correct); }
.status-Wrong { color: var(--wrong); }

/* ── Utility ── */
.hidden { display: none !important; }

/* ── Responsive ── */
@media (max-width: 800px) {
  body { flex-direction: column; overflow-y: auto; }
  .sidebar { width: 100%; height: auto; max-height: 250px; border-right: none; border-bottom: 1.5px solid var(--border); padding: 16px; flex-shrink: 0; }
  .main-content { width: 100%; height: auto; overflow: visible; padding: 20px 16px 80px; }
  .card { display: flex; flex-direction: column; }
  .note-wrap { grid-column: unset; grid-row: unset; border-left: none; border-top: 1.5px solid var(--border); background: var(--surface-2); padding: 14px 20px; }
  .note-side-header { display: none; }
  .note-toggle { display: inline-flex; align-items: center; gap: 7px; font-size: .8rem; font-weight: 500; color: var(--text-2); cursor: pointer; background: none; border: 1.5px solid var(--border); border-radius: 99px; padding: 5px 14px; transition: all var(--transition); }
  .note-toggle:hover { background: var(--surface); }
  .note-toggle.has-note { color: var(--accent); border-color: var(--accent); background: var(--accent-light); }
  .note-body { display: none; flex: none; margin-top: 10px; }
  .note-body.open { display: flex; flex-direction: column; animation: fadeIn .2s ease; }
  .note-textarea { min-height: 90px; resize: vertical; flex: none; }
}
@media (max-width: 520px) {
  .stem { font-size: 1.1rem; padding: 14px 20px 20px; }
  .options { padding: 16px 20px 20px; }
  .card-footer { padding: 0 20px 20px; flex-wrap: wrap; }
  .card-header { padding: 16px 20px 0; }
  .hint-wrap { padding: 0 20px; }
  .note-wrap { padding: 12px 20px; }
  .results-grade { font-size: 3.5rem; }
  .results-stats { gap: 24px; }
}
/* ── Login screen ── */
#loginScreen {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  padding: 24px;
}
#loginScreen.hidden { display: none; }
.login-logo {
  font-family: var(--font-serif);
  font-size: 2.4rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 6px;
  text-align: center;
}
.login-logo span { color: var(--accent); }
.login-sub {
  font-size: .85rem;
  color: var(--text-3);
  margin-bottom: 48px;
  text-align: center;
}
.google-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 13px 28px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 99px;
  font-family: var(--font-sans);
  font-size: .9rem;
  font-weight: 600;
  color: var(--text);
  cursor: pointer;
  transition: border-color var(--transition), background var(--transition);
}
.google-btn:hover { border-color: var(--accent); background: var(--accent-light); }
.login-error {
  margin-top: 16px;
  font-size: .8rem;
  color: var(--wrong);
  min-height: 1em;
  text-align: center;
}
.made-by-login {
  position: fixed;
  bottom: 20px;
  font-size: .72rem;
  color: var(--text-3);
  font-family: var(--font-mono);
  text-align: center;
}
/* ── Persistent credit ── */
.made-by {
  font-size: .68rem;
  color: var(--text-3);
  font-family: var(--font-mono);
  text-align: center;
  padding-top: 12px;
  margin-top: 8px;
  border-top: 1px solid var(--border);
}

</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-logo">NB <span>Quiz</span></div>
  <div class="login-sub">Your personal medical study companion</div>
  <button class="google-btn" onclick="signInWithGoogle()">
    <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
    Continue with Google
  </button>
  <div class="login-error" id="loginError"></div>
  <div class="made-by-login">made by Zi Lin</div>
</div>

<aside class="sidebar">
  <a href="https://zxsye.github.io/nbquiz/" class="home-btn">← Home</a>
  <div class="sidebar-header">
    <span>Quiz Status</span>
    <span style="font-size:0.8rem; color:var(--text-3); font-family:var(--font-mono);" id="sidebarCount">0/25</span>
  </div>
  <div class="q-grid" id="qGrid"></div>
  
  <div style="margin-top:auto; display:flex; flex-direction:column; gap:10px;">
    <button class="btn btn-ghost" id="sidebarCopyBtn" style="width:100%; border: 1.5px solid var(--border); padding: 8px; font-size: 0.85rem;" onclick="copySidebarResults()">📋 Copy Status</button>
    <button class="btn btn-primary" style="width:100%; margin-top:0;" onclick="showResults()">Finish Quiz</button>
    <div class="made-by">made by Zi Lin</div>
  </div>
</aside>

<div class="main-content">
  <header class="app-header">
    <a href="../../../index.html" style="text-decoration:none;">
      <div class="app-title">NB <span>Quiz</span></div>
    </a>
    <div style="display:flex; align-items:center; gap:12px;">
      <div class="score-badge">
        Score&nbsp;<span class="score-num" id="scoreDisplay">0 / 0</span>
      </div>
      <button class="btn btn-ghost" onclick="signOut()" style="padding:6px 14px; font-size:0.8rem;" title="Sign out">Sign out</button>
    </div>
  </header>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-meta">
      <span id="progressLabel">Question 1 of 25</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>

  <div class="card" id="quizCard">
    <div class="card-header">

<script>
// ── Quiz data ─────────────────────────────────────────────────────────────────
const QUESTIONS = [{"stem": "A 22-year-old male is brought to the emergency department after being struck in the temporal region by a cricket ball. He had a brief loss of consciousness at the scene but is currently alert and oriented (GCS 15). Two hours later, while awaiting review, he becomes increasingly agitated and his GCS drops to 11. Which of the following is the most likely underlying pathology?", "options": {"A": "Extradural haematoma", "B": "Acute subdural haematoma", "C": "Diffuse axonal injury", "D": "Cerebral contusion", "E": "Post-concussive syndrome"}, "correct": "A", "rationales": {"A": "The 'lucid interval' followed by rapid deterioration is the classic presentation of an arterial bleed into the extradural space, typically from the middle meningeal artery.", "B": "While possible in trauma, subdural haematomas usually involve high-energy deceleration and present with immediate and persistent neurological depression rather than a lucid interval.", "C": "This pathology typically causes immediate, prolonged unconsciousness that does not correlate with focal findings on an initial CT scan.", "D": "Contusions often show delayed 'blossoming' on imaging, but the classic temporal strike and lucid interval point specifically toward an arterial collection.", "E": "This refers to lingering symptoms like headache and dizziness following mild TBI, but it does not involve an acute, significant drop in GCS."}, "hint": "Consider the classic clinical sequence of injury, recovery, and sudden decline in a young patient with focal temporal trauma.", "part": 1}, {"stem": "An 82-year-old female with a history of atrial fibrillation on warfarin presents with 3 weeks of progressive confusion and two recent falls. A non-contrast CT head shows a crescent-shaped, hypodense collection crossing suture lines with 4 mm of midline shift. What is the most appropriate next step in her management?", "options": {"A": "Urgently reverse anticoagulation with Vitamin K and Prothrombinex", "B": "Immediate emergency craniotomy for evacuation", "C": "Administer high-dose dexamethasone to reduce mass effect", "D": "Perform a lumbar puncture to exclude normal pressure hydrocephalus", "E": "Discharge with a referral to the memory clinic for dementia workup"}, "correct": "A", "rationales": {"A": "In any patient with intracranial bleeding on anticoagulants, immediate reversal is the highest priority to prevent haematoma expansion, regardless of immediate surgical plans.", "B": "A shift of less than 5 mm in a stable patient with a chronic subdural haematoma usually allows time for medical optimization and reversal of coagulopathy first.", "C": "Steroids are generally not indicated for traumatic collections or chronic subdurals and can increase morbidity.", "D": "Lumbar puncture is contraindicated in the presence of a mass lesion with midline shift due to the risk of herniation.", "E": "While she presents with confusion, the CT clearly identifies a structural, treatable cause for her symptoms."}, "hint": "This patient has a 'great mimic' pathology and a critical medication-related risk factor that must be addressed before any intervention.", "part": 1}, {"stem": "A 28-year-old male is involved in a high-speed motor vehicle accident. On primary survey, he is tachypnoeic, tachycardic, and hypotensive (BP 85/50 mmHg). He has absent breath sounds on the right side with hyper-resonance to percussion and distended neck veins. What is the most appropriate immediate action?", "options": {"A": "Needle decompression in the 2nd intercostal space, midclavicular line", "B": "Urgently transport the patient to the CT scanner for a 'Pan-scan'", "C": "Perform a FAST ultrasound to look for pericardial tamponade", "D": "Insert a large-bore intercostal chest drain (28-32Fr) immediately", "E": "Intubate and start positive pressure ventilation"}, "correct": "A", "rationales": {"A": "Tension pneumothorax is a clinical diagnosis requiring immediate decompression to resolve obstructive shock; waiting for imaging is life-threatening.", "B": "Unstable patients should never be taken to CT; life-threatening thoracic injuries must be managed during the primary survey.", "C": "While tamponade is in the differential, the presence of hyper-resonance and absent breath sounds strongly identifies tension pneumothorax as the priority.", "D": "While a chest drain is the definitive treatment, needle decompression is the faster immediate 'bridge' to stabilize the patient's blood pressure.", "E": "Initiating positive pressure ventilation in an undressed tension pneumothorax will worsen the intra-thoracic pressure and rapidly lead to cardiac arrest."}, "hint": "This is a clinical diagnosis of obstructive shock where percussion and auscultation findings guide immediate bedside intervention.", "part": 1}, {"stem": "A 45-year-old female is brought to the trauma bay after a fall from a height. She is hemodynamically unstable (BP 80/40 mmHg, HR 130). A FAST exam is performed and shows anechoic fluid in Morrison’s pouch. What is the next best step in management?", "options": {"A": "Immediate transfer to the operating theatre for laparotomy", "B": "Transfer to CT for grading of the solid organ injury", "C": "Aggressive fluid resuscitation with 2L of normal saline", "D": "Diagnostic peritoneal lavage (DPL) to confirm the FAST findings", "E": "Angioembolisation of the splenic artery"}, "correct": "A", "rationales": {"A": "An unstable patient with a positive FAST (indicating haemoperitoneum) requires immediate surgical haemorrhage control.", "B": "CT is only for hemodynamically stable patients; taking an unstable patient to CT risks an unmanaged arrest in the scanner.", "C": "Modern trauma guidelines favor 'permissive hypotension' and early blood products (MTP) over large volumes of crystalloid which can worsen coagulopathy.", "D": "DPL is largely historical and redundant if a FAST has already demonstrated free fluid in an unstable patient.", "E": "Angiography is an option for stable patients with active blushes on CT, but cannot support an unstable patient needing multi-quadrant exploration."}, "hint": "Consider the 'golden rule' regarding the location of the unstable trauma patient with a positive screening tool for bleeding.", "part": 1}, {"stem": "A 70 kg male sustains thermal burns to his entire anterior trunk and both anterior upper limbs. Using the Parkland formula, what is the total volume of Hartmann's solution required in the first 8 hours following the injury?", "options": {"A": "3,780 mL", "B": "7,560 mL", "C": "5,040 mL", "D": "1,890 mL", "E": "2,520 mL"}, "correct": "A", "rationales": {"A": "TBSA is 18% (ant. trunk) + 9% (both ant. arms) = 27%. Calculation: 4 mL \\times 70 kg \\times 27 = 7,560 mL total; half (3,780 mL) is given in the first 8 hours.", "B": "This represents the total fluid for the first 24 hours, whereas the question asks specifically for the first 8-hour portion.", "C": "This results from an incorrect TBSA calculation or using 3 mL/kg instead of the standard 4 mL/kg for thermal burns.", "D": "This is a quarter of the total 24-hour requirement, likely reflecting a misunderstanding of the fluid delivery schedule.", "E": "This might be calculated using only the trunk TBSA and ignoring the involvement of the upper limbs."}, "hint": "First, calculate the Total Body Surface Area (TBSA) using the Rule of Nines, then apply the 4 mL/kg formula and determine the 50% split.", "part": 1}, {"stem": "A 35-year-old chef presents with a deep laceration to the volar aspect of his right index finger. On examination, he is unable to flex the distal interphalangeal (DIP) joint while the proximal interphalangeal (PIP) joint is held in extension. Which structure is most likely injured?", "options": {"A": "Flexor digitorum profundus (FDP)", "B": "Flexor digitorum superficialis (FDS)", "C": "Lumbrical muscles", "D": "Digital nerve", "E": "Extensor indicis proprius"}, "correct": "A", "rationales": {"A": "The FDP is the only muscle responsible for flexion at the DIP joint; its function is tested by stabilizing the PIP in extension.", "B": "The FDS inserts on the middle phalanx and flexes the PIP joint, not the DIP joint.", "C": "Lumbricals flex the MCP joints and extend the IP joints; they do not perform isolated DIP flexion.", "D": "A nerve injury would cause sensory loss or two-point discrimination deficit but would not explain an isolated loss of DIP flexion if the muscle is intact.", "E": "This is an extensor muscle located on the dorsal aspect of the hand/forearm, unrelated to volar flexion."}, "hint": "Identify the specific tendon that inserts onto the distal phalanx.", "part": 1}, {"stem": "A 19-year-old male presents with severe pain in his left leg following a mid-shaft tibial fracture. Despite immobilization and IV opioids, his pain is worsening. On exam, the leg is tense and he has excruciating pain when the clinician passively plantarflexes his foot. Distal pulses are palpable. What is the most appropriate next step?", "options": {"A": "Emergency surgical consultation for four-compartment fasciotomy", "B": "Elevation of the limb above the level of the heart", "C": "Administer an additional dose of IV morphine and reassess in 1 hour", "D": "Apply a tight compression bandage to reduce swelling", "E": "Wait for the Serum Creatine Kinase (CK) result to confirm muscle damage"}, "correct": "A", "rationales": {"A": "Clinical signs of compartment syndrome, especially pain out of proportion and pain on passive stretch, mandate immediate surgical decompression even if pulses are present.", "B": "Elevation above the heart can reduce arterial inflow and worsen ischaemia in compartment syndrome; the limb should be kept at heart level.", "C": "Delaying treatment in suspected compartment syndrome leads to irreversible myonecrosis and nerve damage within hours.", "D": "External pressure from tight dressings or bandages is a known cause and aggravator of compartment syndrome.", "E": "CK takes hours to rise and a normal level does not exclude the diagnosis; management is based on clinical findings."}, "hint": "The clinical diagnosis of this condition is primary; do not wait for late signs like pulselessness or laboratory evidence.", "part": 1}, {"stem": "A 55-year-old male presents with the 'worst headache of his life' which began suddenly while he was lifting heavy boxes. A non-contrast CT head performed 4 hours after the onset of symptoms is unremarkable. What is the most appropriate next step to exclude a subarachnoid haemorrhage?", "options": {"A": "Perform a lumbar puncture 12 hours after the onset of the headache", "B": "Repeat the non-contrast CT head in 24 hours", "C": "Start oral Nimodipine 60 mg every 4 hours", "D": "Discharge the patient with a diagnosis of tension headache", "E": "Perform a carotid ultrasound to look for dissection"}, "correct": "A", "rationales": {"A": "If CT is negative and suspicion remains high, LP is the gold standard; it must be done at \\ge 12 hours to allow for the development of xanthochromia.", "B": "CT sensitivity for SAH decreases over time as blood is resorbed or redistributed; repeating the same test is unlikely to be more sensitive.", "C": "Nimodipine is used to prevent vasospasm once SAH is confirmed; it is not a diagnostic tool.", "D": "A thunderclap headache is SAH until proven otherwise; a negative early CT does not 100% exclude the diagnosis.", "E": "While dissection is in the differential for headache, it does not address the primary concern of a ruptured aneurysm suggested by a thunderclap onset."}, "hint": "Consider the diagnostic sequence when the initial first-line imaging is negative in a high-suspicion case.", "part": 1}, {"stem": "Which of the following interventions is contraindicated in the management of a patient with an acute traumatic brain injury and raised intracranial pressure?", "options": {"A": "Administration of high-dose Dexamethasone", "B": "Elevating the head of the bed to 30^{\\circ}", "C": "IV bolus of 20% Mannitol", "D": "Short-term hyperventilation to a PaCO_{2} of 30-35 mmHg", "E": "Insertion of an External Ventricular Drain (EVD)"}, "correct": "A", "rationales": {"A": "The CRASH trial demonstrated that steroids increase mortality in TBI and they are specifically contraindicated in this context.", "B": "This is a standard first-line measure to promote venous drainage and reduce ICP.", "C": "Osmotherapy with Mannitol or hypertonic saline is a standard treatment for reducing cerebral oedema and ICP.", "D": "While not for long-term use, brief hyperventilation is an acceptable bridge for acute herniation by causing cerebral vasoconstriction.", "E": "An EVD is both a monitoring and therapeutic tool that allows for CSF drainage to lower ICP."}, "hint": "Recall which medication class is useful for tumor-related oedema but harmful in trauma.", "part": 1}, {"stem": "A 60-year-old female presents with a new-onset ptosis, a dilated and non-reactive pupil, and the right eye is deviated 'down and out'. She also complains of a severe headache. Where is the most likely site of an intracranial aneurysm?", "options": {"A": "Posterior communicating artery (PComA)", "B": "Anterior communicating artery (AComA)", "C": "Middle cerebral artery (MCA)", "D": "Ophthalmic artery", "E": "Basilar artery tip"}, "correct": "A", "rationales": {"A": "A PComA aneurysm can compress the adjacent CN III, leading to the classic 'pupil-involving' third nerve palsy.", "B": "AComA aneurysms are more likely to cause visual field defects or personality changes due to frontal lobe effects, rather than CN III compression.", "C": "MCA aneurysms often present with hemiparesis or dysphasia if they rupture and cause an intracerebral haematoma.", "D": "Aneurysms here are more likely to cause monocular vision loss rather than a complete third nerve palsy.", "E": "While basilar aneurysms can affect cranial nerves, the specific association with isolated CN III palsy is most classic for PComA."}, "hint": "Identify the vessel that lies in close anatomical proximity to the oculomotor nerve.", "part": 1}, {"stem": "A 45-year-old patient with a known history of a large non-secreting pituitary macroadenoma presents with a sudden, agonizing headache and bilateral visual loss. She is hypotensive and tachycardic. What is the most critical immediate medical intervention?", "options": {"A": "IV Hydrocortisone 100 mg", "B": "Urgent transsphenoidal decompression", "C": "High-flow oxygen and IV fluid bolus", "D": "IV Mannitol to reduce intracranial pressure", "E": "Emergency CT Angiogram to exclude an aneurysm"}, "correct": "A", "rationales": {"A": "Pituitary apoplexy can cause acute ACTH deficiency and life-threatening adrenal crisis; hydrocortisone must be given immediately, often before imaging.", "B": "While surgical decompression is needed for visual loss, the immediate life-threat is cardiovascular collapse from adrenal crisis.", "C": "Standard resuscitation is important, but without steroid replacement, the hypotension in an adrenal crisis will remain refractory.", "D": "The primary issue is acute haemorrhage/infarction within the gland and endocrine failure, not generalized cerebral oedema.", "E": "While CTA is useful for differentials, the clinical picture of a known adenoma and shock strongly points to apoplexy requiring steroids first."}, "hint": "Focus on the life-threatening endocrine complication of sudden pituitary failure.", "part": 1}, {"stem": "A 75-year-old male is 2 days post-hip replacement surgery and becomes acutely confused and drowsy. His respiratory rate is 6 breaths/minute and his pupils are 1 mm and non-reactive. What is the most appropriate initial action?", "options": {"A": "Check capillary blood glucose level", "B": "Administer IV Naloxone and provide oxygen", "C": "Urgent non-contrast CT head to exclude a stroke", "D": "Commence a 10% Dextrose infusion", "E": "Start an aggressive IV fluid bolus for suspected sepsis"}, "correct": "B", "rationales": {"A": "While BSL is always a priority in LOC, the specific signs of bradypnoea and pinpoint pupils make opioid toxicity the most immediate likely cause.", "B": "The triad of decreased LOC, bradypnoea, and pinpoint pupils is pathognomonic for opioid toxicity, a common post-operative complication in the elderly.", "C": "While stroke is a differential, the reversible toxidrome must be addressed first, especially given the life-threatening respiratory depression.", "D": "This would treat hypoglycaemia, but the clinical findings specifically suggest a different metabolic/toxic cause.", "E": "Sepsis causes confusion but typically presents with tachycardia and tachypnoea, rather than bradypnoea and pinpoint pupils."}, "hint": "Look for the classic triad of symptoms indicating a specific medication overdose.", "part": 1}, {"stem": "A 40-year-old female presents with severe lower back pain, bilateral leg weakness, and numbness in her 'saddle area'. She mentions she hasn't been able to urinate for 8 hours. What is the required timeframe for definitive imaging in this patient?", "options": {"A": "Within 4 hours", "B": "Within 24 hours", "C": "Electively within 1-2 weeks", "D": "Within 48 hours after a trial of conservative management", "E": "Only if symptoms do not improve after 6 weeks"}, "correct": "A", "rationales": {"A": "Suspected Cauda Equina Syndrome is a surgical emergency requiring MRI within 4 hours to prevent permanent neurological and sphincter dysfunction.", "B": "Waiting 24 hours for imaging is insufficient for a condition where outcome is highly dependent on the speed of decompression.", "C": "Elective imaging is for non-specific back pain without red flags; this patient has multiple 'red flag' symptoms.", "D": "Conservative management is contraindicated when focal neurological deficits or sphincter involvement are present.", "E": "The 6-week rule applies only to mechanical back pain without neurological involvement."}, "hint": "This condition involves 'red flags' and is considered one of the most time-critical neurosurgical emergencies.", "part": 1}, {"stem": "During the primary survey of a trauma patient, you find a 'sucking' chest wound. After applying a three-sided occlusive dressing, what is the next best step for this specific injury?", "options": {"A": "Insertion of a chest drain at a separate site", "B": "Suturing the wound closed immediately in the trauma bay", "C": "Immediate transport to theatre for a thoracotomy", "D": "Performing a needle decompression on the contralateral side", "E": "Intubation and initiation of high-frequency oscillatory ventilation"}, "correct": "A", "rationales": {"A": "An open pneumothorax is managed with a three-sided dressing to create a one-way valve, followed by a formal chest drain to re-expand the lung.", "B": "Closing the wound completely without a chest drain can convert an open pneumothorax into a tension pneumothorax.", "C": "Most open pneumothoraces can be managed with a dressing and a drain; thoracotomy is reserved for massive bleeding or specific hilar injuries.", "D": "Decompressing the 'normal' side is unnecessary and harmful; intervention must be directed at the injured side.", "E": "Standard ABCDE management applies; high-frequency ventilation is not a standard first-line trauma intervention for this injury."}, "hint": "Preventing the conversion of this injury into a tension pneumothorax is the primary goal after the dressing is applied.", "part": 1}, {"stem": "An elderly patient presents with fluctuating levels of consciousness, personality changes, and memory impairment following a minor fall a month ago. CT head reveals a crescentic collection that is isodense to the brain parenchyma. What is the most likely diagnosis?", "options": {"A": "Subacute to chronic subdural haematoma", "B": "Acute extradural haematoma", "C": "Alzheimer's dementia", "D": "Glioblastoma multiforme", "E": "Cerebral abscess"}, "correct": "A", "rationales": {"A": "Subdural haematomas change density over time, becoming isodense (equal to brain) around 1-3 weeks and then hypodense (darker).", "B": "Extradural haematomas are hyperdense (bright white) and biconvex (lens-shaped), and usually present acutely.", "C": "While the symptoms overlap, the presence of a structural collection on CT following trauma points to a surgical cause.", "D": "Tumors typically appear as irregular, ring-enhancing masses (with contrast) rather than crescent-shaped collections following the contour of the brain.", "E": "Abscesses are typically ring-enhancing and associated with systemic signs of infection like fever."}, "hint": "Consider the timing of the injury and how the density of blood on CT changes over several weeks.", "part": 1}, {"stem": "A patient with a traumatic brain injury is found to have a blood pressure of 170/90 mmHg, a heart rate of 45 beats/minute, and irregular respirations. This constellation of signs is known as:", "options": {"A": "Cushing's triad", "B": "Beck's triad", "C": "Virchow's triad", "D": "The Lethal Triad", "E": "Horner's syndrome"}, "correct": "A", "rationales": {"A": "Cushing's triad (hypertension, bradycardia, irregular breathing) is a late sign of severely raised intracranial pressure and impending herniation.", "B": "Beck's triad consists of hypotension, muffled heart sounds, and distended neck veins, indicating cardiac tamponade.", "C": "Virchow's triad describes the three factors contributing to thrombosis: stasis, hypercoagulability, and endothelial injury.", "D": "The lethal triad in trauma refers to acidosis, coagulopathy, and hypothermia.", "E": "Horner's syndrome involves miosis, ptosis, and anhidrosis due to sympathetic nerve chain disruption."}, "hint": "This eponym describes the physiological response to terminal intracranial hypertension.", "part": 1}, {"stem": "A trauma patient has a suspected massive haemothorax. A chest drain is inserted and immediately drains 1,600 mL of blood. What is the most appropriate next management step?", "options": {"A": "Immediate emergency thoracotomy", "B": "Clamping the chest tube to stop the bleeding", "C": "Observation and repeat CXR in 4 hours", "D": "Administration of 1 unit of packed red blood cells and reassessment", "E": "Transfer to CT Angiogram to find the bleeding vessel"}, "correct": "A", "rationales": {"A": "An initial drain output of > 1,500 mL (or > 200 mL/hr for 2-4 hours) is a standard indication for operative intervention in trauma.", "B": "Clamping the tube will simply cause the blood to accumulate in the chest, potentially leading to tension physiology or cardiac compression.", "C": "A massive haemothorax is a surgical emergency; 'watchful waiting' after such a high output is inappropriate.", "D": "While transfusion is needed, the volume of loss indicates a surgical source that will not be managed by simple transfusion alone.", "E": "The patient meets the physiological criteria for surgery; delays for imaging in the setting of massive haemorrhage are dangerous."}, "hint": "Identify the quantitative threshold for immediate surgical exploration in thoracic trauma.", "part": 1}, {"stem": "An adult patient is involved in a house fire and presents with singed nasal hairs, carbonaceous sputum, and a hoarse voice. He is currently breathing comfortably with an SpO_{2} of 98% on room air. What is the most appropriate next step?", "options": {"A": "Early endotracheal intubation", "B": "Administer nebulised adrenaline and observe", "C": "Perform a peak flow test to assess lower airway function", "D": "Discharge with advice to return if he develops difficulty breathing", "E": "Start the Parkland formula based on the facial burns only"}, "correct": "A", "rationales": {"A": "Clinical indicators of inhalation injury (facial burns, hoarseness, soot) predict rapid upper airway oedema; early intubation is safer than waiting for stridor.", "B": "Nebulisers may provide temporary relief but do not secure the airway against the progressive swelling characteristic of thermal airway burns.", "C": "Peak flow is not useful for assessing the risk of upper airway obstruction due to oedema.", "D": "Inhalation injury is dynamic; the airway can close completely within hours, making 'watch and see' at home extremely dangerous.", "E": "The priority is the airway; fluid resuscitation is secondary and superficial burns (common on the face) are not included in the formula."}, "hint": "Thermal injuries to the airway are dynamic and can lead to sudden, total obstruction.", "part": 1}, {"stem": "A 24-year-old male sustained a 'fight bite' laceration over his 3rd MCP joint during an altercation 6 hours ago. On exam, the wound is 1 cm and appears clean. What is the most appropriate management?", "options": {"A": "Formal surgical washout in theatre and IV antibiotics", "B": "Primary closure with 4-0 Nylon sutures", "C": "Simple irrigation in the ED and discharge with oral Amoxicillin", "D": "Apply a Steri-Strip and refer to the outpatient hand clinic", "E": "Observe for 24 hours and only treat if signs of infection develop"}, "correct": "A", "rationales": {"A": "Human bites over joints ('fight bites') are high-risk for septic arthritis; they require surgical exploration, irrigation, and should never be closed primarily.", "B": "Primary closure of a 'fight bite' traps oral flora in the joint space, leading to catastrophic infection.", "C": "Superficial irrigation is insufficient for potential joint penetration; these injuries require specialist hand surgery review.", "D": "This ignores the high risk of infection and the need for urgent aggressive management of joint-threatening bacteria.", "E": "Wait-and-see is inappropriate; the goal is to prevent the established infection (flexor tenosynovitis or septic arthritis) before it occurs."}, "hint": "These specific wounds are 'never close' injuries due to the risk of deep space infection.", "part": 1}, {"stem": "Which of the following is considered the most reliable threshold for diagnosing // ── State ─────────────────────────────────────────────────────────────────────
let current       = 0;
let selected      = null;
let answered      = false;
let score         = 0;
let results       = new Array(QUESTIONS.length).fill(null); 
let flagged       = new Array(QUESTIONS.length).fill(false);
let notes         = new Array(QUESTIONS.length).fill('');
let currentFilter = 'wrong';
let _noteSaveTimer = null;

// ── Firebase ──────────────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey:            "AIzaSyCNnvrEli5lzU3sUFvttTsQPIYQXYK1_WE",
  authDomain:        "nbquiz-6faf9.firebaseapp.com",
  projectId:         "nbquiz-6faf9",
  storageBucket:     "nbquiz-6faf9.firebasestorage.app",

};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();
const QUIZ_ID = 'W7/Trauma/v4';
let uid = null;

function sessionRef() {
  return db.collection('quizSessions').doc(uid).collection('quizzes').doc(QUIZ_ID);
}

async function saveState() {
  if (!uid) return;
  try {
    await sessionRef().set({
      results,
      flagged,
      current,
      score,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  } catch (e) { console.warn('Save failed:', e); }
}

async function loadState() {
  if (!uid) return false;
  try {
    const snap = await sessionRef().get();
    if (!snap.exists) return false;
    const data = snap.data();
    results = data.results || new Array(QUESTIONS.length).fill(null);
    flagged = data.flagged || new Array(QUESTIONS.length).fill(false);
    current = typeof data.current === 'number' ? data.current : 0;
    score   = typeof data.score   === 'number' ? data.score   : 0;
    return true;
  } catch (e) { console.warn('Load failed:', e); return false; }
}

// ── Notes (separate doc — never reset by restartQuiz) ─────────────────────────
function notesRef() {
  return db.collection('quizSessions').doc(uid).collection('notes').doc(QUIZ_ID);
}

async function saveNote(idx) {
  if (!uid) return;
  const text = notes[idx] || '';
  const statusEl = document.getElementById('noteSaveStatus');
  try {
    await notesRef().set({ [`n_${idx}`]: text }, { merge: true });
    if (statusEl) statusEl.textContent = 'Saved ✓';
    setTimeout(() => { if (statusEl) statusEl.textContent = ''; }, 1500);
  } catch (e) {
    if (statusEl) statusEl.textContent = 'Save failed';
    console.warn('Note save failed:', e);
  }
}

async function loadNotes() {
  if (!uid) return;
  try {
    const snap = await notesRef().get();
    if (!snap.exists) return;
    const data = snap.data();
    QUESTIONS.forEach((_, i) => {
      if (data[`n_${i}`] !== undefined) notes[i] = data[`n_${i}`];
    });
  } catch (e) { console.warn('Notes load failed:', e); }
}

// ── Sidebar & Init ────────────────────────────────────────────────────────────
function initSidebar() {
  const grid = document.getElementById('qGrid');
  grid.innerHTML = '';
  QUESTIONS.forEach((q, i) => {
    const div = document.createElement('div');
    div.className = 'q-grid-item';
    div.id = `grid-item-${i}`;
    div.onclick = () => jumpTo(i);
    div.innerHTML = `${i + 1}<div class="flag-icon">🚩</div><div class="note-icon">📝</div>`;
    grid.appendChild(div);
  });
}

function updateSidebar() {
  QUESTIONS.forEach((q, i) => {
    const el = document.getElementById(`grid-item-${i}`);
    if (!el) return;
    
    // Reset base classes
    el.className = 'q-grid-item';
    
    if (i === current) el.classList.add('active');
    if (flagged[i]) el.classList.add('flagged');
    if (notes[i] && notes[i].trim()) el.classList.add('has-note');
    
    const res = results[i];
    if (res) {
      if (res.skipped) el.classList.add('skipped');
      else if (res.wasCorrect) el.classList.add('correct');
      else el.classList.add('wrong');
    }
  });
  
  // Update answered count
  const answeredCount = results.filter(r => r !== null).length;
  document.getElementById('sidebarCount').textContent = `${answeredCount}/${QUESTIONS.length}`;
}

function copySidebarResults() {
  let text = "Quiz Status:\\n\\n";
  
  QUESTIONS.forEach((q, idx) => {
    const r = results[idx];
    let status = "unanswered";
    if (r) {
      if (r.wasCorrect) status = "correct";
      else if (!r.skipped) status = "wrong";
    }
    
    let flagText = flagged[idx] ? " (flagged)" : "";
    text += `${idx + 1}. ${status}${flagText}\\n`;
  });

  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('sidebarCopyBtn');
    const origText = btn.innerHTML;
    btn.innerHTML = '✅ Copied!';
    setTimeout(() => { btn.innerHTML = origText; }, 2000);
  }).catch(err => {
    alert("Failed to copy status: " + err);
  });
}


function renderQuestion(idx) {
  const q   = QUESTIONS[idx];
  answered  = false;
  selected  = null;

  document.getElementById('qLabel').textContent = `Question ${idx + 1}`;
  document.getElementById('partTag').textContent = `Part ${q.part}`;
  document.getElementById('stem').textContent    = q.stem;
  
  // Update flag button state
  const flagBtn = document.getElementById('flagBtn');
  flagBtn.textContent = flagged[idx] ? '🚩 Unflag' : '⚑ Flag';
  flagBtn.style.borderColor = flagged[idx] ? 'var(--wrong-ring)' : 'var(--border)';
  flagBtn.style.color = flagged[idx] ? 'var(--wrong)' : 'var(--text-2)';

  // Note
  const noteTextarea = document.getElementById('noteTextarea');
  const noteToggleBtn = document.getElementById('noteToggleBtn');
  const noteBody = document.getElementById('noteBody');
  const noteSaveStatus = document.getElementById('noteSaveStatus');
  noteTextarea.value = notes[idx] || '';
  noteSaveStatus.textContent = '';
  noteBody.classList.remove('open');
  const hasNote = notes[idx] && notes[idx].trim();
  noteToggleBtn.textContent = hasNote ? '📝 View / edit note' : '📝 Add note';
  noteToggleBtn.classList.toggle('has-note', !!hasNote);

  // Hint
  const hw = document.getElementById('hintWrap');
  const hb = document.getElementById('hintBody');
  if (q.hint) {
    hw.style.display = 'block';
    hb.textContent   = q.hint;
    hb.classList.remove('open');
  } else {
    hw.style.display = 'none';
  }

  // Options
  const optContainer = document.getElementById('options');
  optContainer.innerHTML = '';
  const letters = Object.keys(q.options).sort();
  letters.forEach(letter => {
    const btn = document.createElement('button');
    btn.className  = 'option';
    btn.dataset.letter = letter;
    btn.onclick    = () => selectOption(letter);

    const rat  = q.rationales[letter] || '';
    btn.innerHTML = `
      <div class="opt-letter">${letter}</div>
      <div class="opt-body">
        <div class="opt-text">${escHtml(q.options[letter])}</div>
        ${rat ? `<div class="opt-rationale" id="rat-${letter}">${escHtml(rat)}</div>` : ''}
      </div>
      <div class="opt-icon" id="icon-${letter}"></div>
    `;
    optContainer.appendChild(btn);
  });

  // Footer
  const submitBtn = document.getElementById('submitBtn');
  submitBtn.disabled   = true;
  submitBtn.textContent = 'Check answer';
  submitBtn.onclick    = submitAnswer;
  document.getElementById('skipBtn').textContent = 'Skip →';
  document.getElementById('skipBtn').style.display = '';
  setFeedback('', '');

  updateSidebar();
  updateProgress();
  
  document.getElementById('quizCard').style.animation = 'none';
  requestAnimationFrame(() => {
    document.getElementById('quizCard').style.animation = 'fadeUp .3s ease both';
  });
}

function toggleHint() {
  const hb = document.getElementById('hintBody');
  const btn = document.querySelector('.hint-toggle');
  const isOpen = hb.classList.toggle('open');
  btn.textContent = isOpen ? '💡 Hide hint' : '💡 Show hint';
}

function toggleNote() {
  const noteBody = document.getElementById('noteBody');
  const isOpen = noteBody.classList.toggle('open');
  if (isOpen) {
    document.getElementById('noteTextarea').focus();
  }
}

function onNoteInput() {
  const idx = current;
  const text = document.getElementById('noteTextarea').value;
  notes[idx] = text;
  const btn = document.getElementById('noteToggleBtn');
  const hasNote = text.trim().length > 0;
  btn.textContent = hasNote ? '📝 View / edit note' : '📝 Add note';
  btn.classList.toggle('has-note', hasNote);
  document.getElementById('noteSaveStatus').textContent = 'Saving…';
  clearTimeout(_noteSaveTimer);
  _noteSaveTimer = setTimeout(() => {
    saveNote(idx);
    updateSidebar();
  }, 800);
}

function toggleFlag() {
  flagged[current] = !flagged[current];
  const flagBtn = document.getElementById('flagBtn');
  flagBtn.textContent = flagged[current] ? '🚩 Unflag' : '⚑ Flag';
  flagBtn.style.borderColor = flagged[current] ? 'var(--wrong-ring)' : 'var(--border)';
  flagBtn.style.color = flagged[current] ? 'var(--wrong)' : 'var(--text-2)';
  updateSidebar();
  saveState();
}

function selectOption(letter) {
  if (answered) return;
  selected = letter;
  document.querySelectorAll('.option').forEach(el => {
    el.classList.toggle('selected', el.dataset.letter === letter);
  });
  document.getElementById('submitBtn').disabled = false;
}

function submitAnswer() {
  if (!selected || answered) return;
  answered = true;

  const q = QUESTIONS[current];
  const isCorrect = selected === q.correct;

  // Save result to the fixed array index
  results[current] = { q: current, chosen: selected, correct: q.correct, wasCorrect: isCorrect, skipped: false };
  
  // Recalculate score safely
  score = results.filter(r => r && r.wasCorrect).length;

  // Lock options & colour them
  document.querySelectorAll('.option').forEach(el => {
    el.classList.add('locked');
    const l = el.dataset.letter;
    if (l === q.correct) {
      el.classList.add('correct');
      document.getElementById(`icon-${l}`).textContent = '✅';
    } else if (l === selected && !isCorrect) {
      el.classList.add('wrong');
      document.getElementById(`icon-${l}`).textContent = '❌';
    } else {
      el.classList.add('dimmed');
    }
    // Show rationale
    const rat = document.getElementById(`rat-${l}`);
    if (rat) rat.classList.add('visible');
  });

  if (isCorrect) setFeedback('✅ Correct!', 'correct');
  else setFeedback(`❌ The answer was ${q.correct}`, 'wrong');

  document.getElementById('submitBtn').textContent = current < QUESTIONS.length - 1 ? 'Next →' : 'See results';
  document.getElementById('submitBtn').onclick = nextQuestion;
  document.getElementById('submitBtn').disabled = false;
  document.getElementById('skipBtn').style.display = 'none';

  updateSidebar();
  updateProgress();
  saveState();
}

function nextQuestion() {
  if (!answered) {
    results[current] = { q: current, chosen: null, correct: QUESTIONS[current].correct, wasCorrect: false, skipped: true };
  }
  current++;
  saveState();
  if (current >= QUESTIONS.length) {
    showResults();
  } else {
    renderQuestion(current);
    document.getElementById('submitBtn').onclick = submitAnswer;
  }
}

// ── Progress & score ──────────────────────────────────────────────────────────
function updateProgress() {
  const answeredCount = results.filter(r => r !== null).length;
  const pct = Math.round((answeredCount / QUESTIONS.length) * 100);
  
  document.getElementById('progressFill').style.width  = pct + '%';
  document.getElementById('progressLabel').textContent = `Answered ${answeredCount} of ${QUESTIONS.length}`;
  document.getElementById('progressPct').textContent   = pct + '%';
  document.getElementById('scoreDisplay').textContent  = `${score} / ${answeredCount}`;
}

function setFeedback(msg, cls) {
  const el = document.getElementById('feedbackMsg');
  el.textContent  = msg;
  el.className    = 'feedback-msg' + (cls ? ' ' + cls : '');
  el.style.visibility = msg ? 'visible' : 'hidden';
}

// ── Results & Review Panel ────────────────────────────────────────────────────
function showResults() {
  document.getElementById('quizCard').classList.add('hidden');
  document.getElementById('progressWrap').classList.add('hidden');

  const total   = QUESTIONS.length;
  const correct = results.filter(r => r && r.wasCorrect).length;
  const wrong   = results.filter(r => r && !r.wasCorrect && !r.skipped).length;
  const skipped = results.filter(r => r === null || r.skipped).length;
  const pct     = Math.round((correct / total) * 100);

  document.getElementById('resultsGrade').textContent   = pct + '%';
  document.getElementById('correctCount').textContent   = correct;
  document.getElementById('wrongCount').textContent     = wrong;
  document.getElementById('skippedCount').textContent   = skipped;
  document.getElementById('totalQ').textContent         = total;

  let label = '';
  if (pct >= 90) label = '🏆 Outstanding performance!';
  else if (pct >= 75) label = '🎯 Great work — above pass mark!';
  else if (pct >= 60) label = '📚 Good effort — review the misses.';
  else label = "💪 Keep studying — you'll get there!";
  
  document.getElementById('resultsLabel').textContent = label;
  document.getElementById('resultsScreen').classList.add('visible');
}

function showReview() {
  const section = document.getElementById('reviewSection');
  section.classList.toggle('hidden');
  
  if (!section.classList.contains('hidden')) {
    const correctCount = results.filter(r => r && r.wasCorrect).length;
    filterReview(correctCount === QUESTIONS.length ? 'all' : 'wrong');
  }
}

function filterReview(type) {
  currentFilter = type;
  document.getElementById('filterAll').classList.toggle('active', type === 'all');
  document.getElementById('filterWrong').classList.toggle('active', type === 'wrong');
  document.getElementById('filterFlagged').classList.toggle('active', type === 'flagged');
  document.getElementById('filterNotes').classList.toggle('active', type === 'notes');
  renderReviewList();
}

function renderReviewList() {
  const list = document.getElementById('reviewList');
  list.innerHTML = '';
  
  QUESTIONS.forEach((q, i) => {
    const r = results[i];
    const isFlagged = flagged[i];
    const hasNote = notes[i] && notes[i].trim();
    const isCorrect = r && r.wasCorrect;
    const isUnanswered = !r || r.skipped;

    if (currentFilter === 'wrong' && isCorrect) return;
    if (currentFilter === 'flagged' && !isFlagged) return;
    if (currentFilter === 'notes' && !hasNote) return;

    const div = document.createElement('div');
    div.className = 'review-item';
    div.style.flexDirection = 'column';
    div.style.alignItems = 'stretch';
    const stemShort = q.stem.length > 100 ? q.stem.slice(0, 100) + '…' : q.stem;
    
    let statusText = isUnanswered ? 'Unanswered' : (isCorrect ? 'Correct' : 'Wrong');
    let displayDetail = isUnanswered ? '' : `(${r.chosen} → ${r.correct})`;
    let flagHTML = isFlagged ? '<span style="color:var(--wrong); font-size:0.8rem; margin-left:6px;">🚩</span>' : '';
    let noteIndicator = hasNote ? '<span style="font-size:0.8rem; margin-left:6px;">📝</span>' : '';

    div.innerHTML = `
      <div style="display:flex;align-items:flex-start;gap:14px;" onclick="jumpTo(${i})">
        <div class="review-dot ${isCorrect ? 'correct' : 'wrong'}" style="margin-top:6px;flex-shrink:0;"></div>
        <div class="review-text" style="flex:1;">Q${i + 1}. ${escHtml(stemShort)}${flagHTML}${noteIndicator}</div>
        <div class="review-answer" style="flex-shrink:0;"><span class="status-${statusText}">${statusText}</span> ${displayDetail}</div>
      </div>
      ${hasNote ? `<div class="review-note">${escHtml(notes[i])}</div>` : ''}
    `;
    list.appendChild(div);
  });
  
  if (list.innerHTML === '') {
    list.innerHTML = '<div style="color:var(--text-3);font-size:.9rem;padding:12px;">No questions match this filter.</div>';
  }
}

function copyResults() {
  let text = "Quiz Results Summary:\\n\\n";
  
  QUESTIONS.forEach((q, idx) => {
    const r = results[idx];
    let status = "Unanswered";
    if (r) {
      if (r.wasCorrect) status = "Correct";
      else if (!r.skipped) status = "Wrong";
    }
    let flagText = flagged[idx] ? " [FLAGGED]" : "";
    text += "Q" + (idx + 1) + ": " + status + flagText + "\\n";
  });

  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    const origText = btn.innerHTML;
    btn.innerHTML = '✅ Copied!';
    setTimeout(() => { btn.innerHTML = origText; }, 2000);
  }).catch(err => {
    alert("Failed to copy results: " + err);
  });
}

function jumpTo(idx) {
  document.getElementById('resultsScreen').classList.remove('visible');
  document.getElementById('quizCard').classList.remove('hidden');
  document.getElementById('progressWrap').classList.remove('hidden');
  
  current = idx;
  answered = false;
  selected = null;
  renderQuestion(idx);
  
  // Auto-replay the answer if it was previously answered
  const r = results[idx];
  if (r && !r.skipped) {
    selected = r.chosen;
    submitAnswer(); 
  }
}

function restartQuiz() {
  current  = 0;
  score    = 0;
  results  = new Array(QUESTIONS.length).fill(null);
  flagged  = new Array(QUESTIONS.length).fill(false);
  answered = false;
  selected = null;
  
  document.getElementById('resultsScreen').classList.remove('visible');
  document.getElementById('reviewSection').classList.add('hidden');
  document.getElementById('quizCard').classList.remove('hidden');
  document.getElementById('progressWrap').classList.remove('hidden');
  document.getElementById('submitBtn').onclick = submitAnswer;
  
  saveState();
  initSidebar();
  renderQuestion(0);
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Auth ──────────────────────────────────────────────────────────────────────
const provider = new firebase.auth.GoogleAuthProvider();

function signInWithGoogle() {
  document.getElementById('loginError').textContent = '';
  auth.signInWithPopup(provider).catch(err => {
    document.getElementById('loginError').textContent = 'Sign-in failed. Please try again.';
    console.error(err);
  });
}

function signOut() {
  auth.signOut();
}

async function startQuiz(user) {
  uid = user.uid;
  document.getElementById('loginScreen').classList.add('hidden');
  const restored = await loadState();
  await loadNotes();
  initSidebar();
  if (restored && results.some(r => r !== null)) {
    renderQuestion(current);
    const r = results[current];
    if (r && !r.skipped) {
      selected = r.chosen;
      submitAnswer();
    }
    updateProgress();
  } else {
    renderQuestion(0);
  }
}

// ── Boot ──────────────────────────────────────────────────────────────────────
initSidebar();

auth.onAuthStateChanged(user => {
  if (user) {
    startQuiz(user);
  } else {
    document.getElementById('loginScreen').classList.remove('hidden');
  }
});
</script>
</body>
