<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>W7 · Trauma · v1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:           #f7f5f0;
  --surface:      #ffffff;
  --surface-2:    #f0ede6;
  --border:       #e2ddd5;
  --text:         #1a1714;
  --text-2:       #5a534a;
  --text-3:       #9a8f83;
  --accent:       #2563a8;
  --accent-light: #dbeafe;
  --correct:      #166534;
  --correct-bg:   #dcfce7;
  --correct-ring: #4ade80;
  --wrong:        #991b1b;
  --wrong-bg:     #fee2e2;
  --wrong-ring:   #f87171;
  --hint:         #92400e;
  --hint-bg:      #fef3c7;
  --radius:       10px;
  --radius-lg:    16px;
  --shadow:       0 1px 3px rgba(0,0,0,.07), 0 4px 16px rgba(0,0,0,.06);
  --shadow-lg:    0 4px 6px rgba(0,0,0,.07), 0 12px 32px rgba(0,0,0,.1);
  --font-serif:   'Crimson Pro', Georgia, serif;
  --font-sans:    'DM Sans', system-ui, sans-serif;
  --font-mono:    'DM Mono', monospace;
  --transition:   200ms cubic-bezier(.4,0,.2,1);
}

body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: row;
  align-items: flex-start;
  overflow: hidden;
}

/* ── Sidebar ── */
.sidebar {
  width: 320px;
  height: 100vh;
  overflow-y: auto;
  background: var(--surface);
  border-right: 1.5px solid var(--border);
  padding: 24px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
}
.home-btn {
  display: inline-flex;
  align-items: center;
  font-size: .8rem;
  font-weight: 500;
  color: var(--text-3);
  text-decoration: none;
  margin-bottom: 16px;
  transition: color var(--transition);
}
.home-btn:hover { color: var(--accent); }
.sidebar-header {
  font-family: var(--font-serif);
  font-size: 1.3rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.q-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(42px, 1fr));
  gap: 8px;
  margin-bottom: 24px;
}
.q-grid-item {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 6px;
  border: 1.5px solid var(--border);
  font-family: var(--font-mono);
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  position: relative;
  color: var(--text-2);
  background: var(--bg);
  transition: all 0.2s;
}
.q-grid-item:hover { border-color: var(--text-3); }
.q-grid-item.active { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); color: var(--accent); }
.q-grid-item.correct { background: var(--correct-bg); border-color: var(--correct-ring); color: var(--correct); }
.q-grid-item.wrong { background: var(--wrong-bg); border-color: var(--wrong-ring); color: var(--wrong); }
.q-grid-item.skipped { background: var(--surface-2); border-color: var(--text-3); color: var(--text-2); opacity: 0.8; }

.flag-icon {
  position: absolute;
  top: -6px;
  right: -6px;
  font-size: 12px;
  background: #fff;
  border-radius: 50%;
  box-shadow: 0 1px 2px rgba(0,0,0,0.2);
  display: none;
  width: 16px;
  height: 16px;
  align-items: center;
  justify-content: center;
}
.q-grid-item.flagged .flag-icon { display: flex; }

/* ── Main Content ── */
.main-content {
  flex: 1;
  height: 100vh;
  overflow-y: auto;
  padding: 24px 32px 80px;
}

/* ── Header ── */
.app-header {
  width: 100%;
  max-width: 780px;
  margin: 0 auto 32px auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 0 24px;
  border-bottom: 1.5px solid var(--border);
}
.app-title {
  font-family: var(--font-serif);
  font-size: 1.5rem;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -.01em;
}
.app-title span { color: var(--accent); }
.score-badge {
  font-family: var(--font-mono);
  font-size: .8rem;
  font-weight: 500;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 99px;
  padding: 6px 14px;
  color: var(--text-2);
  display: flex;
  gap: 6px;
  align-items: center;
}
.score-badge .score-num { color: var(--text); font-weight: 600; }

/* ── Progress bar ── */
.progress-wrap { 
  width: 100%; 
  max-width: 780px; 
  margin: 0 auto 28px auto; 
}
.progress-meta { display: flex; justify-content: space-between; font-size: .78rem; color: var(--text-3); margin-bottom: 7px; font-family: var(--font-mono); }
.progress-track { height: 5px; background: var(--border); border-radius: 99px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width 400ms cubic-bezier(.4,0,.2,1); }

/* ── Card ── */
.card {
  width: 100%;
  max-width: 1060px;
  margin: 0 auto;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow);
  overflow: hidden;
  animation: fadeUp .3s ease both;
  display: grid;
  grid-template-columns: minmax(0, 1fr) 260px;
  grid-template-rows: auto auto auto 1fr auto;
}
@keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

.card-header { grid-column: 1; padding: 20px 28px 0; display: flex; align-items: center; gap: 10px; }
.q-label { font-family: var(--font-mono); font-size: .7rem; font-weight: 500; color: var(--text-3); text-transform: uppercase; letter-spacing: .08em; }
.part-tag { font-family: var(--font-mono); font-size: .65rem; font-weight: 500; background: var(--surface-2); border: 1px solid var(--border); border-radius: 4px; padding: 2px 7px; color: var(--text-3); }

.stem { grid-column: 1; font-family: var(--font-serif); font-size: 1.25rem; line-height: 1.65; color: var(--text); padding: 16px 28px 24px; border-bottom: 1px solid var(--border); }

/* ── Hint ── */
.hint-wrap { grid-column: 1; padding: 0 28px; margin-top: 20px; }
.hint-toggle { display: inline-flex; align-items: center; gap: 7px; font-size: .8rem; font-weight: 500; color: var(--hint); cursor: pointer; background: none; border: 1.5px solid #d97706; border-radius: 99px; padding: 5px 14px; transition: background var(--transition); }
.hint-toggle:hover { background: var(--hint-bg); }
.hint-body { margin-top: 10px; padding: 12px 16px; background: var(--hint-bg); border-left: 3px solid #f59e0b; border-radius: 0 var(--radius) var(--radius) 0; font-size: .9rem; color: var(--hint); line-height: 1.55; display: none; }
.hint-body.open { display: block; animation: fadeIn .2s ease; }

/* ── Notes ── */
.note-wrap {
  grid-column: 2;
  grid-row: 1 / -1;
  border-left: 1.5px solid var(--border);
  padding: 20px 18px;
  display: flex;
  flex-direction: column;
  background: var(--surface-2);
}
.note-side-header {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: .72rem;
  font-weight: 600;
  color: var(--text-3);
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: .07em;
  margin-bottom: 10px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}
.note-toggle { display: none; }
.note-body { display: flex; flex-direction: column; flex: 1; margin-top: 0; }
.note-textarea { flex: 1; min-height: 140px; width: 100%; padding: 10px 12px; font-family: var(--font-sans); font-size: .85rem; color: var(--text); background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); resize: none; outline: none; transition: border-color var(--transition); line-height: 1.55; box-sizing: border-box; }
.note-textarea:focus { border-color: var(--accent); }
.note-save-status { font-size: .7rem; color: var(--text-3); margin-top: 5px; text-align: right; font-family: var(--font-mono); min-height: 1em; }
.note-icon { position: absolute; top: -5px; left: -5px; font-size: 9px; background: var(--accent-light); border: 1px solid var(--accent); border-radius: 50%; display: none; width: 14px; height: 14px; align-items: center; justify-content: center; }
.q-grid-item.has-note .note-icon { display: flex; }
.review-note { margin-top: 8px; padding: 8px 12px; background: var(--accent-light); border-radius: 6px; font-size: .82rem; color: var(--text-2); line-height: 1.45; border-left: 3px solid var(--accent); white-space: pre-wrap; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

/* ── Options ── */
.options { grid-column: 1; padding: 20px 28px 28px; display: flex; flex-direction: column; gap: 10px; }
.option { display: flex; align-items: flex-start; gap: 14px; padding: 14px 16px; border: 1.5px solid var(--border); border-radius: var(--radius); cursor: pointer; background: var(--surface); transition: border-color var(--transition), background var(--transition), box-shadow var(--transition); text-align: left; width: 100%; position: relative; }
.option:hover:not(.locked) { border-color: var(--accent); background: var(--accent-light); box-shadow: 0 0 0 3px rgba(37,99,168,.1); }
.option.selected:not(.locked) { border-color: var(--accent); background: var(--accent-light); box-shadow: 0 0 0 3px rgba(37,99,168,.15); }
.option.correct { border-color: var(--correct-ring); background: var(--correct-bg); box-shadow: 0 0 0 3px rgba(74,222,128,.2); }
.option.wrong { border-color: var(--wrong-ring); background: var(--wrong-bg); box-shadow: 0 0 0 3px rgba(248,113,113,.2); }
.option.dimmed { opacity: .5; }

.opt-letter { flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%; background: var(--surface-2); border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: .78rem; font-weight: 500; color: var(--text-2); transition: background var(--transition), border-color var(--transition), color var(--transition); }
.option.correct .opt-letter { background:#4ade80; border-color:#4ade80; color:#14532d; }
.option.wrong   .opt-letter { background:#f87171; border-color:#f87171; color:#7f1d1d; }
.option.selected:not(.locked) .opt-letter { background:var(--accent); border-color:var(--accent); color:#fff; }

.opt-body { flex: 1; }
.opt-text { font-size: .95rem; line-height: 1.5; color: var(--text); }
.opt-rationale { margin-top: 8px; font-size: .83rem; color: var(--text-2); line-height: 1.5; padding-top: 8px; border-top: 1px solid rgba(0,0,0,.06); display: none; }
.opt-rationale.visible { display: block; animation: fadeIn .25s ease; }

.opt-icon { flex-shrink: 0; font-size: 1.1rem; margin-top: 2px; display: none; }
.option.correct .opt-icon, .option.wrong .opt-icon { display:block; }

/* ── Actions ── */
.card-footer { grid-column: 1; padding: 0 28px 28px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.btn { font-family: var(--font-sans); font-size: .9rem; font-weight: 600; border-radius: 99px; padding: 11px 26px; cursor: pointer; border: 1.5px solid transparent; transition: all var(--transition); display: inline-flex; align-items: center; gap: 8px; justify-content: center; }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover { background: #1d4f8a; border-color: #1d4f8a; box-shadow: 0 4px 14px rgba(37,99,168,.3); }
.btn-primary:disabled { opacity:.4; cursor:not-allowed; box-shadow:none; }
.btn-ghost { background: transparent; color: var(--text-2); border-color: var(--border); }
.btn-ghost:hover { background: var(--surface-2); color: var(--text); }

.feedback-msg { font-size: .88rem; font-weight: 600; display: flex; align-items: center; gap: 6px; }
.feedback-msg.correct { color: var(--correct); }
.feedback-msg.wrong   { color: var(--wrong); }

/* ── Results screen ── */
.results-screen { 
  width: 100%; 
  max-width: 780px; 
  margin: 0 auto;
  display: none; 
  flex-direction: column; 
  gap: 24px; 
  animation: fadeUp .4s ease both; 
}
.results-screen.visible { display: flex; }
.results-hero { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); padding: 48px 40px; text-align: center; }
.results-grade { font-family: var(--font-serif); font-size: 5rem; font-weight: 600; line-height: 1; margin-bottom: 8px; background: linear-gradient(135deg, #1a1714 0%, #2563a8 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.results-label { font-size: 1.05rem; color: var(--text-2); margin-bottom: 32px; }
.results-stats { display: flex; justify-content: center; gap: 40px; flex-wrap: wrap; }
.stat { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.stat-num { font-family: var(--font-mono); font-size: 1.8rem; font-weight: 500; color: var(--text); }
.stat-num.green { color: var(--correct); }
.stat-num.red   { color: var(--wrong); }
.stat-label { font-size: .78rem; color: var(--text-3); text-transform: uppercase; letter-spacing: .06em; }
.results-actions { display: flex; justify-content: center; gap: 12px; margin-top: 32px; flex-wrap: wrap; }

/* Review list */
.filter-btn { padding: 5px 14px; font-size: 0.8rem; font-weight: 600; border-radius: 99px; cursor: pointer; border: 1.5px solid var(--border); background: transparent; color: var(--text-2); transition: all var(--transition); }
.filter-btn.active { background: var(--surface-2); color: var(--text); border-color: var(--text-3); }
.review-list { display: flex; flex-direction: column; gap: 12px; }
.review-item { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 16px 20px; cursor: pointer; display: flex; align-items: flex-start; gap: 14px; transition: box-shadow var(--transition); }
.review-item:hover { box-shadow: var(--shadow); }
.review-dot { flex-shrink: 0; width: 10px; height: 10px; border-radius: 50%; margin-top: 6px; }
.review-dot.correct { background: var(--correct-ring); }
.review-dot.wrong   { background: var(--wrong-ring); }
.review-text { flex: 1; font-size: .9rem; color: var(--text-2); line-height: 1.4; }
.review-answer { font-size: .8rem; font-weight: 600; font-family: var(--font-mono); color: var(--text-3); flex-shrink: 0; }
.status-Unanswered { color: var(--text-3); }
.status-Correct { color: var(--correct); }
.status-Wrong { color: var(--wrong); }

/* ── Utility ── */
.hidden { display: none !important; }

/* ── Responsive ── */
@media (max-width: 800px) {
  body { flex-direction: column; overflow-y: auto; }
  .sidebar { width: 100%; height: auto; max-height: 250px; border-right: none; border-bottom: 1.5px solid var(--border); padding: 16px; flex-shrink: 0; }
  .main-content { width: 100%; height: auto; overflow: visible; padding: 20px 16px 80px; }
  .card { display: flex; flex-direction: column; }
  .note-wrap { grid-column: unset; grid-row: unset; border-left: none; border-top: 1.5px solid var(--border); background: var(--surface-2); padding: 14px 20px; }
  .note-side-header { display: none; }
  .note-toggle { display: inline-flex; align-items: center; gap: 7px; font-size: .8rem; font-weight: 500; color: var(--text-2); cursor: pointer; background: none; border: 1.5px solid var(--border); border-radius: 99px; padding: 5px 14px; transition: all var(--transition); }
  .note-toggle:hover { background: var(--surface); }
  .note-toggle.has-note { color: var(--accent); border-color: var(--accent); background: var(--accent-light); }
  .note-body { display: none; flex: none; margin-top: 10px; }
  .note-body.open { display: flex; flex-direction: column; animation: fadeIn .2s ease; }
  .note-textarea { min-height: 90px; resize: vertical; flex: none; }
}
@media (max-width: 520px) {
  .stem { font-size: 1.1rem; padding: 14px 20px 20px; }
  .options { padding: 16px 20px 20px; }
  .card-footer { padding: 0 20px 20px; flex-wrap: wrap; }
  .card-header { padding: 16px 20px 0; }
  .hint-wrap { padding: 0 20px; }
  .note-wrap { padding: 12px 20px; }
  .results-grade { font-size: 3.5rem; }
  .results-stats { gap: 24px; }
}
/* ── Login screen ── */
#loginScreen {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  padding: 24px;
}
#loginScreen.hidden { display: none; }
.login-logo {
  font-family: var(--font-serif);
  font-size: 2.4rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 6px;
  text-align: center;
}
.login-logo span { color: var(--accent); }
.login-sub {
  font-size: .85rem;
  color: var(--text-3);
  margin-bottom: 48px;
  text-align: center;
}
.google-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 13px 28px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 99px;
  font-family: var(--font-sans);
  font-size: .9rem;
  font-weight: 600;
  color: var(--text);
  cursor: pointer;
  transition: border-color var(--transition), background var(--transition);
}
.google-btn:hover { border-color: var(--accent); background: var(--accent-light); }
.login-error {
  margin-top: 16px;
  font-size: .8rem;
  color: var(--wrong);
  min-height: 1em;
  text-align: center;
}
.made-by-login {
  position: fixed;
  bottom: 20px;
  font-size: .72rem;
  color: var(--text-3);
  font-family: var(--font-mono);
  text-align: center;
}
/* ── Persistent credit ── */
.made-by {
  font-size: .68rem;
  color: var(--text-3);
  font-family: var(--font-mono);
  text-align: center;
  padding-top: 12px;
  margin-top: 8px;
  border-top: 1px solid var(--border);
}

</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-logo">NB <span>Quiz</span></div>
  <div class="login-sub">Your personal medical study companion</div>
  <button class="google-btn" onclick="signInWithGoogle()">
    <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
    Continue with Google
  </button>
  <div class="login-error" id="loginError"></div>
  <div class="made-by-login">made by Zi Lin</div>
</div>

<aside class="sidebar">
  <a href="https://zxsye.github.io/nbquiz/" class="home-btn">← Home</a>
  <div class="sidebar-header">
    <span>Quiz Status</span>
    <span style="font-size:0.8rem; color:var(--text-3); font-family:var(--font-mono);" id="sidebarCount">0/30</span>
  </div>
  <div class="q-grid" id="qGrid"></div>
  
  <div style="margin-top:auto; display:flex; flex-direction:column; gap:10px;">
    <button class="btn btn-ghost" id="sidebarCopyBtn" style="width:100%; border: 1.5px solid var(--border); padding: 8px; font-size: 0.85rem;" onclick="copySidebarResults()">📋 Copy Status</button>
    <button class="btn btn-primary" style="width:100%; margin-top:0;" onclick="showResults()">Finish Quiz</button>
    <div class="made-by">made by Zi Lin</div>
  </div>
</aside>

<div class="main-content">
  <header class="app-header">
    <a href="../../../index.html" style="text-decoration:none;">
      <div class="app-title">NB <span>Quiz</span></div>
    </a>
    <div style="display:flex; align-items:center; gap:12px;">
      <div class="score-badge">
        Score&nbsp;<span class="score-num" id="scoreDisplay">0 / 0</span>
      </div>
      <button class="btn btn-ghost" onclick="signOut()" style="padding:6px 14px; font-size:0.8rem;" title="Sign out">Sign out</button>
    </div>
  </header>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-meta">
      <span id="progressLabel">Question 1 of 30</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>

  <div class="card" id="quizCard">
    <div class="card-header">

<script>
// ── Quiz data ─────────────────────────────────────────────────────────────────
const QUESTIONS = [{"stem": "A 24-year-old male is brought to the emergency department after a high-speed motorcycle accident. Initially, he has a GCS of 15, but over the next hour, his GCS drops to 10 and his right pupil becomes fixed and dilated. What is the most appropriate immediate pharmacological intervention?", "options": {"A": "Intravenous Dexamethasone 16mg", "B": "Intravenous Mannitol 20% 1 g/kg", "C": "Intravenous Phenytoin loading dose", "D": "Intravenous Furosemide 40mg", "E": "Intravenous Nimodipine 60mg"}, "correct": "B", "rationales": {"A": "Steroids are specifically contraindicated in traumatic brain injury as they increase mortality.", "B": "Osmotherapy is the first-line medical treatment to rapidly reduce intracranial pressure in the setting of acute herniation.", "C": "While seizure prophylaxis is important, it does not address the immediate life-threatening mass effect and herniation.", "D": "Loop diuretics are not the standard of care for acute intracranial pressure management compared to osmotic agents.", "E": "This medication is used to prevent vasospasm in subarachnoid haemorrhage, not to treat acute traumatic mass effect."}, "hint": "Consider the need to rapidly shift fluid out of the cranial vault to prevent further brainstem compression.", "part": 1}, {"stem": "A 78-year-old female with atrial fibrillation on warfarin presents with three weeks of worsening confusion and a fluctuating level of consciousness. She recalls a minor fall onto carpet a month ago. A non-contrast CT head shows a crescent-shaped hypodense collection crossing suture lines. What is the most likely diagnosis?", "options": {"A": "Acute Subdural Haematoma", "B": "Extradural Haematoma", "C": "Chronic Subdural Haematoma", "D": "Intracerebral Contusion", "E": "Ischaemic Stroke"}, "correct": "C", "rationales": {"A": "Acute subdural collections appear hyperdense (white) on CT, whereas this chronic presentation is hypodense.", "B": "Extradural bleeds are typically biconvex/lens-shaped and usually present acutely in younger patients after significant trauma.", "C": "This is common in elderly, anticoagulated patients with minor trauma, presenting insidiously with hypodense crescentic collections.", "D": "Contusions are parenchymal injuries often showing mixed density and do not typically follow the crescentic subdural space.", "E": "While confusion occurs in stroke, the CT description of a crescent-shaped extra-axial collection confirms a haemorrhagic etiology."}, "hint": "Focus on the timing of the symptoms and the specific density of the collection on the CT scan.", "part": 1}, {"stem": "A 45-year-old female presents with the 'worst headache of her life' which reached peak intensity within 30 seconds. A CT head performed 8 hours after onset is negative for blood. What is the next most appropriate step in management?", "options": {"A": "Discharge with migraine advice", "B": "Repeat CT head in 24 hours", "C": "Lumbar puncture for xanthochromia", "D": "Immediate Cerebral Angiogram", "E": "Start oral Nimodipine 60mg"}, "correct": "C", "rationales": {"A": "A negative CT after 6 hours is not sensitive enough to exclude a subarachnoid haemorrhage.", "B": "Repeating the CT is unlikely to increase sensitivity as blood degrades and becomes less visible over time.", "C": "In CT-negative suspected SAH, a lumbar puncture must be performed at least 12 hours after onset to check for breakdown products of blood.", "D": "Angiography is used to find the source once the haemorrhage is confirmed, rather than as a primary screening tool for CT-negative patients.", "E": "Pharmacological treatment should follow a confirmed diagnosis of SAH."}, "hint": "The sensitivity of CT for blood decreases significantly after the first 6 hours.", "part": 1}, {"stem": "During a primary survey of a trauma patient, you note absent breath sounds on the right side, hyper-resonance to percussion on the right, and a blood pressure of 85/50 mmHg. What is the most immediate priority?", "options": {"A": "Order an urgent portable Chest X-ray", "B": "Perform needle decompression in the 2nd intercostal space", "C": "Insert a 32Fr chest drain in the safe triangle", "D": "Intubate the patient and start positive pressure ventilation", "E": "Activate the Massive Transfusion Protocol"}, "correct": "B", "rationales": {"A": "Waiting for imaging in a clinically diagnosed tension pneumothorax with hypotension can lead to cardiac arrest.", "B": "This is a life-saving clinical diagnosis requiring immediate decompression before any imaging is obtained.", "C": "While this is the definitive treatment, needle decompression is often faster for immediate relief of obstructive shock.", "D": "Positive pressure ventilation can actually worsen a tension pneumothorax and accelerate cardiovascular collapse.", "E": "The hypotension here is likely obstructive (tension) rather than haemorrhagic, though both may coexist in trauma."}, "hint": "Identify the signs of obstructive shock and the immediate bedside procedure used to relieve it.", "part": 1}, {"stem": "A 30-year-old male is brought in after a steering wheel injury to the abdomen. He is pale and tachycardic (HR 130). FAST ultrasound shows free fluid in the splenorenal recess. His blood pressure remains 80/40 mmHg despite 1 L of crystalloid. What is the next best step?", "options": {"A": "CT Abdomen and Pelvis with contrast", "B": "Emergency Laparotomy", "C": "Diagnostic Peritoneal Lavage", "D": "Angioembolisation of the splenic artery", "E": "Repeat FAST ultrasound in 15 minutes"}, "correct": "B", "rationales": {"A": "Hemodynamically unstable patients should never be taken to the CT scanner; they require immediate operative control.", "B": "The combination of hemodynamic instability and a positive FAST scan in blunt trauma is a mandatory indication for immediate surgery.", "C": "Since the FAST scan is already positive for fluid, this invasive procedure is redundant and delays definitive care.", "D": "Interventional radiology is only appropriate for hemodynamically stable patients with active blushes on CT.", "E": "Delaying treatment in a patient with ongoing shock and confirmed haemorrhage increases mortality."}, "hint": "Recall the cardinal rule regarding unstable patients and the radiology department.", "part": 1}, {"stem": "A 70kg adult male sustains partial thickness burns to his entire anterior trunk and both anterior upper limbs. Using the Parkland formula, what is the total volume of Hartmann's solution required in the first 24 hours?", "options": {"A": "5,040 mL", "B": "7,560 mL", "C": "10,080 mL", "D": "3,780 mL", "E": "15,120 mL"}, "correct": "B", "rationales": {"A": "This value assumes a lower %TBSA than the rule of nines dictates for the anterior trunk and both arms.", "B": "Anterior trunk (18%) + both anterior arms (4.5% + 4.5% = 9%) = 27%. 4 mL \\times 70 kg \\times 27 = 7,560 mL.", "C": "This calculation would be correct if the %TBSA was 36%, which overestimates the described burn area.", "D": "This represents only the volume for the first 8 hours, not the total 24-hour requirement.", "E": "This is an overestimation, likely doubling the standard Parkland calculation."}, "hint": "Calculate the %TBSA first: Anterior trunk is 18% and each entire upper limb is 9% (so anterior is 4.5% each).", "part": 1}, {"stem": "A patient with a mid-shaft tibial fracture reports severe pain that is not relieved by 10 mg of IV morphine. On examination, the leg is tense, and there is excruciating pain when the clinician passively plantarflexes the patient's foot. Distal pulses are present. What is the most likely diagnosis?", "options": {"A": "Deep Vein Thrombosis", "B": "Acute Compartment Syndrome", "C": "Acute Arterial Occlusion", "D": "Osteomyelitis", "E": "Fat Embolism Syndrome"}, "correct": "B", "rationales": {"A": "While DVT causes pain, it does not typically present with the 'woody' tension and severe pain on passive stretch seen here.", "B": "Pain out of proportion and pain on passive stretch are the earliest and most sensitive signs of this surgical emergency.", "C": "In arterial occlusion, pulses would be absent; in compartment syndrome, pulses are usually preserved until very late.", "D": "This is an inflammatory/infectious process that presents with fever and localized pain, not the acute tension of a closed compartment.", "E": "Fat embolism presents with respiratory distress, petechial rash, and neurological changes, not isolated limb tension."}, "hint": "Passive stretching of muscles within a high-pressure space causes hallmark ischaemic pain.", "part": 1}, {"stem": "Which of the following describes the most important modifiable risk factor for the development and rupture of berry aneurysms?", "options": {"A": "Alcohol consumption", "B": "Cigarette smoking", "C": "Hypercholesterolaemia", "D": "Sedentary lifestyle", "E": "Diet high in saturated fats"}, "correct": "B", "rationales": {"A": "While heavy use is a risk, it is not as strongly or directly linked to aneurysm dynamics as other vascular stressors.", "B": "Smoking is the strongest modifiable risk factor for both the formation and the rupture of intracranial aneurysms.", "C": "High cholesterol is more strongly associated with atherosclerotic fusiform aneurysms rather than saccular berry aneurysms.", "D": "While general health is important, this has no specific direct evidence linked to aneurysm rupture risk compared to smoking.", "E": "Dietary habits influence atherosclerosis, but smoking exerts a much more direct effect on aneurysm wall integrity."}, "hint": "This risk factor is frequently addressed in public health campaigns regarding vascular health.", "part": 1}, {"stem": "A 50-year-old male presents with a sudden onset of 'curtain-like' visual loss in his right eye, a drooping eyelid, and a fixed, dilated right pupil. He also reports a severe headache. What is the most likely underlying cause?", "options": {"A": "Diabetic CN III palsy", "B": "Posterior Communicating Artery (PComA) Aneurysm", "C": "Middle Cerebral Artery (MCA) Stroke", "D": "Pituitary Macroadenoma", "E": "Meningioma of the sphenoid wing"}, "correct": "B", "rationales": {"A": "Diabetic third nerve palsies typically spare the pupil because the parasympathetic fibers are on the periphery of the nerve.", "B": "A pupil-involving CN III palsy with a headache is an aneurysm of the PComA until proven otherwise.", "C": "Stroke usually presents with hemiparesis or aphasia rather than an isolated third nerve palsy with pupil involvement.", "D": "This typically presents with bitemporal hemianopia from chiasmal compression rather than acute oculomotor nerve palsy.", "E": "Meningiomas present chronically with slowly progressive deficits, not sudden headaches and acute nerve palsies."}, "hint": "A painful, pupil-involving third nerve palsy is a neurosurgical emergency involving the Circle of Willis.", "part": 1}, {"stem": "A 32-year-old woman is brought to the ED following a house fire. She is confused and has soot in her mouth. Her oxygen saturation is 100% on a non-rebreather mask, but her ABG shows a significant metabolic acidosis with a lactate of 8 mmol/L. What is the most appropriate next step?", "options": {"A": "Increase O_2 flow rate", "B": "Administer Hydroxocobalamin 5 g IV", "C": "Initiate IV Sodium Bicarbonate", "D": "Order a CT Chest to look for pneumonitis", "E": "Administer prophylactic antibiotics"}, "correct": "B", "rationales": {"A": "Oxygen saturation is falsely normal in carbon monoxide poisoning and will not resolve cyanide-induced metabolic acidosis.", "B": "The combination of smoke inhalation, altered consciousness, and severe lactic acidosis is highly suggestive of cyanide toxicity.", "C": "Bicarbonate treats the symptom of acidosis but does not address the underlying poisoning causing the cellular hypoxia.", "D": "While pneumonitis can occur, it doesn't explain the acute systemic toxicity and metabolic acidosis in this context.", "E": "Antibiotics are not indicated acutely for smoke inhalation and do not treat the immediate life-threatening metabolic crisis."}, "hint": "Consider the toxins found in smoke from burning synthetic materials that interfere with mitochondrial respiration.", "part": 1}, {"stem": "An 82-year-old male with lower back pain for two days presents with new urinary incontinence and numbness 'around his crotch'. On examination, he has reduced anal tone. What is the most appropriate timeframe for obtaining definitive imaging?", "options": {"A": "Within 1 hour", "B": "Within 4 hours", "C": "Within 12 hours", "D": "Within 24 hours", "E": "Elective MRI as an outpatient"}, "correct": "B", "rationales": {"A": "While urgent, the standard emergency timeframe for MRI in suspected CES is usually cited as within 4 hours.", "B": "Suspected Cauda Equina Syndrome is a surgical emergency requiring MRI within 4 hours to prevent permanent dysfunction.", "C": "Waiting 12 hours significantly increases the risk of irreversible bowel, bladder, and sexual dysfunction.", "D": "This delay is inappropriate for a patient already showing cardinal signs of cauda equina compression.", "E": "Saddle anaesthesia and sphincter disturbance are 'red flags' that mandate immediate inpatient investigation."}, "hint": "This is a surgical emergency where the 'time is nerve' principle applies to the lumbosacral roots.", "part": 1}, {"stem": "A 28-year-old is punched in the mouth during a fight, sustaining a small laceration over the 3rd MCP joint. He can move his finger fully and the X-ray is normal. What is the most appropriate management plan?", "options": {"A": "Suture the wound and give oral Penicillin", "B": "Wash with saline and apply a Steri-strip", "C": "IV Antibiotics and urgent surgical washout", "D": "Discharge with a 5-day course of Amoxicillin-clavulanate", "E": "Apply a splint and review in the hand clinic in 1 week"}, "correct": "C", "rationales": {"A": "Closing a 'fight bite' primarily is dangerous as it traps oral flora in the joint space, leading to severe infection.", "B": "Superficial cleaning is insufficient for a wound that likely penetrated the joint capsule during impact.", "C": "All 'fight bites' over joints require formal exploration, washout, and IV antibiotics due to the high risk of septic arthritis.", "D": "Oral antibiotics alone are inadequate for potential joint space contamination from human oral flora.", "E": "Delaying assessment of a potential septic joint can lead to rapid destruction of the articular cartilage."}, "hint": "Human oral flora introduced into a joint space via a 'fight bite' is an emergency that must not be closed primarily.", "part": 1}, {"stem": "A patient is 12 hours post-craniotomy for a brain tumour. The nurse notes that the patient is becoming increasingly drowsy (GCS drop from 15 to 12) and has a blood pressure of 170/90 mmHg and a heart rate of 55 bpm. What is the most likely cause?", "options": {"A": "Opioid-induced sedation", "B": "Post-operative delirium", "C": "Post-operative intracranial haemorrhage", "D": "Hospital-acquired pneumonia", "E": "Severe Hyponatraemia"}, "correct": "C", "rationales": {"A": "Opioids typically cause a low respiratory rate and pinpoint pupils, not the bradycardia/hypertension (Cushing's triad) seen here.", "B": "Delirium involves fluctuating attention but does not explain the classic physiological signs of raised intracranial pressure.", "C": "A GCS drop post-neurosurgery accompanied by Cushing's triad (hypertension + bradycardia) indicates a life-threatening haematoma.", "D": "Pneumonia usually presents with fever, hypoxia, and tachycardia, rather than the neurological signs described.", "E": "While SIADH can occur, the physiological pattern of hypertension and bradycardia strongly points to a mass effect/raised ICP."}, "hint": "This physiological pattern is a late and ominous sign of brainstem compression.", "part": 1}, {"stem": "Which finding on a lumbar puncture is most diagnostic of a subarachnoid haemorrhage occurring several hours prior?", "options": {"A": "Elevated opening pressure", "B": "High protein content", "C": "Visible xanthochromia in the CSF supernatant", "D": "Presence of more than 10,000 RBCs in the first tube", "E": "Low glucose levels in the CSF"}, "correct": "C", "rationales": {"A": "While ICP can be high in SAH, many other conditions (like idiopathic intracranial hypertension) also have high opening pressures.", "B": "Protein is non-specific and can be elevated in infection, inflammation, or even a traumatic tap.", "C": "Xanthochromia (yellow discoloration) indicates the presence of bilirubin from degraded red blood cells, confirming an older bleed.", "D": "A high RBC count in the first tube only can be caused by a 'traumatic tap' during the procedure itself.", "E": "Low CSF glucose is classically associated with bacterial meningitis, not typically with SAH."}, "hint": "Look for the term that describes the yellow color caused by the breakdown of hemoglobin.", "part": 1}, {"stem": "A 40-year-old male is admitted with a severe head injury. On the second day, his sodium level drops to 122 mmol/L, and he appears clinically hypovolaemic with a high urinary sodium. What is the most likely diagnosis?", "options": {"A": "SIADH", "B": "Cerebral Salt Wasting (CSW)", "C": "Diabetes Insipidus", "D": "Acute Renal Failure", "E": "Psychogenic Polydipsia"}, "correct": "B", "rationales": {"A": "Patients with SIADH are typically euvolaemic or slightly hypervolaemic, whereas this patient is clearly hypovolaemic.", "B": "Unlike SIADH, CSW involves true volume depletion alongside hyponatraemia and is common after neurological injury.", "C": "DI results in hypernatremia due to the loss of free water, which is the opposite of the findings in this case.", "D": "Acute renal failure would typically present with rising creatinine and potassium, not isolated severe hyponatremia and hypovolemia.", "E": "This would present with euvolemia or volume expansion and low urinary sodium as the body tries to retain salt."}, "hint": "Distinguish between the two causes of hyponatraemia in neurosurgery based on the patient's volume status.", "part": 1}, {"stem": "According to the CRASH trial, which of the following is true regarding the use of corticosteroids in traumatic brain injury?", "options": {"A": "They should be given to all patients with GCS < 8", "B": "They are only indicated if the patient has a brain tumour", "C": "They are contraindicated as they increase mortality", "D": "They help reduce vasogenic oedema in trauma", "E": "They are indicated only if given within 3 hours"}, "correct": "C", "rationales": {"A": "The trial showed that steroids actually increased the risk of death in patients with head injuries.", "B": "While steroids are used for tumours, the question asks specifically about the CRASH trial's findings on TBI.", "C": "The CRASH trial conclusively showed higher mortality in the steroid group compared to placebo for TBI patients.", "D": "Traumatic oedema is largely cytotoxic, and steroids have not been proven effective in this context.", "E": "Unlike TXA, steroids have no beneficial window in TBI and should be avoided entirely."}, "hint": "Think about whether a famous large-scale trial supported or discouraged this practice in trauma.", "part": 1}, {"stem": "A 19-year-old male is struck in the temporal region by a cricket ball. He was briefly unconscious but is now awake and talking (GCS 15). Two hours later, he becomes drowsy and rapidly deteriorates. What is the most likely vessel involved?", "options": {"A": "Bridging veins", "B": "Middle Meningeal Artery", "C": "Anterior Communicating Artery", "D": "Basilar Artery", "E": "Sigmoid Sinus"}, "correct": "B", "rationales": {"A": "Bridging veins are the source of subdural haematomas, which usually have a slower onset or more immediate severe presentation.", "B": "This is the classic source of an extradural haematoma, which typically presents with a 'lucid interval' after a temporal blow.", "C": "This is a common site for berry aneurysms causing SAH, not traumatic bleeds from temporal bone fractures.", "D": "Injury to the basilar artery usually results in immediate, devastating brainstem symptoms rather than a lucid interval.", "E": "Venous sinus bleeds can occur with skull fractures, but the arterial bleed of the MMA is the classic association with this presentation."}, "hint": "Consider the artery that runs deep to the pterion and is easily damaged by temporal fractures.", "part": 1}, {"stem": "Which of the following describes 'Beck's Triad', indicative of cardiac tamponade in a trauma patient?", "options": {"A": "Hypertension, bradycardia, irregular respirations", "B": "Hypotension, distended neck veins, muffled heart sounds", "C": "Tachycardia, hypotension, narrowed pulse pressure", "D": "Hyper-resonance, absent breath sounds, hypotension", "E": "Dullness to percussion, absent breath sounds, hypotension"}, "correct": "B", "rationales": {"A": "This is Cushing's Triad, which indicates severely raised intracranial pressure and impending herniation.", "B": "These three clinical findings suggest that fluid in the pericardial sac is compressing the heart and preventing diastolic filling.", "C": "While found in tamponade, this is a general description of shock and not the specific triad for tamponade.", "D": "This pattern is characteristic of a tension pneumothorax, another cause of obstructive shock in trauma.", "E": "This describes a massive haemothorax, which causes hypovolaemic shock rather than obstructive shock."}, "hint": "This triad focuses on heart sounds, venous pressure, and systemic blood pressure.", "part": 1}, {"stem": "A 55-year-old male is undergoing an assessment for chronic back pain. He reports that his leg pain is worse when walking downhill but improves significantly when he leans forward over a shopping trolley. What is the most likely diagnosis?", "options": {"A": "Vascular Claudication", "B": "Lumbar Spinal Stenosis", // ── State ─────────────────────────────────────────────────────────────────────
let current       = 0;
let selected      = null;
let answered      = false;
let score         = 0;
let results       = new Array(QUESTIONS.length).fill(null); 
let flagged       = new Array(QUESTIONS.length).fill(false);
let notes         = new Array(QUESTIONS.length).fill('');
let currentFilter = 'wrong';
let _noteSaveTimer = null;

const QUIZ_ID = 'W7/Trauma/v1';
let uid = null;

function sessionRef() {
  return db.collection('quizSessions').doc(uid).collection('quizzes').doc(QUIZ_ID);
}

async function saveState() {
  if (!uid) return;
  try {
    await sessionRef().set({
      results,
      flagged,
      current,
      score,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  } catch (e) { console.warn('Save failed:', e); }
}

async function loadState() {
  if (!uid) return false;
  try {
    const snap = await sessionRef().get();
    if (!snap.exists) return false;
    const data = snap.data();
    results = data.results || new Array(QUESTIONS.length).fill(null);
    flagged = data.flagged || new Array(QUESTIONS.length).fill(false);
    current = typeof data.current === 'number' ? data.current : 0;
    score   = typeof data.score   === 'number' ? data.score   : 0;
    return true;
  } catch (e) { console.warn('Load failed:', e); return false; }
}

// ── Notes (separate doc — never reset by restartQuiz) ─────────────────────────
function notesRef() {
  return db.collection('quizSessions').doc(uid).collection('notes').doc(QUIZ_ID);
}

async function saveNote(idx) {
  if (!uid) return;
  const text = notes[idx] || '';
  const statusEl = document.getElementById('noteSaveStatus');
  try {
    await notesRef().set({ [`n_${idx}`]: text }, { merge: true });
    if (statusEl) statusEl.textContent = 'Saved ✓';
    setTimeout(() => { if (statusEl) statusEl.textContent = ''; }, 1500);
  } catch (e) {
    if (statusEl) statusEl.textContent = 'Save failed';
    console.warn('Note save failed:', e);
  }
}

async function loadNotes() {
  if (!uid) return;
  try {
    const snap = await notesRef().get();
    if (!snap.exists) return;
    const data = snap.data();
    QUESTIONS.forEach((_, i) => {
      if (data[`n_${i}`] !== undefined) notes[i] = data[`n_${i}`];
    });
  } catch (e) { console.warn('Notes load failed:', e); }
}

// ── Sidebar & Init ────────────────────────────────────────────────────────────
function initSidebar() {
  const grid = document.getElementById('qGrid');
  grid.innerHTML = '';
  QUESTIONS.forEach((q, i) => {
    const div = document.createElement('div');
    div.className = 'q-grid-item';
    div.id = `grid-item-${i}`;
    div.onclick = () => jumpTo(i);
    div.innerHTML = `${i + 1}<div class="flag-icon">🚩</div><div class="note-icon">📝</div>`;
    grid.appendChild(div);
  });
}

function updateSidebar() {
  QUESTIONS.forEach((q, i) => {
    const el = document.getElementById(`grid-item-${i}`);
    if (!el) return;
    
    // Reset base classes
    el.className = 'q-grid-item';
    
    if (i === current) el.classList.add('active');
    if (flagged[i]) el.classList.add('flagged');
    if (notes[i] && notes[i].trim()) el.classList.add('has-note');
    
    const res = results[i];
    if (res) {
      if (res.skipped) el.classList.add('skipped');
      else if (res.wasCorrect) el.classList.add('correct');
      else el.classList.add('wrong');
    }
  });
  
  // Update answered count
  const answeredCount = results.filter(r => r !== null).length;
  document.getElementById('sidebarCount').textContent = `${answeredCount}/${QUESTIONS.length}`;
}

function copySidebarResults() {
  let text = "Quiz Status:\\n\\n";
  
  QUESTIONS.forEach((q, idx) => {
    const r = results[idx];
    let status = "unanswered";
    if (r) {
      if (r.wasCorrect) status = "correct";
      else if (!r.skipped) status = "wrong";
    }
    
    let flagText = flagged[idx] ? " (flagged)" : "";
    text += `${idx + 1}. ${status}${flagText}\\n`;
  });

  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('sidebarCopyBtn');
    const origText = btn.innerHTML;
    btn.innerHTML = '✅ Copied!';
    setTimeout(() => { btn.innerHTML = origText; }, 2000);
  }).catch(err => {
    alert("Failed to copy status: " + err);
  });
}


function renderQuestion(idx) {
  const q   = QUESTIONS[idx];
  answered  = false;
  selected  = null;

  document.getElementById('qLabel').textContent = `Question ${idx + 1}`;
  document.getElementById('partTag').textContent = `Part ${q.part}`;
  document.getElementById('stem').textContent    = q.stem;
  
  // Update flag button state
  const flagBtn = document.getElementById('flagBtn');
  flagBtn.textContent = flagged[idx] ? '🚩 Unflag' : '⚑ Flag';
  flagBtn.style.borderColor = flagged[idx] ? 'var(--wrong-ring)' : 'var(--border)';
  flagBtn.style.color = flagged[idx] ? 'var(--wrong)' : 'var(--text-2)';

  // Note
  const noteTextarea = document.getElementById('noteTextarea');
  const noteToggleBtn = document.getElementById('noteToggleBtn');
  const noteBody = document.getElementById('noteBody');
  const noteSaveStatus = document.getElementById('noteSaveStatus');
  noteTextarea.value = notes[idx] || '';
  noteSaveStatus.textContent = '';
  noteBody.classList.remove('open');
  const hasNote = notes[idx] && notes[idx].trim();
  noteToggleBtn.textContent = hasNote ? '📝 View / edit note' : '📝 Add note';
  noteToggleBtn.classList.toggle('has-note', !!hasNote);

  // Hint
  const hw = document.getElementById('hintWrap');
  const hb = document.getElementById('hintBody');
  if (q.hint) {
    hw.style.display = 'block';
    hb.textContent   = q.hint;
    hb.classList.remove('open');
  } else {
    hw.style.display = 'none';
  }

  // Options
  const optContainer = document.getElementById('options');
  optContainer.innerHTML = '';
  const letters = Object.keys(q.options).sort();
  letters.forEach(letter => {
    const btn = document.createElement('button');
    btn.className  = 'option';
    btn.dataset.letter = letter;
    btn.onclick    = () => selectOption(letter);

    const rat  = q.rationales[letter] || '';
    btn.innerHTML = `
      <div class="opt-letter">${letter}</div>
      <div class="opt-body">
        <div class="opt-text">${escHtml(q.options[letter])}</div>
        ${rat ? `<div class="opt-rationale" id="rat-${letter}">${escHtml(rat)}</div>` : ''}
      </div>
      <div class="opt-icon" id="icon-${letter}"></div>
    `;
    optContainer.appendChild(btn);
  });

  // Footer
  document.getElementById('submitBtn').disabled  = true;
  document.getElementById('submitBtn').textContent = 'Check answer';
  document.getElementById('skipBtn').textContent = 'Skip →';
  document.getElementById('skipBtn').style.display = '';
  setFeedback('', '');

  updateSidebar();
  updateProgress();
  
  document.getElementById('quizCard').style.animation = 'none';
  requestAnimationFrame(() => {
    document.getElementById('quizCard').style.animation = 'fadeUp .3s ease both';
  });
}

function toggleHint() {
  const hb = document.getElementById('hintBody');
  const btn = document.querySelector('.hint-toggle');
  const isOpen = hb.classList.toggle('open');
  btn.textContent = isOpen ? '💡 Hide hint' : '💡 Show hint';
}

function toggleNote() {
  const noteBody = document.getElementById('noteBody');
  const isOpen = noteBody.classList.toggle('open');
  if (isOpen) {
    document.getElementById('noteTextarea').focus();
  }
}

function onNoteInput() {
  const idx = current;
  const text = document.getElementById('noteTextarea').value;
  notes[idx] = text;
  const btn = document.getElementById('noteToggleBtn');
  const hasNote = text.trim().length > 0;
  btn.textContent = hasNote ? '📝 View / edit note' : '📝 Add note';
  btn.classList.toggle('has-note', hasNote);
  document.getElementById('noteSaveStatus').textContent = 'Saving…';
  clearTimeout(_noteSaveTimer);
  _noteSaveTimer = setTimeout(() => {
    saveNote(idx);
    updateSidebar();
  }, 800);
}

function toggleFlag() {
  flagged[current] = !flagged[current];
  const flagBtn = document.getElementById('flagBtn');
  flagBtn.textContent = flagged[current] ? '🚩 Unflag' : '⚑ Flag';
  flagBtn.style.borderColor = flagged[current] ? 'var(--wrong-ring)' : 'var(--border)';
  flagBtn.style.color = flagged[current] ? 'var(--wrong)' : 'var(--text-2)';
  updateSidebar();
  saveState();
}

function selectOption(letter) {
  if (answered) return;
  selected = letter;
  document.querySelectorAll('.option').forEach(el => {
    el.classList.toggle('selected', el.dataset.letter === letter);
  });
  document.getElementById('submitBtn').disabled = false;
}

function submitAnswer() {
  if (!selected || answered) return;
  answered = true;

  const q = QUESTIONS[current];
  const isCorrect = selected === q.correct;

  // Save result to the fixed array index
  results[current] = { q: current, chosen: selected, correct: q.correct, wasCorrect: isCorrect, skipped: false };
  
  // Recalculate score safely
  score = results.filter(r => r && r.wasCorrect).length;

  // Lock options & colour them
  document.querySelectorAll('.option').forEach(el => {
    el.classList.add('locked');
    const l = el.dataset.letter;
    if (l === q.correct) {
      el.classList.add('correct');
      document.getElementById(`icon-${l}`).textContent = '✅';
    } else if (l === selected && !isCorrect) {
      el.classList.add('wrong');
      document.getElementById(`icon-${l}`).textContent = '❌';
    } else {
      el.classList.add('dimmed');
    }
    // Show rationale
    const rat = document.getElementById(`rat-${l}`);
    if (rat) rat.classList.add('visible');
  });

  if (isCorrect) setFeedback('✅ Correct!', 'correct');
  else setFeedback(`❌ The answer was ${q.correct}`, 'wrong');

  document.getElementById('submitBtn').textContent = current < QUESTIONS.length - 1 ? 'Next →' : 'See results';
  document.getElementById('submitBtn').onclick = nextQuestion;
  document.getElementById('submitBtn').disabled = false;
  document.getElementById('skipBtn').style.display = 'none';

  updateSidebar();
  updateProgress();
  saveState();
}

function nextQuestion() {
  if (!answered) {
    results[current] = { q: current, chosen: null, correct: QUESTIONS[current].correct, wasCorrect: false, skipped: true };
  }
  current++;
  saveState();
  if (current >= QUESTIONS.length) {
    showResults();
  } else {
    renderQuestion(current);
    document.getElementById('submitBtn').onclick = submitAnswer;
  }
}

// ── Progress & score ──────────────────────────────────────────────────────────
function updateProgress() {
  const answeredCount = results.filter(r => r !== null).length;
  const pct = Math.round((answeredCount / QUESTIONS.length) * 100);
  
  document.getElementById('progressFill').style.width  = pct + '%';
  document.getElementById('progressLabel').textContent = `Answered ${answeredCount} of ${QUESTIONS.length}`;
  document.getElementById('progressPct').textContent   = pct + '%';
  document.getElementById('scoreDisplay').textContent  = `${score} / ${answeredCount}`;
}

function setFeedback(msg, cls) {
  const el = document.getElementById('feedbackMsg');
  el.textContent  = msg;
  el.className    = 'feedback-msg' + (cls ? ' ' + cls : '');
  el.style.visibility = msg ? 'visible' : 'hidden';
}

// ── Results & Review Panel ────────────────────────────────────────────────────
function showResults() {
  document.getElementById('quizCard').classList.add('hidden');
  document.getElementById('progressWrap').classList.add('hidden');

  const total   = QUESTIONS.length;
  const correct = results.filter(r => r && r.wasCorrect).length;
  const wrong   = results.filter(r => r && !r.wasCorrect && !r.skipped).length;
  const skipped = results.filter(r => r === null || r.skipped).length;
  const pct     = Math.round((correct / total) * 100);

  document.getElementById('resultsGrade').textContent   = pct + '%';
  document.getElementById('correctCount').textContent   = correct;
  document.getElementById('wrongCount').textContent     = wrong;
  document.getElementById('skippedCount').textContent   = skipped;
  document.getElementById('totalQ').textContent         = total;

  let label = '';
  if (pct >= 90) label = '🏆 Outstanding performance!';
  else if (pct >= 75) label = '🎯 Great work — above pass mark!';
  else if (pct >= 60) label = '📚 Good effort — review the misses.';
  else label = "💪 Keep studying — you'll get there!";
  
  document.getElementById('resultsLabel').textContent = label;
  document.getElementById('resultsScreen').classList.add('visible');
}

function showReview() {
  const section = document.getElementById('reviewSection');
  section.classList.toggle('hidden');
  
  if (!section.classList.contains('hidden')) {
    const correctCount = results.filter(r => r && r.wasCorrect).length;
    filterReview(correctCount === QUESTIONS.length ? 'all' : 'wrong');
  }
}

function filterReview(type) {
  currentFilter = type;
  document.getElementById('filterAll').classList.toggle('active', type === 'all');
  document.getElementById('filterWrong').classList.toggle('active', type === 'wrong');
  document.getElementById('filterFlagged').classList.toggle('active', type === 'flagged');
  document.getElementById('filterNotes').classList.toggle('active', type === 'notes');
  renderReviewList();
}

function renderReviewList() {
  const list = document.getElementById('reviewList');
  list.innerHTML = '';
  
  QUESTIONS.forEach((q, i) => {
    const r = results[i];
    const isFlagged = flagged[i];
    const hasNote = notes[i] && notes[i].trim();
    const isCorrect = r && r.wasCorrect;
    const isUnanswered = !r || r.skipped;

    if (currentFilter === 'wrong' && isCorrect) return;
    if (currentFilter === 'flagged' && !isFlagged) return;
    if (currentFilter === 'notes' && !hasNote) return;

    const div = document.createElement('div');
    div.className = 'review-item';
    div.style.flexDirection = 'column';
    div.style.alignItems = 'stretch';
    const stemShort = q.stem.length > 100 ? q.stem.slice(0, 100) + '…' : q.stem;
    
    let statusText = isUnanswered ? 'Unanswered' : (isCorrect ? 'Correct' : 'Wrong');
    let displayDetail = isUnanswered ? '' : `(${r.chosen} → ${r.correct})`;
    let flagHTML = isFlagged ? '<span style="color:var(--wrong); font-size:0.8rem; margin-left:6px;">🚩</span>' : '';
    let noteIndicator = hasNote ? '<span style="font-size:0.8rem; margin-left:6px;">📝</span>' : '';

    div.innerHTML = `
      <div style="display:flex;align-items:flex-start;gap:14px;" onclick="jumpTo(${i})">
        <div class="review-dot ${isCorrect ? 'correct' : 'wrong'}" style="margin-top:6px;flex-shrink:0;"></div>
        <div class="review-text" style="flex:1;">Q${i + 1}. ${escHtml(stemShort)}${flagHTML}${noteIndicator}</div>
        <div class="review-answer" style="flex-shrink:0;"><span class="status-${statusText}">${statusText}</span> ${displayDetail}</div>
      </div>
      ${hasNote ? `<div class="review-note">${escHtml(notes[i])}</div>` : ''}
    `;
    list.appendChild(div);
  });
  
  if (list.innerHTML === '') {
    list.innerHTML = '<div style="color:var(--text-3);font-size:.9rem;padding:12px;">No questions match this filter.</div>';
  }
}

function copyResults() {
  let text = "Quiz Results Summary:\\n\\n";
  
  QUESTIONS.forEach((q, idx) => {
    const r = results[idx];
    let status = "Unanswered";
    if (r) {
      if (r.wasCorrect) status = "Correct";
      else if (!r.skipped) status = "Wrong";
    }
    let flagText = flagged[idx] ? " [FLAGGED]" : "";
    text += "Q" + (idx + 1) + ": " + status + flagText + "\\n";
  });

  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    const origText = btn.innerHTML;
    btn.innerHTML = '✅ Copied!';
    setTimeout(() => { btn.innerHTML = origText; }, 2000);
  }).catch(err => {
    alert("Failed to copy results: " + err);
  });
}

function jumpTo(idx) {
  document.getElementById('resultsScreen').classList.remove('visible');
  document.getElementById('quizCard').classList.remove('hidden');
  document.getElementById('progressWrap').classList.remove('hidden');
  
  current = idx;
  answered = false;
  selected = null;
  renderQuestion(idx);
  
  // Auto-replay the answer if it was previously answered
  const r = results[idx];
  if (r && !r.skipped) {
    selected = r.chosen;
    submitAnswer(); 
  }
}

function restartQuiz() {
  current  = 0;
  score    = 0;
  results  = new Array(QUESTIONS.length).fill(null);
  flagged  = new Array(QUESTIONS.length).fill(false);
  answered = false;
  selected = null;
  
  document.getElementById('resultsScreen').classList.remove('visible');
  document.getElementById('reviewSection').classList.add('hidden');
  document.getElementById('quizCard').classList.remove('hidden');
  document.getElementById('progressWrap').classList.remove('hidden');
  document.getElementById('submitBtn').onclick = submitAnswer;
  
  saveState();
  initSidebar();
  renderQuestion(0);
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Auth ──────────────────────────────────────────────────────────────────────
const provider = new firebase.auth.GoogleAuthProvider();

function signInWithGoogle() {
  document.getElementById('loginError').textContent = '';
  auth.signInWithPopup(provider).catch(err => {
    document.getElementById('loginError').textContent = 'Sign-in failed. Please try again.';
    console.error(err);
  });
}

function signOut() {
  auth.signOut();
}

async function startQuiz(user) {
  uid = user.uid;
  document.getElementById('loginScreen').classList.add('hidden');
  const restored = await loadState();
  await loadNotes();
  initSidebar();
  if (restored && results.some(r => r !== null)) {
    renderQuestion(current);
    const r = results[current];
    if (r && !r.skipped) {
      selected = r.chosen;
      submitAnswer();
    }
    updateProgress();
  } else {
    renderQuestion(0);
  }
}

// ── Boot ──────────────────────────────────────────────────────────────────────
initSidebar();

auth.onAuthStateChanged(user => {
  if (user) {
    startQuiz(user);
  } else {
    document.getElementById('loginScreen').classList.remove('hidden');
  }
});
</script>
