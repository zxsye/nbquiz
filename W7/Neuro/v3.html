<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>W7 · Neuro · v3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:           #f7f5f0;
  --surface:      #ffffff;
  --surface-2:    #f0ede6;
  --border:       #e2ddd5;
  --text:         #1a1714;
  --text-2:       #5a534a;
  --text-3:       #9a8f83;
  --accent:       #2563a8;
  --accent-light: #dbeafe;
  --correct:      #166534;
  --correct-bg:   #dcfce7;
  --correct-ring: #4ade80;
  --wrong:        #991b1b;
  --wrong-bg:     #fee2e2;
  --wrong-ring:   #f87171;
  --hint:         #92400e;
  --hint-bg:      #fef3c7;
  --radius:       10px;
  --radius-lg:    16px;
  --shadow:       0 1px 3px rgba(0,0,0,.07), 0 4px 16px rgba(0,0,0,.06);
  --shadow-lg:    0 4px 6px rgba(0,0,0,.07), 0 12px 32px rgba(0,0,0,.1);
  --font-serif:   'Crimson Pro', Georgia, serif;
  --font-sans:    'DM Sans', system-ui, sans-serif;
  --font-mono:    'DM Mono', monospace;
  --transition:   200ms cubic-bezier(.4,0,.2,1);
}

body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: row;
  align-items: flex-start;
  overflow: hidden;
}

/* ── Sidebar ── */
.sidebar {
  width: 320px;
  height: 100vh;
  overflow-y: auto;
  background: var(--surface);
  border-right: 1.5px solid var(--border);
  padding: 24px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
}
.home-btn {
  display: inline-flex;
  align-items: center;
  font-size: .8rem;
  font-weight: 500;
  color: var(--text-3);
  text-decoration: none;
  margin-bottom: 16px;
  transition: color var(--transition);
}
.home-btn:hover { color: var(--accent); }
.sidebar-header {
  font-family: var(--font-serif);
  font-size: 1.3rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.q-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(42px, 1fr));
  gap: 8px;
  margin-bottom: 24px;
}
.q-grid-item {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 6px;
  border: 1.5px solid var(--border);
  font-family: var(--font-mono);
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  position: relative;
  color: var(--text-2);
  background: var(--bg);
  transition: all 0.2s;
}
.q-grid-item:hover { border-color: var(--text-3); }
.q-grid-item.active { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); color: var(--accent); }
.q-grid-item.correct { background: var(--correct-bg); border-color: var(--correct-ring); color: var(--correct); }
.q-grid-item.wrong { background: var(--wrong-bg); border-color: var(--wrong-ring); color: var(--wrong); }
.q-grid-item.skipped { background: var(--surface-2); border-color: var(--text-3); color: var(--text-2); opacity: 0.8; }

.flag-icon {
  position: absolute;
  top: -6px;
  right: -6px;
  font-size: 12px;
  background: #fff;
  border-radius: 50%;
  box-shadow: 0 1px 2px rgba(0,0,0,0.2);
  display: none;
  width: 16px;
  height: 16px;
  align-items: center;
  justify-content: center;
}
.q-grid-item.flagged .flag-icon { display: flex; }

/* ── Main Content ── */
.main-content {
  flex: 1;
  height: 100vh;
  overflow-y: auto;
  padding: 24px 32px 80px;
}

/* ── Header ── */
.app-header {
  width: 100%;
  max-width: 780px;
  margin: 0 auto 32px auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 0 24px;
  border-bottom: 1.5px solid var(--border);
}
.app-title {
  font-family: var(--font-serif);
  font-size: 1.5rem;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -.01em;
}
.app-title span { color: var(--accent); }
.score-badge {
  font-family: var(--font-mono);
  font-size: .8rem;
  font-weight: 500;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 99px;
  padding: 6px 14px;
  color: var(--text-2);
  display: flex;
  gap: 6px;
  align-items: center;
}
.score-badge .score-num { color: var(--text); font-weight: 600; }

/* ── Progress bar ── */
.progress-wrap { 
  width: 100%; 
  max-width: 780px; 
  margin: 0 auto 28px auto; 
}
.progress-meta { display: flex; justify-content: space-between; font-size: .78rem; color: var(--text-3); margin-bottom: 7px; font-family: var(--font-mono); }
.progress-track { height: 5px; background: var(--border); border-radius: 99px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width 400ms cubic-bezier(.4,0,.2,1); }

/* ── Card ── */
.card {
  width: 100%;
  max-width: 1060px;
  margin: 0 auto;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow);
  overflow: hidden;
  animation: fadeUp .3s ease both;
  display: grid;
  grid-template-columns: minmax(0, 1fr) 260px;
  grid-template-rows: auto auto auto 1fr auto;
}
@keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

.card-header { grid-column: 1; padding: 20px 28px 0; display: flex; align-items: center; gap: 10px; }
.q-label { font-family: var(--font-mono); font-size: .7rem; font-weight: 500; color: var(--text-3); text-transform: uppercase; letter-spacing: .08em; }
.part-tag { font-family: var(--font-mono); font-size: .65rem; font-weight: 500; background: var(--surface-2); border: 1px solid var(--border); border-radius: 4px; padding: 2px 7px; color: var(--text-3); }

.stem { grid-column: 1; font-family: var(--font-serif); font-size: 1.25rem; line-height: 1.65; color: var(--text); padding: 16px 28px 24px; border-bottom: 1px solid var(--border); }

/* ── Hint ── */
.hint-wrap { grid-column: 1; padding: 0 28px; margin-top: 20px; }
.hint-toggle { display: inline-flex; align-items: center; gap: 7px; font-size: .8rem; font-weight: 500; color: var(--hint); cursor: pointer; background: none; border: 1.5px solid #d97706; border-radius: 99px; padding: 5px 14px; transition: background var(--transition); }
.hint-toggle:hover { background: var(--hint-bg); }
.hint-body { margin-top: 10px; padding: 12px 16px; background: var(--hint-bg); border-left: 3px solid #f59e0b; border-radius: 0 var(--radius) var(--radius) 0; font-size: .9rem; color: var(--hint); line-height: 1.55; display: none; }
.hint-body.open { display: block; animation: fadeIn .2s ease; }

/* ── Notes ── */
.note-wrap {
  grid-column: 2;
  grid-row: 1 / -1;
  border-left: 1.5px solid var(--border);
  padding: 20px 18px;
  display: flex;
  flex-direction: column;
  background: var(--surface-2);
}
.note-side-header {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: .72rem;
  font-weight: 600;
  color: var(--text-3);
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: .07em;
  margin-bottom: 10px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}
.note-toggle { display: none; }
.note-body { display: flex; flex-direction: column; flex: 1; margin-top: 0; }
.note-textarea { flex: 1; min-height: 140px; width: 100%; padding: 10px 12px; font-family: var(--font-sans); font-size: .85rem; color: var(--text); background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); resize: none; outline: none; transition: border-color var(--transition); line-height: 1.55; box-sizing: border-box; }
.note-textarea:focus { border-color: var(--accent); }
.note-save-status { font-size: .7rem; color: var(--text-3); margin-top: 5px; text-align: right; font-family: var(--font-mono); min-height: 1em; }
.note-icon { position: absolute; top: -5px; left: -5px; font-size: 9px; background: var(--accent-light); border: 1px solid var(--accent); border-radius: 50%; display: none; width: 14px; height: 14px; align-items: center; justify-content: center; }
.q-grid-item.has-note .note-icon { display: flex; }
.review-note { margin-top: 8px; padding: 8px 12px; background: var(--accent-light); border-radius: 6px; font-size: .82rem; color: var(--text-2); line-height: 1.45; border-left: 3px solid var(--accent); white-space: pre-wrap; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

/* ── Options ── */
.options { grid-column: 1; padding: 20px 28px 28px; display: flex; flex-direction: column; gap: 10px; }
.option { display: flex; align-items: flex-start; gap: 14px; padding: 14px 16px; border: 1.5px solid var(--border); border-radius: var(--radius); cursor: pointer; background: var(--surface); transition: border-color var(--transition), background var(--transition), box-shadow var(--transition); text-align: left; width: 100%; position: relative; }
.option:hover:not(.locked) { border-color: var(--accent); background: var(--accent-light); box-shadow: 0 0 0 3px rgba(37,99,168,.1); }
.option.selected:not(.locked) { border-color: var(--accent); background: var(--accent-light); box-shadow: 0 0 0 3px rgba(37,99,168,.15); }
.option.correct { border-color: var(--correct-ring); background: var(--correct-bg); box-shadow: 0 0 0 3px rgba(74,222,128,.2); }
.option.wrong { border-color: var(--wrong-ring); background: var(--wrong-bg); box-shadow: 0 0 0 3px rgba(248,113,113,.2); }
.option.dimmed { opacity: .5; }

.opt-letter { flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%; background: var(--surface-2); border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: .78rem; font-weight: 500; color: var(--text-2); transition: background var(--transition), border-color var(--transition), color var(--transition); }
.option.correct .opt-letter { background:#4ade80; border-color:#4ade80; color:#14532d; }
.option.wrong   .opt-letter { background:#f87171; border-color:#f87171; color:#7f1d1d; }
.option.selected:not(.locked) .opt-letter { background:var(--accent); border-color:var(--accent); color:#fff; }

.opt-body { flex: 1; }
.opt-text { font-size: .95rem; line-height: 1.5; color: var(--text); }
.opt-rationale { margin-top: 8px; font-size: .83rem; color: var(--text-2); line-height: 1.5; padding-top: 8px; border-top: 1px solid rgba(0,0,0,.06); display: none; }
.opt-rationale.visible { display: block; animation: fadeIn .25s ease; }

.opt-icon { flex-shrink: 0; font-size: 1.1rem; margin-top: 2px; display: none; }
.option.correct .opt-icon, .option.wrong .opt-icon { display:block; }

/* ── Actions ── */
.card-footer { grid-column: 1; padding: 0 28px 28px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.btn { font-family: var(--font-sans); font-size: .9rem; font-weight: 600; border-radius: 99px; padding: 11px 26px; cursor: pointer; border: 1.5px solid transparent; transition: all var(--transition); display: inline-flex; align-items: center; gap: 8px; justify-content: center; }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover { background: #1d4f8a; border-color: #1d4f8a; box-shadow: 0 4px 14px rgba(37,99,168,.3); }
.btn-primary:disabled { opacity:.4; cursor:not-allowed; box-shadow:none; }
.btn-ghost { background: transparent; color: var(--text-2); border-color: var(--border); }
.btn-ghost:hover { background: var(--surface-2); color: var(--text); }

.feedback-msg { font-size: .88rem; font-weight: 600; display: flex; align-items: center; gap: 6px; }
.feedback-msg.correct { color: var(--correct); }
.feedback-msg.wrong   { color: var(--wrong); }

/* ── Results screen ── */
.results-screen { 
  width: 100%; 
  max-width: 780px; 
  margin: 0 auto;
  display: none; 
  flex-direction: column; 
  gap: 24px; 
  animation: fadeUp .4s ease both; 
}
.results-screen.visible { display: flex; }
.results-hero { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); padding: 48px 40px; text-align: center; }
.results-grade { font-family: var(--font-serif); font-size: 5rem; font-weight: 600; line-height: 1; margin-bottom: 8px; background: linear-gradient(135deg, #1a1714 0%, #2563a8 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.results-label { font-size: 1.05rem; color: var(--text-2); margin-bottom: 32px; }
.results-stats { display: flex; justify-content: center; gap: 40px; flex-wrap: wrap; }
.stat { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.stat-num { font-family: var(--font-mono); font-size: 1.8rem; font-weight: 500; color: var(--text); }
.stat-num.green { color: var(--correct); }
.stat-num.red   { color: var(--wrong); }
.stat-label { font-size: .78rem; color: var(--text-3); text-transform: uppercase; letter-spacing: .06em; }
.results-actions { display: flex; justify-content: center; gap: 12px; margin-top: 32px; flex-wrap: wrap; }

/* Review list */
.filter-btn { padding: 5px 14px; font-size: 0.8rem; font-weight: 600; border-radius: 99px; cursor: pointer; border: 1.5px solid var(--border); background: transparent; color: var(--text-2); transition: all var(--transition); }
.filter-btn.active { background: var(--surface-2); color: var(--text); border-color: var(--text-3); }
.review-list { display: flex; flex-direction: column; gap: 12px; }
.review-item { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 16px 20px; cursor: pointer; display: flex; align-items: flex-start; gap: 14px; transition: box-shadow var(--transition); }
.review-item:hover { box-shadow: var(--shadow); }
.review-dot { flex-shrink: 0; width: 10px; height: 10px; border-radius: 50%; margin-top: 6px; }
.review-dot.correct { background: var(--correct-ring); }
.review-dot.wrong   { background: var(--wrong-ring); }
.review-text { flex: 1; font-size: .9rem; color: var(--text-2); line-height: 1.4; }
.review-answer { font-size: .8rem; font-weight: 600; font-family: var(--font-mono); color: var(--text-3); flex-shrink: 0; }
.status-Unanswered { color: var(--text-3); }
.status-Correct { color: var(--correct); }
.status-Wrong { color: var(--wrong); }

/* ── Utility ── */
.hidden { display: none !important; }

/* ── Responsive ── */
@media (max-width: 800px) {
  body { flex-direction: column; overflow-y: auto; }
  .sidebar { width: 100%; height: auto; max-height: 250px; border-right: none; border-bottom: 1.5px solid var(--border); padding: 16px; flex-shrink: 0; }
  .main-content { width: 100%; height: auto; overflow: visible; padding: 20px 16px 80px; }
  .card { display: flex; flex-direction: column; }
  .note-wrap { grid-column: unset; grid-row: unset; border-left: none; border-top: 1.5px solid var(--border); background: var(--surface-2); padding: 14px 20px; }
  .note-side-header { display: none; }
  .note-toggle { display: inline-flex; align-items: center; gap: 7px; font-size: .8rem; font-weight: 500; color: var(--text-2); cursor: pointer; background: none; border: 1.5px solid var(--border); border-radius: 99px; padding: 5px 14px; transition: all var(--transition); }
  .note-toggle:hover { background: var(--surface); }
  .note-toggle.has-note { color: var(--accent); border-color: var(--accent); background: var(--accent-light); }
  .note-body { display: none; flex: none; margin-top: 10px; }
  .note-body.open { display: flex; flex-direction: column; animation: fadeIn .2s ease; }
  .note-textarea { min-height: 90px; resize: vertical; flex: none; }
}
@media (max-width: 520px) {
  .stem { font-size: 1.1rem; padding: 14px 20px 20px; }
  .options { padding: 16px 20px 20px; }
  .card-footer { padding: 0 20px 20px; flex-wrap: wrap; }
  .card-header { padding: 16px 20px 0; }
  .hint-wrap { padding: 0 20px; }
  .note-wrap { padding: 12px 20px; }
  .results-grade { font-size: 3.5rem; }
  .results-stats { gap: 24px; }
}
/* ── Login screen ── */
#loginScreen {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  padding: 24px;
}
#loginScreen.hidden { display: none; }
.login-logo {
  font-family: var(--font-serif);
  font-size: 2.4rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 6px;
  text-align: center;
}
.login-logo span { color: var(--accent); }
.login-sub {
  font-size: .85rem;
  color: var(--text-3);
  margin-bottom: 48px;
  text-align: center;
}
.google-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 13px 28px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 99px;
  font-family: var(--font-sans);
  font-size: .9rem;
  font-weight: 600;
  color: var(--text);
  cursor: pointer;
  transition: border-color var(--transition), background var(--transition);
}
.google-btn:hover { border-color: var(--accent); background: var(--accent-light); }
.login-error {
  margin-top: 16px;
  font-size: .8rem;
  color: var(--wrong);
  min-height: 1em;
  text-align: center;
}
.made-by-login {
  position: fixed;
  bottom: 20px;
  font-size: .72rem;
  color: var(--text-3);
  font-family: var(--font-mono);
  text-align: center;
}
/* ── Persistent credit ── */
.made-by {
  font-size: .68rem;
  color: var(--text-3);
  font-family: var(--font-mono);
  text-align: center;
  padding-top: 12px;
  margin-top: 8px;
  border-top: 1px solid var(--border);
}

</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-logo">NB <span>Quiz</span></div>
  <div class="login-sub">Your personal medical study companion</div>
  <button class="google-btn" onclick="signInWithGoogle()">
    <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
    Continue with Google
  </button>
  <div class="login-error" id="loginError"></div>
  <div class="made-by-login">made by Zi Lin</div>
</div>

<aside class="sidebar">
  <a href="https://zxsye.github.io/nbquiz/" class="home-btn">← Home</a>
  <div class="sidebar-header">
    <span>Quiz Status</span>
    <span style="font-size:0.8rem; color:var(--text-3); font-family:var(--font-mono);" id="sidebarCount">0/25</span>
  </div>
  <div class="q-grid" id="qGrid"></div>
  
  <div style="margin-top:auto; display:flex; flex-direction:column; gap:10px;">
    <button class="btn btn-ghost" id="sidebarCopyBtn" style="width:100%; border: 1.5px solid var(--border); padding: 8px; font-size: 0.85rem;" onclick="copySidebarResults()">📋 Copy Status</button>
    <button class="btn btn-primary" style="width:100%; margin-top:0;" onclick="showResults()">Finish Quiz</button>
    <div class="made-by">made by Zi Lin</div>
  </div>
</aside>

<div class="main-content">
  <header class="app-header">
    <a href="../../../index.html" style="text-decoration:none;">
      <div class="app-title">NB <span>Quiz</span></div>
    </a>
    <div style="display:flex; align-items:center; gap:12px;">
      <div class="score-badge">
        Score&nbsp;<span class="score-num" id="scoreDisplay">0 / 0</span>
      </div>
      <button class="btn btn-ghost" onclick="signOut()" style="padding:6px 14px; font-size:0.8rem;" title="Sign out">Sign out</button>
    </div>
  </header>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-meta">
      <span id="progressLabel">Question 1 of 25</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>

<script>
// ── Quiz data ─────────────────────────────────────────────────────────────────
const QUESTIONS = [{"stem": "A 45-year-old female presents with a sudden-onset \"thunderclap\" headache. A non-contrast CT brain performed 4 hours after symptom onset is unremarkable. What is the most appropriate next step in management?", "options": {"A": "Perform a lumbar puncture immediately to look for xanthochromia.", "B": "Perform a lumbar puncture at least 12 hours after the onset of the headache.", "C": "Discharge the patient with analgesia as the CT is highly sensitive within the first 6 hours.", "D": "Proceed directly to Digital Subtraction Angiography (DSA).", "E": "Request an MRI Brain with gadolinium to identify occult blood."}, "correct": "B", "rationales": {"A": "Performing the procedure too early may result in a false negative because the enzymatic breakdown of hemoglobin into bilirubin takes time.", "B": "Allowing sufficient time ensures that red blood cells have lysed and converted to bilirubin, which is the gold standard for detecting subarachnoid hemorrhage when imaging is negative.", "C": "While the sensitivity is high, a negative CT does not definitively rule out the condition in a high-suspicion case.", "D": "This is an invasive procedure typically reserved for identifying the source once the diagnosis of hemorrhage is confirmed.", "E": "MRI is generally not the preferred follow-up for acute subarachnoid hemorrhage in the emergency setting compared to CSF analysis."}, "hint": "Consider the 'Rule of Sixes' and the physiological timeline for bilirubin production in the CSF.", "part": 1}, {"stem": "A 68-year-old male with a history of chronic alcoholism and hypertension is admitted with progressive confusion and a headache. CT imaging reveals a crescent-shaped hyperdensity crossing the coronal suture line. Which of the following vessels is most likely responsible for this finding?", "options": {"A": "Middle meningeal artery", "B": "Bridging cortical veins", "C": "Anterior communicating artery", "D": "Internal carotid artery", "E": "Great cerebral vein of Galen"}, "correct": "B", "rationales": {"A": "This vessel typically causes biconvex, lens-shaped hematomas that do not cross suture lines.", "B": "These vessels are stretched in the setting of brain atrophy, making them susceptible to tearing during acceleration-deceleration injuries, resulting in a subdural hematoma.", "C": "Rupture here would lead to subarachnoid hemorrhage rather than a localized crescent-shaped collection in the subdural space.", "D": "Large arterial ruptures of this nature typically present with rapid intracranial catastrophe or subarachnoid patterns rather than a subdural collection.", "E": "Injury to deep venous structures usually presents with different radiological patterns and deep-seated involvement."}, "hint": "Focus on the classic anatomical source of a subdural hematoma in an elderly or atrophied brain.", "part": 1}, {"stem": "A patient is admitted with a traumatic brain injury and has an ICP monitor placed. The MAP is 90 mmHg and the ICP is 25 mmHg. According to standard neurocritical care targets, what is the best interpretation of the current CPP?", "options": {"A": "The CPP is 115 mmHg, which is dangerously high.", "B": "The CPP is 65 mmHg, which is within the typical target range.", "C": "The CPP is 3.6 mmHg, indicating imminent brain death.", "D": "The CPP is 65 mmHg, but the target should be >100 mmHg.", "E": "The CPP cannot be calculated without the heart rate."}, "correct": "B", "rationales": {"A": "This calculation incorrectly adds the pressures rather than subtracting the intracranial resistance from the systemic pressure.", "B": "Using the formula CPP = MAP - ICP, the result is 65 mmHg, which aligns with the goal of maintaining perfusion between 60--70 mmHg in trauma.", "C": "This represents a calculation error using division rather than subtraction.", "D": "Targets above 100 mmHg are generally avoided as they can lead to increased cerebral edema and pulmonary complications.", "E": "Cerebral perfusion pressure depends solely on the relationship between mean arterial pressure and intracranial pressure."}, "hint": "Apply the primary formula for cerebral perfusion and recall the standard neurotrauma targets.", "part": 1}, {"stem": "A 75kg man sustains partial-thickness burns to his entire right arm and his entire anterior trunk. Using the Parkland formula, calculate the volume of fluid required in the first 8 hours of resuscitation.", "options": {"A": "4050 mL", "B": "8100 mL", "C": "2700 mL", "D": "5400 mL", "E": "2025 mL"}, "correct": "A", "rationales": {"A": "The TBSA is 27% (arm 9% + anterior trunk 18%); the total 24h fluid is 4 mL \\times 75 kg \\times 27 = 8100 mL, half of which is 4050 mL.", "B": "This represents the total volume for the first 24 hours, not the volume for the initial 8-hour window.", "C": "This is a miscalculation likely using 2 mL as the multiplier in the Parkland formula.", "D": "This volume would correspond to a different TBSA calculation or incorrect timing of administration.", "E": "This is a calculation error representing only a quarter of the total 24-hour requirement."}, "hint": "Sum the TBSA for the arm and anterior trunk, calculate the 24-hour total, and then divide by two.", "part": 1}, {"stem": "A 32-year-old male presents with a deep laceration to the palm of his hand. On examination, he is unable to flex the distal interphalangeal (DIP) joint of his ring finger while the proximal joints are stabilized. Which structure is most likely injured?", "options": {"A": "Flexor Digitorum Superficialis (FDS)", "B": "Flexor Digitorum Profundus (FDP)", "C": "Lumbrical muscles", "D": "Extensor Digitorum Communis", "E": "Palmar interossei"}, "correct": "B", "rationales": {"A": "This muscle is primarily responsible for flexion at the proximal interphalangeal (PIP) joint.", "B": "The FDP is the only tendon that inserts on the distal phalanx and provides flexion at the DIP joint.", "C": "The lumbricals primarily flex the MCP joints and extend the interphalangeal joints.", "D": "This muscle facilitates extension of the digits, not flexion.", "E": "These muscles are involved in adduction of the fingers rather than flexion of the distal joints."}, "hint": "Identify the specific tendon that inserts onto the distal phalanx to facilitate distal flexion.", "part": 1}, {"stem": "A patient presents with a complete third nerve palsy (ptosis, 'down and out' eye) and a fixed, dilated pupil. Which of the following is the most urgent concern?", "options": {"A": "Microvascular ischemia due to Diabetes Mellitus", "B": "Compressive aneurysm of the Posterior Communicating Artery (PCom)", "C": "Atherosclerotic occlusion of the ophthalmic artery", "D": "Pituitary macroadenoma with cavernous sinus invasion", "E": "Myasthenia Gravis exacerbation"}, "correct": "B", "rationales": {"A": "Medical causes like diabetes typically spare the superficially located parasympathetic pupillary fibers, leading to a pupil-sparing palsy.", "B": "The parasympathetic fibers are located on the outside of the third nerve; compression by an aneurysm typically involves the pupil, signaling an impending rupture.", "C": "This would present more prominently with sudden vision loss rather than a specific extraocular muscle palsy with pupillary involvement.", "D": "While possible, this is usually more chronic and would likely involve other cranial nerves (IV, V, VI) simultaneously.", "E": "This condition causes fluctuating weakness and ptosis but does not affect the pupillary reflex."}, "hint": "The presence of pupillary involvement in a CN III palsy suggests external compression rather than an internal medical (ischemic) issue.", "part": 1}, {"stem": "In the management of raised intracranial pressure (ICP), which mechanism explains the benefit of head-of-bed elevation to 30^{\\circ}?", "options": {"A": "It increases arterial inflow to prevent cerebral ischemia.", "B": "It optimizes venous drainage through the jugular veins.", "C": "It induces hypocapnic vasoconstriction.", "D": "It promotes the shunting of CSF into the lumbar cistern.", "E": "It prevents cytotoxic edema by stabilizing the blood-brain barrier."}, "correct": "B", "rationales": {"A": "Elevation can actually decrease mean arterial pressure at the level of the head, potentially lowering inflow.", "B": "Gravity-assisted drainage reduces the venous blood volume component of the Monro-Kellie doctrine, thereby lowering overall ICP.", "C": "Vasoconstriction via CO_2 levels is a result of hyperventilation, not physical positioning.", "D": "While positioning affects CSF dynamics, the primary and immediate acute benefit for ICP is related to the venous system.", "E": "Positioning has no direct cellular effect on the integrity of the blood-brain barrier or the metabolic state of neurons."}, "hint": "Think about the Monro-Kellie doctrine and how gravity affects the fluid volume within the non-compliant skull.", "part": 1}, {"stem": "A 55-year-old male with new-onset seizures and morning headaches undergoes an MRI, which shows a large, ring-enhancing mass in the right frontal lobe that crosses the corpus callosum. Which histological feature is most characteristic of this suspected diagnosis?", "options": {"A": "Psammoma bodies", "B": "Pseudopalisading necrosis", "C": "Whorled pattern of spindle cells", "D": "Fried-egg appearance of cells", "E": "Rosenthal fibers"}, "correct": "B", "rationales": {"A": "These are laminated calcifications classically found in meningiomas, not aggressive glial tumors.", "B": "This is the hallmark pathological finding of Glioblastoma Multiforme (GBM), reflecting rapid growth outstripping the blood supply.", "C": "This description is characteristic of a benign meningioma.", "D": "This is the classic description for oligodendrogliomas, which are generally less aggressive than the tumor described.", "E": "These are thick, elongated eosinophilic structures found in pilocytic astrocytomas, which are typically WHO Grade I and seen in children."}, "hint": "The imaging description of crossing the corpus callosum suggests a 'Butterfly Glioma' (GBM).", "part": 1}, {"stem": "A trauma patient is found to have absent breath sounds on the right side, hyper-resonance to percussion, and a blood pressure of 85/50 mmHg. What is the most appropriate immediate action?", "options": {"A": "Obtain a portable chest X-ray to confirm the diagnosis.", "B": "Perform immediate needle decompression.", "C": "Perform an emergency bedside thoracotomy.", "D": "Insert an intercostal chest drain in the triangle of safety.", "E": "Auscultate the left side to ensure the endotracheal tube is not misplaced."}, "correct": "B", "rationales": {"A": "In a hemodynamically unstable patient with clinical signs of tension, waiting for imaging can lead to cardiac arrest.", "B": "Tension pneumothorax is a clinical diagnosis requiring immediate release of pressure to restore venous return to the heart.", "C": "Thoracotomy is a major surgical procedure reserved for massive hemorrhage or cardiac arrest in penetrating trauma, not the first-line for air decompression.", "D": "While this is the definitive treatment, needle decompression is faster and should be performed first in the setting of hypotension.", "E": "While important, the clinical signs clearly point to a right-sided tension pneumothorax causing obstructive shock."}, "hint": "Tension pneumothorax is a clinical emergency where the 'next best step' is governed by the need for rapid decompression.", "part": 1}, {"stem": "A patient with a suspected splenic injury from blunt abdominal trauma is hemodynamically unstable despite resuscitation with 2 L of crystalloid. The FAST scan is positive for free fluid in Morrison's pouch and the splenorenal recess. What is the next best step?", "options": {"A": "CT Abdomen and Pelvis with IV contrast", "B": "Immediate exploratory laparotomy", "C": "Urgent splenic artery embolization in interventional radiology", "D": "Serial hemoglobin monitoring and ICU admission", "E": "Repeat FAST scan in 30 minutes"}, "correct": "B", "rationales": {"A": "Unstable patients should not be sent to the CT scanner as it delays definitive surgical control of bleeding.", "B": "Hemodynamic instability with a positive FAST scan is an absolute indication for emergency surgery to control hemorrhage.", "C": "Embolization is only appropriate for stable patients with a localized 'blush' on CT.", "D": "Non-operative management is only suitable for patients who remain hemodynamically stable.", "E": "Repeating a positive test in an unstable patient provides no additional information and wastes critical time."}, "hint": "Stability is the deciding factor in the trauma algorithm for whether to image further or go to the operating theatre.", "part": 1}, {"stem": "Which of the following is considered a 'false localizing sign' in the context of raised intracranial pressure?", "options": {"A": "Ipsilateral third nerve palsy", "B": "Contralateral hemiparesis", "C": "Abducens (CN VI) nerve palsy", "D": "Bilateral papilloedema", "E": "Anosmia"}, "correct": "C", "rationales": {"A": "This usually indicates uncal herniation, which is a specific anatomical localization of a mass effect.", "B": "This localizes the lesion to the motor cortex or internal capsule on the opposite side.", "C": "Because of its long intracranial course, this nerve can be stretched by global pressure, mimicking a focal lesion where none exists.", "D": "This is a general sign of increased pressure and does not 'localize' a lesion to a specific cranial nerve pathway.", "E": "This would suggest a lesion specific to the olfactory bulbs or the cribriform plate area."}, "hint": "Identify the cranial nerve that is most vulnerable to traction due to its length and anatomical path.", "part": 1}, {"stem": "Regarding subarachnoid hemorrhage, which medication is specifically indicated for 21 days to reduce the risk of delayed cerebral ischemia?", "options": {"A": "Amlodipine", "B": "Nimodipine", "C": "Mannitol", "D": "Levetiracetam", "E": "Phenylephrine"}, "correct": "B", "rationales": {"A": "This is a dihydropyridine calcium channel blocker used for systemic hypertension, not specifically for vasospasm.", "B": "This lipophilic calcium channel blocker crosses the blood-brain barrier to reduce the incidence and severity of ischemic deficits caused by vasospasm.", "C": "This is an osmotic diuretic used for acute ICP reduction, not for the prevention of delayed vasospasm.", "D": "This is an antiepileptic used for seizure prophylaxis, not for preventing cerebral ischemia.", "E": "This is a vasopressor that might be used as part of 'triple-H' therapy to treat vasospasm, but it is not the standard preventative prophylactic agent."}, "hint": "Think of a specific calcium channel blocker that is lipophilic and crosses into the central nervous system.", "part": 1}, {"stem": "A 24-year-old male is brought to the ED after a motor vehicle accident. He opens his eyes to pain, makes incomprehensible sounds, and withdraws from painful stimuli. What is his Glasgow Coma Scale (GCS) score?", "options": {"A": "GCS\\ 6", "B": "GCS\\ 8", "C": "GCS\\ 9", "D": "GCS\\ 7", "E": "GCS\\ 10"}, "correct": "B", "rationales": {"A": "This would represent a significantly more depressed neurological status than described.", "B": "Eyes = 2 (pain), Verbal = 2 (incomprehensible), Motor = 4 (withdraws); 2+2+4=8.", "C": "This score would be achieved if the patient localized pain (Motor 5) rather than withdrawing from it.", "D": "This would occur if the patient exhibited abnormal flexion (decorticate posturing) rather than withdrawing.", "E": "This would imply a higher level of verbal response (e.g., confused conversation)."}, "hint": "Add the components: eyes to pain, incomprehensible verbal, and withdrawal motor.", "part": 1}, {"stem": "Which of the following findings is most strongly suggestive of a base of skull fracture, making the insertion of a nasogastric tube potentially dangerous?", "options": {"A": "Subhyaloid hemorrhage", "B": "Battle's sign", "C": "Projectile vomiting", "D": "Fixed and dilated pupil", "E": "Kernig's sign"}, "correct": "B", "rationales": {"A": "This is a sign of sudden, severe intracranial pressure increase, classically seen in subarachnoid hemorrhage (Terson syndrome).", "B": "Ecchymosis over the mastoid process indicates a fracture of the petrous temporal bone, part of the skull base.", "C": "This is a non-specific sign of generally raised intracranial pressure.", "D": "This indicates herniation or third nerve compression, not necessarily a skull base fracture.", "E": "This is a sign of meningeal irritation, typically seen in meningitis or subarachnoid hemorrhage."}, "hint": "Look for a sign involving bruising behind the ear or around the eyes (raccoon eyes).", "part": 1}, {"stem": "A patient with a full-thickness circumferential burn to the right arm develops cool fingers and an absent radial pulse. What is the most appropriate immediate surgical intervention?", "options": {"A": "Fasciotomy", "B": "Escharotomy", "C": "Debridement and skin grafting", "D": "Amputation at the level of the burn", "E": "Primary closure of the burn wound"}, "correct": "B", "rationales": {"A": "Fasciotomy involves cutting the muscle fascia and is used for compartment syndrome, whereas this case is caused by the constricting burn eschar.", "B": "This involves incising the non-compliant, leathery burnt tissue to release pressure and restore distal circulation.", "C": "While eventually necessary, this is not an emergency procedure for restoring immediate vascular flow.", "D": "This is an extreme measure that is not indicated before attempting to release the constricting eschar.", "E": "Burns are not primarily closed; they require grafting or secondary healing, and closure would worsen the pressure."}, "hint": "Distinguish between a procedure that cuts through the burnt skin versus one that cuts through the muscle fascia.", "part": 1}, {"stem": "Which set of clinical signs constitutes 'Beck's Triad', which helps differentiate cardiac tamponade from a tension pneumothorax?", "options": {"A": "Hypertension, Bradycardia, and Irregular respirations", "B": "Hypotension, Distended neck veins, and Muffled heart sounds", "C": "Tracheal deviation, Hyper-resonance, and Hypotension", "D": "Fever, Nuchal rigidity, and Altered mental status", "E": "Tachycardia, Tachypnoea, and Narrow pulse pressure"}, "correct": "B", "rationales": {"A": "These three signs make up Cushing's Triad, which is associated with severely raised intracranial pressure.", "B": "These constitute Beck's Triad, pointing specifically to fluid accumulation in the pericardium.", "C": "These are the hallmark signs of a tension pneumothorax, not cardiac tamponade.", "D": "These are signs typical of meningitis.", "E": "These are general signs of shock and are not specific enough to diagnose tamponade."}, "hint": "One of these triads involves the character of the heart sounds as a defining feature.", "part": 1}, {"stem": "A 40-year-old construction worker presents with severe lower back pain radiating down his left leg to the top of his foot. He has weakness in dorsiflexion of the foot. Which nerve root is most likely compressed?", "options": {"A": "L3", "B": "L4", "C": "L5", "D": "S1", "E": "S2"}, "correct": "C", "rationales": {"A": "Compression of L3 typically presents with weakness in knee extension and an impaired patellar reflex.", "B": "While L4 can be involved in dorsiflexion, it is more characteristically associated with the patellar reflex and inversion.", "C": "L5 is the primary root responsible for foot dorsiflexion and great toe extension; its dermatome covers the top of the foot.", "D": "S1 compression typically presents with weakness in plantarflexion and a loss of the ankle (Achilles) reflex.", "E": "S2 is primarily involved in pelvic floor and intrinsic foot function, not major ankle movements."}, "hint": "Consider the myotome for 'foot drop' and the dermatomal distribution to the dorsal surface of the foot.", "part": 1}, {"stem": "During the management of a trauma patient with a possible thoracic injury, a chest drain is inserted. The initial output is 1600 mL of blood. What is the most appropriate next step in management?", "options": {"A": "Clamp the chest drain to prevent further blood loss.", "B": "Administer 2 L of crystalloid and monitor for an hour.", "C": "Prepare the patient for an emergency thoracotomy.", "D": "Perform a CT Angiogram of the chest to find the bleeding source.", "E": "Give 2 units of uncrossmatched blood and repeat the chest X-ray."}, "correct": "C", "rationales": {"A": "Clamping the drain can lead to a tension hemothorax and does not stop the underlying hemorrhage.", "B": "Massive initial output indicates a major vessel injury that crystalloid alone cannot stabilize.", "C": "According to ATLS guidelines, an immediate output of >1500 mL is an indication for surgical exploration.", "D": "With this volume of loss, the patient is likely to be or become unstable, making transport to CT unsafe.", "E": "While blood is needed, the threshold for surgery has already been met by the volume of initial drainage."}, "hint": "Recall the numeric threshold for immediate surgical intervention based on initial chest drain output.", "part": 1}, {"stem": "Which phase of Jackson's burn zones describes the area of potentially salvageable tissue that is at risk of irreversible loss if resuscitation is inadequate?", "options": {"A": "Zone of Coagulation", "B": "Zone of Stasis", "C": "Zone of Hyperaemia", "D": "Zone of Fibrosis", "E": "Zone of Demarcation"}, "correct": "B", "rationales": {"A": "This central area has already suffered irreversible tissue necrosis.", "B": "This area has impaired perfusion; with good resuscitation, it may recover, but it can progress to necrosis if ischemia persists.", "C": "This outermost zone has increased blood flow and is expected to heal without intervention.", "D": "This is not one of the three classic physiological zones of a burn described by Jackson.", "E": "This term refers to the later visual boundary between necrotic and healthy tissue, not the acute physiological zones."}, "hint": "This zone is 'in between' the central dead tissue and the outer healthy tissue.", "part": 1}, {"stem": "A patient with a known intracranial mass presents with a headache and progressive drowsiness. On examination, they have a heart rate of 48 bpm, a blood pressure of 180/95 mmHg, and irregular breathing. What is the most likely underlying physiological process?", "options": {"A": "Hypovolaemic shock due to internal bleeding", "B": "Acute meningitis", "C": "Severely raised intracranial pressure with impending herniation", "D": "Pulmonary embolism with obstructive shock", "E": "Opioid overdose"}, "correct": "C", "rationales": {"A": "Shock usually presents with tachycardia and hypotension, the opposite of the signs described.", "B": "While it can cause headache and altered consciousness, the triad of hypertension and bradycardia is more specific to pressure effects.", "C": "Cushing's triad (hypertension, bradycardia, irregular breathing) is a late sign of dangerously high ICP.", "D": "This typically causes hypotension and tachycardia, often with low oxygen saturations.", "E": "While this causes respiratory depression and bradycardia, it usually results in hypotension and miosis."}, "hint": "This triad of signs is the clinical hallmark of critical intracranial hypertension.", "part": 1}, {"stem": "A 28-year-old male is evaluated in the ED following a bar fight. He has a small laceration over his right 3rd metacarpophalangeal (MCP) joint. He states he hit someone in the mouth. What is the most appropriate management strategy?", "options": {"A": "Suture the wound immediately to prevent scarring.", "B": "Prescribe oral Amoxicillin and discharge with GP follow-up.", "C": "Irrigate the wound, provide Tetanus prophylaxis, and start Co-amoxiclav.", "D": "Perform an X-ray to look for a fracture but do not give antibiotics.", "E": "Reassure the patient that the wound is superficial and needs only a dressing."}, "correct": "C", "rationales": {"A": "Closing a human bite wound primarily carries an extremely high risk of trapping infection.", "B": "Oral monotherapy is insufficient for the polymicrobial flora of a 'fight bite,' and GP follow-up is not aggressive enough.", "C": "This approach addresses the high risk of infection (including Eikenella\\ corrodens) associated with human bites.", "D": "Antibiotics are mandatory in human bite injuries due to the high rate of subsequent septic arthritis or tenosynovitis.", "E": "Ignoring a fight bite can lead to rapid destruction of the joint or tendon sheath."}, "hint": "The mechanism of hitting someone's teeth suggests a highly contaminated 'human bite' scenario.", "part": 1}, {"stem": "A patient is diagnosed with a large meningioma. Which of the following imaging features on a contrast-enhanced MRI would be most classic for this tumor?", "options": {"A": "A 'Dural Tail' sign", "B": "A 'Popcorn' appearance", "C": "Massive vasogenic edema crossing the midline", "D": "Multiple lesions at the grey-white matter junction", "E": "An intensely calcified lesion within the ventricle"}, "correct": "A", "rationales": {"A": "This represents thickening and enhancement of the dura mater adjacent to the tumor, a characteristic finding in meningiomas.", "B": "This is the classic description of a cavernous malformation (cavernoma), not a meningioma.", "C": "While meningiomas can cause edema, this pattern is much more characteristic of a high-grade glioma.", "D": "This pattern is highly suggestive of metastatic disease.", "E": "Intraventricular tumors like choroid plexus papillomas or ependymomas would be more likely in this location."}, "hint": "Look for a sign that indicates the tumor's origin from the arachnoid cap cells attached to the dura.", "part": 1}, {"stem": "What is the primary mechanism of injury in 'Diffuse Axonal Injury' (DAI), and how does it typically appear on an initial CT brain?", "options": {"A": "Direct impact to the skull; presents with a large midline shift.", "B": "Rotational shearing forces; often appears relatively normal or with small punctate hemorrhages.", "C": "Bursting of bridging veins; appears as a crescent-shaped hyperdensity.", "D": "Low-pressure venous oozing; appears as a hypodense collection over weeks.", "E": "High-pressure arterial rupture; appears as a biconvex hematoma."}, "correct": "B", "rationales": {"A": "Direct impact usually causes contusions or hematomas rather than diffuse shearing.", "B": "DAI involves the shearing of axons at the grey-white matter junction and often shows a discrepancy between a poor clinical state and a near-normal CT.", "C": "This describes the pathophysiology of a subdural hematoma.", "D": "This describes a chronic subdural hematoma.", "E": "This describes the pathophysiology of an extradural hematoma."}, "hint": "Consider the 'GCS-CT mismatch' where the patient looks much worse than the scan suggests.", "part": 1}, {"stem": "Which of the following is an absolute contraindication to performing a lumbar puncture in a patient with suspected meningitis or subarachnoid hemorrhage?", "options": {"A": "Fever and neck stiffness", "B": "A platelet count of 150 \\times 10^9/L", "C": "Signs of a mass lesion or obstructive hydrocephalus on CT", "D": "A history of previous back surgery", "E": "Patient is taking low-dose Aspirin"}, "correct": "C", "rationales": {"A": "These are indications for a lumbar puncture to diagnose the cause of the symptoms.", "B": "This is a normal platelet count and poses no increased risk for the procedure.", "C": "Performing an LP in the presence of a pressure gradient can cause brain herniation (coning).", "D": "This may make the procedure technically more difficult, but it is not a contraindication.", "E": "Low-dose Aspirin is generally not a contraindication for a lumbar puncture, unlike // ── State ─────────────────────────────────────────────────────────────────────
let current       = 0;
let selected      = null;
let answered      = false;
let score         = 0;
let results       = new Array(QUESTIONS.length).fill(null); 
let flagged       = new Array(QUESTIONS.length).fill(false);
let notes         = new Array(QUESTIONS.length).fill('');
let currentFilter = 'wrong';
let _noteSaveTimer = null;

// ── Firebase ──────────────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey:            "AIzaSyCNnvrEli5lzU3sUFvttTsQPIYQXYK1_WE",
  authDomain:        "nbquiz-6faf9.firebaseapp.com",
  projectId:         "nbquiz-6faf9",
  storageBucket:     "nbquiz-6faf9.firebasestorage.app",
  messagingSenderId: "913114740758",
  appId:             "1:913114740758:web:a856bb9c8eedf3cd629d37",
  measurementId:     "G-8Z4YWVBZEZ"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();
const QUIZ_ID = 'W7/Neuro/v3';
let uid = null;

function sessionRef() {
  return db.collection('quizSessions').doc(uid).collection('quizzes').doc(QUIZ_ID);
}

async function saveState() {
  if (!uid) return;
  try {
    await sessionRef().set({
      results,
      flagged,
      current,
      score,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  } catch (e) { console.warn('Save failed:', e); }
}

async function loadState() {
  if (!uid) return false;
  try {
    const snap = await sessionRef().get();
    if (!snap.exists) return false;
    const data = snap.data();
    results = data.results || new Array(QUESTIONS.length).fill(null);
    flagged = data.flagged || new Array(QUESTIONS.length).fill(false);
    current = typeof data.current === 'number' ? data.current : 0;
    score   = typeof data.score   === 'number' ? data.score   : 0;
    return true;
  } catch (e) { console.warn('Load failed:', e); return false; }
}

// ── Notes (separate doc — never reset by restartQuiz) ─────────────────────────
function notesRef() {
  return db.collection('quizSessions').doc(uid).collection('notes').doc(QUIZ_ID);
}

async function saveNote(idx) {
  if (!uid) return;
  const text = notes[idx] || '';
  const statusEl = document.getElementById('noteSaveStatus');
  try {
    await notesRef().set({ [`n_${idx}`]: text }, { merge: true });
    if (statusEl) statusEl.textContent = 'Saved ✓';
    setTimeout(() => { if (statusEl) statusEl.textContent = ''; }, 1500);
  } catch (e) {
    if (statusEl) statusEl.textContent = 'Save failed';
    console.warn('Note save failed:', e);
  }
}

async function loadNotes() {
  if (!uid) return;
  try {
    const snap = await notesRef().get();
    if (!snap.exists) return;
    const data = snap.data();
    QUESTIONS.forEach((_, i) => {
      if (data[`n_${i}`] !== undefined) notes[i] = data[`n_${i}`];
    });
  } catch (e) { console.warn('Notes load failed:', e); }
}

// ── Sidebar & Init ────────────────────────────────────────────────────────────
function initSidebar() {
  const grid = document.getElementById('qGrid');
  grid.innerHTML = '';
  QUESTIONS.forEach((q, i) => {
    const div = document.createElement('div');
    div.className = 'q-grid-item';
    div.id = `grid-item-${i}`;
    div.onclick = () => jumpTo(i);
    div.innerHTML = `${i + 1}<div class="flag-icon">🚩</div><div class="note-icon">📝</div>`;
    grid.appendChild(div);
  });
}

function updateSidebar() {
  QUESTIONS.forEach((q, i) => {
    const el = document.getElementById(`grid-item-${i}`);
    if (!el) return;
    
    // Reset base classes
    el.className = 'q-grid-item';
    
    if (i === current) el.classList.add('active');
    if (flagged[i]) el.classList.add('flagged');
    if (notes[i] && notes[i].trim()) el.classList.add('has-note');
    
    const res = results[i];
    if (res) {
      if (res.skipped) el.classList.add('skipped');
      else if (res.wasCorrect) el.classList.add('correct');
      else el.classList.add('wrong');
    }
  });
  
  // Update answered count
  const answeredCount = results.filter(r => r !== null).length;
  document.getElementById('sidebarCount').textContent = `${answeredCount}/${QUESTIONS.length}`;
}

function copySidebarResults() {
  let text = "Quiz Status:\\n\\n";
  
  QUESTIONS.forEach((q, idx) => {
    const r = results[idx];
    let status = "unanswered";
    if (r) {
      if (r.wasCorrect) status = "correct";
      else if (!r.skipped) status = "wrong";
    }
    
    let flagText = flagged[idx] ? " (flagged)" : "";
    text += `${idx + 1}. ${status}${flagText}\\n`;
  });

  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('sidebarCopyBtn');
    const origText = btn.innerHTML;
    btn.innerHTML = '✅ Copied!';
    setTimeout(() => { btn.innerHTML = origText; }, 2000);
  }).catch(err => {
    alert("Failed to copy status: " + err);
  });
}


function renderQuestion(idx) {
  const q   = QUESTIONS[idx];
  answered  = false;
  selected  = null;

  document.getElementById('qLabel').textContent = `Question ${idx + 1}`;
  document.getElementById('partTag').textContent = `Part ${q.part}`;
  document.getElementById('stem').textContent    = q.stem;
  
  // Update flag button state
  const flagBtn = document.getElementById('flagBtn');
  flagBtn.textContent = flagged[idx] ? '🚩 Unflag' : '⚑ Flag';
  flagBtn.style.borderColor = flagged[idx] ? 'var(--wrong-ring)' : 'var(--border)';
  flagBtn.style.color = flagged[idx] ? 'var(--wrong)' : 'var(--text-2)';

  // Note
  const noteTextarea = document.getElementById('noteTextarea');
  const noteToggleBtn = document.getElementById('noteToggleBtn');
  const noteBody = document.getElementById('noteBody');
  const noteSaveStatus = document.getElementById('noteSaveStatus');
  noteTextarea.value = notes[idx] || '';
  noteSaveStatus.textContent = '';
  noteBody.classList.remove('open');
  const hasNote = notes[idx] && notes[idx].trim();
  noteToggleBtn.textContent = hasNote ? '📝 View / edit note' : '📝 Add note';
  noteToggleBtn.classList.toggle('has-note', !!hasNote);

  // Hint
  const hw = document.getElementById('hintWrap');
  const hb = document.getElementById('hintBody');
  if (q.hint) {
    hw.style.display = 'block';
    hb.textContent   = q.hint;
    hb.classList.remove('open');
  } else {
    hw.style.display = 'none';
  }

  // Options
  const optContainer = document.getElementById('options');
  optContainer.innerHTML = '';
  const letters = Object.keys(q.options).sort();
  letters.forEach(letter => {
    const btn = document.createElement('button');
    btn.className  = 'option';
    btn.dataset.letter = letter;
    btn.onclick    = () => selectOption(letter);

    const rat  = q.rationales[letter] || '';
    btn.innerHTML = `
      <div class="opt-letter">${letter}</div>
      <div class="opt-body">
        <div class="opt-text">${escHtml(q.options[letter])}</div>
        ${rat ? `<div class="opt-rationale" id="rat-${letter}">${escHtml(rat)}</div>` : ''}
      </div>
      <div class="opt-icon" id="icon-${letter}"></div>
    `;
    optContainer.appendChild(btn);
  });

  // Footer
  const submitBtn = document.getElementById('submitBtn');
  submitBtn.disabled   = true;
  submitBtn.textContent = 'Check answer';
  submitBtn.onclick    = submitAnswer;
  document.getElementById('skipBtn').textContent = 'Skip →';
  document.getElementById('skipBtn').style.display = '';
  setFeedback('', '');

  updateSidebar();
  updateProgress();
  
  document.getElementById('quizCard').style.animation = 'none';
  requestAnimationFrame(() => {
    document.getElementById('quizCard').style.animation = 'fadeUp .3s ease both';
  });
}

function toggleHint() {
  const hb = document.getElementById('hintBody');
  const btn = document.querySelector('.hint-toggle');
  const isOpen = hb.classList.toggle('open');
  btn.textContent = isOpen ? '💡 Hide hint' : '💡 Show hint';
}

function toggleNote() {
  const noteBody = document.getElementById('noteBody');
  const isOpen = noteBody.classList.toggle('open');
  if (isOpen) {
    document.getElementById('noteTextarea').focus();
  }
}

function onNoteInput() {
  const idx = current;
  const text = document.getElementById('noteTextarea').value;
  notes[idx] = text;
  const btn = document.getElementById('noteToggleBtn');
  const hasNote = text.trim().length > 0;
  btn.textContent = hasNote ? '📝 View / edit note' : '📝 Add note';
  btn.classList.toggle('has-note', hasNote);
  document.getElementById('noteSaveStatus').textContent = 'Saving…';
  clearTimeout(_noteSaveTimer);
  _noteSaveTimer = setTimeout(() => {
    saveNote(idx);
    updateSidebar();
  }, 800);
}

function toggleFlag() {
  flagged[current] = !flagged[current];
  const flagBtn = document.getElementById('flagBtn');
  flagBtn.textContent = flagged[current] ? '🚩 Unflag' : '⚑ Flag';
  flagBtn.style.borderColor = flagged[current] ? 'var(--wrong-ring)' : 'var(--border)';
  flagBtn.style.color = flagged[current] ? 'var(--wrong)' : 'var(--text-2)';
  updateSidebar();
  saveState();
}

function selectOption(letter) {
  if (answered) return;
  selected = letter;
  document.querySelectorAll('.option').forEach(el => {
    el.classList.toggle('selected', el.dataset.letter === letter);
  });
  document.getElementById('submitBtn').disabled = false;
}

function submitAnswer() {
  if (!selected || answered) return;
  answered = true;

  const q = QUESTIONS[current];
  const isCorrect = selected === q.correct;

  // Save result to the fixed array index
  results[current] = { q: current, chosen: selected, correct: q.correct, wasCorrect: isCorrect, skipped: false };
  
  // Recalculate score safely
  score = results.filter(r => r && r.wasCorrect).length;

  // Lock options & colour them
  document.querySelectorAll('.option').forEach(el => {
    el.classList.add('locked');
    const l = el.dataset.letter;
    if (l === q.correct) {
      el.classList.add('correct');
      document.getElementById(`icon-${l}`).textContent = '✅';
    } else if (l === selected && !isCorrect) {
      el.classList.add('wrong');
      document.getElementById(`icon-${l}`).textContent = '❌';
    } else {
      el.classList.add('dimmed');
    }
    // Show rationale
    const rat = document.getElementById(`rat-${l}`);
    if (rat) rat.classList.add('visible');
  });

  if (isCorrect) setFeedback('✅ Correct!', 'correct');
  else setFeedback(`❌ The answer was ${q.correct}`, 'wrong');

  document.getElementById('submitBtn').textContent = current < QUESTIONS.length - 1 ? 'Next →' : 'See results';
  document.getElementById('submitBtn').onclick = nextQuestion;
  document.getElementById('submitBtn').disabled = false;
  document.getElementById('skipBtn').style.display = 'none';

  updateSidebar();
  updateProgress();
  saveState();
}

function nextQuestion() {
  if (!answered) {
    results[current] = { q: current, chosen: null, correct: QUESTIONS[current].correct, wasCorrect: false, skipped: true };
  }
  current++;
  saveState();
  if (current >= QUESTIONS.length) {
    showResults();
  } else {
    renderQuestion(current);
    document.getElementById('submitBtn').onclick = submitAnswer;
  }
}

// ── Progress & score ──────────────────────────────────────────────────────────
function updateProgress() {
  const answeredCount = results.filter(r => r !== null).length;
  const pct = Math.round((answeredCount / QUESTIONS.length) * 100);
  
  document.getElementById('progressFill').style.width  = pct + '%';
  document.getElementById('progressLabel').textContent = `Answered ${answeredCount} of ${QUESTIONS.length}`;
  document.getElementById('progressPct').textContent   = pct + '%';
  document.getElementById('scoreDisplay').textContent  = `${score} / ${answeredCount}`;
}

function setFeedback(msg, cls) {
  const el = document.getElementById('feedbackMsg');
  el.textContent  = msg;
  el.className    = 'feedback-msg' + (cls ? ' ' + cls : '');
  el.style.visibility = msg ? 'visible' : 'hidden';
}

// ── Results & Review Panel ────────────────────────────────────────────────────
function showResults() {
  document.getElementById('quizCard').classList.add('hidden');
  document.getElementById('progressWrap').classList.add('hidden');

  const total   = QUESTIONS.length;
  const correct = results.filter(r => r && r.wasCorrect).length;
  const wrong   = results.filter(r => r && !r.wasCorrect && !r.skipped).length;
  const skipped = results.filter(r => r === null || r.skipped).length;
  const pct     = Math.round((correct / total) * 100);

  document.getElementById('resultsGrade').textContent   = pct + '%';
  document.getElementById('correctCount').textContent   = correct;
  document.getElementById('wrongCount').textContent     = wrong;
  document.getElementById('skippedCount').textContent   = skipped;
  document.getElementById('totalQ').textContent         = total;

  let label = '';
  if (pct >= 90) label = '🏆 Outstanding performance!';
  else if (pct >= 75) label = '🎯 Great work — above pass mark!';
  else if (pct >= 60) label = '📚 Good effort — review the misses.';
  else label = "💪 Keep studying — you'll get there!";
  
  document.getElementById('resultsLabel').textContent = label;
  document.getElementById('resultsScreen').classList.add('visible');
}

function showReview() {
  const section = document.getElementById('reviewSection');
  section.classList.toggle('hidden');
  
  if (!section.classList.contains('hidden')) {
    const correctCount = results.filter(r => r && r.wasCorrect).length;
    filterReview(correctCount === QUESTIONS.length ? 'all' : 'wrong');
  }
}

function filterReview(type) {
  currentFilter = type;
  document.getElementById('filterAll').classList.toggle('active', type === 'all');
  document.getElementById('filterWrong').classList.toggle('active', type === 'wrong');
  document.getElementById('filterFlagged').classList.toggle('active', type === 'flagged');
  document.getElementById('filterNotes').classList.toggle('active', type === 'notes');
  renderReviewList();
}

function renderReviewList() {
  const list = document.getElementById('reviewList');
  list.innerHTML = '';
  
  QUESTIONS.forEach((q, i) => {
    const r = results[i];
    const isFlagged = flagged[i];
    const hasNote = notes[i] && notes[i].trim();
    const isCorrect = r && r.wasCorrect;
    const isUnanswered = !r || r.skipped;

    if (currentFilter === 'wrong' && isCorrect) return;
    if (currentFilter === 'flagged' && !isFlagged) return;
    if (currentFilter === 'notes' && !hasNote) return;

    const div = document.createElement('div');
    div.className = 'review-item';
    div.style.flexDirection = 'column';
    div.style.alignItems = 'stretch';
    const stemShort = q.stem.length > 100 ? q.stem.slice(0, 100) + '…' : q.stem;
    
    let statusText = isUnanswered ? 'Unanswered' : (isCorrect ? 'Correct' : 'Wrong');
    let displayDetail = isUnanswered ? '' : `(${r.chosen} → ${r.correct})`;
    let flagHTML = isFlagged ? '<span style="color:var(--wrong); font-size:0.8rem; margin-left:6px;">🚩</span>' : '';
    let noteIndicator = hasNote ? '<span style="font-size:0.8rem; margin-left:6px;">📝</span>' : '';

    div.innerHTML = `
      <div style="display:flex;align-items:flex-start;gap:14px;" onclick="jumpTo(${i})">
        <div class="review-dot ${isCorrect ? 'correct' : 'wrong'}" style="margin-top:6px;flex-shrink:0;"></div>
        <div class="review-text" style="flex:1;">Q${i + 1}. ${escHtml(stemShort)}${flagHTML}${noteIndicator}</div>
        <div class="review-answer" style="flex-shrink:0;"><span class="status-${statusText}">${statusText}</span> ${displayDetail}</div>
      </div>
      ${hasNote ? `<div class="review-note">${escHtml(notes[i])}</div>` : ''}
    `;
    list.appendChild(div);
  });
  
  if (list.innerHTML === '') {
    list.innerHTML = '<div style="color:var(--text-3);font-size:.9rem;padding:12px;">No questions match this filter.</div>';
  }
}

function copyResults() {
  let text = "Quiz Results Summary:\\n\\n";
  
  QUESTIONS.forEach((q, idx) => {
    const r = results[idx];
    let status = "Unanswered";
    if (r) {
      if (r.wasCorrect) status = "Correct";
      else if (!r.skipped) status = "Wrong";
    }
    let flagText = flagged[idx] ? " [FLAGGED]" : "";
    text += "Q" + (idx + 1) + ": " + status + flagText + "\\n";
  });

  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    const origText = btn.innerHTML;
    btn.innerHTML = '✅ Copied!';
    setTimeout(() => { btn.innerHTML = origText; }, 2000);
  }).catch(err => {
    alert("Failed to copy results: " + err);
  });
}

function jumpTo(idx) {
  document.getElementById('resultsScreen').classList.remove('visible');
  document.getElementById('quizCard').classList.remove('hidden');
  document.getElementById('progressWrap').classList.remove('hidden');
  
  current = idx;
  answered = false;
  selected = null;
  renderQuestion(idx);
  
  // Auto-replay the answer if it was previously answered
  const r = results[idx];
  if (r && !r.skipped) {
    selected = r.chosen;
    submitAnswer(); 
  }
}

function restartQuiz() {
  current  = 0;
  score    = 0;
  results  = new Array(QUESTIONS.length).fill(null);
  flagged  = new Array(QUESTIONS.length).fill(false);
  answered = false;
  selected = null;
  
  document.getElementById('resultsScreen').classList.remove('visible');
  document.getElementById('reviewSection').classList.add('hidden');
  document.getElementById('quizCard').classList.remove('hidden');
  document.getElementById('progressWrap').classList.remove('hidden');
  document.getElementById('submitBtn').onclick = submitAnswer;
  
  saveState();
  initSidebar();
  renderQuestion(0);
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Auth ──────────────────────────────────────────────────────────────────────
const provider = new firebase.auth.GoogleAuthProvider();

function signInWithGoogle() {
  document.getElementById('loginError').textContent = '';
  auth.signInWithPopup(provider).catch(err => {
    document.getElementById('loginError').textContent = 'Sign-in failed. Please try again.';
    console.error(err);
  });
}

function signOut() {
  auth.signOut();
}

async function startQuiz(user) {
  uid = user.uid;
  document.getElementById('loginScreen').classList.add('hidden');
  const restored = await loadState();
  await loadNotes();
  initSidebar();
  if (restored && results.some(r => r !== null)) {
    renderQuestion(current);
    const r = results[current];
    if (r && !r.skipped) {
      selected = r.chosen;
      submitAnswer();
    }
    updateProgress();
  } else {
    renderQuestion(0);
  }
}

// ── Boot ──────────────────────────────────────────────────────────────────────
initSidebar();

auth.onAuthStateChanged(user => {
  if (user) {
    startQuiz(user);
  } else {
    document.getElementById('loginScreen').classList.remove('hidden');
  }
});
</script>
