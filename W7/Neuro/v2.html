<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>W7 · Neuro · v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:           #f7f5f0;
  --surface:      #ffffff;
  --surface-2:    #f0ede6;
  --border:       #e2ddd5;
  --text:         #1a1714;
  --text-2:       #5a534a;
  --text-3:       #9a8f83;
  --accent:       #2563a8;
  --accent-light: #dbeafe;
  --correct:      #166534;
  --correct-bg:   #dcfce7;
  --correct-ring: #4ade80;
  --wrong:        #991b1b;
  --wrong-bg:     #fee2e2;
  --wrong-ring:   #f87171;
  --hint:         #92400e;
  --hint-bg:      #fef3c7;
  --radius:       10px;
  --radius-lg:    16px;
  --shadow:       0 1px 3px rgba(0,0,0,.07), 0 4px 16px rgba(0,0,0,.06);
  --shadow-lg:    0 4px 6px rgba(0,0,0,.07), 0 12px 32px rgba(0,0,0,.1);
  --font-serif:   'Crimson Pro', Georgia, serif;
  --font-sans:    'DM Sans', system-ui, sans-serif;
  --font-mono:    'DM Mono', monospace;
  --transition:   200ms cubic-bezier(.4,0,.2,1);
}

body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: row;
  align-items: flex-start;
  overflow: hidden;
}

/* ── Sidebar ── */
.sidebar {
  width: 320px;
  height: 100vh;
  overflow-y: auto;
  background: var(--surface);
  border-right: 1.5px solid var(--border);
  padding: 24px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
}
.home-btn {
  display: inline-flex;
  align-items: center;
  font-size: .8rem;
  font-weight: 500;
  color: var(--text-3);
  text-decoration: none;
  margin-bottom: 16px;
  transition: color var(--transition);
}
.home-btn:hover { color: var(--accent); }
.sidebar-header {
  font-family: var(--font-serif);
  font-size: 1.3rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.q-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(42px, 1fr));
  gap: 8px;
  margin-bottom: 24px;
}
.q-grid-item {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 6px;
  border: 1.5px solid var(--border);
  font-family: var(--font-mono);
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  position: relative;
  color: var(--text-2);
  background: var(--bg);
  transition: all 0.2s;
}
.q-grid-item:hover { border-color: var(--text-3); }
.q-grid-item.active { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); color: var(--accent); }
.q-grid-item.correct { background: var(--correct-bg); border-color: var(--correct-ring); color: var(--correct); }
.q-grid-item.wrong { background: var(--wrong-bg); border-color: var(--wrong-ring); color: var(--wrong); }
.q-grid-item.skipped { background: var(--surface-2); border-color: var(--text-3); color: var(--text-2); opacity: 0.8; }

.flag-icon {
  position: absolute;
  top: -6px;
  right: -6px;
  font-size: 12px;
  background: #fff;
  border-radius: 50%;
  box-shadow: 0 1px 2px rgba(0,0,0,0.2);
  display: none;
  width: 16px;
  height: 16px;
  align-items: center;
  justify-content: center;
}
.q-grid-item.flagged .flag-icon { display: flex; }

/* ── Main Content ── */
.main-content {
  flex: 1;
  height: 100vh;
  overflow-y: auto;
  padding: 24px 32px 80px;
}

/* ── Header ── */
.app-header {
  width: 100%;
  max-width: 780px;
  margin: 0 auto 32px auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 0 24px;
  border-bottom: 1.5px solid var(--border);
}
.app-title {
  font-family: var(--font-serif);
  font-size: 1.5rem;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -.01em;
}
.app-title span { color: var(--accent); }
.score-badge {
  font-family: var(--font-mono);
  font-size: .8rem;
  font-weight: 500;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 99px;
  padding: 6px 14px;
  color: var(--text-2);
  display: flex;
  gap: 6px;
  align-items: center;
}
.score-badge .score-num { color: var(--text); font-weight: 600; }

/* ── Progress bar ── */
.progress-wrap { 
  width: 100%; 
  max-width: 780px; 
  margin: 0 auto 28px auto; 
}
.progress-meta { display: flex; justify-content: space-between; font-size: .78rem; color: var(--text-3); margin-bottom: 7px; font-family: var(--font-mono); }
.progress-track { height: 5px; background: var(--border); border-radius: 99px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width 400ms cubic-bezier(.4,0,.2,1); }

/* ── Card ── */
.card {
  width: 100%;
  max-width: 1060px;
  margin: 0 auto;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow);
  overflow: hidden;
  animation: fadeUp .3s ease both;
  display: grid;
  grid-template-columns: minmax(0, 1fr) 260px;
  grid-template-rows: auto auto auto 1fr auto;
}
@keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

.card-header { grid-column: 1; padding: 20px 28px 0; display: flex; align-items: center; gap: 10px; }
.q-label { font-family: var(--font-mono); font-size: .7rem; font-weight: 500; color: var(--text-3); text-transform: uppercase; letter-spacing: .08em; }
.part-tag { font-family: var(--font-mono); font-size: .65rem; font-weight: 500; background: var(--surface-2); border: 1px solid var(--border); border-radius: 4px; padding: 2px 7px; color: var(--text-3); }

.stem { grid-column: 1; font-family: var(--font-serif); font-size: 1.25rem; line-height: 1.65; color: var(--text); padding: 16px 28px 24px; border-bottom: 1px solid var(--border); }

/* ── Hint ── */
.hint-wrap { grid-column: 1; padding: 0 28px; margin-top: 20px; }
.hint-toggle { display: inline-flex; align-items: center; gap: 7px; font-size: .8rem; font-weight: 500; color: var(--hint); cursor: pointer; background: none; border: 1.5px solid #d97706; border-radius: 99px; padding: 5px 14px; transition: background var(--transition); }
.hint-toggle:hover { background: var(--hint-bg); }
.hint-body { margin-top: 10px; padding: 12px 16px; background: var(--hint-bg); border-left: 3px solid #f59e0b; border-radius: 0 var(--radius) var(--radius) 0; font-size: .9rem; color: var(--hint); line-height: 1.55; display: none; }
.hint-body.open { display: block; animation: fadeIn .2s ease; }

/* ── Notes ── */
.note-wrap {
  grid-column: 2;
  grid-row: 1 / -1;
  border-left: 1.5px solid var(--border);
  padding: 20px 18px;
  display: flex;
  flex-direction: column;
  background: var(--surface-2);
}
.note-side-header {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: .72rem;
  font-weight: 600;
  color: var(--text-3);
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: .07em;
  margin-bottom: 10px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}
.note-toggle { display: none; }
.note-body { display: flex; flex-direction: column; flex: 1; margin-top: 0; }
.note-textarea { flex: 1; min-height: 140px; width: 100%; padding: 10px 12px; font-family: var(--font-sans); font-size: .85rem; color: var(--text); background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); resize: none; outline: none; transition: border-color var(--transition); line-height: 1.55; box-sizing: border-box; }
.note-textarea:focus { border-color: var(--accent); }
.note-save-status { font-size: .7rem; color: var(--text-3); margin-top: 5px; text-align: right; font-family: var(--font-mono); min-height: 1em; }
.note-icon { position: absolute; top: -5px; left: -5px; font-size: 9px; background: var(--accent-light); border: 1px solid var(--accent); border-radius: 50%; display: none; width: 14px; height: 14px; align-items: center; justify-content: center; }
.q-grid-item.has-note .note-icon { display: flex; }
.review-note { margin-top: 8px; padding: 8px 12px; background: var(--accent-light); border-radius: 6px; font-size: .82rem; color: var(--text-2); line-height: 1.45; border-left: 3px solid var(--accent); white-space: pre-wrap; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

/* ── Options ── */
.options { grid-column: 1; padding: 20px 28px 28px; display: flex; flex-direction: column; gap: 10px; }
.option { display: flex; align-items: flex-start; gap: 14px; padding: 14px 16px; border: 1.5px solid var(--border); border-radius: var(--radius); cursor: pointer; background: var(--surface); transition: border-color var(--transition), background var(--transition), box-shadow var(--transition); text-align: left; width: 100%; position: relative; }
.option:hover:not(.locked) { border-color: var(--accent); background: var(--accent-light); box-shadow: 0 0 0 3px rgba(37,99,168,.1); }
.option.selected:not(.locked) { border-color: var(--accent); background: var(--accent-light); box-shadow: 0 0 0 3px rgba(37,99,168,.15); }
.option.correct { border-color: var(--correct-ring); background: var(--correct-bg); box-shadow: 0 0 0 3px rgba(74,222,128,.2); }
.option.wrong { border-color: var(--wrong-ring); background: var(--wrong-bg); box-shadow: 0 0 0 3px rgba(248,113,113,.2); }
.option.dimmed { opacity: .5; }

.opt-letter { flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%; background: var(--surface-2); border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: .78rem; font-weight: 500; color: var(--text-2); transition: background var(--transition), border-color var(--transition), color var(--transition); }
.option.correct .opt-letter { background:#4ade80; border-color:#4ade80; color:#14532d; }
.option.wrong   .opt-letter { background:#f87171; border-color:#f87171; color:#7f1d1d; }
.option.selected:not(.locked) .opt-letter { background:var(--accent); border-color:var(--accent); color:#fff; }

.opt-body { flex: 1; }
.opt-text { font-size: .95rem; line-height: 1.5; color: var(--text); }
.opt-rationale { margin-top: 8px; font-size: .83rem; color: var(--text-2); line-height: 1.5; padding-top: 8px; border-top: 1px solid rgba(0,0,0,.06); display: none; }
.opt-rationale.visible { display: block; animation: fadeIn .25s ease; }

.opt-icon { flex-shrink: 0; font-size: 1.1rem; margin-top: 2px; display: none; }
.option.correct .opt-icon, .option.wrong .opt-icon { display:block; }

/* ── Actions ── */
.card-footer { grid-column: 1; padding: 0 28px 28px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.btn { font-family: var(--font-sans); font-size: .9rem; font-weight: 600; border-radius: 99px; padding: 11px 26px; cursor: pointer; border: 1.5px solid transparent; transition: all var(--transition); display: inline-flex; align-items: center; gap: 8px; justify-content: center; }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover { background: #1d4f8a; border-color: #1d4f8a; box-shadow: 0 4px 14px rgba(37,99,168,.3); }
.btn-primary:disabled { opacity:.4; cursor:not-allowed; box-shadow:none; }
.btn-ghost { background: transparent; color: var(--text-2); border-color: var(--border); }
.btn-ghost:hover { background: var(--surface-2); color: var(--text); }

.feedback-msg { font-size: .88rem; font-weight: 600; display: flex; align-items: center; gap: 6px; }
.feedback-msg.correct { color: var(--correct); }
.feedback-msg.wrong   { color: var(--wrong); }

/* ── Results screen ── */
.results-screen { 
  width: 100%; 
  max-width: 780px; 
  margin: 0 auto;
  display: none; 
  flex-direction: column; 
  gap: 24px; 
  animation: fadeUp .4s ease both; 
}
.results-screen.visible { display: flex; }
.results-hero { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); padding: 48px 40px; text-align: center; }
.results-grade { font-family: var(--font-serif); font-size: 5rem; font-weight: 600; line-height: 1; margin-bottom: 8px; background: linear-gradient(135deg, #1a1714 0%, #2563a8 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.results-label { font-size: 1.05rem; color: var(--text-2); margin-bottom: 32px; }
.results-stats { display: flex; justify-content: center; gap: 40px; flex-wrap: wrap; }
.stat { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.stat-num { font-family: var(--font-mono); font-size: 1.8rem; font-weight: 500; color: var(--text); }
.stat-num.green { color: var(--correct); }
.stat-num.red   { color: var(--wrong); }
.stat-label { font-size: .78rem; color: var(--text-3); text-transform: uppercase; letter-spacing: .06em; }
.results-actions { display: flex; justify-content: center; gap: 12px; margin-top: 32px; flex-wrap: wrap; }

/* Review list */
.filter-btn { padding: 5px 14px; font-size: 0.8rem; font-weight: 600; border-radius: 99px; cursor: pointer; border: 1.5px solid var(--border); background: transparent; color: var(--text-2); transition: all var(--transition); }
.filter-btn.active { background: var(--surface-2); color: var(--text); border-color: var(--text-3); }
.review-list { display: flex; flex-direction: column; gap: 12px; }
.review-item { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 16px 20px; cursor: pointer; display: flex; align-items: flex-start; gap: 14px; transition: box-shadow var(--transition); }
.review-item:hover { box-shadow: var(--shadow); }
.review-dot { flex-shrink: 0; width: 10px; height: 10px; border-radius: 50%; margin-top: 6px; }
.review-dot.correct { background: var(--correct-ring); }
.review-dot.wrong   { background: var(--wrong-ring); }
.review-text { flex: 1; font-size: .9rem; color: var(--text-2); line-height: 1.4; }
.review-answer { font-size: .8rem; font-weight: 600; font-family: var(--font-mono); color: var(--text-3); flex-shrink: 0; }
.status-Unanswered { color: var(--text-3); }
.status-Correct { color: var(--correct); }
.status-Wrong { color: var(--wrong); }

/* ── Utility ── */
.hidden { display: none !important; }

/* ── Responsive ── */
@media (max-width: 800px) {
  body { flex-direction: column; overflow-y: auto; }
  .sidebar { width: 100%; height: auto; max-height: 250px; border-right: none; border-bottom: 1.5px solid var(--border); padding: 16px; flex-shrink: 0; }
  .main-content { width: 100%; height: auto; overflow: visible; padding: 20px 16px 80px; }
  .card { display: flex; flex-direction: column; }
  .note-wrap { grid-column: unset; grid-row: unset; border-left: none; border-top: 1.5px solid var(--border); background: var(--surface-2); padding: 14px 20px; }
  .note-side-header { display: none; }
  .note-toggle { display: inline-flex; align-items: center; gap: 7px; font-size: .8rem; font-weight: 500; color: var(--text-2); cursor: pointer; background: none; border: 1.5px solid var(--border); border-radius: 99px; padding: 5px 14px; transition: all var(--transition); }
  .note-toggle:hover { background: var(--surface); }
  .note-toggle.has-note { color: var(--accent); border-color: var(--accent); background: var(--accent-light); }
  .note-body { display: none; flex: none; margin-top: 10px; }
  .note-body.open { display: flex; flex-direction: column; animation: fadeIn .2s ease; }
  .note-textarea { min-height: 90px; resize: vertical; flex: none; }
}
@media (max-width: 520px) {
  .stem { font-size: 1.1rem; padding: 14px 20px 20px; }
  .options { padding: 16px 20px 20px; }
  .card-footer { padding: 0 20px 20px; flex-wrap: wrap; }
  .card-header { padding: 16px 20px 0; }
  .hint-wrap { padding: 0 20px; }
  .note-wrap { padding: 12px 20px; }
  .results-grade { font-size: 3.5rem; }
  .results-stats { gap: 24px; }
}
/* ── Login screen ── */
#loginScreen {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  padding: 24px;
}
#loginScreen.hidden { display: none; }
.login-logo {
  font-family: var(--font-serif);
  font-size: 2.4rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 6px;
  text-align: center;
}
.login-logo span { color: var(--accent); }
.login-sub {
  font-size: .85rem;
  color: var(--text-3);
  margin-bottom: 48px;
  text-align: center;
}
.google-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 13px 28px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 99px;
  font-family: var(--font-sans);
  font-size: .9rem;
  font-weight: 600;
  color: var(--text);
  cursor: pointer;
  transition: border-color var(--transition), background var(--transition);
}
.google-btn:hover { border-color: var(--accent); background: var(--accent-light); }
.login-error {
  margin-top: 16px;
  font-size: .8rem;
  color: var(--wrong);
  min-height: 1em;
  text-align: center;
}
.made-by-login {
  position: fixed;
  bottom: 20px;
  font-size: .72rem;
  color: var(--text-3);
  font-family: var(--font-mono);
  text-align: center;
}
/* ── Persistent credit ── */
.made-by {
  font-size: .68rem;
  color: var(--text-3);
  font-family: var(--font-mono);
  text-align: center;
  padding-top: 12px;
  margin-top: 8px;
  border-top: 1px solid var(--border);
}

</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-logo">NB <span>Quiz</span></div>
  <div class="login-sub">Your personal medical study companion</div>
  <button class="google-btn" onclick="signInWithGoogle()">
    <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
    Continue with Google
  </button>
  <div class="login-error" id="loginError"></div>
  <div class="made-by-login">made by Zi Lin</div>
</div>

<aside class="sidebar">
  <a href="https://zxsye.github.io/nbquiz/" class="home-btn">← Home</a>
  <div class="sidebar-header">
    <span>Quiz Status</span>
    <span style="font-size:0.8rem; color:var(--text-3); font-family:var(--font-mono);" id="sidebarCount">0/50</span>
  </div>
  <div class="q-grid" id="qGrid"></div>
  
  <div style="margin-top:auto; display:flex; flex-direction:column; gap:10px;">
    <button class="btn btn-ghost" id="sidebarCopyBtn" style="width:100%; border: 1.5px solid var(--border); padding: 8px; font-size: 0.85rem;" onclick="copySidebarResults()">📋 Copy Status</button>
    <button class="btn btn-primary" style="width:100%; margin-top:0;" onclick="showResults()">Finish Quiz</button>
    <div class="made-by">made by Zi Lin</div>
  </div>
</aside>

<div class="main-content">
  <header class="app-header">
    <a href="../../../index.html" style="text-decoration:none;">
      <div class="app-title">NB <span>Quiz</span></div>
    </a>
    <div style="display:flex; align-items:center; gap:12px;">
      <div class="score-badge">
        Score&nbsp;<span class="score-num" id="scoreDisplay">0 / 0</span>
      </div>
      <button class="btn btn-ghost" onclick="signOut()" style="padding:6px 14px; font-size:0.8rem;" title="Sign out">Sign out</button>
    </div>
  </header>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-meta">
      <span id="progressLabel">Question 1 of 50</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>

  <div class="card" id="quizCard">
    <div class="card-header">

<script>
// ── Quiz data ─────────────────────────────────────────────────────────────────
const QUESTIONS = [{"stem": "A 45-year-old female presents to the Emergency Department with the sudden onset of a 'thunderclap' headache that reached peak intensity within 30 seconds. A non-contrast CT brain performed 4 hours after the onset of symptoms is negative for any intracranial hemorrhage. What is the most appropriate next step in her management?", "options": {"A": "Discharge with outpatient neurology follow-up", "B": "Perform a lumbar puncture immediately", "C": "Wait until 12 hours post-headache onset to perform a lumbar puncture", "D": "Perform a CT Angiogram (CTA) of the brain", "E": "Repeat the non-contrast CT brain in 24 hours"}, "correct": "C", "rationales": {"A": "Discharging the patient prematurely would be dangerous, as a CT scan is not 100% sensitive, especially if symptoms persist or the suspicion remains high.", "B": "Performing a lumbar puncture too early (before 6-12 hours) may result in a false negative for xanthochromia, as bilirubin takes time to form from broken-down red blood cells.", "C": "The 'Rule of Sixes' suggests waiting 6-12 hours for xanthochromia to develop, which is the gold standard for diagnosing SAH when CT is negative.", "D": "While a CTA can identify an aneurysm, it does not confirm if a hemorrhage has actually occurred; the diagnostic pathway for SAH requires CSF analysis if CT is negative.", "E": "Sensitivity of CT for SAH actually decreases over time as blood is cleared from the subarachnoid space, making a repeat CT less useful than a lumbar puncture."}, "hint": "Think about the biochemical timeline required for the breakdown of hemoglobin into bilirubin in the CSF.", "part": 1}, {"stem": "A 72-year-old male on warfarin for atrial fibrillation is brought in after a fall. He is confused but has no focal neurological deficits. His CT scan shows a crescent-shaped, hyperdense collection that crosses the coronal suture line. What is the most likely source of this bleeding?", "options": {"A": "Middle meningeal artery", "B": "Bridging cortical veins", "C": "Anterior communicating artery", "D": "Internal carotid artery", "E": "Basilar artery"}, "correct": "B", "rationales": {"A": "Rupture of the middle meningeal artery typically causes an extradural hematoma, which is biconvex and does not cross suture lines.", "B": "Subdural hemorrhages result from the tearing of bridging veins, often due to brain atrophy in the elderly or acceleration-deceleration forces.", "C": "Rupture of the anterior communicating artery typically results in a subarachnoid hemorrhage rather than a subdural collection.", "D": "Large arterial ruptures like the ICA are more likely to cause devastating intraparenchymal or subarachnoid bleeds rather than the classic crescentic SDH.", "E": "Basilar artery issues usually present with brainstem symptoms or subarachnoid hemorrhage, not a subdural hematoma."}, "hint": "This anatomical structure connects the surface of the brain to the dural sinuses and is prone to shearing.", "part": 1}, {"stem": "A patient with a traumatic brain injury has an intracranial pressure (ICP) of 25 mmHg and a mean arterial pressure (MAP) of 85 mmHg. What is the calculated Cerebral Perfusion Pressure (CPP)?", "options": {"A": "110 mmHg", "B": "3.4 mmHg", "C": "60 mmHg", "D": "70 mmHg", "E": "50 mmHg"}, "correct": "C", "rationales": {"A": "This value incorrectly adds ICP and MAP instead of subtracting the resistance from the driving pressure.", "B": "This result stems from dividing the MAP by ICP, which is not the physiological formula for perfusion pressure.", "C": "CPP is calculated as MAP - ICP; in this case, 85 - 25 = 60 mmHg.", "D": "This is often the target CPP in TBI management, but it is not the result of the values provided in this specific scenario.", "E": "This value would be below the recommended threshold for maintaining adequate brain perfusion in trauma patients."}, "hint": "The formula involves finding the difference between the systemic pressure and the resistance within the skull.", "part": 1}, {"stem": "A 25-year-old male is admitted with 30% Total Body Surface Area (TBSA) burns involving his legs and trunk. He weighs 70 kg. Using the Parkland Formula, how much fluid should he receive in the first 8 hours of his resuscitation?", "options": {"A": "8,400 mL", "B": "4,200 mL", "C": "2,100 mL", "D": "1,050 mL", "E": "16,800 mL"}, "correct": "B", "rationales": {"A": "This represents the total fluid volume calculated for the entire first 24 hours, not just the first 8-hour window.", "B": "The Parkland Formula is 4mL \\times kg \\times TBSA%; total 24h fluid is 4 \\times 70 \\times 30 = 8400mL, with half (4200mL) given in the first 8 hours.", "C": "This would be the amount given in a 4-hour window if the fluid were distributed evenly, which contradicts the standard resuscitation protocol.", "D": "This is a significant under-resuscitation and does not align with the weight-based needs of a major burn patient.", "E": "This would be double the calculated 24-hour total, putting the patient at severe risk for fluid overload and edema."}, "hint": "Calculate the 24-hour total first, then determine the requirement for the initial intensive period.", "part": 1}, {"stem": "A 30-year-old carpenter presents with a deep laceration to the palm of his hand. On examination, he is unable to flex the distal interphalangeal joint (DIPJ) of his index finger while the proximal joint is held in extension. Which structure is most likely damaged?", "options": {"A": "Flexor Digitorum Superficialis (FDS)", "B": "Flexor Digitorum Profundus (FDP)", "C": "Flexor Pollicis Longus", "D": "Median nerve", "E": "Lumbrical muscles"}, "correct": "B", "rationales": {"A": "FDS is responsible for flexing the proximal interphalangeal joint (PIPJ), not the distal joint.", "B": "The FDP is the only muscle responsible for flexion at the distal interphalangeal joint (DIPJ).", "C": "This muscle is responsible for thumb flexion and would not affect the index finger's distal joint.", "D": "While the median nerve innervates these muscles, a direct laceration causing isolated loss of DIPJ flexion suggests a tendon injury rather than a proximal nerve lesion.", "E": "Lumbricals assist in flexing the MCP joints and extending the IP joints, not in flexing the DIPJ."}, "hint": "Identify the specific tendon responsible for the final joint of the digit.", "part": 1}, {"stem": "A 55-year-old patient is found to have a dilated right pupil that is non-reactive to light, associated with ptosis and a 'down and out' eye position. An urgent MRA is performed. Which aneurysm location is most likely responsible for these findings?", "options": {"A": "Anterior Communicating Artery (ACom)", "B": "Posterior Communicating Artery (PCom)", "C": "Middle Cerebral Artery (MCA)", "D": "Basilar Artery Tip", "E": "Ophthalmic Artery"}, "correct": "B", "rationales": {"A": "ACom aneurysms are common but typically present with visual field defects or frontal lobe symptoms rather than a isolated CN III palsy.", "B": "PCom aneurysms can compress the adjacent Third Cranial Nerve (Oculomotor), classically causing a pupil-involving palsy.", "C": "MCA aneurysms often cause mass effect on the temporal lobe or hemiparesis but rarely compress the oculomotor nerve directly.", "D": "Basilar tip aneurysms can cause midbrain syndromes but are less classically associated with an isolated, pupil-involving third nerve palsy compared to PCom.", "E": "Ophthalmic artery aneurysms are more likely to compress the optic nerve (CN II), causing visual loss rather than extraocular movement deficits."}, "hint": "Consider the proximity of the Circle of Willis vessels to the Third Cranial Nerve.", "part": 1}, {"stem": "A 60-year-old smoker presents with a 2-month history of headaches that are worse in the morning and when bending over. He recently had a new-onset generalized tonic-clonic seizure. An MRI shows a 'ring-enhancing' lesion in the right frontal lobe with significant surrounding vasogenic edema. Which medication should be started immediately to address the edema?", "options": {"A": "Mannitol", "B": "Phenytoin", "C": "Dexamethasone", "D": "Temozolomide", "E": "Furosemide"}, "correct": "C", "rationales": {"A": "Mannitol is used for acute, life-threatening ICP elevation and cytotoxic edema (like in stroke), but it is not the standard maintenance treatment for tumor-related vasogenic edema.", "B": "While an anticonvulsant is needed for his seizure, it does not treat the underlying cerebral edema.", "C": "High-dose corticosteroids like dexamethasone are the gold standard for reducing vasogenic edema associated with brain tumors by stabilizing the blood-brain barrier.", "D": "Temozolomide is a chemotherapy agent used for GBM, but it is not an acute treatment for edema.", "E": "Loop diuretics have a negligible effect on brain edema compared to their systemic effects."}, "hint": "This class of drug is used to stabilize 'leaky' capillaries in the setting of malignancy.", "part": 1}, {"stem": "A 40-year-old man presents with severe lower back pain radiating down his left leg to the foot. He reports difficulty starting urination and 'numbness' when wiping after a bowel movement. What is the most urgent next step?", "options": {"A": "Prescribe high-dose NSAIDs and bed rest", "B": "Refer for urgent outpatient physiotherapy", "C": "Perform an urgent MRI of the lumbar spine", "D": "Arrange for an elective CT myelogram", "E": "Administer an epidural steroid injection"}, "correct": "C", "rationales": {"A": "This approach ignores red flag symptoms of cauda equina syndrome, which require immediate surgical evaluation.", "B": "Physiotherapy is appropriate for simple radiculopathy, but saddle anesthesia indicates an emergency situation.", "C": "The patient has 'red flags' for Cauda Equina Syndrome (urinary retention and saddle anesthesia), which is a surgical emergency requiring immediate imaging and decompression.", "D": "Elective procedures are inappropriate for a patient with progressive neurological deficits and sphincter dysfunction.", "E": "Injections are used for pain management in chronic stable cases, but they do not resolve the mechanical compression in Cauda Equina Syndrome."}, "hint": "Identify the symptoms that suggest an immediate threat to the nerves governing the pelvic floor.", "part": 1}, {"stem": "Following a motor vehicle accident, a 30-year-old male is brought to the trauma bay with respiratory distress. Examination reveals absent breath sounds and hyper-resonance on the right side, with a blood pressure of 85/50 mmHg and distended neck veins. What is the immediate priority?", "options": {"A": "Obtain an erect chest X-ray", "B": "Insert a large-bore intercostal chest drain in the triangle of safety", "C": "Perform immediate needle decompression", "D": "Perform an emergency thoracotomy", "E": "Perform an eFAST scan to check for pericardial fluid"}, "correct": "C", "rationales": {"A": "Waiting for an X-ray in the setting of clinical tension pneumothorax and hypotension can lead to cardiac arrest.", "B": "While a chest drain is the definitive treatment, needle decompression is a faster temporary measure to restore hemodynamics in an unstable patient.", "C": "Tension pneumothorax is a clinical diagnosis; immediate decompression is required to relieve the pressure and restore venous return to the heart.", "D": "Thoracotomy is indicated for massive hemothorax or cardiac arrest, but not as the first step for a tension pneumothorax.", "E": "While FAST is part of the trauma protocol, the clinical signs (absent breath sounds) strongly point to a tension pneumothorax over cardiac tamponade."}, "hint": "In an unstable patient with absent breath sounds and hypotension, you must act before confirming with imaging.", "part": 1}, {"stem": "A 20-year-old football player is struck in the abdomen. He is hemodynamically stable but complains of left-sided abdominal pain and left shoulder tip pain. A FAST scan shows free fluid in the splenorenal recess. What is the name of the sign describing his shoulder pain?", "options": {"A": "Battle's sign", "B": "Cullen's sign", "C": "Kehr's sign", "D": "Kernig's sign", "E": "Grey Turner's sign"}, "correct": "C", "rationales": {"A": "Battle's sign refers to bruising over the mastoid process, indicating a base of skull fracture.", "B": "Cullen's sign is periumbilical bruising seen in retroperitoneal hemorrhage or pancreatitis.", "C": "Kehr's sign is referred pain to the left shoulder due to irritation of the diaphragm by blood, classically from a splenic rupture.", "D": "Kernig's sign is used to assess for meningeal irritation, not abdominal trauma.", "E": "Grey Turner's sign refers to bruising in the flanks, usually associated with severe pancreatitis."}, "hint": "This eponym describes referred pain caused by the phrenic nerve.", "part": 1}, {"stem": "Which of the following is strictly contraindicated in a patient with a suspected brain abscess and clinical signs of papilledema?", "options": {"A": "Non-contrast CT Brain", "B": "Intravenous antibiotics", "C": "Lumbar Puncture", "D": "MRI with Gadolinium", "E": "Stereotactic biopsy"}, "correct": "C", "rationales": {"A": "CT is a safe and necessary first-line imaging modality to identify the lesion.", "B": "Antibiotics are a cornerstone of management for a brain abscess once the diagnosis is suspected.", "C": "Performing an LP in the presence of a mass lesion and raised ICP can cause a pressure gradient that leads to fatal brain herniation.", "D": "MRI is the gold standard for characterizing the abscess and planning surgical intervention.", "E": "Biopsy or aspiration is often required to identify the causative organism and decompress the abscess."}, "hint": "This procedure involves removing fluid from the spinal canal, which can be dangerous when intracranial pressure is high.", "part": 1}, {"stem": "A 19-year-old male is involved in a high-speed collision. He initially loses consciousness but is awake and talking on arrival at the hospital (GCS 15). One hour later, his GCS drops to 8, and his right pupil becomes fixed and dilated. What is the most likely diagnosis?", "options": {"A": "Acute Subdural Haemorrhage", "B": "Extradural Haemorrhage", "C": "Diffuse Axonal Injury", "D": "Subarachnoid Haemorrhage", "E": "Concussion"}, "correct": "B", "rationales": {"A": "While SDH causes deterioration, the 'lucid interval' followed by rapid decline and a pupil-involving palsy is the hallmark of an EDH.", "B": "The classic 'lucid interval' occurs as a high-pressure arterial bleed (EDH) expands, eventually causing uncal herniation and CN III compression.", "C": "DAI typically presents with immediate and persistent coma rather than a lucid interval.", "D": "SAH presents with a sudden thunderclap headache rather than the traumatic lucid interval sequence.", "E": "Concussion involves a temporary loss of function without the severe, rapid deterioration and focal signs seen in this scenario."}, "hint": "Focus on the 'lucid interval' and the rapid progression of mass effect.", "part": 1}, {"stem": "During the management of a severe traumatic brain injury, the patient develops a heart rate of 45 bpm, a blood pressure of 180/100 mmHg, and an irregular breathing pattern. What does this 'triad' indicate?", "options": {"A": "Neurogenic shock", "B": "Hypovolaemic shock", "C": "Cushing's Triad", "D": "Beck's Triad", "E": "Serotonin Syndrome"}, "correct": "C", "rationales": {"A": "Neurogenic shock involves hypotension and bradycardia, not the hypertension seen in this triad.", "B": "Hypovolaemic shock involves tachycardia and hypotension, which is the opposite of these findings.", "C": "Cushing's triad (hypertension, bradycardia, and irregular respirations) is a late sign of dangerously raised intracranial pressure.", "D": "Beck's triad (muffled heart sounds, low BP, high JVP) is associated with cardiac tamponade.", "E": "Serotonin syndrome involves autonomic instability but is unrelated to intracranial pressure or trauma."}, "hint": "This is a late physiological response to brainstem compression and terminal ICP rise.", "part": 1}, {"stem": "A patient is brought in with a GCS of 6 after falling from a height. According to the ATLS guidelines, what is the most important first step in his management?", "options": {"A": "Perform a head CT", "B": "Endotracheal intubation", "C": "Administer IV Mannitol", "D": "Check a blood glucose level", "E": "Apply a cervical collar"}, "correct": "B", "rationales": {"A": "Imaging should only occur after the patient is stabilized and the airway is secured.", "B": "The rule 'GCS 8, intubate' highlights that patients with a GCS of 8 or less cannot protect their airway and require definitive management.", "C": "Mannitol may be used later to manage ICP, but securing the airway (ABC) is always the first priority.", "D": "While important, metabolic checks follow the primary survey and airway stabilization.", "E": "Spine protection is part of 'A' (Airway), but providing a patent and secure airway is the critical action for a comatose patient."}, "hint": "Remember the pneumonic for the primary survey and the threshold for airway protection.", "part": 1}, {"stem": "A 35-year-old male is rescued from a house fire. He has singed nasal hairs and soot in his sputum. Despite an SpO2 of 100% on high-flow oxygen, he appears confused. What is the most likely cause of his confusion?", "options": {"A": "Hypovolaemic shock", "B": "Sepsis", "C": "Carbon Monoxide (CO) poisoning", "D": "Cerebral edema from heat", "E": "Pain"}, "correct": "C", "rationales": {"A": "Confusion can occur in shock, but the soot and high oxygen saturation despite confusion strongly suggest carbon monoxide poisoning.", "B": "Sepsis from burns typically takes 24 hours or more to develop and would not be the cause of acute confusion at the scene.", "C": "CO binds to hemoglobin with higher affinity than oxygen; standard pulse oximetry cannot distinguish between oxyhemoglobin and carboxyhemoglobin, giving a false 100% reading.", "D": "Heat stroke can cause confusion, but in a fire victim, CO and cyanide toxicity are far more common causes of neurological symptoms.", "E": "Severe pain causes agitation, but persistent confusion in the context of smoke inhalation is a medical emergency suggesting toxicity or hypoxia."}, "hint": "Pulse oximeters often provide a 'perfect' reading even when the blood is saturated with a toxic gas from fires.", "part": 1}, {"stem": "A patient presents with a laceration on the knuckle (MCP joint) after an altercation. What is the most critical management step for this specific injury type?", "options": {"A": "Simple primary closure with sutures in the ED", "B": "Apply a steristrip and discharge with simple analgesia", "C": "Surgical washout and IV antibiotics", "D": "Tetanus vaccine only", "E": "X-ray followed by outpatient hand clinic referral"}, "correct": "C", "rationales": {"A": "Primary closure of a 'fight bite' is contraindicated due to the high risk of trapping aggressive oral bacteria in the joint space.", "B": "This fails to address the high infection risk associated with human bites over a joint.", "C": "A 'fight bite' (laceration over the MCPJ) is contaminated with human oral flora and requires aggressive irrigation and antibiotic coverage.", "D": "Tetanus is necessary, but it does not prevent the acute cellulitis or tenosynovitis caused by oral bacteria.", "E": "Delaying treatment of a potential joint-penetrating bite can lead to permanent loss of hand function."}, "hint": "Consider the high risk of polymicrobial infection when a joint space is potentially involved.", "part": 1}, {"stem": "Which of the following describes the 'Zone of Stasis' in Jackson's Burn Zones model?", "options": {"A": "The central area of irreversible tissue loss", "B": "The outer area characterized by vasodilation", "C": "The area of impaired perfusion that is potentially salvageable", "D": "The area where nerves are completely destroyed", "E": "The area that will always require a skin graft"}, "correct": "C", "rationales": {"A": "This describes the Zone of Coagulation, where cells are already dead.", "B": "This describes the Zone of Hyperemia, which typically recovers without intervention.", "C": "The Zone of Stasis is the surrounding area of compromised blood flow that may recover with proper resuscitation or progress to necrosis.", "D": "Nerve destruction refers to the depth of the burn (full-thickness) rather than the concentric zones of a single burn wound.", "E": "The requirement for a graft depends on the depth and healing capacity of the stasis and coagulation zones, but the definition of the zone itself is about salvageability."}, "hint": "Focus on the zone that is most affected by the quality of medical resuscitation.", "part": 1}, {"stem": "A 65-year-old male presents with urinary incontinence, gait disturbance, and cognitive decline. A CT scan shows dilated ventricles without a corresponding increase in CSF pressure on lumbar puncture. What is the most likely diagnosis?", "options": {"A": "Obstructive Hydrocephalus", "B": "Alzheimer's Disease", "C": "Normal Pressure Hydrocephalus (NPH)", "D": "Pseudotumor Cerebri", "E": "Glioblastoma Multiforme"}, "correct": "C", "rationales": {"A": "Obstructive hydrocephalus would typically show a clear point of blockage and elevated pressure on an LP.", "B": "While cognitive decline occurs, the triad of symptoms ('wet, wobbly, and wacky') is classic for NPH.", "C": "NPH presents with the triad of dementia, ataxia, and urinary incontinence, and is characterized by ventricular enlargement with normal opening pressures.", "D": "Also known as IIH, this typically involves high opening pressure and occurs in younger, often overweight females.", "E": "GBM would show a mass lesion on CT rather than isolated ventricular enlargement."}, "hint": "The mnemonic for this condition is 'Wet, Wobbly, and Wacky'.", "part": 1}, {"stem": "A patient with a suspected splenic laceration is hemodynamically unstable (BP   70/40 mmHg) despite 2L of crystalloid resuscitation. The FAST scan is positive. What is the next best step?", "options": {"A": "CT Abdomen and Pelvis with contrast", "B": "Laparotomy", "C": "Angio-embolization", "D": "Serial FAST scans every 30 minutes", "E": "Observation in the ICU"}, "correct": "B", "rationales": {"A": "An unstable patient should never be sent to the CT scanner; they belong in the operating theater.", "B": "In the setting of hemodynamic instability and a positive FAST scan, the patient requires immediate surgical control of bleeding.", "C": "Angiography is reserved for stable patients with 'active blush' on CT, not for patients in decompensated shock.", "D": "Waiting and repeating tests is inappropriate when the patient is actively bleeding out and has already failed fluid resuscitation.", "E": "Non-operative management is only for stable patients; this patient's vitals indicate an ongoing surgical emergency."}, "hint": "Stability determines the diagnostic pathway: stability allows for imaging, while instability requires immediate surgery.", "part": 1}, {"stem": "A 'Dural Tail' sign on a contrast-enhanced MRI is most characteristic of which intracranial tumor?", "options": {"A": "Glioblastoma Multiforme (GBM)", "B": "Meningioma", "C": "Acoustic Neuroma", "D": "Brain Metastasis", "E": "Pituitary Adenoma"}, "correct": "B", "rationales": {"A": "GBM is an intra-axial tumor and does not typically show a dural tail, appearing instead as a ring-enhancing lesion with central necrosis.", "B": "A dural tail represents thickening and enhancement of the dura adjacent to a tumor, which is a classic feature of meningiomas.", "C": "Acoustic neuromas occur in the cerebellopontine angle and involve the 8th cranial nerve, without the classic dural tail of meningiomas.", "D": "Metastases are usually well-circumscribed and at the grey-white matter junction, not primarily dural-based.", "E": "Pituitary adenomas are located in the sella turcica and do not exhibit dural tailing."}, "hint": "This tumor arises from the arachnoid cap cells and is usually benign.", "part": 1}, {"stem": "A patient with a traumatic hemothorax has a chest drain inserted. An initial 1,600 mL of blood is drained immediately. What is the definitive management step?", "options": {"A": "Clamp the chest drain to prevent further loss", "B": "Immediate Thoracotomy", "C": "Repeat a chest X-ray in 4 hours", "D": "Administer Tranexamic Acid and observe", "E": "Replace the volume with 3L of saline"}, "correct": "B", "rationales": {"A": "Clamping a drain in the presence of an active bleed can lead to a tension hemothorax or lung compression.", "B": "According to trauma protocols, drainage of >1500mL of blood initially (or >200mL/hr for 2-4 hours) is an indication for emergency surgery.", "C": "Imaging is redundant when the massive volume of drained blood already confirms a life-threatening high-pressure hemorrhage.", "D": "TXA is a helpful adjunct but cannot stop a massive arterial bleed that meets surgical criteria.", "E": "Fluid replacement is necessary but does not solve the underlying surgical problem of a major vascular injury."}, "hint": "Specific volume thresholds in trauma dictate the transition from bedside drainage to the operating room.", "part": 1}, {"stem": "Which complication is a patient at highest risk for during the window of 3 to 14 days following a subarachnoid hemorrhage?", "options": {"A": "Re-bleeding", "B": "Delayed Cerebral Ischaemia (Vasospasm)", "C": "Acute obstructive hydrocephalus", "D": "Brainstem herniation", "E": "Terson Syndrome"}, "correct": "B", "rationales": {"A": "The highest risk of re-bleeding occurs within the first 24 hours, not during the 3-14 day window.", "B": "Vasospasm typically peaks between 3-14 days post-SAH as blood breakdown products irritate the arterial walls.", "C": "Acute hydrocephalus occurs almost immediately as blood clots block the drainage of CSF.", "D": "Herniation is an acute complication related to the initial surge in ICP or a massive re-bleed.", "E": "Terson syndrome (intraocular hemorrhage) occurs at the time of the initial bleed due to the sudden rise in ICP."}, "hint": "This delayed complication is treated with the calcium channel blocker nimodipine.", "part": 1}, {"stem": "A 50-year-old female presents with a new-onset headache and a 'down and out' eye with a dilated, non-reactive pupil. She has a history of ADPKD. What is the most likely underlying cause?", "options": {"A": "Ischemic stroke", "B": "Diabetic neuropathy", "C": "Berry aneurysm", "D": "Migraine", "E": "Meningitis"}, "correct": "C", "rationales": {"A": "Ischemic strokes typically present with hemiparesis or aphasia rather than an isolated, pupil-involving third nerve palsy.", "B": "Diabetic third nerve palsy classically spares the pupil because the parasympathetic fibers are on the periphery and less affected by microvascular ischemia.", "C": "Patients with ADPKD are at increased risk for berry aneurysms, which can cause mass effect on CN III at the PCom junction.", "D": "While migraines cause headaches, they do not cause a fixed dilated pupil and down-and-out eye position.", "E": "Meningitis causes neck stiffness and fever, not isolated focal cranial nerve compression."}, "hint": "Consider the common vascular associations with Autosomal Dominant Polycystic Kidney Disease.", "part": 1}, {"stem": "A patient with a severe head injury and an initial GCS of 4 has a blood pressure of 88/40 mmHg. Why is this hypotension particularly dangerous in the context of traumatic brain injury?", "options": {"A": "It indicates a concurrent spinal cord injury", "B": "It increases the risk of intracranial hypertension", "C": "It significantly increases mortality by causing secondary brain injury", "D": "It interferes with the accuracy of the GCS assessment", "E": "It makes surgical intervention impossible"}, "correct": "C", "rationales": {"A": "While it can occur in neurogenic shock, hypotension is primarily dangerous because it exacerbates secondary brain injury by reducing perfusion.", "B": "Hypotension actually reduces intracranial pressure slightly but is detrimental because it starves the brain of oxygen and nutrients.", "C": "A single episode of SBP < 90 mmHg in a TBI patient is proven to double the mortality rate due to decreased cerebral perfusion.", "D": "Hypotension can alter GCS, but the primary clinical concern is the irreversible damage caused by ischemia.", "E": "Surgical intervention is possible, but the prognosis is much worse if the patient has suffered prolonged hypotension."}, "hint": "Focus on the effect of systemic pressure on the delivery of blood to a damaged brain.", "part": 1}, {"stem": "In the context of the Monro-Kellie doctrine, which of the following is the first component to be displaced to compensate for an expanding intracranial mass?", "options": {"A": "Arterial blood", "B": "Brain tissue", "C": "Cerebrospinal Fluid (CSF)", "D": "Intracellular fluid", "E": "Venous blood and CSF"}, "correct": "C", "rationales": {"A": "Arterial blood is under high pressure and is not easily displaced; reducing it would cause immediate ischemia.", "B": "Brain tissue is non-compressible; its displacement leads to herniation, which is a late and pathological event.", "C": "CSF is the primary buffering component; it is easily displaced into the spinal subarachnoid space when intracranial pressure rises.", "D": "Intracellular fluid remains constant; movement of water across cells is part of edema pathology, not early compensation.", "E": "While both can be displaced, the combined answer is less specific than identifying CSF as the primary, most mobile reservoir."}, "hint": "Think of the most mobile fluid within the cranial and spinal cavities.", "part": 1}, {"stem": "A patient with a suspected base of skull fracture presents with Battle's sign and Raccoon eyes. Which of the following procedures is strictly contraindicated?", "options": {"A": "Oral endotracheal intubation", "B": "Nasogastric tube (NGT) insertion", "C": "Lumbar puncture", "D": "Application of a cervical collar", "E": "Venous cannulation"}, "correct": "B", "rationales": {"A": "Oral intubation is safe and often necessary to protect the airway.", "B": "In base of skull fractures, NGT insertion carries the risk of accidental intracranial placement through the fractured cribriform plate.", "C": "While generally avoided in trauma, an NGT insertion is the classic 'mechanical' contraindication for a base of skull fracture.", "D": "A collar is mandatory until the C-spine is cleared, regardless of the skull fracture.", "E": "Obtaining IV access is a standard part of the primary survey."}, "hint": "Consider the risk of a tube entering the cranium through a fractured bony floor.", "part": 1}, {"stem": "A 10-year-old child presents with a 'scald' burn to the chest after spilling hot tea. The area is pale pink, very painful, and covered in blisters with brisk capillary refill. How would you classify the depth of this burn?", "options": {"A": "Superficial (1st degree)", "B": "Superficial Partial-Thickness (2nd degree)", "C": "Deep Partial-Thickness (2nd degree)", "D": "Full-Thickness (3rd degree)", "E": "Fourth-degree burn"}, "correct": "B", "rationales": {"A": "Superficial burns (like sunburn) are red but do not have blisters.", "B": "Blistering, brisk capillary refill, and severe pain are the hallmarks of a superficial partial-thickness burn.", "C": "Deep partial-thickness burns typically have slow capillary refill and may appear fixed red or white.", "D": "Full-thickness burns are typically painless (as nerves are destroyed) and lack capillary refill.", "E": "Fourth-degree burns extend into muscle or bone and would not present with blisters and brisk refill."}, "hint": "The presence of blisters and preserved sensation with fast refill points to a specific layer of the dermis.", "part": 1}, {"stem": "What is the primary purpose of administering Nimodipine for 21 days following an aneurysmal subarachnoid hemorrhage?", "options": {"A": "To dissolve the blood clot in the subarachnoid space", "B": "To prevent delayed cerebral ischaemia due to vasospasm", "C": "To lower the systemic blood pressure to prevent re-bleeding", "D": "To treat associated hyponatremia", "E": "To reduce the risk of post-traumatic epilepsy"}, "correct": "B", "rationales": {"A": "Nimodipine is a calcium channel blocker, not a thrombolytic agent.", "B": "Nimodipine is clinically proven to improve neurological outcomes by reducing the incidence of vasospasm after SAH.", "C": "While it can slightly lower BP, its primary purpose in SAH is neuroprotection against vasospasm, not antihypertensive therapy.", "D": "Hyponatremia is managed with fluid balance (maintaining euvolemia), not calcium channel blockers.", "E": "Anticonvulsants are used for seizure prophylaxis, not Nimodipine."}, "hint": "Think about the delayed arterial reaction to blood products in the subarachnoid space.", "part": 1}, {"stem": "A patient with a suspected splenic injury has a FAST scan. Which area is specifically being evaluated when the probe is placed in the Left Upper Quadrant (LUQ)?", "options": {"A": "Morrison's Pouch", "B": "Splenorenal Recess", "C": "Pouch of Douglas", "D": "Pericardial space", "E": "Paracolic gutter"}, "correct": "B", "rationales": {"A": "Morrison's Pouch is the hepatorenal recess located in the Right Upper Quadrant (RUQ).", "B": "The splenorenal recess is the potential space between the spleen and the left kidney where free fluid can accumulate.", "C": "The Pouch of Douglas is located in the pelvis, not the LUQ.", "D": "The pericardial space is assessed via a subxiphoid or parasternal view, not the LUQ.", "E": "While fluid can travel to the gutters, the primary LUQ view in FAST specifically looks at the spleen-kidney interface."}, "hint": "Identify the potential space where fluid collects between the organ and the kidney on the left.", "part": 1}, {"stem": "A 28-year-old male presents with a 'dropped' distal phalanx of his middle finger after a sporting injury. He is unable to actively extend the DIPJ. What is the most likely injury?", "options": {"A": "Flexor Digitorum Profundus rupture", "B": "Mallet Finger", "C": "Jersey Finger", "D": "Boutonniere deformity", "E": "Trigger Finger"}, "correct": "B", "rationales": {"A": "This would result in an inability to flex the joint, not extend it.", "B": "Mallet finger is caused by the disruption of the extensor tendon at the base of the distal phalanx.", "C": "Jersey finger is a rupture of the FDP tendon, preventing flexion.", "D": "A Boutonniere deformity involves the central slip of the extensor tendon, causing PIPJ flexion and DIPJ hyperextension.", "E": "Trigger finger is a stenosing tenosynovitis causing 'catching' or 'locking' of the finger, not a loss of extension."}, "hint": "This injury is the extensor equivalent of a distal tendon rupture.", "part": 1}, {"stem": "Which of the following intracranial tumors is most likely to show 'pseudopalisading necrosis' and microvascular proliferation on a histological slide?", "options": {"A": "Low-grade astrocytoma", "B": "Meningioma", "C": "Glioblastoma Multiforme (GBM)", "D": "Oligodendroglioma", "E": "Ependymoma"}, "correct": "C", "rationales": {"A": "Low-grade astrocytomas lack the malignant features of necrosis and vascular proliferation.", "B": "Meningiomas classically show whorls and psammoma bodies, not necrotic palisading.", "C": "GBM is characterized by its high-grade malignant features, including pseudopalisading necrosis and glomeruloid vascular proliferation.", "D": "Oligodendrogliomas are known for a 'fried-egg' cellular appearance and 'chicken-wire' vasculature.", "E": "Ependymomas show perivascular pseudorosettes, which are distinct from pseudopalisading necrosis."}, "hint": "Identify the hallmark pathological features of the most common WHO Grade IV primary brain tumor.", "part": 1}, {"stem": "A 50-year-old man with back pain reports that his leg pain improves significantly when he leans forward over a shopping cart while walking. What is the most likely diagnosis?", "options": {"A": "Acute disc herniation", "B": "Spondylolisthesis", "C": "Spinal Stenosis", "D": "Ankylosing spondylitis", "E": "Trochanteric bursitis"}, "correct": "C", "rationales": {"A": "Disc herniations usually worsen with flexion (leaning forward) as it increases pressure on the disc.", "B": "While it causes back pain, the 'shopping cart sign' is specifically pathognomonic for stenosis.", "C": "Neurogenic claudication caused by spinal stenosis is relieved by leaning forward, as this posture opens the spinal canal.", "D": "AS presents with morning stiffness that improves with exercise, not mechanical relief by flexion.", "E": "Bursitis causes lateral hip pain rather than the claudicant leg symptoms described."}, "hint": "Consider the mechanical changes in the spinal canal volume during flexion versus extension.", "part": 1}, {"stem": "In a patient with suspected raised ICP, which cranial nerve palsy is considered a 'false localizing sign'?", "options": {"A": "CN II (Optic Nerve)", "B": "CN III (Oculomotor Nerve)", "C": "CN VI (Abducens Nerve)", "D": "CN VII (Facial Nerve)", "E": "CN VIII (Vestibulocochlear Nerve)"}, "correct": "C", "rationales": {"A": "Optic nerve involvement causes papilledema or vision loss, which is a direct reflection of ICP, not a 'false localizer'.", "B": "CN III palsy in the setting of high ICP often correctly localizes to uncal herniation.", "C": "The abducens nerve has a long, vulnerable intracranial course; its palsy can be caused by generalized high ICP and does not necessarily localize the lesion.", "D": "CN VII palsies usually indicate a lesion in the pons or the cerebellopontine angle, not generalized ICP.", "E": "This nerve is typically affected by local lesions (like acoustic neuromas) rather than generalized pressure changes."}, "hint": "This nerve is easily stretched or compressed against the petrous ligament due to its long path.", "part": 1}, {"stem": "What is the standard recommended head elevation angle for patients with raised intracranial pressure to optimize venous drainage?", "options": {"A": "0^{\\circ} (Flat)", "B": "15^{\\circ}", "C": "30^{\\circ}", "D": "45^{\\circ}", "E": "90^{\\circ} (Sitting upright)"}, "correct": "C", "rationales": {"A": "Lying flat can increase ICP by impeding venous return from the brain.", "B": "While better than flat, 15^{\\circ} is less effective than the standard recommended angle for ICP management.", "C": "Elevating the head to 30^{\\circ} is the gold standard for reducing ICP by facilitating venous outflow through the jugular veins.", "D": "Elevating the head too high can potentially reduce MAP and CPP, making 30^{\\circ} the ideal balance.", "E": "This is impractical in the ICU setting for trauma patients and does not provide superior benefit over the 30^{\\circ} incline."}, "hint": "This specific angle is part of the standard 'neuro-protective' nursing bundle.", "part": 1}, {"stem": "A 40-year-old male is brought to the ED after a bar fight. He has a 'fusiform' swelling of his index finger, which is held in a slightly flexed position. There is severe pain on passive extension. Which condition does this constellation of signs suggest?", "options": {"A": "Gouty arthritis", "B": "Flexor Tenosynovitis", "C": "Dupuytren's Contracture", "D": "Colles Fracture", "E": "Paronychia"}, "correct": "B", "rationales": {"A": "Gout usually affects the MCP joint or the base of the thumb and would not typically show Kanavel's signs along the tendon sheath.", "B": "These are the classic Kanavel's signs of flexor tenosynovitis, a surgical emergency.", "C": "Dupuytren's is a chronic, painless thickening of the palmar fascia, not an acute painful infection.", "D": "A Colles fracture involves the distal radius and would not present with isolated finger sheath symptoms.", "E": "Paronychia is a localized infection around the nail fold, not the entire flexor sheath."}, "hint": "Recall the four Kanavel's signs that indicate an infection within the finger's synovial sheath.", "part": 1}, {"stem": "A patient suffers a traumatic brain injury and has a CT scan that appears relatively normal, but he remains in a deep coma (GCS  4). What is the most likely diagnosis?", "options": {"A": "Epidural hematoma", "B": "Subdural hematoma", "C": "Diffuse Axonal Injury (DAI)", "D": "Acute Hydrocephalus", "E": "Cerebral Contusion"}, "correct": "C", "rationales": {"A": "An epidural hematoma would be clearly visible on CT as a biconvex, hyperdense mass.", "B": "A subdural hematoma would appear as a crescentic hyperdensity on CT.", "C": "DAI is characterized by a mismatch between the patient's poor clinical state (coma) and a normal-looking CT scan.", "D": "Hydrocephalus would show ventricular enlargement, which is easily detectable on CT.", "E": "Contusions appear as hyperdense 'salt and pepper' areas of hemorrhage and edema on a CT scan."}, "hint": "This injury involves microscopic shearing of white matter tracts that is often invisible on standard CT.", "part": 1}, {"stem": "In a patient with a circumferential full-thickness burn to the chest that is impeding ventilation, what is the most appropriate surgical intervention?", "options": {"A": "Skin grafting", "B": "Debridement", "C": "Escharotomy", "D": "Fasciotomy", "E": "Tracheostomy"}, "correct": "C", "rationales": {"A": "Grafting is a reconstructive step performed later, not an acute emergency measure for breathing.", "B": "Debridement removes dead tissue but does not immediately release the constrictive 'tourniquet' effect of a leathery eschar.", "C": "An escharotomy involves cutting through the burnt, non-elastic tissue (eschar) to release pressure and allow for adequate chest expansion or distal perfusion.", "D": "Fasciotomy involves cutting through muscle fascia for compartment syndrome; escharotomy is the procedure for burn-related constriction.", "E": "A tracheostomy may bypass a secondary airway obstruction, but it will not fix the primary problem of a constricted chest wall."}, "hint": "This procedure involves making incisions through the leathery, burnt skin to restore mechanical function.", "part": 1}, {"stem": "Which of the following is the single most common site for the formation of saccular (berry) aneurysms?", "options": {"A": "Posterior Communicating Artery (PCom)", "B": "Anterior Communicating Artery (ACom)", "C": "Internal Carotid Artery (ICA)", "D": "Middle Cerebral Artery (MCA) bifurcation", "E": "Basilar Artery Tip"}, "correct": "B", "rationales": {"A": "PCom is a common site (%) but is not the most common.", "B": "The ACom is the most frequent location for berry aneurysms, accounting for approximately 30--35% of cases.", "C": "While common, aneurysms here are less frequent than those at the ACom junction.", "D": "The MCA bifurcation is the third most common site.", "E": "Posterior circulation aneurysms are less common overall than anterior circulation aneurysms."}, "hint": "Look for the vessel that connects the two anterior cerebral arteries.", "part": 1}, {"stem": "A patient with multiple metastases to the brain is found to have a primary tumor in the lung. What is the most common cause of death in patients with extensive brain metastases?", "options": {"A": "Status epilepticus", "B": "Brain herniation from mass effect", "C": "Pulmonary embolism", "D": "Chemotherapy toxicity", "E": "Respiratory failure from the primary lung cancer"}, "correct": "B", "rationales": {"A": "Seizures are common but are usually manageable with medications and rarely the primary cause of death.", "B": "Uncontrolled increase in ICP and subsequent herniation is the terminal event for many patients with progressive brain tumors.", "C": "While brain tumor patients are prothrombotic, direct neurological failure from mass effect is a more common terminal cause.", "D": "Modern palliative care aims to balance toxicity, and it is rarely the leading cause of death compared to disease progression.", "E": "While the primary cancer is significant, neurological progression (herniation) is the specific cause of death related to the brain involvement."}, "hint": "Consider the mechanical consequences of an unyielding skull containing expanding mass lesions.", "part": 1}, {"stem": "A surgeon is considering surgery for a patient with persistent back pain. Statistically, which symptom is most likely to improve following a surgical decompression?", "options": {"A": "Isolated axial lower back pain", "B": "Radicular leg pain (sciatica)", "C": "Psychosocial 'Yellow Flags'", "D": "Fibromyalgia-related tenderness", "E": "General morning stiffness"}, "correct": "B", "rationales": {"A": "Isolated back pain (without radiculopathy) has much lower surgical success rates than radicular pain.", "B": "Decompression surgery is highly effective for relieving leg pain caused by nerve root compression.", "C": "Yellow flags refer to psychosocial predictors of chronic pain and are not addressed by surgery.", "D": "Fibromyalgia is a systemic pain disorder and is a contraindication for spinal surgery.", "E": "Morning stiffness is often inflammatory or degenerative and does not reliably respond to focal decompression."}, "hint": "Think about the 'Leg vs. Back' rule in spinal surgery outcomes.", "part": 1}, {"stem": "What is the recommended duration of cooling for a fresh thermal burn using tap water?", "options": {"A": "2 minutes", "B": "5 minutes", "C": "10 minutes", "D": "20 minutes", "E": "60 minutes"}, "correct": "D", "rationales": {"A": "Two minutes is insufficient to dissipate the heat stored in the dermal layers.", "B": "While better than nothing, 5 minutes does not provide the maximum benefit for wound stabilization.", "C": "Ten minutes is a common misconception, but the guidelines recommend a longer duration.", "D": "Running cool tap water for 20 minutes is the standard of care for immediate burn first aid and is effective up to 3 hours post-injury.", "E": "Sixty minutes of cooling can lead to hypothermia, especially in children or patients with large surface area burns."}, "hint": "This duration is often cited in first-aid protocols and has been shown to reduce the need for skin grafting.", "part": 1}, {"stem": "A 'Sentinel Bleed' is a high-yield concept in neurosurgery. What does it typically represent in clinical practice?", "options": {"A": "A minor bleed from a skin laceration before a major hemorrhage", "B": "A small, 'warning' headache caused by a minor aneurysmal leak", "C": "The first drop of blood seen during a craniotomy", "D": "A nosebleed that precedes a base of skull fracture diagnosis", "E": "The bleeding from a scalp wound that 'sentinels' a brain injury"}, "correct": "B", "rationales": {"A": "This is unrelated to the neurosurgical definition of a sentinel bleed.", "B": "A sentinel bleed is a warning headache that occurs days or weeks before a catastrophic subarachnoid hemorrhage.", "C": "This is an intraoperative observation, not a clinical warning sign of rupture.", "D": "While rhinorrhea can occur, it is not referred to as a 'sentinel bleed'.", "E": "Scalp wounds are common and do not serve as a specific warning for an underlying aneurysm."}, "hint": "It is a 'warning' event that should never be ignored, even if the pain resolves.", "part": 1}, {"stem": "Which of the following describes the shape and characteristics of an Extradural (Epidural) Hematoma on a CT scan?", "options": {"A": "Crescent-shaped and crosses suture lines", "B": "Biconvex (lens-shaped) and does not cross suture lines", "C": "Star-shaped and fills the basal cisterns", "D": "Diffuse punctate hemorrhages at the grey-white junction", "E": "A ring-enhancing mass with surrounding edema"}, "correct": "B", "rationales": {"A": "This describes a subdural hematoma.", "B": "An EDH is biconvex because it is constrained by the firm dural attachments at the skull's suture lines.", "C": "This describes a subarachnoid hemorrhage.", "D": "This is characteristic of diffuse axonal injury or multiple contusions.", "E": "This describes a tumor or abscess, not an acute hematoma."}, "hint": "Think of the 'Lemon' vs. 'Banana' analogy.", "part": 1}, {"stem": "A patient is diagnosed with 'Cerebral Salt Wasting' following a subarachnoid hemorrhage. Which biochemical finding would best support this diagnosis over SIADH?", "options": {"A": "Hyponatremia", "B": "High urine sodium", "C": "Hypovolaemia (Low fluid status)", "D": "Low serum osmolality", "E": "Hypernatremia"}, "correct": "C", "rationales": {"A": "Hyponatremia is seen in both SIADH and CSW, so it does not differentiate them.", "B": "Both conditions can have high urine sodium concentration.", "C": "The key differentiator is that CSW causes hypovolemia, whereas SIADH causes euvolemia or mild hypervolemia.", "D": "Both SIADH and CSW result in low serum osmolality due to the low sodium.", "E": "Both conditions involve low, not high, sodium levels."}, "hint": "The differentiation between these two SAH complications relies on the assessment of the patient's volume status.", "part": 1}, {"stem": "Which of the following primary malignancies is the most common source of brain metastases in adults?", "options": {"A": "Prostate Cancer", "B": "Lung Cancer", "C": "Melanoma", "D": "Colorectal Cancer", "E": "Renal Cell Carcinoma"}, "correct": "B", "rationales": {"A": "Prostate cancer commonly spreads to bone but rarely to the brain.", "B": "Lung cancer is the most common primary source of brain metastases.", "C": "Melanoma has a high propensity to spread to the brain, but it is less common overall than lung cancer.", "D": "Colorectal cancer more commonly metastasizes to the liver and lung.", "E": "Renal cell carcinoma is a common source, but lung and breast are more frequent."}, "hint": "Consider the organ that receives the entire cardiac output and is a frequent site of primary malignancy.", "part": 1}, {"stem": "A patient has a traumatic pneumothorax. Where is the 'Triangle of Safety' located for the insertion of a chest drain?", "options": {"A": "2nd intercostal space, mid-clavicular line", "B": "5th intercostal space, anterior to the mid-axillary line", "C": "4th intercostal space, mid-scapular line", "D": "7th intercostal space, mid-axillary line", "E": "1st intercostal space, just below the clavicle"}, "correct": "B", "rationales": {"A": "This is the traditional site for needle decompression, not for a formal chest drain.", "B": "The triangle of safety is bounded by the latissimus dorsi, pectoralis major, and the line superior to the 5th intercostal space.", "C": "The posterior approach is avoided due to the risk of injuring the scapula and major muscles.", "D": "This is too low and increases the risk of injuring the liver or spleen.", "E": "This site risks injury to the subclavian vessels."}, "hint": "It is bounded by the pectoralis major and latissimus dorsi.", "part": 1}, {"stem": "What is the 'Lethal Triad' that trauma surgeons strive to prevent in patients with massive intra-abdominal bleeding?", "options": {"A": "Hypertension, Bradycardia, Irregular breathing", "B": "Muffled heart sounds, High JVP, Low BP", "C": "Acidosis, Hypothermia, and Coagulopathy", "D": "Tachycardia, Tachypnea, and Hypotension", "E": "Anemia, Thrombocytopenia, and Leukopenia"}, "correct": "C", "rationales": {"A": "This describes Cushing's Triad for raised ICP.", "B": "This describes Beck's Triad for cardiac tamponade.", "C": "The lethal triad in trauma refers to the self-reinforcing cycle of acidosis, hypothermia, and coagulopathy that leads to death.", "D": "These are signs of shock, but they do not define the specific 'lethal triad' of metabolic failure.", "E": "These describe pancytopenia, not the physiologic lethal triad of trauma."}, "hint": "Think about the metabolic and temperature-related failures that occur during massive hemorrhage.", "part": 1}, {"stem": "Which of the following is an absolute indication for emergency surgical intervention (laparotomy) in a patient with abdominal trauma?", "options": {"A": "A Grade III splenic laceration on CT scan", "B": "The presence of a small amount of free fluid on a FAST scan in a stable patient", "C": "Hemodynamic instability despite adequate fluid resuscitation", "D": "A seatbelt sign (bruising) across the abdomen", "E": "Isolated hematuria"}, "correct": "C", "rationales": {"A": "Stable Grade III injuries can often be managed non-operatively with observation.", "B": "Stable patients with fluid on FAST should go to CT to characterize the injury, not necessarily to the OR.", "C": "Unresponsiveness to resuscitation in the setting of trauma suggests active, massive internal bleeding requiring surgery.", "D": "A seatbelt sign is an indication for careful assessment (CT scan) but is not an absolute indication for immediate surgery on its own.", "E": "Hematuria suggests a urological injury, which is usually investigated with a CT urogram first."}, "hint": "Focus on the patient's physiology rather than the suspected anatomy.", "part": 1}, {"stem": "Which of the following is true regarding a '90% lacerated' tendon in the hand?", "options": {"A": "It will always cause an immediate loss of joint movement", "B": "It can still demonstrate a full range of motion against no resistance", "C": "It should be left to heal by secondary intention", "D": "It is not a surgical emergency because the tendon is not fully snapped", "E": "It will show Kanavel's signs on examination"}, "correct": "B", "rationales": {"A": "A tendon can be mostly lacerated and still move the joint, which is why testing against resistance is vital.", "B": "The '90% rule' states that a significantly lacerated tendon can still function against no gravity, necessitating resistance testing.", "C": "Tendon lacerations usually require surgical repair within 7-14 days to restore full strength and prevent snapping.", "D": "While not
