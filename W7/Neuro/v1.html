ic pressure on the delivery of blood to a damaged brain.", "part": 1}, {"stem": "In the context of the Monro-Kellie doctrine, which of the following is the first component to be displaced to compensate for an expanding intracranial mass?", "options": {"A": "Arterial blood", "B": "Brain tissue", "C": "Cerebrospinal Fluid (CSF)", "D": "Intracellular fluid", "E": "Venous blood and CSF"}, "correct": "C", "rationales": {"A": "Arterial blood is under high pressure and is not easily displaced; reducing it would cause immediate ischemia.", "B": "Brain tissue is non-compressible; its displacement leads to herniation, which is a late and pathological event.", "C": "CSF is the primary buffering component; it is easily displaced into the spinal subarachnoid space when intracranial pressure rises.", "D": "Intracellular fluid remains constant; movement of water across cells is part of edema pathology, not early compensation.", "E": "While both can be displaced, the combined answer is less specific than identifying CSF as the primary, most mobile reservoir."}, "hint": "Think of the most mobile fluid within the cranial and spinal cavities.", "part": 1}, {"stem": "A patient with a suspected base of skull fracture presents with Battle's sign and Raccoon eyes. Which of the following procedures is strictly contraindicated?", "options": {"A": "Oral endotracheal intubation", "B": "Nasogastric tube (NGT) insertion", "C": "Lumbar puncture", "D": "Application of a cervical collar", "E": "Venous cannulation"}, "correct": "B", "rationales": {"A": "Oral intubation is safe and often necessary to protect the airway.", "B": "In base of skull fractures, NGT insertion carries the risk of accidental intracranial placement through the fractured cribriform plate.", "C": "While generally avoided in trauma, an NGT insertion is the classic 'mechanical' contraindication for a base of skull fracture.", "D": "A collar is mandatory until the C-spine is cleared, regardless of the skull fracture.", "E": "Obtaining IV access is a standard part of the primary survey."}, "hint": "Consider the risk of a tube entering the cranium through a fractured bony floor.", "part": 1}, {"stem": "A 10-year-old child presents with a 'scald' burn to the chest after spilling hot tea. The area is pale pink, very painful, and covered in blisters with brisk capillary refill. How would you classify the depth of this burn?", "options": {"A": "Superficial (1st degree)", "B": "Superficial Partial-Thickness (2nd degree)", "C": "Deep Partial-Thickness (2nd degree)", "D": "Full-Thickness (3rd degree)", "E": "Fourth-degree burn"}, "correct": "B", "rationales": {"A": "Superficial burns (like sunburn) are red but do not have blisters.", "B": "Blistering, brisk capillary refill, and severe pain are the hallmarks of a superficial partial-thickness burn.", "C": "Deep partial-thickness burns typically have slow capillary refill and may appear fixed red or white.", "D": "Full-thickness burns are typically painless (as nerves are destroyed) and lack capillary refill.", "E": "Fourth-degree burns extend into muscle or bone and would not present with blisters and brisk refill."}, "hint": "The presence of blisters and preserved sensation with fast refill points to a specific layer of the dermis.", "part": 1}, {"stem": "What is the primary purpose of administering Nimodipine for 21 days following an aneurysmal subarachnoid hemorrhage?", "options": {"A": "To dissolve the blood clot in the subarachnoid space", "B": "To prevent delayed cerebral ischaemia due to vasospasm", "C": "To lower the systemic blood pressure to prevent re-bleeding", "D": "To treat associated hyponatremia", "E": "To reduce the risk of post-traumatic epilepsy"}, "correct": "B", "rationales": {"A": "Nimodipine is a calcium channel blocker, not a thrombolytic agent.", "B": "Nimodipine is clinically proven to improve neurological outcomes by reducing the incidence of vasospasm after SAH.", "C": "While it can slightly lower BP, its primary purpose in SAH is neuroprotection against vasospasm, not antihypertensive therapy.", "D": "Hyponatremia is managed with fluid balance (maintaining euvolemia), not calcium channel blockers.", "E": "Anticonvulsants are used for seizure prophylaxis, not Nimodipine."}, "hint": "Think about the delayed arterial reaction to blood products in the subarachnoid space.", "part": 1}, {"stem": "A patient with a suspected splenic injury has a FAST scan. Which area is specifically being evaluated when the probe is placed in the Left Upper Quadrant (LUQ)?", "options": {"A": "Morrison's Pouch", "B": "Splenorenal Recess", "C": "Pouch of Douglas", "D": "Pericardial space", "E": "Paracolic gutter"}, "correct": "B", "rationales": {"A": "Morrison's Pouch is the hepatorenal recess located in the Right Upper Quadrant (RUQ).", "B": "The splenorenal recess is the potential space between the spleen and the left kidney where free fluid can accumulate.", "C": "The Pouch of Douglas is located in the pelvis, not the LUQ.", "D": "The pericardial space is assessed via a subxiphoid or parasternal view, not the LUQ.", "E": "While fluid can travel to the gutters, the primary LUQ view in FAST specifically looks at the spleen-kidney interface."}, "hint": "Identify the potential space where fluid collects between the organ and the kidney on the left.", "part": 1}, {"stem": "A 28-year-old male presents with a 'dropped' distal phalanx of his middle finger after a sporting injury. He is unable to actively extend the DIPJ. What is the most likely injury?", "options": {"A": "Flexor Digitorum Profundus rupture", "B": "Mallet Finger", "C": "Jersey Finger", "D": "Boutonniere deformity", "E": "Trigger Finger"}, "correct": "B", "rationales": {"A": "This would result in an inability to flex the joint, not extend it.", "B": "Mallet finger is caused by the disruption of the extensor tendon at the base of the distal phalanx.", "C": "Jersey finger is a rupture of the FDP tendon, preventing flexion.", "D": "A Boutonniere deformity involves the central slip of the extensor tendon, causing PIPJ flexion and DIPJ hyperextension.", "E": "Trigger finger is a stenosing tenosynovitis causing 'catching' or 'locking' of the finger, not a loss of extension."}, "hint": "This injury is the extensor equivalent of a distal tendon rupture.", "part": 1}, {"stem": "Which of the following intracranial tumors is most likely to show 'pseudopalisading necrosis' and microvascular proliferation on a histological slide?", "options": {"A": "Low-grade astrocytoma", "B": "Meningioma", "C": "Glioblastoma Multiforme (GBM)", "D": "Oligodendroglioma", "E": "Ependymoma"}, "correct": "C", "rationales": {"A": "Low-grade astrocytomas lack the malignant features of necrosis and vascular proliferation.", "B": "Meningiomas classically show whorls and psammoma bodies, not necrotic palisading.", "C": "GBM is characterized by its high-grade malignant features, including pseudopalisading necrosis and glomeruloid vascular proliferation.", "D": "Oligodendrogliomas are known for a 'fried-egg' cellular appearance and 'chicken-wire' vasculature.", "E": "Ependymomas show perivascular pseudorosettes, which are distinct from pseudopalisading necrosis."}, "hint": "Identify the hallmark pathological features of the most common WHO Grade IV primary brain tumor.", "part": 1}, {"stem": "A 50-year-old man with back pain reports that his leg pain improves significantly when he leans forward over a shopping cart while walking. What is the most likely diagnosis?", "options": {"A": "Acute disc herniation", "B": "Spondylolisthesis", "C": "Spinal Stenosis", "D": "Ankylosing spondylitis", "E": "Trochanteric bursitis"}, "correct": "C", "rationales": {"A": "Disc herniations usually worsen with flexion (leaning forward) as it increases pressure on the disc.", "B": "While it causes back pain, the 'shopping cart sign' is specifically pathognomonic for stenosis.", "C": "Neurogenic claudication caused by spinal stenosis is relieved by leaning forward, as this posture opens the spinal canal.", "D": "AS presents with morning stiffness that improves with exercise, not mechanical relief by flexion.", "E": "Bursitis causes lateral hip pain rather than the claudicant leg symptoms described."}, "hint": "Consider the mechanical changes in the spinal canal volume during flexion versus extension.", "part": 1}, {"stem": "In a patient with suspected raised ICP, which cranial nerve palsy is considered a 'false localizing sign'?", "options": {"A": "CN II (Optic Nerve)", "B": "CN III (Oculomotor Nerve)", "C": "CN VI (Abducens Nerve)", "D": "CN VII (Facial Nerve)", "E": "CN VIII (Vestibulocochlear Nerve)"}, "correct": "C", "rationales": {"A": "Optic nerve involvement causes papilledema or vision loss, which is a direct reflection of ICP, not a 'false localizer'.", "B": "CN III palsy in the setting of high ICP often correctly localizes to uncal herniation.", "C": "The abducens nerve has a long, vulnerable intracranial course; its palsy can be caused by generalized high ICP and does not necessarily localize the lesion.", "D": "CN VII palsies usually indicate a lesion in the pons or the cerebellopontine angle, not generalized ICP.", "E": "This nerve is typically affected by local lesions (like acoustic neuromas) rather than generalized pressure changes."}, "hint": "This nerve is easily stretched or compressed against the petrous ligament due to its long path.", "part": 1}, {"stem": "What is the standard recommended head elevation angle for patients with raised intracranial pressure to optimize venous drainage?", "options": {"A": "0^{\\circ} (Flat)", "B": "15^{\\circ}", "C": "30^{\\circ}", "D": "45^{\\circ}", "E": "90^{\\circ} (Sitting upright)"}, "correct": "C", "rationales": {"A": "Lying flat can increase ICP by impeding venous return from the brain.", "B": "While better than flat, 15^{\\circ} is less effective than the standard recommended angle for ICP management.", "C": "Elevating the head to 30^{\\circ} is the gold standard for reducing ICP by facilitating venous outflow through the jugular veins.", "D": "Elevating the head too high can potentially reduce MAP and CPP, making 30^{\\circ} the ideal balance.", "E": "This is impractical in the ICU setting for trauma patients and does not provide superior benefit over the 30^{\\circ} incline."}, "hint": "This specific angle is part of the standard 'neuro-protective' nursing bundle.", "part": 1}, {"stem": "A 40-year-old male is brought to the ED after a bar fight. He has a 'fusiform' swelling of his index finger, which is held in a slightly flexed position. There is severe pain on passive extension. Which condition does this constellation of signs suggest?", "options": {"A": "Gouty arthritis", "B": "Flexor Tenosynovitis", "C": "Dupuytren's Contracture", "D": "Colles Fracture", "E": "Paronychia"}, "correct": "B", "rationales": {"A": "Gout usually affects the MCP joint or the base of the thumb and would not typically show Kanavel's signs along the tendon sheath.", "B": "These are the classic Kanavel's signs of flexor tenosynovitis, a surgical emergency.", "C": "Dupuytren's is a chronic, painless thickening of the palmar fascia, not an acute painful infection.", "D": "A Colles fracture involves the distal radius and would not present with isolated finger sheath symptoms.", "E": "Paronychia is a localized infection around the nail fold, not the entire flexor sheath."}, "hint": "Recall the four Kanavel's signs that indicate an infection within the finger's synovial sheath.", "part": 1}, {"stem": "A patient suffers a traumatic brain injury and has a CT scan that appears relatively normal, but he remains in a deep coma (GCS  4). What is the most likely diagnosis?", "options": {"A": "Epidural hematoma", "B": "Subdural hematoma", "C": "Diffuse Axonal Injury (DAI)", "D": "Acute Hydrocephalus", "E": "Cerebral Contusion"}, "correct": "C", "rationales": {"A": "An epidural hematoma would be clearly visible on CT as a biconvex, hyperdense mass.", "B": "A subdural hematoma would appear as a crescentic hyperdensity on CT.", "C": "DAI is characterized by a mismatch between the patient's poor clinical state (coma) and a normal-looking CT scan.", "D": "Hydrocephalus would show ventricular enlargement, which is easily detectable on CT.", "E": "Contusions appear as hyperdense 'salt and pepper' areas of hemorrhage and edema on a CT scan."}, "hint": "This injury involves microscopic shearing of white matter tracts that is often invisible on standard CT.", "part": 1}, {"stem": "In a patient with a circumferential full-thickness burn to the chest that is impeding ventilation, what is the most appropriate surgical intervention?", "options": {"A": "Skin grafting", "B": "Debridement", "C": "Escharotomy", "D": "Fasciotomy", "E": "Tracheostomy"}, "correct": "C", "rationales": {"A": "Grafting is a reconstructive step performed later, not an acute emergency measure for breathing.", "B": "Debridement removes dead tissue but does not immediately release the constrictive 'tourniquet' effect of a leathery eschar.", "C": "An escharotomy involves cutting through the burnt, non-elastic tissue (eschar) to release pressure and allow for adequate chest expansion or distal perfusion.", "D": "Fasciotomy involves cutting through muscle fascia for compartment syndrome; escharotomy is the procedure for burn-related constriction.", "E": "A tracheostomy may bypass a secondary airway obstruction, but it will not fix the primary problem of a constricted chest wall."}, "hint": "This procedure involves making incisions through the leathery, burnt skin to restore mechanical function.", "part": 1}, {"stem": "Which of the following is the single most common site for the formation of saccular (berry) aneurysms?", "options": {"A": "Posterior Communicating Artery (PCom)", "B": "Anterior Communicating Artery (ACom)", "C": "Internal Carotid Artery (ICA)", "D": "Middle Cerebral Artery (MCA) bifurcation", "E": "Basilar Artery Tip"}, "correct": "B", "rationales": {"A": "PCom is a common site (%) but is not the most common.", "B": "The ACom is the most frequent location for berry aneurysms, accounting for approximately 30--35% of cases.", "C": "While common, aneurysms here are less frequent than those at the ACom junction.", "D": "The MCA bifurcation is the third most common site.", "E": "Posterior circulation aneurysms are less common overall than anterior circulation aneurysms."}, "hint": "Look for the vessel that connects the two anterior cerebral arteries.", "part": 1}, {"stem": "A patient with multiple metastases to the brain is found to have a primary tumor in the lung. What is the most common cause of death in patients with extensive brain metastases?", "options": {"A": "Status epilepticus", "B": "Brain herniation from mass effect", "C": "Pulmonary embolism", "D": "Chemotherapy toxicity", "E": "Respiratory failure from the primary lung cancer"}, "correct": "B", "rationales": {"A": "Seizures are common but are usually manageable with medications and rarely the primary cause of death.", "B": "Uncontrolled increase in ICP and subsequent herniation is the terminal event for many patients with progressive brain tumors.", "C": "While brain tumor patients are prothrombotic, direct neurological failure from mass effect is a more common terminal cause.", "D": "Modern palliative care aims to balance toxicity, and it is rarely the leading cause of death compared to disease progression.", "E": "While the primary cancer is significant, neurological progression (herniation) is the specific cause of death related to the brain involvement."}, "hint": "Consider the mechanical consequences of an unyielding skull containing expanding mass lesions.", "part": 1}, {"stem": "A surgeon is considering surgery for a patient with persistent back pain. Statistically, which symptom is most likely to improve following a surgical decompression?", "options": {"A": "Isolated axial lower back pain", "B": "Radicular leg pain (sciatica)", "C": "Psychosocial 'Yellow Flags'", "D": "Fibromyalgia-related tenderness", "E": "General morning stiffness"}, "correct": "B", "rationales": {"A": "Isolated back pain (without radiculopathy) has much lower surgical success rates than radicular pain.", "B": "Decompression surgery is highly effective for relieving leg pain caused by nerve root compression.", "C": "Yellow flags refer to psychosocial predictors of chronic pain and are not addressed by surgery.", "D": "Fibromyalgia is a systemic pain disorder and is a contraindication for spinal surgery.", "E": "Morning stiffness is often inflammatory or degenerative and does not reliably respond to focal decompression."}, "hint": "Think about the 'Leg vs. Back' rule in spinal surgery outcomes.", "part": 1}, {"stem": "What is the recommended duration of cooling for a fresh thermal burn using tap water?", "options": {"A": "2 minutes", "B": "5 minutes", "C": "10 minutes", "D": "20 minutes", "E": "60 minutes"}, "correct": "D", "rationales": {"A": "Two minutes is insufficient to dissipate the heat stored in the dermal layers.", "B": "While better than nothing, 5 minutes does not provide the maximum benefit for wound stabilization.", "C": "Ten minutes is a common misconception, but the guidelines recommend a longer duration.", "D": "Running cool tap water for 20 minutes is the standard of care for immediate burn first aid and is effective up to 3 hours post-injury.", "E": "Sixty minutes of cooling can lead to hypothermia, especially in children or patients with large surface area burns."}, "hint": "This duration is often cited in first-aid protocols and has been shown to reduce the need for skin grafting.", "part": 1}, {"stem": "A 'Sentinel Bleed' is a high-yield concept in neurosurgery. What does it typically represent in clinical practice?", "options": {"A": "A minor bleed from a skin laceration before a major hemorrhage", "B": "A small, 'warning' headache caused by a minor aneurysmal leak", "C": "The first drop of blood seen during a craniotomy", "D": "A nosebleed that precedes a base of skull fracture diagnosis", "E": "The bleeding from a scalp wound that 'sentinels' a brain injury"}, "correct": "B", "rationales": {"A": "This is unrelated to the neurosurgical definition of a sentinel bleed.", "B": "A sentinel bleed is a warning headache that occurs days or weeks before a catastrophic subarachnoid hemorrhage.", "C": "This is an intraoperative observation, not a clinical warning sign of rupture.", "D": "While rhinorrhea can occur, it is not referred to as a 'sentinel bleed'.", "E": "Scalp wounds are common and do not serve as a specific warning for an underlying aneurysm."}, "hint": "It is a 'warning' event that should never be ignored, even if the pain resolves.", "part": 1}, {"stem": "Which of the following describes the shape and characteristics of an Extradural (Epidural) Hematoma on a CT scan?", "options": {"A": "Crescent-shaped and crosses suture lines", "B": "Biconvex (lens-shaped) and does not cross suture lines", "C": "Star-shaped and fills the basal cisterns", "D": "Diffuse punctate hemorrhages at the grey-white junction", "E": "A ring-enhancing mass with surrounding edema"}, "correct": "B", "rationales": {"A": "This describes a subdural hematoma.", "B": "An EDH is biconvex because it is constrained by the firm dural attachments at the skull's suture lines.", "C": "This describes a subarachnoid hemorrhage.", "D": "This is characteristic of diffuse axonal injury or multiple contusions.", "E": "This describes a tumor or abscess, not an acute hematoma."}, "hint": "Think of the 'Lemon' vs. 'Banana' analogy.", "part": 1}, {"stem": "A patient is diagnosed with 'Cerebral Salt Wasting' following a subarachnoid hemorrhage. Which biochemical finding would best support this diagnosis over SIADH?", "options": {"A": "Hyponatremia", "B": "High urine sodium", "C": "Hypovolaemia (Low fluid status)", "D": "Low serum osmolality", "E": "Hypernatremia"}, "correct": "C", "rationales": {"A": "Hyponatremia is seen in both SIADH and CSW, so it does not differentiate them.", "B": "Both conditions can have high urine sodium concentration.", "C": "The key differentiator is that CSW causes hypovolemia, whereas SIADH causes euvolemia or mild hypervolemia.", "D": "Both SIADH and CSW result in low serum osmolality due to the low sodium.", "E": "Both conditions involve low, not high, sodium levels."}, "hint": "The differentiation between these two SAH complications relies on the assessment of the patient's volume status.", "part": 1}, {"stem": "Which of the following primary malignancies is the most common source of brain metastases in adults?", "options": {"A": "Prostate Cancer", "B": "Lung Cancer", "C": "Melanoma", "D": "Colorectal Cancer", "E": "Renal Cell Carcinoma"}, "correct": "B", "rationales": {"A": "Prostate cancer commonly spreads to bone but rarely to the brain.", "B": "Lung cancer is the most common primary source of brain metastases.", "C": "Melanoma has a high propensity to spread to the brain, but it is less common overall than lung cancer.", "D": "Colorectal cancer more commonly metastasizes to the liver and lung.", "E": "Renal cell carcinoma is a common source, but lung and breast are more frequent."}, "hint": "Consider the organ that receives the entire cardiac output and is a frequent site of primary malignancy.", "part": 1}, {"stem": "A patient has a traumatic pneumothorax. Where is the 'Triangle of Safety' located for the insertion of a chest drain?", "options": {"A": "2nd intercostal space, mid-clavicular line", "B": "5th intercostal space, anterior to the mid-axillary line", "C": "4th intercostal space, mid-scapular line", "D": "7th intercostal space, mid-axillary line", "E": "1st intercostal space, just below the clavicle"}, "correct": "B", "rationales": {"A": "This is the traditional site for needle decompression, not for a formal chest drain.", "B": "The triangle of safety is bounded by the latissimus dorsi, pectoralis major, and the line superior to the 5th intercostal space.", "C": "The posterior approach is avoided due to the risk of injuring the scapula and major muscles.", "D": "This is too low and increases the risk of injuring the liver or spleen.", "E": "This site risks injury to the subclavian vessels."}, "hint": "It is bounded by the pectoralis major and latissimus dorsi.", "part": 1}, {"stem": "What is the 'Lethal Triad' that trauma surgeons strive to prevent in patients with massive intra-abdominal bleeding?", "options": {"A": "Hypertension, Bradycardia, Irregular breathing", "B": "Muffled heart sounds, High JVP, Low BP", "C": "Acidosis, Hypothermia, and Coagulopathy", "D": "Tachycardia, Tachypnea, and Hypotension", "E": "Anemia, Thrombocytopenia, and Leukopenia"}, "correct": "C", "rationales": {"A": "This describes Cushing's Triad for raised ICP.", "B": "This describes Beck's Triad for cardiac tamponade.", "C": "The lethal triad in trauma refers to the self-reinforcing cycle of acidosis, hypothermia, and coagulopathy that leads to death.", "D": "These are signs of shock, but they do not define the specific 'lethal triad' of metabolic failure.", "E": "These describe pancytopenia, not the physiologic lethal triad of trauma."}, "hint": "Think about the metabolic and temperature-related failures that occur during massive hemorrhage.", "part": 1}, {"stem": "Which of the following is an absolute indication for emergency surgical intervention (laparotomy) in a patient with abdominal trauma?", "options": {"A": "A Grade III splenic laceration on CT scan", "B": "The presence of a small amount of free fluid on a FAST scan in a stable patient", "C": "Hemodynamic instability despite adequate fluid resuscitation", "D": "A seatbelt sign (bruising) across the abdomen", "E": "Isolated hematuria"}, "correct": "C", "rationales": {"A": "Stable Grade III injuries can often be managed non-operatively with observation.", "B": "Stable patients with fluid on FAST should go to CT to characterize the injury, not necessarily to the OR.", "C": "Unresponsiveness to resuscitation in the setting of trauma suggests active, massive internal bleeding requiring surgery.", "D": "A seatbelt sign is an indication for careful assessment (CT scan) but is not an absolute indication for immediate surgery on its own.", "E": "Hematuria suggests a urological injury, which is usually investigated with a CT urogram first."}, "hint": "Focus on the patient's physiology rather than the suspected anatomy.", "part": 1}, {"stem": "Which of the following is true regarding a '90% lacerated' tendon in the hand?", "options": {"A": "It will always cause an immediate loss of joint movement", "B": "It can still demonstrate a full range of motion against no resistance", "C": "It should be left to heal by secondary intention", "D": "It is not a surgical emergency because the tendon is not fully snapped", "E": "It will show Kanavel's signs on examination"}, "correct": "B", "rationales": {"A": "A tendon can be mostly lacerated and still move the joint, which is why testing against resistance is vital.", "B": "The '90% rule' states that a significantly lacerated tendon can still function against no gravity, necessitating resistance testing.", "C": "Tendon lacerations usually require surgical repair within 7-14 days to restore full strength and prevent snapping.", "D": "While not an immediate 'life-or-limb' emergency, it is a surgical case that should not be missed as it will eventually fail.", "E": "Kanavel's signs indicate infection (tenosynovitis), not the mechanical integrity of the tendon."}, "hint": "Consider why you must test muscle function against a load during a hand exam.", "part": 1}, {"stem": "A 22-year-old female presents with a severe headache and papilledema. Her CT scan is normal. A lumbar puncture shows an opening pressure of 35 cm  H_2O. What is the most likely diagnosis?", "options": {"A": "Meningitis", "B": "Idiopathic Intracranial Hypertension (IIH)", "C": "Subarachnoid Hemorrhage", "D": "Migraine with aura", "E": "Normal Pressure Hydrocephalus"}, "correct": "B", "rationales": {"A": "Meningitis would involve fever and altered CSF chemistry (low glucose/high protein).", "B": "IIH (Pseudotumor Cerebri) presents with raised ICP (papilledema, high opening pressure) in the absence of a mass lesion or hydrocephalus.", "C": "SAH would typically show blood on CT or xanthochromia in the CSF.", "D": "Migraines do not cause papilledema or elevated opening pressure on LP.", "E": "NPH involves dilated ventricles and a normal opening pressure, unlike this case."}, "hint": "This condition is often associated with young, overweight females and mimics a tumor's pressure without a mass.", "part": 1}, {"stem": "A 22-year-old male is brought to the emergency department after being struck in the temporal region by a cricket ball. He had a brief loss of consciousness at the scene but is currently alert and oriented (GCS 15). Two hours later, while awaiting review, he becomes increasingly agitated and his GCS drops to 11. Which of the following is the most likely underlying pathology?", "options": {"A": "Extradural haematoma", "B": "Acute subdural haematoma", "C": "Diffuse axonal injury", "D": "Cerebral contusion", "E": "Post-concussive syndrome"}, "correct": "A", "rationales": {"A": "The 'lucid interval' followed by rapid deterioration is the classic presentation of an arterial bleed into the extradural space, typically from the middle meningeal artery.", "B": "While possible in trauma, subdural haematomas usually involve high-energy deceleration and present with immediate and persistent neurological depression rather than a lucid interval.", "C": "This pathology typically causes immediate, prolonged unconsciousness that does not correlate with focal findings on an initial CT scan.", "D": "Contusions often show delayed 'blossoming' on imaging, but the classic temporal strike and lucid interval point specifically toward an arterial collection.", "E": "This refers to lingering symptoms like headache and dizziness following mild TBI, but it does not involve an acute, significant drop in GCS."}, "hint": "Consider the classic clinical sequence of injury, recovery, and sudden decline in a young patient with focal temporal trauma.", "part": 1}, {"stem": "An 82-year-old female with a history of atrial fibrillation on warfarin presents with 3 weeks of progressive confusion and two recent falls. A non-contrast CT head shows a crescent-shaped, hypodense collection crossing suture lines with 4 mm of midline shift. What is the most appropriate next step in her management?", "options": {"A": "Urgently reverse anticoagulation with Vitamin K and Prothrombinex", "B": "Immediate emergency craniotomy for evacuation", "C": "Administer high-dose dexamethasone to reduce mass effect", "D": "Perform a lumbar puncture to exclude normal pressure hydrocephalus", "E": "Discharge with a referral to the memory clinic for dementia workup"}, "correct": "A", "rationales": {"A": "In any patient with intracranial bleeding on anticoagulants, immediate reversal is the highest priority to prevent haematoma expansion, regardless of immediate surgical plans.", "B": "A shift of less than 5 mm in a stable patient with a chronic subdural haematoma usually allows time for medical optimization and reversal of coagulopathy first.", "C": "Steroids are generally not indicated for traumatic collections or chronic subdurals and can increase morbidity.", "D": "Lumbar puncture is contraindicated in the presence of a mass lesion with midline shift due to the risk of herniation.", "E": "While she presents with confusion, the CT clearly identifies a structural, treatable cause for her symptoms."}, "hint": "This patient has a 'great mimic' pathology and a critical medication-related risk factor that must be addressed before any intervention.", "part": 1}, {"stem": "A 28-year-old male is involved in a high-speed motor vehicle accident. On primary survey, he is tachypnoeic, tachycardic, and hypotensive (BP 85/50 mmHg). He has absent breath sounds on the right side with hyper-resonance to percussion and distended neck veins. What is the most appropriate immediate action?", "options": {"A": "Needle decompression in the 2nd intercostal space, midclavicular line", "B": "Urgently transport the patient to the CT scanner for a 'Pan-scan'", "C": "Perform a FAST ultrasound to look for pericardial tamponade", "D": "Insert a large-bore intercostal chest drain (28-32Fr) immediately", "E": "Intubate and start positive pressure ventilation"}, "correct": "A", "rationales": {"A": "Tension pneumothorax is a clinical diagnosis requiring immediate decompression to resolve obstructive shock; waiting for imaging is life-threatening.", "B": "Unstable patients should never be taken to CT; life-threatening thoracic injuries must be managed during the primary survey.", "C": "While tamponade is in the differential, the presence of hyper-resonance and absent breath sounds strongly identifies tension pneumothorax as the priority.", "D": "While a chest drain is the definitive treatment, needle decompression is the faster immediate 'bridge' to stabilize the patient's blood pressure.", "E": "Initiating positive pressure ventilation in an undressed tension pneumothorax will worsen the intra-thoracic pressure and rapidly lead to cardiac arrest."}, "hint": "This is a clinical diagnosis of obstructive shock where percussion and auscultation findings guide immediate bedside intervention.", "part": 1}, {"stem": "A 45-year-old female is brought to the trauma bay after a fall from a height. She is hemodynamically unstable (BP 80/40 mmHg, HR 130). A FAST exam is performed and shows anechoic fluid in Morrison’s pouch. What is the next best step in management?", "options": {"A": "Immediate transfer to the operating theatre for laparotomy", "B": "Transfer to CT for grading of the solid organ injury", "C": "Aggressive fluid resuscitation with 2L of normal saline", "D": "Diagnostic peritoneal lavage (DPL) to confirm the FAST findings", "E": "Angioembolisation of the splenic artery"}, "correct": "A", "rationales": {"A": "An unstable patient with a positive FAST (indicating haemoperitoneum) requires immediate surgical haemorrhage control.", "B": "CT is only for hemodynamically stable patients; taking an unstable patient to CT risks an unmanaged arrest in the scanner.", "C": "Modern trauma guidelines favor 'permissive hypotension' and early blood products (MTP) over large volumes of crystalloid which can worsen coagulopathy.", "D": "DPL is largely historical and redundant if a FAST has already demonstrated free fluid in an unstable patient.", "E": "Angiography is an option for stable patients with active blushes on CT, but cannot support an unstable patient needing multi-quadrant exploration."}, "hint": "Consider the 'golden rule' regarding the location of the unstable trauma patient with a positive screening tool for bleeding.", "part": 1}, {"stem": "A 70 kg male sustains thermal burns to his entire anterior trunk and both anterior upper limbs. Using the Parkland formula, what is the total volume of Hartmann's solution required in the first 8 hours following the injury?", "options": {"A": "3,780 mL", "B": "7,560 mL", "C": "5,040 mL", "D": "1,890 mL", "E": "2,520 mL"}, "correct": "A", "rationales": {"A": "TBSA is 18% (ant. trunk) + 9% (both ant. arms) = 27%. Calculation: 4 mL \\times 70 kg \\times 27 = 7,560 mL total; half (3,780 mL) is given in the first 8 hours.", "B": "This represents the total fluid for the first 24 hours, whereas the question asks specifically for the first 8-hour portion.", "C": "This results from an incorrect TBSA calculation or using 3 mL/kg instead of the standard 4 mL/kg for thermal burns.", "D": "This is a quarter of the total 24-hour requirement, likely reflecting a misunderstanding of the fluid delivery schedule.", "E": "This might be calculated using only the trunk TBSA and ignoring the involvement of the upper limbs."}, "hint": "First, calculate the Total Body Surface Area (TBSA) using the Rule of Nines, then apply the 4 mL/kg formula and determine the 50% split.", "part": 1}, {"stem": "A 35-year-old chef presents with a deep laceration to the volar aspect of his right index finger. On examination, he is unable to flex the distal interphalangeal (DIP) joint while the proximal interphalangeal (PIP) joint is held in extension. Which structure is most likely injured?", "options": {"A": "Flexor digitorum profundus (FDP)", "B": "Flexor digitorum superficialis (FDS)", "C": "Lumbrical muscles", "D": "Digital nerve", "E": "Extensor indicis proprius"}, "correct": "A", "rationales": {"A": "The FDP is the only muscle responsible for flexion at the DIP joint; its function is tested by stabilizing the PIP in extension.", "B": "The FDS inserts on the middle phalanx and flexes the PIP joint, not the DIP joint.", "C": "Lumbricals flex the MCP joints and extend the IP joints; they do not perform isolated DIP flexion.", "D": "A nerve injury would cause sensory loss or two-point discrimination deficit but would not explain an isolated loss of DIP flexion if the muscle is intact.", "E": "This is an extensor muscle located on the dorsal aspect of the hand/forearm, unrelated to volar flexion."}, "hint": "Identify the specific tendon that inserts onto the distal phalanx.", "part": 1}, {"stem": "A 19-year-old male presents with severe pain in his left leg following a mid-shaft tibial fracture. Despite immobilization and IV opioids, his pain is worsening. On exam, the leg is tense and he has excruciating pain when the clinician passively plantarflexes his foot. Distal pulses are palpable. What is the most appropriate next step?", "options": {"A": "Emergency surgical consultation for four-compartment fasciotomy", "B": "Elevation of the limb above the level of the heart", "C": "Administer an additional dose of IV morphine and reassess in 1 hour", "D": "Apply a tight compression bandage to reduce swelling", "E": "Wait for the Serum Creatine Kinase (CK) result to confirm muscle damage"}, "correct": "A", "rationales": {"A": "Clinical signs of compartment syndrome, especially pain out of proportion and pain on passive stretch, mandate immediate surgical decompression even if pulses are present.", "B": "Elevation above the heart can reduce arterial inflow and worsen ischaemia in compartment syndrome; the limb should be kept at heart level.", "C": "Delaying treatment in suspected compartment syndrome leads to irreversible myonecrosis and nerve damage within hours.", "D": "External pressure from tight dressings or bandages is a known cause and aggravator of compartment syndrome.", "E": "CK takes hours to rise and a normal level does not exclude the diagnosis; management is based on clinical findings."}, "hint": "The clinical diagnosis of this condition is primary; do not wait for late signs like pulselessness or laboratory evidence.", "part": 1}, {"stem": "A 55-year-old male presents with the 'worst headache of his life' which began suddenly while he was lifting heavy boxes. A non-contrast CT head performed 4 hours after the onset of symptoms is unremarkable. What is the most appropriate next step to exclude a subarachnoid haemorrhage?", "options": {"A": "Perform a lumbar puncture 12 hours after the onset of the headache", "B": "Repeat the non-contrast CT head in 24 hours", "C": "Start oral Nimodipine 60 mg every 4 hours", "D": "Discharge the patient with a diagnosis of tension headache", "E": "Perform a carotid ultrasound to look for dissection"}, "correct": "A", "rationales": {"A": "If CT is negative and suspicion remains high, LP is the gold standard; it must be done at \\ge 12 hours to allow for the development of xanthochromia.", "B": "CT sensitivity for SAH decreases over time as blood is resorbed or redistributed; repeating the same test is unlikely to be more sensitive.", "C": "Nimodipine is used to prevent vasospasm once SAH is confirmed; it is not a diagnostic tool.", "D": "A thunderclap headache is SAH until proven otherwise; a negative early CT does not 100% exclude the diagnosis.", "E": "While dissection is in the differential for headache, it does not address the primary concern of a ruptured aneurysm suggested by a thunderclap onset."}, "hint": "Consider the diagnostic sequence when the initial first-line imaging is negative in a high-suspicion case.", "part": 1}, {"stem": "Which of the following interventions is contraindicated in the management of a patient with an acute traumatic brain injury and raised intracranial pressure?", "options": {"A": "Administration of high-dose Dexamethasone", "B": "Elevating the head of the bed to 30^{\\circ}", "C": "IV bolus of 20% Mannitol", "D": "Short-term hyperventilation to a PaCO_{2} of 30-35 mmHg", "E": "Insertion of an External Ventricular Drain (EVD)"}, "correct": "A", "rationales": {"A": "The CRASH trial demonstrated that steroids increase mortality in TBI and they are specifically contraindicated in this context.", "B": "This is a standard first-line measure to promote venous drainage and reduce ICP.", "C": "Osmotherapy with Mannitol or hypertonic saline is a standard treatment for reducing cerebral oedema and ICP.", "D": "While not for long-term use, brief hyperventilation is an acceptable bridge for acute herniation by causing cerebral vasoconstriction.", "E": "An EVD is both a monitoring and therapeutic tool that allows for CSF drainage to lower ICP."}, "hint": "Recall which medication class is useful for tumor-related oedema but harmful in trauma.", "part": 1}, {"stem": "A 60-year-old female presents with a new-onset ptosis, a dilated and non-reactive pupil, and the right eye is deviated 'down and out'. She also complains of a severe headache. Where is the most likely site of an intracranial aneurysm?", "options": {"A": "Posterior communicating artery (PComA)", "B": "Anterior communicating artery (AComA)", "C": "Middle cerebral artery (MCA)", "D": "Ophthalmic artery", "E": "Basilar artery tip"}, "correct": "A", "rationales": {"A": "A PComA aneurysm can compress the adjacent CN III, leading to the classic 'pupil-involving' third nerve palsy.", "B": "AComA aneurysms are more likely to cause visual field defects or personality changes due to frontal lobe effects, rather than CN III compression.", "C": "MCA aneurysms often present with hemiparesis or dysphasia if they rupture and cause an intracerebral haematoma.", "D": "Aneurysms here are more likely to cause monocular vision loss rather than a complete third nerve palsy.", "E": "While basilar aneurysms can affect cranial nerves, the specific association with isolated CN III palsy is most classic for PComA."}, "hint": "Identify the vessel that lies in close anatomical proximity to the oculomotor nerve.", "part": 1}, {"stem": "A 45-year-old patient with a known history of a large non-secreting pituitary macroadenoma presents with a sudden, agonizing headache and bilateral visual loss. She is hypotensive and tachycardic. What is the most critical immediate medical intervention?", "options": {"A": "IV Hydrocortisone 100 mg", "B": "Urgent transsphenoidal decompression", "C": "High-flow oxygen and IV fluid bolus", "D": "IV Mannitol to reduce intracranial pressure", "E": "Emergency CT Angiogram to exclude an aneurysm"}, "correct": "A", "rationales": {"A": "Pituitary apoplexy can cause acute ACTH deficiency and life-threatening adrenal crisis; hydrocortisone must be given immediately, often before imaging.", "B": "While surgical decompression is needed for visual loss, the immediate life-threat is cardiovascular collapse from adrenal crisis.", "C": "Standard resuscitation is important, but without steroid replacement, the hypotension in an adrenal crisis will remain refractory.", "D": "The primary issue is acute haemorrhage/infarction within the gland and endocrine failure, not generalized cerebral oedema.", "E": "While CTA is useful for differentials, the clinical picture of a known adenoma and shock strongly points to apoplexy requiring steroids first."}, "hint": "Focus on the life-threatening endocrine complication of sudden pituitary failure.", "part": 1}, {"stem": "A 75-year-old male is 2 days post-hip replacement surgery and becomes acutely confused and drowsy. His respiratory rate is 6 breaths/minute and his pupils are 1 mm and non-reactive. What is the most appropriate initial action?", "options": {"A": "Check capillary blood glucose level", "B": "Administer IV Naloxone and provide oxygen", "C": "Urgent non-contrast CT head to exclude a stroke", "D": "Commence a 10% Dextrose infusion", "E": "Start an aggressive IV fluid bolus for suspected sepsis"}, "correct": "B", "rationales": {"A": "While BSL is always a priority in LOC, the specific signs of bradypnoea and pinpoint pupils make opioid toxicity the most immediate likely cause.", "B": "The triad of decreased LOC, bradypnoea, and pinpoint pupils is pathognomonic for opioid toxicity, a common post-operative complication in the elderly.", "C": "While stroke is a differential, the reversible toxidrome must be addressed first, especially given the life-threatening respiratory depression.", "D": "This would treat hypoglycaemia, but the clinical findings specifically suggest a different metabolic/toxic cause.", "E": "Sepsis causes confusion but typically presents with tachycardia and tachypnoea, rather than bradypnoea and pinpoint pupils."}, "hint": "Look for the classic triad of symptoms indicating a specific medication overdose.", "part": 1}, {"stem": "A 40-year-old female presents with severe lower back pain, bilateral leg weakness, and numbness in her 'saddle area'. She mentions she hasn't been able to urinate for 8 hours. What is the required timeframe for definitive imaging in this patient?", "options": {"A": "Within 4 hours", "B": "Within 24 hours", "C": "Electively within 1-2 weeks", "D": "Within 48 hours after a trial of conservative management", "E": "Only if symptoms do not improve after 6 weeks"}, "correct": "A", "rationales": {"A": "Suspected Cauda Equina Syndrome is a surgical emergency requiring MRI within 4 hours to prevent permanent neurological and sphincter dysfunction.", "B": "Waiting 24 hours for imaging is insufficient for a condition where outcome is highly dependent on the speed of decompression.", "C": "Elective imaging is for non-specific back pain without red flags; this patient has multiple 'red flag' symptoms.", "D": "Conservative management is contraindicated when focal neurological deficits or sphincter involvement are present.", "E": "The 6-week rule applies only to mechanical back pain without neurological involvement."}, "hint": "This condition involves 'red flags' and is considered one of the most time-critical neurosurgical emergencies.", "part": 1}, {"stem": "During the primary survey of a trauma patient, you find a 'sucking' chest wound. After applying a three-sided occlusive dressing, what is the next best step for this specific injury?", "options": {"A": "Insertion of a chest drain at a separate site", "B": "Suturing the wound closed immediately in the trauma bay", "C": "Immediate transport to theatre for a thoracotomy", "D": "Performing a needle decompression on the contralateral side", "E": "Intubation and initiation of high-frequency oscillatory ventilation"}, "correct": "A", "rationales": {"A": "An open pneumothorax is managed with a three-sided dressing to create a one-way valve, followed by a formal chest drain to re-expand the lung.", "B": "Closing the wound completely without a chest drain can convert an open pneumothorax into a tension pneumothorax.", "C": "Most open pneumothoraces can be managed with a dressing and a drain; thoracotomy is reserved for massive bleeding or specific hilar injuries.", "D": "Decompressing the 'normal' side is unnecessary and harmful; intervention must be directed at the injured side.", "E": "Standard ABCDE management applies; high-frequency ventilation is not a standard first-line trauma intervention for this injury."}, "hint": "Preventing the conversion of this injury into a tension pneumothorax is the primary goal after the dressing is applied.", "part": 1}, {"stem": "An elderly patient presents with fluctuating levels of consciousness, personality changes, and memory impairment following a minor fall a month ago. CT head reveals a crescentic collection that is isodense to the brain parenchyma. What is the most likely diagnosis?", "options": {"A": "Subacute to chronic subdural haematoma", "B": "Acute extradural haematoma", "C": "Alzheimer's dementia", "D": "Glioblastoma multiforme", "E": "Cerebral abscess"}, "correct": "A", "rationales": {"A": "Subdural haematomas change density over time, becoming isodense (equal to brain) around 1-3 weeks and then hypodense (darker).", "B": "Extradural haematomas are hyperdense (bright white) and biconvex (lens-shaped), and usually present acutely.", "C": "While the symptoms overlap, the presence of a structural collection on CT following trauma points to a surgical cause.", "D": "Tumors typically appear as irregular, ring-enhancing masses (with contrast) rather than crescent-shaped collections following the contour of the brain.", "E": "Abscesses are typically ring-enhancing and associated with systemic signs of infection like fever."}, "hint": "Consider the timing of the injury and how the density of blood on CT changes over several weeks.", "part": 1}, {"stem": "A patient with a traumatic brain injury is found to have a blood pressure of 170/90 mmHg, a heart rate of 45 beats/minute, and irregular respirations. This constellation of signs is known as:", "options": {"A": "Cushing's triad", "B": "Beck's triad", "C": "Virchow's triad", "D": "The Lethal Triad", "E": "Horner's syndrome"}, "correct": "A", "rationales": {"A": "Cushing's triad (hypertension, bradycardia, irregular breathing) is a late sign of severely raised intracranial pressure and impending herniation.", "B": "Beck's triad consists of hypotension, muffled heart sounds, and distended neck veins, indicating cardiac tamponade.", "C": "Virchow's triad describes the three factors contributing to thrombosis: stasis, hypercoagulability, and endothelial injury.", "D": "The lethal triad in trauma refers to acidosis, coagulopathy, and hypothermia.", "E": "Horner's syndrome involves miosis, ptosis, and anhidrosis due to sympathetic nerve chain disruption."}, "hint": "This eponym describes the physiological response to terminal intracranial hypertension.", "part": 1}, {"stem": "A trauma patient has a suspected massive haemothorax. A chest drain is inserted and immediately drains 1,600 mL of blood. What is the most appropriate next management step?", "options": {"A": "Immediate emergency thoracotomy", "B": "Clamping the chest tube to stop the bleeding", "C": "Observation and repeat CXR in 4 hours", "D": "Administration of 1 unit of packed red blood cells and reassessment", "E": "Transfer to CT Angiogram to find the bleeding vessel"}, "correct": "A", "rationales": {"A": "An initial drain output of > 1,500 mL (or > 200 mL/hr for 2-4 hours) is a standard indication for operative intervention in trauma.", "B": "Clamping the tube will simply cause the blood to accumulate in the chest, potentially leading to tension physiology or cardiac compression.", "C": "A massive haemothorax is a surgical emergency; 'watchful waiting' after such a high output is inappropriate.", "D": "While transfusion is needed, the volume of loss indicates a surgical source that will not be managed by simple transfusion alone.", "E": "The patient meets the physiological criteria for surgery; delays for imaging in the setting of massive haemorrhage are dangerous."}, "hint": "Identify the quantitative threshold for immediate surgical exploration in thoracic trauma.", "part": 1}, {"stem": "An adult patient is involved in a house fire and presents with singed nasal hairs, carbonaceous sputum, and a hoarse voice. He is currently breathing comfortably with an SpO_{2} of 98% on room air. What is the most appropriate next step?", "options": {"A": "Early endotracheal intubation", "B": "Administer nebulised adrenaline and observe", "C": "Perform a peak flow test to assess lower airway function", "D": "Discharge with advice to return if he develops difficulty breathing", "E": "Start the Parkland formula based on the facial burns only"}, "correct": "A", "rationales": {"A": "Clinical indicators of inhalation injury (facial burns, hoarseness, soot) predict rapid upper airway oedema; early intubation is safer than waiting for stridor.", "B": "Nebulisers may provide temporary relief but do not secure the airway against the progressive swelling characteristic of thermal airway burns.", "C": "Peak flow is not useful for assessing the risk of upper airway obstruction due to oedema.", "D": "Inhalation injury is dynamic; the airway can close completely within hours, making 'watch and see' at home extremely dangerous.", "E": "The priority is the airway; fluid resuscitation is secondary and superficial burns (common on the face) are not included in the formula."}, "hint": "Thermal injuries to the airway are dynamic and can lead to sudden, total obstruction.", "part": 1}, {"stem": "A 24-year-old male sustained a 'fight bite' laceration over his 3rd MCP joint during an altercation 6 hours ago. On exam, the wound is 1 cm and appears clean. What is the most appropriate management?", "options": {"A": "Formal surgical washout in theatre and IV antibiotics", "B": "Primary closure with 4-0 Nylon sutures", "C": "Simple irrigation in the ED and discharge with oral Amoxicillin", "D": "Apply a Steri-Strip and refer to the outpatient hand clinic", "E": "Observe for 24 hours and only treat if signs of infection develop"}, "correct": "A", "rationales": {"A": "Human bites over joints ('fight bites') are high-risk for septic arthritis; they require surgical exploration, irrigation, and should never be closed primarily.", "B": "Primary closure of a 'fight bite' traps oral flora in the joi // ── State ─────────────────────────────────────────────────────────────────────
let current       = 0;
let selected      = null;
let answered      = false;
let score         = 0;
let results       = new Array(QUESTIONS.length).fill(null); 
let flagged       = new Array(QUESTIONS.length).fill(false);
let notes         = new Array(QUESTIONS.length).fill('');
let currentFilter = 'wrong';
let _noteSaveTimer = null;

// ── Firebase ──────────────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey:            "AIzaSyCNnvrEli5lzU3sUFvttTsQPIYQXYK1_WE",
  authDomain:        "nbquiz-6faf9.firebaseapp.com",
  projectId:         "nbquiz-6faf9",
  storageBucket:     "nbquiz-6faf9.firebasestorage.app",
  messagingSenderId: "913114740758",
  appId:             "1:913114740758:web:a856bb9c8eedf3cd629d37",
  measurementId:     "G-8Z4YWVBZEZ"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();
const QUIZ_ID = 'W7/Neuro/v1';
let uid = null;

function sessionRef() {
  return db.collection('quizSessions').doc(uid).collection('quizzes').doc(QUIZ_ID);
}

async function saveState() {
  if (!uid) return;
  try {
    await sessionRef().set({
      results,
      flagged,
      current,
      score,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  } catch (e) { console.warn('Save failed:', e); }
}

async function loadState() {
  if (!uid) return false;
  try {
    const snap = await sessionRef().get();
    if (!snap.exists) return false;
    const data = snap.data();
    results = data.results || new Array(QUESTIONS.length).fill(null);
    flagged = data.flagged || new Array(QUESTIONS.length).fill(false);
    current = typeof data.current === 'number' ? data.current : 0;
    score   = typeof data.score   === 'number' ? data.score   : 0;
    return true;
  } catch (e) { console.warn('Load failed:', e); return false; }
}

// ── Notes (separate doc — never reset by restartQuiz) ─────────────────────────
function notesRef() {
  return db.collection('quizSessions').doc(uid).collection('notes').doc(QUIZ_ID);
}

async function saveNote(idx) {
  if (!uid) return;
  const text = notes[idx] || '';
  const statusEl = document.getElementById('noteSaveStatus');
  try {
    await notesRef().set({ [`n_${idx}`]: text }, { merge: true });
    if (statusEl) statusEl.textContent = 'Saved ✓';
    setTimeout(() => { if (statusEl) statusEl.textContent = ''; }, 1500);
  } catch (e) {
    if (statusEl) statusEl.textContent = 'Save failed';
    console.warn('Note save failed:', e);
  }
}

async function loadNotes() {
  if (!uid) return;
  try {
    const snap = await notesRef().get();
    if (!snap.exists) return;
    const data = snap.data();
    QUESTIONS.forEach((_, i) => {
      if (data[`n_${i}`] !== undefined) notes[i] = data[`n_${i}`];
    });
  } catch (e) { console.warn('Notes load failed:', e); }
}

// ── Sidebar & Init ────────────────────────────────────────────────────────────
function initSidebar() {
  const grid = document.getElementById('qGrid');
  grid.innerHTML = '';
  QUESTIONS.forEach((q, i) => {
    const div = document.createElement('div');
    div.className = 'q-grid-item';
    div.id = `grid-item-${i}`;
    div.onclick = () => jumpTo(i);
    div.innerHTML = `${i + 1}<div class="flag-icon">🚩</div><div class="note-icon">📝</div>`;
    grid.appendChild(div);
  });
}

function updateSidebar() {
  QUESTIONS.forEach((q, i) => {
    const el = document.getElementById(`grid-item-${i}`);
    if (!el) return;
    
    // Reset base classes
    el.className = 'q-grid-item';
    
    if (i === current) el.classList.add('active');
    if (flagged[i]) el.classList.add('flagged');
    if (notes[i] && notes[i].trim()) el.classList.add('has-note');
    
    const res = results[i];
    if (res) {
      if (res.skipped) el.classList.add('skipped');
      else if (res.wasCorrect) el.classList.add('correct');
      else el.classList.add('wrong');
    }
  });
  
  // Update answered count
  const answeredCount = results.filter(r => r !== null).length;
  document.getElementById('sidebarCount').textContent = `${answeredCount}/${QUESTIONS.length}`;
}

function copySidebarResults() {
  let text = "Quiz Status:\\n\\n";
  
  QUESTIONS.forEach((q, idx) => {
    const r = results[idx];
    let status = "unanswered";
    if (r) {
      if (r.wasCorrect) status = "correct";
      else if (!r.skipped) status = "wrong";
    }
    
    let flagText = flagged[idx] ? " (flagged)" : "";
    text += `${idx + 1}. ${status}${flagText}\\n`;
  });

  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('sidebarCopyBtn');
    const origText = btn.innerHTML;
    btn.innerHTML = '✅ Copied!';
    setTimeout(() => { btn.innerHTML = origText; }, 2000);
  }).catch(err => {
    alert("Failed to copy status: " + err);
  });
}


function renderQuestion(idx) {
  const q   = QUESTIONS[idx];
  answered  = false;
  selected  = null;

  document.getElementById('qLabel').textContent = `Question ${idx + 1}`;
  document.getElementById('partTag').textContent = `Part ${q.part}`;
  document.getElementById('stem').textContent    = q.stem;
  
  // Update flag button state
  const flagBtn = document.getElementById('flagBtn');
  flagBtn.textContent = flagged[idx] ? '🚩 Unflag' : '⚑ Flag';
  flagBtn.style.borderColor = flagged[idx] ? 'var(--wrong-ring)' : 'var(--border)';
  flagBtn.style.color = flagged[idx] ? 'var(--wrong)' : 'var(--text-2)';

  // Note
  const noteTextarea = document.getElementById('noteTextarea');
  const noteToggleBtn = document.getElementById('noteToggleBtn');
  const noteBody = document.getElementById('noteBody');
  const noteSaveStatus = document.getElementById('noteSaveStatus');
  noteTextarea.value = notes[idx] || '';
  noteSaveStatus.textContent = '';
  noteBody.classList.remove('open');
  const hasNote = notes[idx] && notes[idx].trim();
  noteToggleBtn.textContent = hasNote ? '📝 View / edit note' : '📝 Add note';
  noteToggleBtn.classList.toggle('has-note', !!hasNote);

  // Hint
  const hw = document.getElementById('hintWrap');
  const hb = document.getElementById('hintBody');
  if (q.hint) {
    hw.style.display = 'block';
    hb.textContent   = q.hint;
    hb.classList.remove('open');
  } else {
    hw.style.display = 'none';
  }

  // Options
  const optContainer = document.getElementById('options');
  optContainer.innerHTML = '';
  const letters = Object.keys(q.options).sort();
  letters.forEach(letter => {
    const btn = document.createElement('button');
    btn.className  = 'option';
    btn.dataset.letter = letter;
    btn.onclick    = () => selectOption(letter);

    const rat  = q.rationales[letter] || '';
    btn.innerHTML = `
      <div class="opt-letter">${letter}</div>
      <div class="opt-body">
        <div class="opt-text">${escHtml(q.options[letter])}</div>
        ${rat ? `<div class="opt-rationale" id="rat-${letter}">${escHtml(rat)}</div>` : ''}
      </div>
      <div class="opt-icon" id="icon-${letter}"></div>
    `;
    optContainer.appendChild(btn);
  });

  // Footer
  document.getElementById('submitBtn').disabled  = true;
  document.getElementById('submitBtn').textContent = 'Check answer';
  document.getElementById('skipBtn').textContent = 'Skip →';
  document.getElementById('skipBtn').style.display = '';
  setFeedback('', '');

  updateSidebar();
  updateProgress();
  
  document.getElementById('quizCard').style.animation = 'none';
  requestAnimationFrame(() => {
    document.getElementById('quizCard').style.animation = 'fadeUp .3s ease both';
  });
}

function toggleHint() {
  const hb = document.getElementById('hintBody');
  const btn = document.querySelector('.hint-toggle');
  const isOpen = hb.classList.toggle('open');
  btn.textContent = isOpen ? '💡 Hide hint' : '💡 Show hint';
}

function toggleNote() {
  const noteBody = document.getElementById('noteBody');
  const isOpen = noteBody.classList.toggle('open');
  if (isOpen) {
    document.getElementById('noteTextarea').focus();
  }
}

function onNoteInput() {
  const idx = current;
  const text = document.getElementById('noteTextarea').value;
  notes[idx] = text;
  const btn = document.getElementById('noteToggleBtn');
  const hasNote = text.trim().length > 0;
  btn.textContent = hasNote ? '📝 View / edit note' : '📝 Add note';
  btn.classList.toggle('has-note', hasNote);
  document.getElementById('noteSaveStatus').textContent = 'Saving…';
  clearTimeout(_noteSaveTimer);
  _noteSaveTimer = setTimeout(() => {
    saveNote(idx);
    updateSidebar();
  }, 800);
}

function toggleFlag() {
  flagged[current] = !flagged[current];
  const flagBtn = document.getElementById('flagBtn');
  flagBtn.textContent = flagged[current] ? '🚩 Unflag' : '⚑ Flag';
  flagBtn.style.borderColor = flagged[current] ? 'var(--wrong-ring)' : 'var(--border)';
  flagBtn.style.color = flagged[current] ? 'var(--wrong)' : 'var(--text-2)';
  updateSidebar();
  saveState();
}

function selectOption(letter) {
  if (answered) return;
  selected = letter;
  document.querySelectorAll('.option').forEach(el => {
    el.classList.toggle('selected', el.dataset.letter === letter);
  });
  document.getElementById('submitBtn').disabled = false;
}

function submitAnswer() {
  if (!selected || answered) return;
  answered = true;

  const q = QUESTIONS[current];
  const isCorrect = selected === q.correct;

  // Save result to the fixed array index
  results[current] = { q: current, chosen: selected, correct: q.correct, wasCorrect: isCorrect, skipped: false };
  
  // Recalculate score safely
  score = results.filter(r => r && r.wasCorrect).length;

  // Lock options & colour them
  document.querySelectorAll('.option').forEach(el => {
    el.classList.add('locked');
    const l = el.dataset.letter;
    if (l === q.correct) {
      el.classList.add('correct');
      document.getElementById(`icon-${l}`).textContent = '✅';
    } else if (l === selected && !isCorrect) {
      el.classList.add('wrong');
      document.getElementById(`icon-${l}`).textContent = '❌';
    } else {
      el.classList.add('dimmed');
    }
    // Show rationale
    const rat = document.getElementById(`rat-${l}`);
    if (rat) rat.classList.add('visible');
  });

  if (isCorrect) setFeedback('✅ Correct!', 'correct');
  else setFeedback(`❌ The answer was ${q.correct}`, 'wrong');

  document.getElementById('submitBtn').textContent = current < QUESTIONS.length - 1 ? 'Next →' : 'See results';
  document.getElementById('submitBtn').onclick = nextQuestion;
  document.getElementById('submitBtn').disabled = false;
  document.getElementById('skipBtn').style.display = 'none';

  updateSidebar();
  updateProgress();
  saveState();
}

function nextQuestion() {
  if (!answered) {
    results[current] = { q: current, chosen: null, correct: QUESTIONS[current].correct, wasCorrect: false, skipped: true };
  }
  current++;
  saveState();
  if (current >= QUESTIONS.length) {
    showResults();
  } else {
    renderQuestion(current);
    document.getElementById('submitBtn').onclick = submitAnswer;
  }
}

// ── Progress & score ──────────────────────────────────────────────────────────
function updateProgress() {
  const answeredCount = results.filter(r => r !== null).length;
  const pct = Math.round((answeredCount / QUESTIONS.length) * 100);
  
  document.getElementById('progressFill').style.width  = pct + '%';
  document.getElementById('progressLabel').textContent = `Answered ${answeredCount} of ${QUESTIONS.length}`;
  document.getElementById('progressPct').textContent   = pct + '%';
  document.getElementById('scoreDisplay').textContent  = `${score} / ${answeredCount}`;
}

function setFeedback(msg, cls) {
  const el = document.getElementById('feedbackMsg');
  el.textContent  = msg;
  el.className    = 'feedback-msg' + (cls ? ' ' + cls : '');
  el.style.visibility = msg ? 'visible' : 'hidden';
}

// ── Results & Review Panel ────────────────────────────────────────────────────
function showResults() {
  document.getElementById('quizCard').classList.add('hidden');
  document.getElementById('progressWrap').classList.add('hidden');

  const total   = QUESTIONS.length;
  const correct = results.filter(r => r && r.wasCorrect).length;
  const wrong   = results.filter(r => r && !r.wasCorrect && !r.skipped).length;
  const skipped = results.filter(r => r === null || r.skipped).length;
  const pct     = Math.round((correct / total) * 100);

  document.getElementById('resultsGrade').textContent   = pct + '%';
  document.getElementById('correctCount').textContent   = correct;
  document.getElementById('wrongCount').textContent     = wrong;
  document.getElementById('skippedCount').textContent   = skipped;
  document.getElementById('totalQ').textContent         = total;

  let label = '';
  if (pct >= 90) label = '🏆 Outstanding performance!';
  else if (pct >= 75) label = '🎯 Great work — above pass mark!';
  else if (pct >= 60) label = '📚 Good effort — review the misses.';
  else label = "💪 Keep studying — you'll get there!";
  
  document.getElementById('resultsLabel').textContent = label;
  document.getElementById('resultsScreen').classList.add('visible');
}

function showReview() {
  const section = document.getElementById('reviewSection');
  section.classList.toggle('hidden');
  
  if (!section.classList.contains('hidden')) {
    const correctCount = results.filter(r => r && r.wasCorrect).length;
    filterReview(correctCount === QUESTIONS.length ? 'all' : 'wrong');
  }
}

function filterReview(type) {
  currentFilter = type;
  document.getElementById('filterAll').classList.toggle('active', type === 'all');
  document.getElementById('filterWrong').classList.toggle('active', type === 'wrong');
  document.getElementById('filterFlagged').classList.toggle('active', type === 'flagged');
  document.getElementById('filterNotes').classList.toggle('active', type === 'notes');
  renderReviewList();
}

function renderReviewList() {
  const list = document.getElementById('reviewList');
  list.innerHTML = '';
  
  QUESTIONS.forEach((q, i) => {
    const r = results[i];
    const isFlagged = flagged[i];
    const hasNote = notes[i] && notes[i].trim();
    const isCorrect = r && r.wasCorrect;
    const isUnanswered = !r || r.skipped;

    if (currentFilter === 'wrong' && isCorrect) return;
    if (currentFilter === 'flagged' && !isFlagged) return;
    if (currentFilter === 'notes' && !hasNote) return;

    const div = document.createElement('div');
    div.className = 'review-item';
    div.style.flexDirection = 'column';
    div.style.alignItems = 'stretch';
    const stemShort = q.stem.length > 100 ? q.stem.slice(0, 100) + '…' : q.stem;
    
    let statusText = isUnanswered ? 'Unanswered' : (isCorrect ? 'Correct' : 'Wrong');
    let displayDetail = isUnanswered ? '' : `(${r.chosen} → ${r.correct})`;
    let flagHTML = isFlagged ? '<span style="color:var(--wrong); font-size:0.8rem; margin-left:6px;">🚩</span>' : '';
    let noteIndicator = hasNote ? '<span style="font-size:0.8rem; margin-left:6px;">📝</span>' : '';

    div.innerHTML = `
      <div style="display:flex;align-items:flex-start;gap:14px;" onclick="jumpTo(${i})">
        <div class="review-dot ${isCorrect ? 'correct' : 'wrong'}" style="margin-top:6px;flex-shrink:0;"></div>
        <div class="review-text" style="flex:1;">Q${i + 1}. ${escHtml(stemShort)}${flagHTML}${noteIndicator}</div>
        <div class="review-answer" style="flex-shrink:0;"><span class="status-${statusText}">${statusText}</span> ${displayDetail}</div>
      </div>
      ${hasNote ? `<div class="review-note">${escHtml(notes[i])}</div>` : ''}
    `;
    list.appendChild(div);
  });
  
  if (list.innerHTML === '') {
    list.innerHTML = '<div style="color:var(--text-3);font-size:.9rem;padding:12px;">No questions match this filter.</div>';
  }
}

function copyResults() {
  let text = "Quiz Results Summary:\\n\\n";
  
  QUESTIONS.forEach((q, idx) => {
    const r = results[idx];
    let status = "Unanswered";
    if (r) {
      if (r.wasCorrect) status = "Correct";
      else if (!r.skipped) status = "Wrong";
    }
    let flagText = flagged[idx] ? " [FLAGGED]" : "";
    text += "Q" + (idx + 1) + ": " + status + flagText + "\\n";
  });

  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    const origText = btn.innerHTML;
    btn.innerHTML = '✅ Copied!';
    setTimeout(() => { btn.innerHTML = origText; }, 2000);
  }).catch(err => {
    alert("Failed to copy results: " + err);
  });
}

function jumpTo(idx) {
  document.getElementById('resultsScreen').classList.remove('visible');
  document.getElementById('quizCard').classList.remove('hidden');
  document.getElementById('progressWrap').classList.remove('hidden');
  
  current = idx;
  answered = false;
  selected = null;
  renderQuestion(idx);
  
  // Auto-replay the answer if it was previously answered
  const r = results[idx];
  if (r && !r.skipped) {
    selected = r.chosen;
    submitAnswer(); 
  }
}

function restartQuiz() {
  current  = 0;
  score    = 0;
  results  = new Array(QUESTIONS.length).fill(null);
  flagged  = new Array(QUESTIONS.length).fill(false);
  answered = false;
  selected = null;
  
  document.getElementById('resultsScreen').classList.remove('visible');
  document.getElementById('reviewSection').classList.add('hidden');
  document.getElementById('quizCard').classList.remove('hidden');
  document.getElementById('progressWrap').classList.remove('hidden');
  document.getElementById('submitBtn').onclick = submitAnswer;
  
  saveState();
  initSidebar();
  renderQuestion(0);
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Auth ──────────────────────────────────────────────────────────────────────
const provider = new firebase.auth.GoogleAuthProvider();

function signInWithGoogle() {
  document.getElementById('loginError').textContent = '';
  auth.signInWithPopup(provider).catch(err => {
    document.getElementById('loginError').textContent = 'Sign-in failed. Please try again.';
    console.error(err);
  });
}

function signOut() {
  auth.signOut();
}

async function startQuiz(user) {
  uid = user.uid;
  document.getElementById('loginScreen').classList.add('hidden');
  const restored = await loadState();
  await loadNotes();
  initSidebar();
  if (restored && results.some(r => r !== null)) {
    renderQuestion(current);
    const r = results[current];
    if (r && !r.skipped) {
      selected = r.chosen;
      submitAnswer();
    }
    updateProgress();
  } else {
    renderQuestion(0);
  }
}

// ── Boot ──────────────────────────────────────────────────────────────────────
initSidebar();

auth.onAuthStateChanged(user => {
  if (user) {
    startQuiz(user);
  } else {
    document.getElementById('loginScreen').classList.remove('hidden');
  }
});
</script>
</body>
