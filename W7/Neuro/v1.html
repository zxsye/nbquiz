<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>W7 · Neuro · v1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:           #f7f5f0;
  --surface:      #ffffff;
  --surface-2:    #f0ede6;
  --border:       #e2ddd5;
  --text:         #1a1714;
  --text-2:       #5a534a;
  --text-3:       #9a8f83;
  --accent:       #2563a8;
  --accent-light: #dbeafe;
  --correct:      #166534;
  --correct-bg:   #dcfce7;
  --correct-ring: #4ade80;
  --wrong:        #991b1b;
  --wrong-bg:     #fee2e2;
  --wrong-ring:   #f87171;
  --hint:         #92400e;
  --hint-bg:      #fef3c7;
  --radius:       10px;
  --radius-lg:    16px;
  --shadow:       0 1px 3px rgba(0,0,0,.07), 0 4px 16px rgba(0,0,0,.06);
  --shadow-lg:    0 4px 6px rgba(0,0,0,.07), 0 12px 32px rgba(0,0,0,.1);
  --font-serif:   'Crimson Pro', Georgia, serif;
  --font-sans:    'DM Sans', system-ui, sans-serif;
  --font-mono:    'DM Mono', monospace;
  --transition:   200ms cubic-bezier(.4,0,.2,1);
}

body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: row;
  align-items: flex-start;
  overflow: hidden;
}

/* ── Sidebar ── */
.sidebar {
  width: 320px;
  height: 100vh;
  overflow-y: auto;
  background: var(--surface);
  border-right: 1.5px solid var(--border);
  padding: 24px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
}
.home-btn {
  display: inline-flex;
  align-items: center;
  font-size: .8rem;
  font-weight: 500;
  color: var(--text-3);
  text-decoration: none;
  margin-bottom: 16px;
  transition: color var(--transition);
}
.home-btn:hover { color: var(--accent); }
.sidebar-header {
  font-family: var(--font-serif);
  font-size: 1.3rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.q-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(42px, 1fr));
  gap: 8px;
  margin-bottom: 24px;
}
.q-grid-item {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 6px;
  border: 1.5px solid var(--border);
  font-family: var(--font-mono);
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  position: relative;
  color: var(--text-2);
  background: var(--bg);
  transition: all 0.2s;
}
.q-grid-item:hover { border-color: var(--text-3); }
.q-grid-item.active { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); color: var(--accent); }
.q-grid-item.correct { background: var(--correct-bg); border-color: var(--correct-ring); color: var(--correct); }
.q-grid-item.wrong { background: var(--wrong-bg); border-color: var(--wrong-ring); color: var(--wrong); }
.q-grid-item.skipped { background: var(--surface-2); border-color: var(--text-3); color: var(--text-2); opacity: 0.8; }

.flag-icon {
  position: absolute;
  top: -6px;
  right: -6px;
  font-size: 12px;
  background: #fff;
  border-radius: 50%;
  box-shadow: 0 1px 2px rgba(0,0,0,0.2);
  display: none;
  width: 16px;
  height: 16px;
  align-items: center;
  justify-content: center;
}
.q-grid-item.flagged .flag-icon { display: flex; }

/* ── Main Content ── */
.main-content {
  flex: 1;
  height: 100vh;
  overflow-y: auto;
  padding: 24px 32px 80px;
}

/* ── Header ── */
.app-header {
  width: 100%;
  max-width: 780px;
  margin: 0 auto 32px auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 0 24px;
  border-bottom: 1.5px solid var(--border);
}
.app-title {
  font-family: var(--font-serif);
  font-size: 1.5rem;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -.01em;
}
.app-title span { color: var(--accent); }
.score-badge {
  font-family: var(--font-mono);
  font-size: .8rem;
  font-weight: 500;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 99px;
  padding: 6px 14px;
  color: var(--text-2);
  display: flex;
  gap: 6px;
  align-items: center;
}
.score-badge .score-num { color: var(--text); font-weight: 600; }

/* ── Progress bar ── */
.progress-wrap { 
  width: 100%; 
  max-width: 780px; 
  margin: 0 auto 28px auto; 
}
.progress-meta { display: flex; justify-content: space-between; font-size: .78rem; color: var(--text-3); margin-bottom: 7px; font-family: var(--font-mono); }
.progress-track { height: 5px; background: var(--border); border-radius: 99px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width 400ms cubic-bezier(.4,0,.2,1); }

/* ── Card ── */
.card {
  width: 100%;
  max-width: 1060px;
  margin: 0 auto;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow);
  overflow: hidden;
  animation: fadeUp .3s ease both;
  display: grid;
  grid-template-columns: minmax(0, 1fr) 260px;
  grid-template-rows: auto auto auto 1fr auto;
}
@keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

.card-header { grid-column: 1; padding: 20px 28px 0; display: flex; align-items: center; gap: 10px; }
.q-label { font-family: var(--font-mono); font-size: .7rem; font-weight: 500; color: var(--text-3); text-transform: uppercase; letter-spacing: .08em; }
.part-tag { font-family: var(--font-mono); font-size: .65rem; font-weight: 500; background: var(--surface-2); border: 1px solid var(--border); border-radius: 4px; padding: 2px 7px; color: var(--text-3); }

.stem { grid-column: 1; font-family: var(--font-serif); font-size: 1.25rem; line-height: 1.65; color: var(--text); padding: 16px 28px 24px; border-bottom: 1px solid var(--border); }

/* ── Hint ── */
.hint-wrap { grid-column: 1; padding: 0 28px; margin-top: 20px; }
.hint-toggle { display: inline-flex; align-items: center; gap: 7px; font-size: .8rem; font-weight: 500; color: var(--hint); cursor: pointer; background: none; border: 1.5px solid #d97706; border-radius: 99px; padding: 5px 14px; transition: background var(--transition); }
.hint-toggle:hover { background: var(--hint-bg); }
.hint-body { margin-top: 10px; padding: 12px 16px; background: var(--hint-bg); border-left: 3px solid #f59e0b; border-radius: 0 var(--radius) var(--radius) 0; font-size: .9rem; color: var(--hint); line-height: 1.55; display: none; }
.hint-body.open { display: block; animation: fadeIn .2s ease; }

/* ── Notes ── */
.note-wrap {
  grid-column: 2;
  grid-row: 1 / -1;
  border-left: 1.5px solid var(--border);
  padding: 20px 18px;
  display: flex;
  flex-direction: column;
  background: var(--surface-2);
}
.note-side-header {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: .72rem;
  font-weight: 600;
  color: var(--text-3);
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: .07em;
  margin-bottom: 10px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}
.note-toggle { display: none; }
.note-body { display: flex; flex-direction: column; flex: 1; margin-top: 0; }
.note-textarea { flex: 1; min-height: 140px; width: 100%; padding: 10px 12px; font-family: var(--font-sans); font-size: .85rem; color: var(--text); background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); resize: none; outline: none; transition: border-color var(--transition); line-height: 1.55; box-sizing: border-box; }
.note-textarea:focus { border-color: var(--accent); }
.note-save-status { font-size: .7rem; color: var(--text-3); margin-top: 5px; text-align: right; font-family: var(--font-mono); min-height: 1em; }
.note-icon { position: absolute; top: -5px; left: -5px; font-size: 9px; background: var(--accent-light); border: 1px solid var(--accent); border-radius: 50%; display: none; width: 14px; height: 14px; align-items: center; justify-content: center; }
.q-grid-item.has-note .note-icon { display: flex; }
.review-note { margin-top: 8px; padding: 8px 12px; background: var(--accent-light); border-radius: 6px; font-size: .82rem; color: var(--text-2); line-height: 1.45; border-left: 3px solid var(--accent); white-space: pre-wrap; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

/* ── Options ── */
.options { grid-column: 1; padding: 20px 28px 28px; display: flex; flex-direction: column; gap: 10px; }
.option { display: flex; align-items: flex-start; gap: 14px; padding: 14px 16px; border: 1.5px solid var(--border); border-radius: var(--radius); cursor: pointer; background: var(--surface); transition: border-color var(--transition), background var(--transition), box-shadow var(--transition); text-align: left; width: 100%; position: relative; }
.option:hover:not(.locked) { border-color: var(--accent); background: var(--accent-light); box-shadow: 0 0 0 3px rgba(37,99,168,.1); }
.option.selected:not(.locked) { border-color: var(--accent); background: var(--accent-light); box-shadow: 0 0 0 3px rgba(37,99,168,.15); }
.option.correct { border-color: var(--correct-ring); background: var(--correct-bg); box-shadow: 0 0 0 3px rgba(74,222,128,.2); }
.option.wrong { border-color: var(--wrong-ring); background: var(--wrong-bg); box-shadow: 0 0 0 3px rgba(248,113,113,.2); }
.option.dimmed { opacity: .5; }

.opt-letter { flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%; background: var(--surface-2); border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: .78rem; font-weight: 500; color: var(--text-2); transition: background var(--transition), border-color var(--transition), color var(--transition); }
.option.correct .opt-letter { background:#4ade80; border-color:#4ade80; color:#14532d; }
.option.wrong   .opt-letter { background:#f87171; border-color:#f87171; color:#7f1d1d; }
.option.selected:not(.locked) .opt-letter { background:var(--accent); border-color:var(--accent); color:#fff; }

.opt-body { flex: 1; }
.opt-text { font-size: .95rem; line-height: 1.5; color: var(--text); }
.opt-rationale { margin-top: 8px; font-size: .83rem; color: var(--text-2); line-height: 1.5; padding-top: 8px; border-top: 1px solid rgba(0,0,0,.06); display: none; }
.opt-rationale.visible { display: block; animation: fadeIn .25s ease; }

.opt-icon { flex-shrink: 0; font-size: 1.1rem; margin-top: 2px; display: none; }
.option.correct .opt-icon, .option.wrong .opt-icon { display:block; }

/* ── Actions ── */
.card-footer { grid-column: 1; padding: 0 28px 28px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.btn { font-family: var(--font-sans); font-size: .9rem; font-weight: 600; border-radius: 99px; padding: 11px 26px; cursor: pointer; border: 1.5px solid transparent; transition: all var(--transition); display: inline-flex; align-items: center; gap: 8px; justify-content: center; }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover { background: #1d4f8a; border-color: #1d4f8a; box-shadow: 0 4px 14px rgba(37,99,168,.3); }
.btn-primary:disabled { opacity:.4; cursor:not-allowed; box-shadow:none; }
.btn-ghost { background: transparent; color: var(--text-2); border-color: var(--border); }
.btn-ghost:hover { background: var(--surface-2); color: var(--text); }

.feedback-msg { font-size: .88rem; font-weight: 600; display: flex; align-items: center; gap: 6px; }
.feedback-msg.correct { color: var(--correct); }
.feedback-msg.wrong   { color: var(--wrong); }

/* ── Results screen ── */
.results-screen { 
  width: 100%; 
  max-width: 780px; 
  margin: 0 auto;
  display: none; 
  flex-direction: column; 
  gap: 24px; 
  animation: fadeUp .4s ease both; 
}
.results-screen.visible { display: flex; }
.results-hero { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); padding: 48px 40px; text-align: center; }
.results-grade { font-family: var(--font-serif); font-size: 5rem; font-weight: 600; line-height: 1; margin-bottom: 8px; background: linear-gradient(135deg, #1a1714 0%, #2563a8 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.results-label { font-size: 1.05rem; color: var(--text-2); margin-bottom: 32px; }
.results-stats { display: flex; justify-content: center; gap: 40px; flex-wrap: wrap; }
.stat { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.stat-num { font-family: var(--font-mono); font-size: 1.8rem; font-weight: 500; color: var(--text); }
.stat-num.green { color: var(--correct); }
.stat-num.red   { color: var(--wrong); }
.stat-label { font-size: .78rem; color: var(--text-3); text-transform: uppercase; letter-spacing: .06em; }
.results-actions { display: flex; justify-content: center; gap: 12px; margin-top: 32px; flex-wrap: wrap; }

/* Review list */
.filter-btn { padding: 5px 14px; font-size: 0.8rem; font-weight: 600; border-radius: 99px; cursor: pointer; border: 1.5px solid var(--border); background: transparent; color: var(--text-2); transition: all var(--transition); }
.filter-btn.active { background: var(--surface-2); color: var(--text); border-color: var(--text-3); }
.review-list { display: flex; flex-direction: column; gap: 12px; }
.review-item { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 16px 20px; cursor: pointer; display: flex; align-items: flex-start; gap: 14px; transition: box-shadow var(--transition); }
.review-item:hover { box-shadow: var(--shadow); }
.review-dot { flex-shrink: 0; width: 10px; height: 10px; border-radius: 50%; margin-top: 6px; }
.review-dot.correct { background: var(--correct-ring); }
.review-dot.wrong   { background: var(--wrong-ring); }
.review-text { flex: 1; font-size: .9rem; color: var(--text-2); line-height: 1.4; }
.review-answer { font-size: .8rem; font-weight: 600; font-family: var(--font-mono); color: var(--text-3); flex-shrink: 0; }
.status-Unanswered { color: var(--text-3); }
.status-Correct { color: var(--correct); }
.status-Wrong { color: var(--wrong); }

/* ── Utility ── */
.hidden { display: none !important; }

/* ── Responsive ── */
@media (max-width: 800px) {
  body { flex-direction: column; overflow-y: auto; }
  .sidebar { width: 100%; height: auto; max-height: 250px; border-right: none; border-bottom: 1.5px solid var(--border); padding: 16px; flex-shrink: 0; }
  .main-content { width: 100%; height: auto; overflow: visible; padding: 20px 16px 80px; }
  .card { display: flex; flex-direction: column; }
  .note-wrap { grid-column: unset; grid-row: unset; border-left: none; border-top: 1.5px solid var(--border); background: var(--surface-2); padding: 14px 20px; }
  .note-side-header { display: none; }
  .note-toggle { display: inline-flex; align-items: center; gap: 7px; font-size: .8rem; font-weight: 500; color: var(--text-2); cursor: pointer; background: none; border: 1.5px solid var(--border); border-radius: 99px; padding: 5px 14px; transition: all var(--transition); }
  .note-toggle:hover { background: var(--surface); }
  .note-toggle.has-note { color: var(--accent); border-color: var(--accent); background: var(--accent-light); }
  .note-body { display: none; flex: none; margin-top: 10px; }
  .note-body.open { display: flex; flex-direction: column; animation: fadeIn .2s ease; }
  .note-textarea { min-height: 90px; resize: vertical; flex: none; }
}
@media (max-width: 520px) {
  .stem { font-size: 1.1rem; padding: 14px 20px 20px; }
  .options { padding: 16px 20px 20px; }
  .card-footer { padding: 0 20px 20px; flex-wrap: wrap; }
  .card-header { padding: 16px 20px 0; }
  .hint-wrap { padding: 0 20px; }
  .note-wrap { padding: 12px 20px; }
  .results-grade { font-size: 3.5rem; }
  .results-stats { gap: 24px; }
}
/* ── Login screen ── */
#loginScreen {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  padding: 24px;
}
#loginScreen.hidden { display: none; }
.login-logo {
  font-family: var(--font-serif);
  font-size: 2.4rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 6px;
  text-align: center;
}
.login-logo span { color: var(--accent); }
.login-sub {
  font-size: .85rem;
  color: var(--text-3);
  margin-bottom: 48px;
  text-align: center;
}
.google-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 13px 28px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 99px;
  font-family: var(--font-sans);
  font-size: .9rem;
  font-weight: 600;
  color: var(--text);
  cursor: pointer;
  transition: border-color var(--transition), background var(--transition);
}
.google-btn:hover { border-color: var(--accent); background: var(--accent-light); }
.login-error {
  margin-top: 16px;
  font-size: .8rem;
  color: var(--wrong);
  min-height: 1em;
  text-align: center;
}
.made-by-login {
  position: fixed;
  bottom: 20px;
  font-size: .72rem;
  color: var(--text-3);
  font-family: var(--font-mono);
  text-align: center;
}
/* ── Persistent credit ── */
.made-by {
  font-size: .68rem;
  color: var(--text-3);
  font-family: var(--font-mono);
  text-align: center;
  padding-top: 12px;
  margin-top: 8px;
  border-top: 1px solid var(--border);
}

</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-logo">NB <span>Quiz</span></div>
  <div class="login-sub">Your personal medical study companion</div>
  <button class="google-btn" onclick="signInWithGoogle()">
    <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
    Continue with Google
  </button>
  <div class="login-error" id="loginError"></div>
  <div class="made-by-login">made by Zi Lin</div>
</div>

<aside class="sidebar">
  <a href="https://zxsye.github.io/nbquiz/" class="home-btn">← Home</a>
  <div class="sidebar-header">
    <span>Quiz Status</span>
    <span style="font-size:0.8rem; color:var(--text-3); font-family:var(--font-mono);" id="sidebarCount">0/28</span>
  </div>
  <div class="q-grid" id="qGrid"></div>
  
  <div style="margin-top:auto; display:flex; flex-direction:column; gap:10px;">
    <button class="btn btn-ghost" id="sidebarCopyBtn" style="width:100%; border: 1.5px solid var(--border); padding: 8px; font-size: 0.85rem;" onclick="copySidebarResults()">📋 Copy Status</button>
    <button class="btn btn-primary" style="width:100%; margin-top:0;" onclick="showResults()">Finish Quiz</button>
    <div class="made-by">made by Zi Lin</div>
  </div>
</aside>

<div class="main-content">
  <header class="app-header">
    <a href="../../../index.html" style="text-decoration:none;">
      <div class="app-title">NB <span>Quiz</span></div>
    </a>
    <div style="display:flex; align-items:center; gap:12px;">
      <div class="score-badge">
        Score&nbsp;<span class="score-num" id="scoreDisplay">0 / 0</span>
      </div>
      <button class="btn btn-ghost" onclick="signOut()" style="padding:6px 14px; font-size:0.8rem;" title="Sign out">Sign out</button>
    </div>
  </header>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-meta">
      <span id="progressLabel">Question 1 of 28</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>

  <div class="card" id="quizCard">

// ── Quiz data ─────────────────────────────────────────────────────────────────
const QUESTIONS = [{"stem": "A 24-year-old male is brought to the Emergency Department following a high-speed motorcycle accident. On arrival, his GCS is 13 (E3, V4, M6). A non-contrast CT head reveals a biconvex, hyperdense collection in the right temporal region with a 3 mm midline shift. One hour later, his GCS drops to 8, and his right pupil becomes fixed and dilated. What is the most appropriate next step in management?", "options": {"A": "Administer IV dexamethasone 16 mg", "B": "Immediate neurosurgical consultation for craniotomy", "C": "Repeat the CT head to assess for haematoma expansion", "D": "Perform a lumbar puncture to exclude associated subarachnoid blood", "E": "Start an urgent IV infusion of 0.9% saline at 250 mL/hr"}, "correct": "B", "rationales": {"A": "Steroids are contraindicated in the management of traumatic brain injury based on the CRASH trial.", "B": "A deteriorating GCS and a blown pupil in the context of an extradural haematoma represent a surgical emergency requiring immediate evacuation.", "C": "Clinical deterioration with signs of herniation is a mandate for action rather than further diagnostic imaging which delays treatment.", "D": "Lumbar puncture is strictly contraindicated in the presence of a mass lesion due to the risk of tonsillar herniation.", "E": "While fluid resuscitation is important, it does not address the primary issue of uncal herniation from the mass effect."}, "hint": "Consider the significance of a 'blown pupil' and a rapid decline in GCS following a temporal blow.", "part": 1}, {"stem": "A 55-year-old female presents with the 'worst headache of her life' that reached maximal intensity within 30 seconds. A non-contrast CT head performed 8 hours after the onset of symptoms is negative for subarachnoid haemorrhage. What is the next best step to definitively exclude the diagnosis?", "options": {"A": "Perform a lumbar puncture immediately", "B": "Perform a lumbar puncture 12 hours after symptom onset", "C": "Discharge the patient with migraine advice", "D": "Order a stat MRI brain with FLAIR sequences", "E": "Start oral Nimodipine 60 mg and reassess in the morning"}, "correct": "B", "rationales": {"A": "Xanthochromia takes at least 12 hours to develop; performing an LP earlier may yield a false negative.", "B": "Spectrophotometry for xanthochromia is the gold standard for CT-negative SAH but requires time for haemoglobin breakdown.", "C": "CT sensitivity for SAH drops after 6 hours, so a negative scan at 8 hours is insufficient to rule out the condition.", "D": "While MRI is useful in subacute stages, LP for xanthochromia remains the standard diagnostic step following a negative acute CT.", "E": "Medical management should not be initiated until the diagnosis is confirmed or highly suspected after appropriate investigations."}, "hint": "The detection of bilirubin in the CSF is time-dependent.", "part": 1}, {"stem": "A 45-year-old construction worker presents with acute-on-chronic lower back pain after lifting a heavy box. He reports 'numbness when wiping' and difficulty initiating urination. On examination, he has reduced anal tone and 3/5 power in bilateral plantarflexion. What is the most appropriate timeframe for obtaining definitive imaging?", "options": {"A": "Within 4 hours", "B": "Within 24 hours", "C": "After a trial of 6 weeks of conservative management", "D": "Only if symptoms do not improve with high-dose NSAIDs", "E": "Within 48 hours as an outpatient"}, "correct": "A", "rationales": {"A": "Suspected Cauda Equina Syndrome is a surgical emergency requiring MRI within 4 hours to prevent permanent neurological deficit.", "B": "Delaying imaging for 24 hours increases the risk of irreversible bowel and bladder dysfunction.", "C": "Conservative management is appropriate for non-specific back pain, but red flags like saddle anaesthesia require immediate investigation.", "D": "Neurological deficits take precedence over pain response when determining the urgency of imaging.", "E": "Cauda Equina Syndrome requires inpatient assessment and emergency surgical pathways."}, "hint": "Saddle anaesthesia and urinary retention indicate a time-critical surgical emergency.", "part": 1}, {"stem": "A 70 kg adult male sustains partial-thickness burns to his entire anterior trunk and the entirety of both upper limbs. Using the Parkland formula (4 mL \\times weight in kg \\times %TBSA), calculate the total volume of Hartmann's solution required in the first 8 hours from the time of the injury.", "options": {"A": "5,040 mL", "B": "10,080 mL", "C": "2,520 mL", "D": "7,560 mL", "E": "3,800 mL"}, "correct": "A", "rationales": {"A": "Total TBSA is 18% (trunk) + 18% (arms) = 36%. Total 24h fluid is 4 \\times 70 \\times 36 = 10,080 mL; half (5,040 mL) is given in the first 8 hours.", "B": "This represents the total 24-hour fluid requirement, not the initial 8-hour volume.", "C": "This calculation likely uses an incorrect TBSA percentage or represents a 4-hour volume.", "D": "This does not align with the standard 50/50 distribution of the Parkland formula.", "E": "This is an incorrect calculation of the percentage or the weight-based formula."}, "hint": "Calculate the total 24-hour requirement first, then determine the portion for the first time interval.", "part": 1}, {"stem": "A 30-year-old female is involved in a motor vehicle accident. She is tachycardic (HR 125) and hypotensive (BP 85/50). On primary survey, the FAST exam is positive for free fluid in Morrison's pouch. What is the most appropriate next step?", "options": {"A": "Transfer immediately to the CT scanner for a pan-scan", "B": "Emergency laparotomy in the operating theatre", "C": "Administer 2 L of Hartmann's solution and reassess the BP", "D": "Perform a diagnostic peritoneal lavage (DPL)", "E": "Apply a pelvic binder and obtain a pelvic X-ray"}, "correct": "B", "rationales": {"A": "Unstable patients with a positive FAST should never go to the CT scanner; they require immediate operative intervention.", "B": "Haemodynamic instability with evidence of intra-abdominal haemorrhage (positive FAST) is an absolute indication for immediate surgery.", "C": "Aggressive crystalloid resuscitation should not delay definitive surgical control of bleeding in an unstable trauma patient.", "D": "DPL is largely superseded by FAST and is unnecessary if the FAST has already confirmed free fluid.", "E": "While pelvic stabilization is part of trauma care, the positive abdominal FAST points to an abdominal source of shock."}, "hint": "Recall the rule about taking unstable patients to the radiology department.", "part": 1}, {"stem": "A patient presents with respiratory distress after a stab wound to the chest. Examination reveals distended neck veins, absent breath sounds on the right, and hyper-resonance to percussion on the right side. His blood pressure is 80/40 mmHg. What is the immediate priority?", "options": {"A": "Obtain an urgent portable chest X-ray", "B": "Perform needle decompression in the 2nd intercostal space", "C": "Intubate and start positive pressure ventilation", "D": "Perform an emergency bedside thoracotomy", "E": "Insert a 28Fr chest tube in the safe triangle"}, "correct": "B", "rationales": {"A": "Tension pneumothorax is a clinical diagnosis; waiting for an X-ray can lead to cardiac arrest.", "B": "Immediate decompression is required for tension pneumothorax to resolve obstructive shock before definitive chest tube insertion.", "C": "Positive pressure ventilation can actually worsen a tension pneumothorax by increasing intrathoracic pressure.", "D": "Thoracotomy is indicated for massive haemothorax or cardiac tamponade, not primarily for a tension pneumothorax.", "E": "While a chest tube is definitive, needle decompression is the faster immediate life-saving 'bridge' in an unstable patient."}, "hint": "Obstructive shock in this context requires an immediate clinical maneuver, not a scan.", "part": 1}, {"stem": "An 18-year-old male with a closed tibial fracture reports increasing pain despite escalating doses of morphine. On examination, the leg is tense, and he has excruciating pain when the great toe is passively plantarflexed. His BP is 110/70 mmHg and the intracompartmental pressure is 45 mmHg. What is the calculated \\Delta P and the required management?", "options": {"A": "\\Delta P is 65 mmHg; continue observation", "B": "\\Delta P is 25 mmHg; immediate fasciotomy", "C": "\\Delta P is 35 mmHg; bivalve the cast and elevate the limb", "D": "\\Delta P is 15 mmHg; immediate fasciotomy", "E": "\\Delta P is 25 mmHg; apply a tight compression bandage"}, "correct": "B", "rationales": {"A": "The \\Delta P is calculated using the diastolic pressure, not the systolic or mean pressure.", "B": "\\Delta P = Diastolic BP (70) - Compartment Pressure (45) = 25 mmHg. A \\Delta P < 30 mmHg is an indication for surgery.", "C": "Elevation is avoided in compartment syndrome as it can further reduce arterial perfusion pressure.", "D": "The calculation is incorrect, though the management choice (fasciotomy) would be correct for that value.", "E": "Compression is contraindicated as it increases the pressure within the closed compartment."}, "hint": "The formula for perfusion safety involves the diastolic blood pressure.", "part": 1}, {"stem": "A 35-year-old female with a known pituitary macroadenoma presents with a sudden 'thunderclap' headache, bilateral vision loss, and ptosis. She is found to be hypotensive and confused. What is the most critical initial intervention?", "options": {"A": "Urgent MRI of the pituitary gland", "B": "Administration of 100 mg IV hydrocortisone", "C": "Immediate transsphenoidal surgical decompression", "D": "Stat dose of oral Cabergoline", "E": "Aspirin 300 mg to treat suspected ischaemic stroke"}, "correct": "B", "rationales": {"A": "Imaging is necessary but should follow the management of life-threatening adrenal crisis.", "B": "Pituitary apoplexy causes acute ACTH deficiency; treating the resulting adrenal crisis is life-saving and takes priority.", "C": "Surgery is the definitive treatment for vision loss but the patient must be stabilized medically first.", "D": "Dopamine agonists are used for prolactinomas but have no role in the acute management of pituitary apoplexy.", "E": "The presentation strongly suggests apoplexy; aspirin could worsen haemorrhage into the tumour."}, "hint": "Think about the hormonal deficiency that could cause sudden cardiovascular collapse.", "part": 1}, {"stem": "A 60-year-old patient presents with a new-onset headache and an isolated right-sided third cranial nerve palsy with a fixed, dilated pupil. Which of the following is the most likely underlying pathology?", "options": {"A": "Aneurysm of the Posterior Communicating Artery (PComA)", "B": "Diabetic mononeuropathy of the oculomotor nerve", "C": "Aneurysm of the Anterior Communicating Artery (AComA)", "D": "Ischaemic stroke in the occipital lobe", "E": "Tension-type headache"}, "correct": "A", "rationales": {"A": "PComA aneurysms are anatomically located near CN III; a pupil-involving palsy suggests external compression of the nerve's parasympathetic fibers.", "B": "Diabetic CN III palsies are typically 'pupil-sparing' because they affect the internal vasa nervorum rather than external fibers.", "C": "AComA aneurysms more commonly present with visual field defects or frontal lobe symptoms rather than CN III palsy.", "D": "Occipital strokes cause visual field defects (hemianopia) rather than ocular motility or pupil issues.", "E": "Tension headaches do not present with focal neurological deficits like cranial nerve palsies."}, "hint": "This specific artery is a common site for berry aneurysms and lies in close proximity to the third nerve.", "part": 1}, {"stem": "A 68-year-old man underwent an elective laminectomy yesterday. This morning, the nurse finds him difficult to rouse. His GCS is 11 (E3, V3, M5). What is the first investigation that should be performed at the bedside?", "options": {"A": "Blood Glucose Level (BSL)", "B": "Urgent CT Head", "C": "Arterial Blood Gas (ABG)", "D": "Full Blood Count (FBC)", "E": "C-reactive protein (CRP)"}, "correct": "A", "rationales": {"A": "Hypoglycaemia is a rapidly reversible cause of altered consciousness and should be excluded first in any post-operative GCS decline.", "B": "A CT may be needed, but bedside exclusions for metabolic or respiratory causes come first.", "C": "ABG is useful for detecting hypercapnia or hypoxia, but BSL is faster and more immediately treatable.", "D": "FBC will not provide an immediate explanation for an acute drop in level of consciousness.", "E": "CRP is a marker of inflammation and does not assist in the acute diagnosis of decreased LOC."}, "hint": "Identify the most easily reversible and common metabolic cause of altered awareness.", "part": 1}, {"stem": "Which of the following statements regarding the use of steroids in neurosurgery is correct according to the provided material?", "options": {"A": "Dexamethasone is indicated in traumatic brain injury to reduce oedema", "B": "Dexamethasone should be used in ischaemic stroke to prevent herniation", "C": "Dexamethasone is effective for reducing vasogenic oedema in brain tumours", "D": "Steroids should be administered immediately in cases of suspected CNS lymphoma", "E": "Hydrocortisone is the steroid of choice for treating cerebral contusions"}, "correct": "C", "rationales": {"A": "The CRASH trial demonstrated increased mortality when steroids were used for TBI.", "B": "Steroids are contraindicated in ischaemic stroke as they can increase the risk of haemorrhagic transformation.", "C": "Steroids are highly effective at stabilizing the blood-brain barrier and reducing oedema caused by tumours and abscesses.", "D": "Steroids can cause lymphoma to regress, making it difficult to obtain a definitive tissue diagnosis via biopsy.", "E": "Steroids are generally avoided in trauma settings regardless of the specific injury type (contusion vs haematoma)."}, "hint": "Steroids have different effects depending on whether the oedema is cytotoxic or vasogenic.", "part": 1}, {"stem": "A 72-year-old female presents to the ED after a fall. She has no loss of consciousness but cannot remember the events immediately following the fall. She is currently on Warfarin for atrial fibrillation. According to NICE criteria, which of the following is correct regarding her imaging?", "options": {"A": "She does not require a CT head as she did not lose consciousness", "B": "She requires a CT head within 1 hour", "C": "She requires a CT head within 8 hours", "D": "She only requires an X-ray of the skull to look for fractures", "E": "She can be discharged if her GCS is 15 at 2 hours"}, "correct": "C", "rationales": {"A": "Anticoagulant use is a significant risk factor that mandates imaging regardless of LOC if there is any amnesia or clinical concern.", "B": "While she needs a scan, 'within 1 hour' is reserved for GCS <13, focal deficits, or signs of skull fracture.", "C": "Amnesia plus age \\ge 65 or coagulopathy/anticoagulant use meets the criteria for a CT head within 8 hours.", "D": "Skull X-rays are not used for assessing intracranial pathology in TBI; CT is the standard of care.", "E": "Patients on anticoagulants with any head injury symptoms require a scan before discharge due to the risk of delayed bleeding."}, "hint": "Medication history and age play a key role in the urgency of TBI imaging.", "part": 1}, {"stem": "In a patient with a confirmed aneurysmal subarachnoid haemorrhage, what is the primary purpose of administering Nimodipine for 21 days?", "options": {"A": "To dissolve the existing subarachnoid clot", "B": "To maintain a Mean Arterial Pressure (MAP) above 80 mmHg", "C": "To reduce the incidence and severity of delayed cerebral ischaemia", "D": "To prevent re-bleeding from the unsecured aneurysm", "E": "To treat acute hydrocephalus by increasing CSF absorption"}, "correct": "C", "rationales": {"A": "Nimodipine is a calcium channel blocker, not a thrombolytic agent.", "B": "Nimodipine can actually lower blood pressure; its benefit is neuroprotection/vasospasm reduction.", "C": "Nimodipine reduces the impact of vasospasm, which typically peaks 4–14 days after the initial haemorrhage.", "D": "Aneurysm securing (coiling/clipping) is the only way to effectively prevent re-bleeding.", "E": "Nimodipine has no effect on CSF dynamics or the treatment of hydrocephalus."}, "hint": "Focus on the secondary injury that typically occurs about a week after the bleed.", "part": 1}, {"stem": "A 22-year-old male presents with a painful, swollen left index finger two days after a minor laceration. On examination, the finger is held in slight flexion, there is fusiform swelling, and he experiences intense pain when you attempt to straighten the finger. What is the most likely diagnosis?", "options": {"A": "Ulnar nerve entrapment", "B": "Acute flexor tenosynovitis", "C": "Trigger finger", "D": "Mallet finger", "E": "Dupuytren’s contracture"}, "correct": "B", "rationales": {"A": "Ulnar nerve issues cause specific sensory/motor deficits but not the localized inflammatory signs of a finger infection.", "B": "The description matches Kanavel's cardinal signs, which indicate an infection within the tendon sheath.", "C": "Trigger finger involves mechanical catching of the tendon, not usually systemic/localized infection signs and fusiform swelling.", "D": "Mallet finger involves the distal extensor tendon and results in an inability to extend the DIPJ, not painful passive extension.", "E": "This is a chronic fibrotic condition of the palmar fascia, not an acute painful infection."}, "hint": "Look for the collective clinical findings known as Kanavel's signs.", "part": 1}, {"stem": "A patient arrives with a 3 cm laceration on the palm of his hand after breaking a glass bottle. What is the most important imaging consideration before closing the wound?", "options": {"A": "No imaging is needed if the wound is thoroughly irrigated", "B": "X-ray of the hand to look for radio-opaque foreign bodies", "C": "Ultrasound of the palm to check for wood fragments", "D": "MRI to assess for occult tendon damage", "E": "CT hand with contrast to check for vascular injury"}, "correct": "B", "rationales": {"A": "Visual inspection alone can miss deep foreign bodies, especially when glass is involved.", "B": "Glass is almost always radio-opaque on plain film X-rays and should be excluded before closure.", "C": "While ultrasound is good for wood, the specific mechanism here (glass) is better evaluated first with X-ray.", "D": "Tendon damage is a clinical diagnosis confirmed by examination or direct visualization, not acute MRI.", "E": "CTA is reserved for suspected major arterial injuries with hard signs of ischaemia."}, "hint": "Consider the radiological properties of common materials like glass.", "part": 1}, {"stem": "Regarding the administration of Tranexamic Acid (TXA) in trauma patients with significant haemorrhage, which of the following is correct?", "options": {"A": "It should be given regardless of the time since injury", "B": "The first dose is 1 g IV over 10 minutes", "C": "It is only indicated if the patient is over the age of 65", "D": "It works by directly promoting platelet aggregation", "E": "It must be avoided in patients with a history of DVT"}, "correct": "B", "rationales": {"A": "TXA given more than 3 hours after injury may actually increase the risk of death.", "B": "The CRASH-2 protocol specifies a 1 g bolus followed by a 1 g maintenance infusion over 8 hours.", "C": "TXA is used in any trauma patient with significant bleeding regardless of age.", "D": "TXA is an antifibrinolytic that prevents the breakdown of clots by inhibiting plasminogen.", "E": "In the setting of life-threatening trauma, the benefit of TXA outweighs the potential risk of thromboembolism."}, "hint": "The timing of this medication is critical for its efficacy.", "part": 1}, {"stem": "A patient is unable to extend their great toe (Extensor Hallucis Longus) following a lumbar disc herniation. Sensation is reduced on the dorsum of the foot. Which nerve root is most likely affected?", "options": {"A": "L3", "B": "L4", "C": "L5", "D": "S1", "E": "S2"}, "correct": "C", "rationales": {"A": "L3 is associated with knee extension and sensation over the distal thigh/knee.", "B": "L4 is primarily associated with the knee-jerk reflex and foot dorsiflexion.", "C": "L5 controls EHL (great toe extension) and provides sensation to the dorsum of the foot.", "D": "S1 is associated with the ankle-jerk reflex, plantarflexion, and the lateral border of the foot.", "E": "S2-S4 are primarily involved in pelvic floor, bladder, and bowel function."}, "hint": "Think of the dermatome and myotome for the most common site of lumbar disc herniation.", "part": 1}, {"stem": "A patient with a traumatic brain injury is noted to have a blood pressure of 180/90 mmHg, a heart rate of 45 beats/min, and an irregular respiratory pattern. What is this clinical triad called, and what does it indicate?", "options": {"A": "Beck’s Triad; cardiac tamponade", "B": "Virchow’s Triad; high risk of DVT", "C": "Cushing’s Triad; severely raised ICP", "D": "Whipple’s Triad; insulinoma", "E": "The Lethal Triad; coagulopathy, acidosis, hypothermia"}, "correct": "C", "rationales": {"A": "Beck’s triad includes muffled heart sounds, JVP distension, and hypotension.", "B": "Virchow’s triad describes factors contributing to thrombosis (stasis, injury, hypercoagulability).", "C": "Cushing's triad is a physiological response to life-threatening intracranial pressure and impending herniation.", "D": "Whipple’s triad involves symptoms of hypoglycaemia, low BSL, and relief upon glucose administration.", "E": "The lethal triad refers to trauma-induced physiological failure, not specifically these neuro-vital signs."}, "hint": "This response is a brainstem reflex to maintain cerebral perfusion pressure.", "pa // ── State ─────────────────────────────────────────────────────────────────────
let current       = 0;
let selected      = null;
let answered      = false;
let score         = 0;
let results       = new Array(QUESTIONS.length).fill(null); 
let flagged       = new Array(QUESTIONS.length).fill(false);
let notes         = new Array(QUESTIONS.length).fill('');
let currentFilter = 'wrong';
let _noteSaveTimer = null;

// ── Firebase ──────────────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey:            "AIzaSyCNnvrEli5lzU3sUFvttTsQPIYQXYK1_WE",
  authDomain:        "nbquiz-6faf9.firebaseapp.com",
  projectId:         "nbquiz-6faf9",

};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();
const QUIZ_ID = 'W7/Neuro/v1';
let uid = null;

function sessionRef() {
  return db.collection('quizSessions').doc(uid).collection('quizzes').doc(QUIZ_ID);
}

async function saveState() {
  if (!uid) return;
  try {
    await sessionRef().set({
      results,
      flagged,
      current,
      score,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  } catch (e) { console.warn('Save failed:', e); }
}

async function loadState() {
  if (!uid) return false;
  try {
    const snap = await sessionRef().get();
    if (!snap.exists) return false;
    const data = snap.data();
    results = data.results || new Array(QUESTIONS.length).fill(null);
    flagged = data.flagged || new Array(QUESTIONS.length).fill(false);
    current = typeof data.current === 'number' ? data.current : 0;
    score   = typeof data.score   === 'number' ? data.score   : 0;
    return true;
  } catch (e) { console.warn('Load failed:', e); return false; }
}

// ── Notes (separate doc — never reset by restartQuiz) ─────────────────────────
function notesRef() {
  return db.collection('quizSessions').doc(uid).collection('notes').doc(QUIZ_ID);
}

async function saveNote(idx) {
  if (!uid) return;
  const text = notes[idx] || '';
  const statusEl = document.getElementById('noteSaveStatus');
  try {
    await notesRef().set({ [`n_${idx}`]: text }, { merge: true });
    if (statusEl) statusEl.textContent = 'Saved ✓';
    setTimeout(() => { if (statusEl) statusEl.textContent = ''; }, 1500);
  } catch (e) {
    if (statusEl) statusEl.textContent = 'Save failed';
    console.warn('Note save failed:', e);
  }
}

async function loadNotes() {
  if (!uid) return;
  try {
    const snap = await notesRef().get();
    if (!snap.exists) return;
    const data = snap.data();
    QUESTIONS.forEach((_, i) => {
      if (data[`n_${i}`] !== undefined) notes[i] = data[`n_${i}`];
    });
  } catch (e) { console.warn('Notes load failed:', e); }
}

// ── Sidebar & Init ────────────────────────────────────────────────────────────
function initSidebar() {
  const grid = document.getElementById('qGrid');
  grid.innerHTML = '';
  QUESTIONS.forEach((q, i) => {
    const div = document.createElement('div');
    div.className = 'q-grid-item';
    div.id = `grid-item-${i}`;
    div.onclick = () => jumpTo(i);
    div.innerHTML = `${i + 1}<div class="flag-icon">🚩</div><div class="note-icon">📝</div>`;
    grid.appendChild(div);
  });
}

function updateSidebar() {
  QUESTIONS.forEach((q, i) => {
    const el = document.getElementById(`grid-item-${i}`);
    if (!el) return;
    
    // Reset base classes
    el.className = 'q-grid-item';
    
    if (i === current) el.classList.add('active');
    if (flagged[i]) el.classList.add('flagged');
    if (notes[i] && notes[i].trim()) el.classList.add('has-note');
    
    const res = results[i];
    if (res) {
      if (res.skipped) el.classList.add('skipped');
      else if (res.wasCorrect) el.classList.add('correct');
      else el.classList.add('wrong');
    }
  });
  
  // Update answered count
  const answeredCount = results.filter(r => r !== null).length;
  document.getElementById('sidebarCount').textContent = `${answeredCount}/${QUESTIONS.length}`;
}

function copySidebarResults() {
  let text = "Quiz Status:\\n\\n";
  
  QUESTIONS.forEach((q, idx) => {
    const r = results[idx];
    let status = "unanswered";
    if (r) {
      if (r.wasCorrect) status = "correct";
      else if (!r.skipped) status = "wrong";
    }
    
    let flagText = flagged[idx] ? " (flagged)" : "";
    text += `${idx + 1}. ${status}${flagText}\\n`;
  });

  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('sidebarCopyBtn');
    const origText = btn.innerHTML;
    btn.innerHTML = '✅ Copied!';
    setTimeout(() => { btn.innerHTML = origText; }, 2000);
  }).catch(err => {
    alert("Failed to copy status: " + err);
  });
}


function renderQuestion(idx) {
  const q   = QUESTIONS[idx];
  answered  = false;
  selected  = null;

  document.getElementById('qLabel').textContent = `Question ${idx + 1}`;
  document.getElementById('partTag').textContent = `Part ${q.part}`;
  document.getElementById('stem').textContent    = q.stem;
  
  // Update flag button state
  const flagBtn = document.getElementById('flagBtn');
  flagBtn.textContent = flagged[idx] ? '🚩 Unflag' : '⚑ Flag';
  flagBtn.style.borderColor = flagged[idx] ? 'var(--wrong-ring)' : 'var(--border)';
  flagBtn.style.color = flagged[idx] ? 'var(--wrong)' : 'var(--text-2)';

  // Note
  const noteTextarea = document.getElementById('noteTextarea');
  const noteToggleBtn = document.getElementById('noteToggleBtn');
  const noteBody = document.getElementById('noteBody');
  const noteSaveStatus = document.getElementById('noteSaveStatus');
  noteTextarea.value = notes[idx] || '';
  noteSaveStatus.textContent = '';
  noteBody.classList.remove('open');
  const hasNote = notes[idx] && notes[idx].trim();
  noteToggleBtn.textContent = hasNote ? '📝 View / edit note' : '📝 Add note';
  noteToggleBtn.classList.toggle('has-note', !!hasNote);

  // Hint
  const hw = document.getElementById('hintWrap');
  const hb = document.getElementById('hintBody');
  if (q.hint) {
    hw.style.display = 'block';
    hb.textContent   = q.hint;
    hb.classList.remove('open');
  } else {
    hw.style.display = 'none';
  }

  // Options
  const optContainer = document.getElementById('options');
  optContainer.innerHTML = '';
  const letters = Object.keys(q.options).sort();
  letters.forEach(letter => {
    const btn = document.createElement('button');
    btn.className  = 'option';
    btn.dataset.letter = letter;
    btn.onclick    = () => selectOption(letter);

    const rat  = q.rationales[letter] || '';
    btn.innerHTML = `
      <div class="opt-letter">${letter}</div>
      <div class="opt-body">
        <div class="opt-text">${escHtml(q.options[letter])}</div>
        ${rat ? `<div class="opt-rationale" id="rat-${letter}">${escHtml(rat)}</div>` : ''}
      </div>
      <div class="opt-icon" id="icon-${letter}"></div>
    `;
    optContainer.appendChild(btn);
  });

  // Footer
  const submitBtn = document.getElementById('submitBtn');
  submitBtn.disabled   = true;
  submitBtn.textContent = 'Check answer';
  submitBtn.onclick    = submitAnswer;
  document.getElementById('skipBtn').textContent = 'Skip →';
  document.getElementById('skipBtn').style.display = '';
  setFeedback('', '');

  updateSidebar();
  updateProgress();
  
  document.getElementById('quizCard').style.animation = 'none';
  requestAnimationFrame(() => {
    document.getElementById('quizCard').style.animation = 'fadeUp .3s ease both';
  });
}

function toggleHint() {
  const hb = document.getElementById('hintBody');
  const btn = document.querySelector('.hint-toggle');
  const isOpen = hb.classList.toggle('open');
  btn.textContent = isOpen ? '💡 Hide hint' : '💡 Show hint';
}

function toggleNote() {
  const noteBody = document.getElementById('noteBody');
  const isOpen = noteBody.classList.toggle('open');
  if (isOpen) {
    document.getElementById('noteTextarea').focus();
  }
}

function onNoteInput() {
  const idx = current;
  const text = document.getElementById('noteTextarea').value;
  notes[idx] = text;
  const btn = document.getElementById('noteToggleBtn');
  const hasNote = text.trim().length > 0;
  btn.textContent = hasNote ? '📝 View / edit note' : '📝 Add note';
  btn.classList.toggle('has-note', hasNote);
  document.getElementById('noteSaveStatus').textContent = 'Saving…';
  clearTimeout(_noteSaveTimer);
  _noteSaveTimer = setTimeout(() => {
    saveNote(idx);
    updateSidebar();
  }, 800);
}

function toggleFlag() {
  flagged[current] = !flagged[current];
  const flagBtn = document.getElementById('flagBtn');
  flagBtn.textContent = flagged[current] ? '🚩 Unflag' : '⚑ Flag';
  flagBtn.style.borderColor = flagged[current] ? 'var(--wrong-ring)' : 'var(--border)';
  flagBtn.style.color = flagged[current] ? 'var(--wrong)' : 'var(--text-2)';
  updateSidebar();
  saveState();
}

function selectOption(letter) {
  if (answered) return;
  selected = letter;
  document.querySelectorAll('.option').forEach(el => {
    el.classList.toggle('selected', el.dataset.letter === letter);
  });
  document.getElementById('submitBtn').disabled = false;
}

function submitAnswer() {
  if (!selected || answered) return;
  answered = true;

  const q = QUESTIONS[current];
  const isCorrect = selected === q.correct;

  // Save result to the fixed array index
  results[current] = { q: current, chosen: selected, correct: q.correct, wasCorrect: isCorrect, skipped: false };
  
  // Recalculate score safely
  score = results.filter(r => r && r.wasCorrect).length;

  // Lock options & colour them
  document.querySelectorAll('.option').forEach(el => {
    el.classList.add('locked');
    const l = el.dataset.letter;
    if (l === q.correct) {
      el.classList.add('correct');
      document.getElementById(`icon-${l}`).textContent = '✅';
    } else if (l === selected && !isCorrect) {
      el.classList.add('wrong');
      document.getElementById(`icon-${l}`).textContent = '❌';
    } else {
      el.classList.add('dimmed');
    }
    // Show rationale
    const rat = document.getElementById(`rat-${l}`);
    if (rat) rat.classList.add('visible');
  });

  if (isCorrect) setFeedback('✅ Correct!', 'correct');
  else setFeedback(`❌ The answer was ${q.correct}`, 'wrong');

  document.getElementById('submitBtn').textContent = current < QUESTIONS.length - 1 ? 'Next →' : 'See results';
  document.getElementById('submitBtn').onclick = nextQuestion;
  document.getElementById('submitBtn').disabled = false;
  document.getElementById('skipBtn').style.display = 'none';

  updateSidebar();
  updateProgress();
  saveState();
}

function nextQuestion() {
  if (!answered) {
    results[current] = { q: current, chosen: null, correct: QUESTIONS[current].correct, wasCorrect: false, skipped: true };
  }
  current++;
  saveState();
  if (current >= QUESTIONS.length) {
    showResults();
  } else {
    renderQuestion(current);
    document.getElementById('submitBtn').onclick = submitAnswer;
  }
}

// ── Progress & score ──────────────────────────────────────────────────────────
function updateProgress() {
  const answeredCount = results.filter(r => r !== null).length;
  const pct = Math.round((answeredCount / QUESTIONS.length) * 100);
  
  document.getElementById('progressFill').style.width  = pct + '%';
  document.getElementById('progressLabel').textContent = `Answered ${answeredCount} of ${QUESTIONS.length}`;
  document.getElementById('progressPct').textContent   = pct + '%';
  document.getElementById('scoreDisplay').textContent  = `${score} / ${answeredCount}`;
}

function setFeedback(msg, cls) {
  const el = document.getElementById('feedbackMsg');
  el.textContent  = msg;
  el.className    = 'feedback-msg' + (cls ? ' ' + cls : '');
  el.style.visibility = msg ? 'visible' : 'hidden';
}

// ── Results & Review Panel ────────────────────────────────────────────────────
function showResults() {
  document.getElementById('quizCard').classList.add('hidden');
  document.getElementById('progressWrap').classList.add('hidden');

  const total   = QUESTIONS.length;
  const correct = results.filter(r => r && r.wasCorrect).length;
  const wrong   = results.filter(r => r && !r.wasCorrect && !r.skipped).length;
  const skipped = results.filter(r => r === null || r.skipped).length;
  const pct     = Math.round((correct / total) * 100);

  document.getElementById('resultsGrade').textContent   = pct + '%';
  document.getElementById('correctCount').textContent   = correct;
  document.getElementById('wrongCount').textContent     = wrong;
  document.getElementById('skippedCount').textContent   = skipped;
  document.getElementById('totalQ').textContent         = total;

  let label = '';
  if (pct >= 90) label = '🏆 Outstanding performance!';
  else if (pct >= 75) label = '🎯 Great work — above pass mark!';
  else if (pct >= 60) label = '📚 Good effort — review the misses.';
  else label = "💪 Keep studying — you'll get there!";
  
  document.getElementById('resultsLabel').textContent = label;
  document.getElementById('resultsScreen').classList.add('visible');
}

function showReview() {
  const section = document.getElementById('reviewSection');
  section.classList.toggle('hidden');
  
  if (!section.classList.contains('hidden')) {
    const correctCount = results.filter(r => r && r.wasCorrect).length;
    filterReview(correctCount === QUESTIONS.length ? 'all' : 'wrong');
  }
}

function filterReview(type) {
  currentFilter = type;
  document.getElementById('filterAll').classList.toggle('active', type === 'all');
  document.getElementById('filterWrong').classList.toggle('active', type === 'wrong');
  document.getElementById('filterFlagged').classList.toggle('active', type === 'flagged');
  document.getElementById('filterNotes').classList.toggle('active', type === 'notes');
  renderReviewList();
}

function renderReviewList() {
  const list = document.getElementById('reviewList');
  list.innerHTML = '';
  
  QUESTIONS.forEach((q, i) => {
    const r = results[i];
    const isFlagged = flagged[i];
    const hasNote = notes[i] && notes[i].trim();
    const isCorrect = r && r.wasCorrect;
    const isUnanswered = !r || r.skipped;

    if (currentFilter === 'wrong' && isCorrect) return;
    if (currentFilter === 'flagged' && !isFlagged) return;
    if (currentFilter === 'notes' && !hasNote) return;

    const div = document.createElement('div');
    div.className = 'review-item';
    div.style.flexDirection = 'column';
    div.style.alignItems = 'stretch';
    const stemShort = q.stem.length > 100 ? q.stem.slice(0, 100) + '…' : q.stem;
    
    let statusText = isUnanswered ? 'Unanswered' : (isCorrect ? 'Correct' : 'Wrong');
    let displayDetail = isUnanswered ? '' : `(${r.chosen} → ${r.correct})`;
    let flagHTML = isFlagged ? '<span style="color:var(--wrong); font-size:0.8rem; margin-left:6px;">🚩</span>' : '';
    let noteIndicator = hasNote ? '<span style="font-size:0.8rem; margin-left:6px;">📝</span>' : '';

    div.innerHTML = `
      <div style="display:flex;align-items:flex-start;gap:14px;" onclick="jumpTo(${i})">
        <div class="review-dot ${isCorrect ? 'correct' : 'wrong'}" style="margin-top:6px;flex-shrink:0;"></div>
        <div class="review-text" style="flex:1;">Q${i + 1}. ${escHtml(stemShort)}${flagHTML}${noteIndicator}</div>
        <div class="review-answer" style="flex-shrink:0;"><span class="status-${statusText}">${statusText}</span> ${displayDetail}</div>
      </div>
      ${hasNote ? `<div class="review-note">${escHtml(notes[i])}</div>` : ''}
    `;
    list.appendChild(div);
  });
  
  if (list.innerHTML === '') {
    list.innerHTML = '<div style="color:var(--text-3);font-size:.9rem;padding:12px;">No questions match this filter.</div>';
  }
}

function copyResults() {
  let text = "Quiz Results Summary:\\n\\n";
  
  QUESTIONS.forEach((q, idx) => {
    const r = results[idx];
    let status = "Unanswered";
    if (r) {
      if (r.wasCorrect) status = "Correct";
      else if (!r.skipped) status = "Wrong";
    }
    let flagText = flagged[idx] ? " [FLAGGED]" : "";
    text += "Q" + (idx + 1) + ": " + status + flagText + "\\n";
  });

  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    const origText = btn.innerHTML;
    btn.innerHTML = '✅ Copied!';
    setTimeout(() => { btn.innerHTML = origText; }, 2000);
  }).catch(err => {
    alert("Failed to copy results: " + err);
  });
}

function jumpTo(idx) {
  document.getElementById('resultsScreen').classList.remove('visible');
  document.getElementById('quizCard').classList.remove('hidden');
  document.getElementById('progressWrap').classList.remove('hidden');
  
  current = idx;
  answered = false;
  selected = null;
  renderQuestion(idx);
  
  // Auto-replay the answer if it was previously answered
  const r = results[idx];
  if (r && !r.skipped) {
    selected = r.chosen;
    submitAnswer(); 
  }
}

function restartQuiz() {
  current  = 0;
  score    = 0;
  results  = new Array(QUESTIONS.length).fill(null);
  flagged  = new Array(QUESTIONS.length).fill(false);
  answered = false;
  selected = null;
  
  document.getElementById('resultsScreen').classList.remove('visible');
  document.getElementById('reviewSection').classList.add('hidden');
  document.getElementById('quizCard').classList.remove('hidden');
  document.getElementById('progressWrap').classList.remove('hidden');
  document.getElementById('submitBtn').onclick = submitAnswer;
  
  saveState();
  initSidebar();
  renderQuestion(0);
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Auth ──────────────────────────────────────────────────────────────────────
const provider = new firebase.auth.GoogleAuthProvider();

function signInWithGoogle() {
  document.getElementById('loginError').textContent = '';
  auth.signInWithPopup(provider).catch(err => {
    document.getElementById('loginError').textContent = 'Sign-in failed. Please try again.';
    console.error(err);
  });
}

function signOut() {
  auth.signOut();
}

async function startQuiz(user) {
  uid = user.uid;
  document.getElementById('loginScreen').classList.add('hidden');
  const restored = await loadState();
  await loadNotes();
  initSidebar();
  if (restored && results.some(r => r !== null)) {
    renderQuestion(current);
    const r = results[current];
    if (r && !r.skipped) {
      selected = r.chosen;
      submitAnswer();
    }
    updateProgress();
  } else {
    renderQuestion(0);
  }
}

// ── Boot ──────────────────────────────────────────────────────────────────────
initSidebar();

auth.onAuthStateChanged(user => {
  if (user) {
    startQuiz(user);
  } else {
    document.getElementById('loginScreen').classList.remove('hidden');
  }
});
</script>
