<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>W1 · Vascular · v1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:           #f7f5f0;
  --surface:      #ffffff;
  --surface-2:    #f0ede6;
  --border:       #e2ddd5;
  --text:         #1a1714;
  --text-2:       #5a534a;
  --text-3:       #9a8f83;
  --accent:       #2563a8;
  --accent-light: #dbeafe;
  --correct:      #166534;
  --correct-bg:   #dcfce7;
  --correct-ring: #4ade80;
  --wrong:        #991b1b;
  --wrong-bg:     #fee2e2;
  --wrong-ring:   #f87171;
  --hint:         #92400e;
  --hint-bg:      #fef3c7;
  --radius:       10px;
  --radius-lg:    16px;
  --shadow:       0 1px 3px rgba(0,0,0,.07), 0 4px 16px rgba(0,0,0,.06);
  --shadow-lg:    0 4px 6px rgba(0,0,0,.07), 0 12px 32px rgba(0,0,0,.1);
  --font-serif:   'Crimson Pro', Georgia, serif;
  --font-sans:    'DM Sans', system-ui, sans-serif;
  --font-mono:    'DM Mono', monospace;
  --transition:   200ms cubic-bezier(.4,0,.2,1);
}

body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: row;
  align-items: flex-start;
  overflow: hidden;
}

/* ── Sidebar ── */
.sidebar {
  width: 320px;
  height: 100vh;
  overflow-y: auto;
  background: var(--surface);
  border-right: 1.5px solid var(--border);
  padding: 24px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
}
.home-btn {
  display: inline-flex;
  align-items: center;
  font-size: .8rem;
  font-weight: 500;
  color: var(--text-3);
  text-decoration: none;
  margin-bottom: 16px;
  transition: color var(--transition);
}
.home-btn:hover { color: var(--accent); }
.sidebar-header {
  font-family: var(--font-serif);
  font-size: 1.3rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.q-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(42px, 1fr));
  gap: 8px;
  margin-bottom: 24px;
}
.q-grid-item {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 6px;
  border: 1.5px solid var(--border);
  font-family: var(--font-mono);
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  position: relative;
  color: var(--text-2);
  background: var(--bg);
  transition: all 0.2s;
}
.q-grid-item:hover { border-color: var(--text-3); }
.q-grid-item.active { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); color: var(--accent); }
.q-grid-item.correct { background: var(--correct-bg); border-color: var(--correct-ring); color: var(--correct); }
.q-grid-item.wrong { background: var(--wrong-bg); border-color: var(--wrong-ring); color: var(--wrong); }
.q-grid-item.skipped { background: var(--surface-2); border-color: var(--text-3); color: var(--text-2); opacity: 0.8; }

.flag-icon {
  position: absolute;
  top: -6px;
  right: -6px;
  font-size: 12px;
  background: #fff;
  border-radius: 50%;
  box-shadow: 0 1px 2px rgba(0,0,0,0.2);
  display: none;
  width: 16px;
  height: 16px;
  align-items: center;
  justify-content: center;
}
.q-grid-item.flagged .flag-icon { display: flex; }

/* ── Main Content ── */
.main-content {
  flex: 1;
  height: 100vh;
  overflow-y: auto;
  padding: 24px 32px 80px;
}

/* ── Header ── */
.app-header {
  width: 100%;
  max-width: 780px;
  margin: 0 auto 32px auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 0 24px;
  border-bottom: 1.5px solid var(--border);
}
.app-title {
  font-family: var(--font-serif);
  font-size: 1.5rem;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -.01em;
}
.app-title span { color: var(--accent); }
.score-badge {
  font-family: var(--font-mono);
  font-size: .8rem;
  font-weight: 500;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 99px;
  padding: 6px 14px;
  color: var(--text-2);
  display: flex;
  gap: 6px;
  align-items: center;
}
.score-badge .score-num { color: var(--text); font-weight: 600; }

/* ── Progress bar ── */
.progress-wrap { 
  width: 100%; 
  max-width: 780px; 
  margin: 0 auto 28px auto; 
}
.progress-meta { display: flex; justify-content: space-between; font-size: .78rem; color: var(--text-3); margin-bottom: 7px; font-family: var(--font-mono); }
.progress-track { height: 5px; background: var(--border); border-radius: 99px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width 400ms cubic-bezier(.4,0,.2,1); }

/* ── Card ── */
.card {
  width: 100%;
  max-width: 1060px;
  margin: 0 auto;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow);
  overflow: hidden;
  animation: fadeUp .3s ease both;
  display: grid;
  grid-template-columns: minmax(0, 1fr) 260px;
  grid-template-rows: auto auto auto 1fr auto;
}
@keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

.card-header { grid-column: 1; padding: 20px 28px 0; display: flex; align-items: center; gap: 10px; }
.q-label { font-family: var(--font-mono); font-size: .7rem; font-weight: 500; color: var(--text-3); text-transform: uppercase; letter-spacing: .08em; }
.part-tag { font-family: var(--font-mono); font-size: .65rem; font-weight: 500; background: var(--surface-2); border: 1px solid var(--border); border-radius: 4px; padding: 2px 7px; color: var(--text-3); }

.stem { grid-column: 1; font-family: var(--font-serif); font-size: 1.25rem; line-height: 1.65; color: var(--text); padding: 16px 28px 24px; border-bottom: 1px solid var(--border); }

/* ── Hint ── */
.hint-wrap { grid-column: 1; padding: 0 28px; margin-top: 20px; }
.hint-toggle { display: inline-flex; align-items: center; gap: 7px; font-size: .8rem; font-weight: 500; color: var(--hint); cursor: pointer; background: none; border: 1.5px solid #d97706; border-radius: 99px; padding: 5px 14px; transition: background var(--transition); }
.hint-toggle:hover { background: var(--hint-bg); }
.hint-body { margin-top: 10px; padding: 12px 16px; background: var(--hint-bg); border-left: 3px solid #f59e0b; border-radius: 0 var(--radius) var(--radius) 0; font-size: .9rem; color: var(--hint); line-height: 1.55; display: none; }
.hint-body.open { display: block; animation: fadeIn .2s ease; }

/* ── Notes ── */
.note-wrap {
  grid-column: 2;
  grid-row: 1 / -1;
  border-left: 1.5px solid var(--border);
  padding: 20px 18px;
  display: flex;
  flex-direction: column;
  background: var(--surface-2);
}
.note-side-header {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: .72rem;
  font-weight: 600;
  color: var(--text-3);
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: .07em;
  margin-bottom: 10px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}
.note-toggle { display: none; }
.note-body { display: flex; flex-direction: column; flex: 1; margin-top: 0; }
.note-textarea { flex: 1; min-height: 140px; width: 100%; padding: 10px 12px; font-family: var(--font-sans); font-size: .85rem; color: var(--text); background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); resize: none; outline: none; transition: border-color var(--transition); line-height: 1.55; box-sizing: border-box; }
.note-textarea:focus { border-color: var(--accent); }
.note-save-status { font-size: .7rem; color: var(--text-3); margin-top: 5px; text-align: right; font-family: var(--font-mono); min-height: 1em; }
.note-icon { position: absolute; top: -5px; left: -5px; font-size: 9px; background: var(--accent-light); border: 1px solid var(--accent); border-radius: 50%; display: none; width: 14px; height: 14px; align-items: center; justify-content: center; }
.q-grid-item.has-note .note-icon { display: flex; }
.review-note { margin-top: 8px; padding: 8px 12px; background: var(--accent-light); border-radius: 6px; font-size: .82rem; color: var(--text-2); line-height: 1.45; border-left: 3px solid var(--accent); white-space: pre-wrap; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

/* ── Options ── */
.options { grid-column: 1; padding: 20px 28px 28px; display: flex; flex-direction: column; gap: 10px; }
.option { display: flex; align-items: flex-start; gap: 14px; padding: 14px 16px; border: 1.5px solid var(--border); border-radius: var(--radius); cursor: pointer; background: var(--surface); transition: border-color var(--transition), background var(--transition), box-shadow var(--transition); text-align: left; width: 100%; position: relative; }
.option:hover:not(.locked) { border-color: var(--accent); background: var(--accent-light); box-shadow: 0 0 0 3px rgba(37,99,168,.1); }
.option.selected:not(.locked) { border-color: var(--accent); background: var(--accent-light); box-shadow: 0 0 0 3px rgba(37,99,168,.15); }
.option.correct { border-color: var(--correct-ring); background: var(--correct-bg); box-shadow: 0 0 0 3px rgba(74,222,128,.2); }
.option.wrong { border-color: var(--wrong-ring); background: var(--wrong-bg); box-shadow: 0 0 0 3px rgba(248,113,113,.2); }
.option.dimmed { opacity: .5; }

.opt-letter { flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%; background: var(--surface-2); border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: .78rem; font-weight: 500; color: var(--text-2); transition: background var(--transition), border-color var(--transition), color var(--transition); }
.option.correct .opt-letter { background:#4ade80; border-color:#4ade80; color:#14532d; }
.option.wrong   .opt-letter { background:#f87171; border-color:#f87171; color:#7f1d1d; }
.option.selected:not(.locked) .opt-letter { background:var(--accent); border-color:var(--accent); color:#fff; }

.opt-body { flex: 1; }
.opt-text { font-size: .95rem; line-height: 1.5; color: var(--text); }
.opt-rationale { margin-top: 8px; font-size: .83rem; color: var(--text-2); line-height: 1.5; padding-top: 8px; border-top: 1px solid rgba(0,0,0,.06); display: none; }
.opt-rationale.visible { display: block; animation: fadeIn .25s ease; }

.opt-icon { flex-shrink: 0; font-size: 1.1rem; margin-top: 2px; display: none; }
.option.correct .opt-icon, .option.wrong .opt-icon { display:block; }

/* ── Actions ── */
.card-footer { grid-column: 1; padding: 0 28px 28px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.btn { font-family: var(--font-sans); font-size: .9rem; font-weight: 600; border-radius: 99px; padding: 11px 26px; cursor: pointer; border: 1.5px solid transparent; transition: all var(--transition); display: inline-flex; align-items: center; gap: 8px; justify-content: center; }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover { background: #1d4f8a; border-color: #1d4f8a; box-shadow: 0 4px 14px rgba(37,99,168,.3); }
.btn-primary:disabled { opacity:.4; cursor:not-allowed; box-shadow:none; }
.btn-ghost { background: transparent; color: var(--text-2); border-color: var(--border); }
.btn-ghost:hover { background: var(--surface-2); color: var(--text); }

.feedback-msg { font-size: .88rem; font-weight: 600; display: flex; align-items: center; gap: 6px; }
.feedback-msg.correct { color: var(--correct); }
.feedback-msg.wrong   { color: var(--wrong); }

/* ── Results screen ── */
.results-screen { 
  width: 100%; 
  max-width: 780px; 
  margin: 0 auto;
  display: none; 
  flex-direction: column; 
  gap: 24px; 
  animation: fadeUp .4s ease both; 
}
.results-screen.visible { display: flex; }
.results-hero { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); padding: 48px 40px; text-align: center; }
.results-grade { font-family: var(--font-serif); font-size: 5rem; font-weight: 600; line-height: 1; margin-bottom: 8px; background: linear-gradient(135deg, #1a1714 0%, #2563a8 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.results-label { font-size: 1.05rem; color: var(--text-2); margin-bottom: 32px; }
.results-stats { display: flex; justify-content: center; gap: 40px; flex-wrap: wrap; }
.stat { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.stat-num { font-family: var(--font-mono); font-size: 1.8rem; font-weight: 500; color: var(--text); }
.stat-num.green { color: var(--correct); }
.stat-num.red   { color: var(--wrong); }
.stat-label { font-size: .78rem; color: var(--text-3); text-transform: uppercase; letter-spacing: .06em; }
.results-actions { display: flex; justify-content: center; gap: 12px; margin-top: 32px; flex-wrap: wrap; }

/* Review list */
.filter-btn { padding: 5px 14px; font-size: 0.8rem; font-weight: 600; border-radius: 99px; cursor: pointer; border: 1.5px solid var(--border); background: transparent; color: var(--text-2); transition: all var(--transition); }
.filter-btn.active { background: var(--surface-2); color: var(--text); border-color: var(--text-3); }
.review-list { display: flex; flex-direction: column; gap: 12px; }
.review-item { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 16px 20px; cursor: pointer; display: flex; align-items: flex-start; gap: 14px; transition: box-shadow var(--transition); }
.review-item:hover { box-shadow: var(--shadow); }
.review-dot { flex-shrink: 0; width: 10px; height: 10px; border-radius: 50%; margin-top: 6px; }
.review-dot.correct { background: var(--correct-ring); }
.review-dot.wrong   { background: var(--wrong-ring); }
.review-text { flex: 1; font-size: .9rem; color: var(--text-2); line-height: 1.4; }
.review-answer { font-size: .8rem; font-weight: 600; font-family: var(--font-mono); color: var(--text-3); flex-shrink: 0; }
.status-Unanswered { color: var(--text-3); }
.status-Correct { color: var(--correct); }
.status-Wrong { color: var(--wrong); }

/* ── Utility ── */
.hidden { display: none !important; }

/* ── Responsive ── */
@media (max-width: 800px) {
  body { flex-direction: column; overflow-y: auto; }
  .sidebar { width: 100%; height: auto; max-height: 250px; border-right: none; border-bottom: 1.5px solid var(--border); padding: 16px; flex-shrink: 0; }
  .main-content { width: 100%; height: auto; overflow: visible; padding: 20px 16px 80px; }
  .card { display: flex; flex-direction: column; }
  .note-wrap { grid-column: unset; grid-row: unset; border-left: none; border-top: 1.5px solid var(--border); background: var(--surface-2); padding: 14px 20px; }
  .note-side-header { display: none; }
  .note-toggle { display: inline-flex; align-items: center; gap: 7px; font-size: .8rem; font-weight: 500; color: var(--text-2); cursor: pointer; background: none; border: 1.5px solid var(--border); border-radius: 99px; padding: 5px 14px; transition: all var(--transition); }
  .note-toggle:hover { background: var(--surface); }
  .note-toggle.has-note { color: var(--accent); border-color: var(--accent); background: var(--accent-light); }
  .note-body { display: none; flex: none; margin-top: 10px; }
  .note-body.open { display: flex; flex-direction: column; animation: fadeIn .2s ease; }
  .note-textarea { min-height: 90px; resize: vertical; flex: none; }
}
@media (max-width: 520px) {
  .stem { font-size: 1.1rem; padding: 14px 20px 20px; }
  .options { padding: 16px 20px 20px; }
  .card-footer { padding: 0 20px 20px; flex-wrap: wrap; }
  .card-header { padding: 16px 20px 0; }
  .hint-wrap { padding: 0 20px; }
  .note-wrap { padding: 12px 20px; }
  .results-grade { font-size: 3.5rem; }
  .results-stats { gap: 24px; }
}
/* ── Login screen ── */
#loginScreen {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  padding: 24px;
}
#loginScreen.hidden { display: none; }
.login-logo {
  font-family: var(--font-serif);
  font-size: 2.4rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 6px;
  text-align: center;
}
.login-logo span { color: var(--accent); }
.login-sub {
  font-size: .85rem;
  color: var(--text-3);
  margin-bottom: 48px;
  text-align: center;
}
.google-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 13px 28px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 99px;
  font-family: var(--font-sans);
  font-size: .9rem;
  font-weight: 600;
  color: var(--text);
  cursor: pointer;
  transition: border-color var(--transition), background var(--transition);
}
.google-btn:hover { border-color: var(--accent); background: var(--accent-light); }
.login-error {
  margin-top: 16px;
  font-size: .8rem;
  color: var(--wrong);
  min-height: 1em;
  text-align: center;
}
.made-by-login {
  position: fixed;
  bottom: 20px;
  font-size: .72rem;
  color: var(--text-3);
  font-family: var(--font-mono);
  text-align: center;
}
/* ── Persistent credit ── */
.made-by {
  font-size: .68rem;
  color: var(--text-3);
  font-family: var(--font-mono);
  text-align: center;
  padding-top: 12px;
  margin-top: 8px;
  border-top: 1px solid var(--border);
}

</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-logo">NB <span>Quiz</span></div>
  <div class="login-sub">Your personal medical study companion</div>
  <button class="google-btn" onclick="signInWithGoogle()">
    <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
    Continue with Google
  </button>
  <div class="login-error" id="loginError"></div>
  <div class="made-by-login">made by Zi Lin</div>
</div>

<aside class="sidebar">
  <a href="https://zxsye.github.io/nbquiz/" class="home-btn">← Home</a>
  <div class="sidebar-header">
    <span>Quiz Status</span>
    <span style="font-size:0.8rem; color:var(--text-3); font-family:var(--font-mono);" id="sidebarCount">0/30</span>
  </div>
  <div class="q-grid" id="qGrid"></div>
  
  <div style="margin-top:auto; display:flex; flex-direction:column; gap:10px;">
    <button class="btn btn-ghost" id="sidebarCopyBtn" style="width:100%; border: 1.5px solid var(--border); padding: 8px; font-size: 0.85rem;" onclick="copySidebarResults()">📋 Copy Status</button>
    <button class="btn btn-primary" style="width:100%; margin-top:0;" onclick="showResults()">Finish Quiz</button>
    <div class="made-by">made by Zi Lin</div>
  </div>
</aside>

<div class="main-content">
  <header class="app-header">
    <a href="../../../index.html" style="text-decoration:none;">
      <div class="app-title">NB <span>Quiz</span></div>
    </a>
    <div style="display:flex; align-items:center; gap:12px;">
      <div class="score-badge">
        Score&nbsp;<span class="score-num" id="scoreDisplay">0 / 0</span>
      </div>
      <button class="btn btn-ghost" onclick="signOut()" style="padding:6px 14px; font-size:0.8rem;" title="Sign out">Sign out</button>
    </div>
  </header>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-meta">
      <span id="progressLabel">Question 1 of 30</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>

  <div class="card" id="quizCard">
    <div class="card-header">

<script>
// ── Quiz data ─────────────────────────────────────────────────────────────────
const QUESTIONS = [{"stem": "A 74-year-old male presents to the emergency department with sudden-onset, severe lower back pain and a syncopal episode. On examination, he is diaphoretic with a heart rate of 115 bpm and a blood pressure of 82/50 mmHg. A bedside ultrasound confirms a 6.5 cm abdominal aortic aneurysm. What is the most appropriate next step in his management?", "options": {"A": "Immediate transfer to the operating theatre for open surgical repair", "B": "Urgent CT Aortography to assess for suitability for EVAR", "C": "Aggressive fluid resuscitation with 2 L of normal saline to normalize blood pressure", "D": "Formal abdominal ultrasound by a radiologist to confirm the site of rupture", "E": "Administration of IV morphine and reassessment of blood pressure in 15 minutes"}, "correct": "A", "rationales": {"A": "In a hemodynamically unstable patient with a confirmed AAA, the priority is immediate surgical control; delays for imaging increase mortality.", "B": "Transferring an unstable patient to the CT suite is dangerous as they may lose tamponade and collapse away from resuscitative support.", "C": "Aggressive fluid resuscitation can disrupt a contained retroperitoneal hematoma, converting it to a free rupture (permissive hypotension is preferred).", "D": "A bedside ultrasound is sufficient to confirm the presence of the aneurysm in an unstable patient; formal imaging causes unnecessary delay.", "E": "While analgesia is indicated, delaying surgical intervention in an unstable ruptured AAA leads to near 100% mortality."}, "hint": "Consider the diagnostic rule for unstable patients with suspected rupture.", "part": 1}, {"stem": "A 58-year-old female presents with tearing interscapular pain and a blood pressure of 195/110 mmHg. CT aortography reveals an intimal flap originating distal to the left subclavian artery and extending to the iliac bifurcation. Which of the following is the most appropriate initial pharmacological strategy?", "options": {"A": "IV Labetalol to target a heart rate <60 bpm and SBP 100-120 mmHg", "B": "IV Sodium Nitroprusside to rapidly bring the SBP below 120 mmHg", "C": "Sublingual Glyceryl Trinitrate (GTN) followed by oral Metoprolol", "D": "IV Heparin bolus to prevent thrombus formation within the false lumen", "E": "Immediate preparation for median sternotomy and ascending aortic replacement"}, "correct": "A", "rationales": {"A": "Beta-blockers reduce the rate of pressure rise (dP/dt), which prevents the propagation of the dissection flap.", "B": "Vasodilators used alone cause reflex tachycardia, which increases shear stress on the aortic wall and can worsen the dissection.", "C": "Acute aortic syndromes require titrated IV therapy in an intensive care setting, and beta-blockade must precede vasodilation.", "D": "Anticoagulation is generally contraindicated in acute dissection as it can worsen hemorrhage or extension into the media.", "E": "This describes a Stanford Type B dissection (distal to the left subclavian), which is primarily managed medically unless complicated."}, "hint": "Think about the specific hemodynamic variable (dP/dt) that drives the propagation of an intimal tear.", "part": 1}, {"stem": "A 65-year-old male with a history of atrial fibrillation presents with a 4-hour history of sudden-onset right leg pain. On examination, the limb is pale and cold to the touch. He has no sensation in his toes and can only wiggle them with great effort. Handheld Doppler signals are absent at the ankle, but a faint venous signal is heard. What is the Rutherford classification of this limb?", "options": {"A": "Grade IIb (Immediately threatened)", "B": "Grade I (Viable)", "C": "Grade IIa (Marginally threatened)", "D": "Grade III (Irreversible)", "E": "Grade IV (Critical)"}, "correct": "A", "rationales": {"A": "Sensory loss beyond the toes and motor weakness (paralysis/paresis) indicate a limb that requires emergency revascularization.", "B": "A viable limb has no sensory or motor loss and audible arterial Doppler signals.", "C": "In Grade IIa, sensory loss is minimal or absent and there is no motor deficit.", "D": "Irreversible ischemia involves profound anesthesia, complete paralysis, and rigor of the muscles; this patient still has some motor function.", "E": "There is no 'Grade IV' in the standard Rutherford classification for acute limb ischemia."}, "hint": "Look closely at the presence of motor deficit and the type of Doppler signals found.", "part": 1}, {"stem": "A 32-year-old woman, 10 days postpartum, presents with a swollen, painful left leg. On examination, the leg is blue and severely engorged with pitting edema extending to the groin. Distal pulses are difficult to palpate due to swelling, and the patient reports intense 'bursting' pain. What is the most likely diagnosis?", "options": {"A": "Phlegmasia cerulea dolens", "B": "Acute Limb Ischaemia", "C": "Cellulitis", "D": "Superficial Thrombophlebitis", "E": "Acute Compartment Syndrome"}, "correct": "A", "rationales": {"A": "This is a massive ileofemoral DVT causing total venous outflow obstruction, leading to limb-threatening venous gangrene if untreated.", "B": "While pain and pulse difficulty occur, the blue, engorged appearance is characteristic of venous, not arterial, pathology.", "C": "Cellulitis typically presents with erythema and systemic symptoms, not massive blue engorgement and 'bursting' pain.", "D": "This typically presents as a localized, tender, palpable cord rather than whole-limb massive edema and cyanosis.", "E": "While compartment syndrome causes pain, it is usually post-traumatic or post-ischemic and doesn't explain the massive blue edema of the whole leg."}, "hint": "Focus on the color of the limb and the severity of the swelling.", "part": 1}, {"stem": "A 70-year-old smoker presents with calf pain that occurs after walking 100 m and is relieved by 2 minutes of standing. His resting ABI is 1.35 in the affected leg. What is the most likely explanation for this ABI finding?", "options": {"A": "Medial artery calcification making the vessels non-compressible", "B": "The patient has excellent collateral circulation", "C": "The patient does not have peripheral artery disease", "D": "An error was made using the wrong-sized blood pressure cuff", "E": "Upper limb arterial stenosis causing a low brachial pressure"}, "correct": "A", "rationales": {"A": "An ABI >1.3 usually indicates calcified, stiff arteries (common in diabetes or CKD), making the measurement unreliable.", "B": "Excellent collaterals might normalize an ABI to 0.9-1.0, but would not cause it to rise to 1.35.", "C": "The clinical history of reproducible claudication strongly suggests PAD despite the falsely elevated ABI.", "D": "While cuff size matters, the 'classic' reason for an ABI >1.3 in vascular medicine is vessel non-compressibility.", "E": "While a low brachial pressure could raise the ratio, the ABI is calculated using the highest of the two brachial pressures."}, "hint": "Consider why the blood pressure cuff might fail to occlude blood flow in elderly or diabetic patients.", "part": 1}, {"stem": "Which of the following is an absolute indication for elective repair of an asymptomatic infrarenal abdominal aortic aneurysm in a 68-year-old male?", "options": {"A": "A maximum transverse diameter of 5.6 cm on ultrasound", "B": "A growth rate of 0.5 cm in the last 12 months", "C": "The presence of a 3.0 cm fusiform aneurysm", "D": "The presence of mural thrombus within a 4.5 cm sac", "E": "A history of heavy smoking and hypertension"}, "correct": "A", "rationales": {"A": "The standard threshold for elective repair in men is \\ge 5.5 cm as the risk of rupture outweighs the risk of surgery.", "B": "A growth rate of >1.0 cm/year is considered rapid and an indication for surgery; 0.5 cm is within standard surveillance limits.", "C": "A 3.0 cm aneurysm is the threshold for diagnosis but requires annual surveillance, not immediate repair.", "D": "Thrombus is a common finding in aneurysms and does not change the diameter-based threshold for elective repair.", "E": "While these are risk factors for development and rupture, they are not themselves indications for surgical repair."}, "hint": "Recall the specific size thresholds used in the national screening and management guidelines for men.", "part": 1}, {"stem": "A 72-year-old male with symptomatic carotid stenosis undergoes a carotid endarterectomy (CEA). Six hours post-operatively, the nurse alerts you to an expanding hematoma in his neck and new-onset inspiratory stridor. What is the most appropriate immediate action?", "options": {"A": "Open the neck wound at the bedside immediately", "B": "Perform an urgent CT scan of the neck to locate the source of bleeding", "C": "Intubate the patient using a rapid sequence induction (RSI)", "D": "Apply firm manual pressure to the wound and call the surgical registrar", "E": "Administer IV Protamine to reverse any residual heparin effect"}, "correct": "A", "rationales": {"A": "An expanding neck hematoma post-CEA is an airway emergency; opening the wound releases the pressure on the trachea.", "B": "In the setting of airway compromise (stridor), time-consuming imaging is contraindicated.", "C": "Intubation may be extremely difficult due to tracheal deviation/compression; decompression of the hematoma should happen first or simultaneously.", "D": "Manual pressure may worsen airway obstruction and will not stop an arterial bleed within a closed space.", "E": "While reversal of anticoagulation is important, it does not address the immediate life-threatening airway obstruction."}, "hint": "This is a 'stop the clock' emergency regarding the airway.", "part": 1}, {"stem": "Which Stanford type and management plan is correct for an aortic dissection involving the ascending aorta, regardless of where the original intimal tear occurred?", "options": {"A": "Stanford Type A; emergency surgical repair", "B": "Stanford Type A; aggressive medical management with beta-blockers", "C": "Stanford Type B; emergency surgical repair", "D": "DeBakey Type III; medical management with blood pressure targets", "E": "Stanford Type B; Thoracic Endovascular Aortic Repair (TEVAR)"}, "correct": "A", "rationales": {"A": "Any involvement of the ascending aorta carries a high risk of tamponade, coronary occlusion, or aortic rupture and requires surgery.", "B": "Medical management alone for Type A is associated with a 1-2% mortality rate per hour in the acute phase.", "C": "Stanford B involves the descending aorta only and is typically managed medically unless complications arise.", "D": "DeBakey III is equivalent to Stanford B, but the question specifies ascending aortic involvement.", "E": "Ascending aortic involvement by definition makes the dissection Type A, which is not treated primarily with TEVAR."}, "hint": "The classification is based on the anatomical location of the dissection, not the origin of the tear.", "part": 1}, {"stem": "A patient is undergoing evaluation for a cold, painful right foot. You suspect acute limb ischemia. Which of the following findings would most strongly suggest an embolic source over in-situ thrombosis?", "options": {"A": "A history of atrial fibrillation and normal pulses in the contralateral limb", "B": "A long history of intermittent claudication in both legs", "C": "The presence of bilateral bruits over the femoral arteries", "D": "Slow onset of symptoms over the course of 48 hours", "E": "An ABI of 0.4 in the symptomatic leg"}, "correct": "A", "rationales": {"A": "Emboli typically arise from the heart and lodge in healthy vessels, leaving the other leg with normal pulses.", "B": "A history of claudication suggests background peripheral artery disease, making in-situ thrombosis more likely.", "C": "Bruits indicate diffuse atherosclerotic disease, which points toward in-situ thrombosis.", "D": "Embolic events are typically 'dramatic' and sudden (seconds to minutes), whereas thrombosis can be more gradual.", "E": "A low ABI confirms ischemia but does not distinguish between an embolic or thrombotic etiology."}, "hint": "Think about where the clot came from and the 'health' of the background vasculature.", "part": 1}, {"stem": "In the management of a suspected Deep Venous Thrombosis (DVT), which clinical scenario allows for D-dimer to safely 'rule out' the diagnosis?", "options": {"A": "A Wells score of \\le 1 with a negative D-dimer", "B": "A Wells score of \\ge 3 with a negative D-dimer", "C": "Any patient with a negative D-dimer, regardless of clinical findings", "D": "A patient with a positive D-dimer and unilateral leg swelling", "E": "A patient with suspected PE and a Wells score of 2"}, "correct": "A", "rationales": {"A": "D-dimer has a high negative predictive value; in low-probability patients, a negative result is sufficient to exclude DVT.", "B": "In high-probability patients, the risk of a false negative D-dimer is too high, and imaging (ultrasound) is mandatory.", "C": "Clinical probability must be integrated; D-dimer is not specific and should not be used in high-risk scenarios to exclude disease.", "D": "A positive D-dimer is not diagnostic of DVT and requires confirmation with duplex ultrasound.", "E": "D-dimer is used as a rule-out in low-probability cases, but the question specifically asks about DVT management."}, "hint": "Consider the difference between a 'rule-in' and 'rule-out' test in low versus high pre-test probability.", "part": 1}, {"stem": "A 66-year-old male with a history of hypertension and smoking reports pain in his buttocks and thighs when walking up hills. He also mentions recent-onset erectile dysfunction. What is the most likely level of arterial occlusion?", "options": {"A": "Aortoiliac segment (Leriche Syndrome)", "B": "Superficial femoral artery", "C": "Popliteal artery", "D": "Internal iliac artery alone", "E": "Tibial arteries"}, "correct": "A", "rationales": {"A": "The triad of buttock/thigh claudication, absent femoral pulses, and erectile dysfunction defines Leriche syndrome.", "B": "SFA occlusion typically presents with calf claudication, not buttock pain or erectile dysfunction.", "C": "Popliteal disease causes symptoms in the lower calf and foot.", "D": "While internal iliac disease causes erectile dysfunction, it wouldn't explain the thigh claudication unless the common iliac/aorta were involved.", "E": "Tibial disease causes foot claudication and is common in diabetics, but does not present with buttock pain."}, "hint": "This classic triad involves the terminal aorta and its bifurcation.", "part": 1}, {"stem": "Which type of endoleak following Endovascular Aneurysm Repair (EVAR) is characterized by persistent flow into the aneurysm sac via retrograde fill from branch vessels like the inferior mesenteric artery (IMA)?", "options": {"A": "Type II", "B": "Type I", "C": "Type III", "D": "Type IV", "E": "Type V"}, "correct": "A", "rationales": {"A": "Type II endoleaks are the most common and result from 'back-bleeding' from collateral vessels into the excluded sac.", "B": "Type I endoleaks occur at the graft attachment sites (proximal or distal) and represent a failure of the seal.", "C": "Type III endoleaks are due to structural failure of the graft, such as a hole in the fabric or disconnection of components.", "D": "Type IV endoleaks are due to graft porosity, which is rare with modern materials and usually resolves as the patient coagulates.", "E": "Type V (endotension) is sac expansion without a visible leak on imaging."}, "hint": "This is the most common type of endoleak and is often managed conservatively unless the sac grows.", "part": 1}, {"stem": "A 78-year-old woman is 3 days post-open repair of a ruptured AAA. She develops sudden abdominal distension, bloody diarrhea, and a rising serum lactate of 4.5 mmol/L. What complication should be most urgently excluded?", "options": {"A": "Ischaemic colitis (Bowel ischaemia)", "B": "Post-operative ileus", "C": "Clostridioides difficile infection", "D": "Graft infection", "E": "Acute Mesenteric Ischaemia of the small bowel"}, "correct": "A", "rationales": {"A": "Sacrifice of the IMA and perioperative hypotension make the sigmoid colon vulnerable to ischemia, which presents with bloody stools and acidosis.", "B": "While ileus causes distension, it does not typically cause bloody diarrhea or significantly elevated lactate.", "C": "While it causes diarrhea, the surgical history and lactate level in the early post-op period point strongly toward a vascular cause.", "D": "Graft infection is a catastrophic late complication but usually presents with fevers and malaise later in the recovery.", "E": "Small bowel ischemia usually involves the SMA; AAA repair specifically risks the IMA territory (large bowel)."}, "hint": "Identify which vessel is typically ligated during AAA repair and which part of the gut it supplies.", "part": 1}, {"stem": "An 82-year-old male with a history of TIA undergoes carotid imaging showing 85% stenosis of the left internal carotid artery. He is currently on Aspirin 100 mg and Atorvastatin 40 mg. What is the most appropriate next management step regarding surgical intervention?", "options": {"A": "Carotid Endarterectomy within 2 weeks of the initial TIA", "B": "Carotid Endarterectomy once the patient has completed 3 months of dual antiplatelet therapy", "C": "Lifelong medical management as he is already on a statin and antiplatelet", "D": "Carotid Artery Stenting as it has lower perioperative stroke risk in patients >70 years old", "E": "Repeat duplex ultrasound in 6 months to monitor for progression"}, "correct": "A", "rationales": {"A": "For symptomatic stenosis >50%, the maximum benefit of CEA is achieved when performed as soon as possible, ideally within 14 days.", "B": "Delaying surgery by 3 months significantly increases the risk of a completed stroke while waiting.", "C": "Medical management alone is insufficient for symptomatic high-grade stenosis; the risk of recurrence is high without intervention.", "D": "In symptomatic patients over 70, CEA generally has a lower perioperative stroke risk than stenting.", "E": "The patient is already symptomatic with high-grade stenosis; monitoring is inappropriate as he is already at high risk."}, "hint": "Think about the 'window of opportunity' to prevent a stroke after a warning TIA.", "part": 1}, {"stem": "A patient with acute limb ischemia undergoes successful surgical embolectomy. Two hours later, he complains of severe pain in the calf that is worsened by passive dorsiflexion of the ankle. The calf feels tense and 'woody.' What is the most likely diagnosis?", "options": {"A": "Reperfusion-induced Compartment Syndrome", "B": "Recurrent arterial embolism (re-occlusion)", "C": "Acute Deep Venous Thrombosis", "D": "Normal post-operative soreness", "E": "Lactic acidosis causing muscle cramps"}, "correct": "A", "rationales": {"A": "Reperfusion of ischemic muscle causes edema, which can increase pressure within non-compliant fascial compartments.", "B": "Re-occlusion would cause a cold, pulseless limb, whereas pain on passive stretch is the hallmark of compartment syndrome.", "C": "While swelling occurs, DVT does not typically cause the 'woody' tightness and excruciating pain on muscle stretch seen here.", "D": "Pain out of proportion to the procedure and clinical signs of tightness must be treated as compartment syndrome until proven otherwise.", "E": "Acidosis can occur post-reperfusion, but the focal physical signs (tenseness, pain on stretch) indicate a local pressure issue."}, "hint": "Focus on the clinical hallmark: 'pain on passive stretch'.", "part": 1}, {"stem": "A 50-year-old male with no significant past medical history presents with a 4 cm thoracic aortic aneurysm detected incidentally on a chest X-ray. He is asymptomatic. Which of the following is the most important next step in his workup?", "options": {"A": "Genetic counseling and screening for connective tissue disorders", "B": "Immediate Thoracic Endovascular Aortic Repair (TEVAR)", "C": "Referral for coronary artery bypass grafting (CABG)", "D": "Wait-and-watch with repeat chest X-ray in 2 years", "E": "Commencement of Warfarin to prevent mural thrombus formation"}, "correct": "A", "rationales": {"A": "In a young patient with an aortic aneurysm, underlying conditions like Marfan or Loeys-Dietz syndrome must be excluded.", "B": "A 4 cm thoracic aneurysm is below the standard elective repair threshold for an asymptomatic patient (5.5-6.0 cm).", "C": "While atherosclerosis is a risk factor, there is no indication for CABG in an asymptomatic patient without proven CAD.", "D": "Thoracic aneurysms require more precise monitoring with CT or MRI, and 2 years is too long an interval.", "E": "Anticoagulation is not indicated for the management of aortic aneurysms."}, "hint": "Consider why a 'young' patient might develop an aneurysm in the absence of traditional risk factors like hypertension.", "part": 1}, {"stem": "Which of the following is a component of the 'lethal triad' in trauma and massive hemorrhage, such as a ruptured AAA, that vascular surgeons work to avoid?", "options": {"A": "Coagulopathy, Acidosis, Hypothermia", "B": "Hypotension, Tachycardia, Oliguria", "C": "Hypokalemia, Hyperglycemia, Hypertension", "D": "Uremia, Thrombocytopenia, Anemia", "E": "Hyperthermia, Alkalosis, Polycythemia"}, "correct": "A", "rationales": {"A": "These three factors exacerbate each other, leading to a vicious cycle that makes surgical hemorrhage impossible to control.", "B": "These are clinical signs of shock but do not constitute the 'lethal triad' of metabolic/physiologic failure.", "C": "Rupture typically causes hyperkalemia (from cell death/ischemia) and hypotension, not the opposite.", "D": "While these can occur in surgical patients, they are not the specific 'lethal triad' associated with trauma/hemorrhage resuscitation.", "E": "Hemorrhagic shock leads to hypothermia and acidosis, the opposite of this list."}, "hint": "Think about the physiologic states induced by cold, old blood transfusions and low tissue perfusion.", "part": 1}, {"stem": "A 62-year-old male with chronic limb-threatening ischemia (CLTI) presents with a non-healing ulcer on his right heel and rest pain. His Toe-Brachial Index (TBI) is 0.25. What is the primary goal of management?", "options": {"A": "Urgent revascularization to prevent major amputation", "B": "Commencing a supervised walking program for 12 weeks", "C": "Primary above-knee amputation to prevent sepsis", "D": "Strict bed rest with leg elevation to reduce swelling", "E": "Long-term IV antibiotic therapy until the ulcer heals"}, "correct": "A", "rationales": {"A": "CLTI is defined by rest pain or tissue loss; without revascularization, there is a very high risk of limb loss within a year.", "B": "Walking programs are first-line for claudication, but CLTI (rest pain/ulcers) requires urgent anatomical intervention.", "C": "Amputation is a last resort; revascularization should be attempted first unless the limb is already non-viable.", "D": "Elevation is contraindicated in arterial ischemia as it reduces hydrostatic pressure and worsens perfusion to the foot.", "E": "The ulcer will not heal without adequate blood flow; antibiotics are an adjunct to, not a replacement for, revascularization."}, "hint": "Differentiate between 'stable' claudication and 'unstable' limb-threatening disease.", "part": 1}, {"stem": "A 55-year-old male develops Heparin-Induced Thrombocytopenia (HIT) 6 days after starting unfractionated heparin for a DVT. His platelet count has dropped from 250 \\times 10^9/L to 90 \\times 10^9/L. What is the most critical next step?", "options": {"A": "Stop all forms of heparin and start a non-heparin anticoagulant like Argatroban", "B": "Stop heparin and wait for platelets to recover before starting Warfarin", "C": "Switch from unfractionated heparin to Enoxaparin (LMWH)", "D": "Perform a platelet transfusion to prevent spontaneous bleeding", "E": "Continue heparin but add Aspirin to prevent further platelet aggregation"}, "correct": "A", "rationales": {"A": "HIT is a pro-thrombotic state; stopping heparin is necessary, but the patient must remain anticoagulated with an alternative agent.", "B": "Starting Warfarin too early in HIT can cause skin necrosis and does not provide the immediate anticoagulation needed.", "C": "LMWH cross-reacts with HIT antibodies and is absolutely contraindicated if HIT is suspected.", "D": "HIT is a thrombotic condition, not a bleeding condition; platelet transfusions may actually worsen the pro-thrombotic state.", "E": "Continuing the inciting agent (heparin) in HIT leads to a high risk of catastrophic thrombotic events (stroke, limb loss)."}, "hint": "Recall why HIT is considered a 'paradoxical' condition regarding its effect on clotting.", "part": 1}, {"stem": "A 70-year-old male undergoes a successful Carotid Endarterectomy. On day 2, he develops a severe headache and high blood pressure (185/95 mmHg). Suddenly, he has a generalized tonic-clonic seizure. What post-operative complication is most likely?", "options": {"A": "Cerebral Hyperperfusion Syndrome", "B": "Acute Ischaemic Stroke from graft thrombosis", "C": "Post-operative Meningitis", "D": "Hypoglycaemic seizure", "E": "Brain tumor with focal-to-bilateral tonic-clonic evolution"}, "correct": "A", "rationales": {"A": "Sudden restoration of blood flow to a chronically under-perfused brain can cause edema and hemorrhage due to impaired autoregulation.", "B": "While stroke is a concern, the triad of headache, hypertension, and seizure is classic for hyperperfusion rather than acute occlusion.", "C": "Meningitis would present with fevers and meningismus, which are absent in this presentation.", "D": "While possible, hyperperfusion syndrome is a specific and well-known complication of carotid revascularization.", "E": "Given the recent CEA and hypertension, a surgical complication is far more probable than a new malignancy."}, "hint": "Consider what happens when a brain used to low pressure is suddenly 'flooded' with blood flow.", "part": 1}, {"stem": "Which of the following describes 'Permissive Hypotension' in the context of a ruptured AAA?", "options": {"A": "Maintaining SBP 70-90 mmHg to prevent dislodging a stabilizing clot", "B": "Allowing the patient to remain hypotensive only if their GCS is 15", "C": "Withholding all IV fluids until the patient has reached the ICU", "D": "Achieving a Mean Arterial Pressure (MAP) of 100 mmHg to ensure renal perfusion", "E": "Targeting a systolic pressure of 120 mmHg using vasopressors"}, "correct": "A", "rationales": {"A": "Lower pressures reduce the risk of turning a 'contained' retroperitoneal rupture into a 'free' intraperitoneal rupture.", "B": "If neurological compromise is profound, targets may be raised, but the default strategy is to keep pressure low regardless of GCS until in theatre.", "C": "Fluids are not withheld entirely; they are given judiciously to maintain the 70-90 mmHg target.", "D": "A MAP of 100 mmHg would require aggressive resuscitation, which is contraindicated due to the risk of re-bleeding.", "E": "Vasopressors increase wall tension and should be avoided in favor of titrated volume to a low-normal target."}, "hint": "Think about the balance between organ perfusion and the structural integrity of a 'contained' rupture.", "part": 1}, {"stem": "A 65-year-old male with a history of smoking presents with persistent 'tearing' chest pain radiating to the back. CT shows an intramural hematoma (IMH) in the ascending aorta but no visible intimal flap. How should this be managed?", "options": {"A": "Emergency surgical repair, similar to a Stanford Type A dissection", "B": "Conservative medical management with repeat CT in 24 hours", "C": "Immediate anticoagulation with Heparin to prevent clot propagation", "D": "Thoracic Endovascular Aortic Repair (TEVAR) to seal the hematoma", "E": "Thrombolysis as this repr // ── State ─────────────────────────────────────────────────────────────────────
let current       = 0;
let selected      = null;
let answered      = false;
let score         = 0;
let results       = new Array(QUESTIONS.length).fill(null); 
let flagged       = new Array(QUESTIONS.length).fill(false);
let notes         = new Array(QUESTIONS.length).fill('');
let currentFilter = 'wrong';
let _noteSaveTimer = null;

// ── Firebase ──────────────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey:            "AIzaSyCNnvrEli5lzU3sUFvttTsQPIYQXYK1_WE",
  authDomain:        "nbquiz-6faf9.firebaseapp.com",

};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();
const QUIZ_ID = 'W1/Vascular/v1';
let uid = null;

function sessionRef() {
  return db.collection('quizSessions').doc(uid).collection('quizzes').doc(QUIZ_ID);
}

async function saveState() {
  if (!uid) return;
  try {
    await sessionRef().set({
      results,
      flagged,
      current,
      score,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  } catch (e) { console.warn('Save failed:', e); }
}

async function loadState() {
  if (!uid) return false;
  try {
    const snap = await sessionRef().get();
    if (!snap.exists) return false;
    const data = snap.data();
    results = data.results || new Array(QUESTIONS.length).fill(null);
    flagged = data.flagged || new Array(QUESTIONS.length).fill(false);
    current = typeof data.current === 'number' ? data.current : 0;
    score   = typeof data.score   === 'number' ? data.score   : 0;
    return true;
  } catch (e) { console.warn('Load failed:', e); return false; }
}

// ── Notes (separate doc — never reset by restartQuiz) ─────────────────────────
function notesRef() {
  return db.collection('quizSessions').doc(uid).collection('notes').doc(QUIZ_ID);
}

async function saveNote(idx) {
  if (!uid) return;
  const text = notes[idx] || '';
  const statusEl = document.getElementById('noteSaveStatus');
  try {
    await notesRef().set({ [`n_${idx}`]: text }, { merge: true });
    if (statusEl) statusEl.textContent = 'Saved ✓';
    setTimeout(() => { if (statusEl) statusEl.textContent = ''; }, 1500);
  } catch (e) {
    if (statusEl) statusEl.textContent = 'Save failed';
    console.warn('Note save failed:', e);
  }
}

async function loadNotes() {
  if (!uid) return;
  try {
    const snap = await notesRef().get();
    if (!snap.exists) return;
    const data = snap.data();
    QUESTIONS.forEach((_, i) => {
      if (data[`n_${i}`] !== undefined) notes[i] = data[`n_${i}`];
    });
  } catch (e) { console.warn('Notes load failed:', e); }
}

// ── Sidebar & Init ────────────────────────────────────────────────────────────
function initSidebar() {
  const grid = document.getElementById('qGrid');
  grid.innerHTML = '';
  QUESTIONS.forEach((q, i) => {
    const div = document.createElement('div');
    div.className = 'q-grid-item';
    div.id = `grid-item-${i}`;
    div.onclick = () => jumpTo(i);
    div.innerHTML = `${i + 1}<div class="flag-icon">🚩</div><div class="note-icon">📝</div>`;
    grid.appendChild(div);
  });
}

function updateSidebar() {
  QUESTIONS.forEach((q, i) => {
    const el = document.getElementById(`grid-item-${i}`);
    if (!el) return;
    
    // Reset base classes
    el.className = 'q-grid-item';
    
    if (i === current) el.classList.add('active');
    if (flagged[i]) el.classList.add('flagged');
    if (notes[i] && notes[i].trim()) el.classList.add('has-note');
    
    const res = results[i];
    if (res) {
      if (res.skipped) el.classList.add('skipped');
      else if (res.wasCorrect) el.classList.add('correct');
      else el.classList.add('wrong');
    }
  });
  
  // Update answered count
  const answeredCount = results.filter(r => r !== null).length;
  document.getElementById('sidebarCount').textContent = `${answeredCount}/${QUESTIONS.length}`;
}

function copySidebarResults() {
  let text = "Quiz Status:\\n\\n";
  
  QUESTIONS.forEach((q, idx) => {
    const r = results[idx];
    let status = "unanswered";
    if (r) {
      if (r.wasCorrect) status = "correct";
      else if (!r.skipped) status = "wrong";
    }
    
    let flagText = flagged[idx] ? " (flagged)" : "";
    text += `${idx + 1}. ${status}${flagText}\\n`;
  });

  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('sidebarCopyBtn');
    const origText = btn.innerHTML;
    btn.innerHTML = '✅ Copied!';
    setTimeout(() => { btn.innerHTML = origText; }, 2000);
  }).catch(err => {
    alert("Failed to copy status: " + err);
  });
}


function renderQuestion(idx) {
  const q   = QUESTIONS[idx];
  answered  = false;
  selected  = null;

  document.getElementById('qLabel').textContent = `Question ${idx + 1}`;
  document.getElementById('partTag').textContent = `Part ${q.part}`;
  document.getElementById('stem').textContent    = q.stem;
  
  // Update flag button state
  const flagBtn = document.getElementById('flagBtn');
  flagBtn.textContent = flagged[idx] ? '🚩 Unflag' : '⚑ Flag';
  flagBtn.style.borderColor = flagged[idx] ? 'var(--wrong-ring)' : 'var(--border)';
  flagBtn.style.color = flagged[idx] ? 'var(--wrong)' : 'var(--text-2)';

  // Note
  const noteTextarea = document.getElementById('noteTextarea');
  const noteToggleBtn = document.getElementById('noteToggleBtn');
  const noteBody = document.getElementById('noteBody');
  const noteSaveStatus = document.getElementById('noteSaveStatus');
  noteTextarea.value = notes[idx] || '';
  noteSaveStatus.textContent = '';
  noteBody.classList.remove('open');
  const hasNote = notes[idx] && notes[idx].trim();
  noteToggleBtn.textContent = hasNote ? '📝 View / edit note' : '📝 Add note';
  noteToggleBtn.classList.toggle('has-note', !!hasNote);

  // Hint
  const hw = document.getElementById('hintWrap');
  const hb = document.getElementById('hintBody');
  if (q.hint) {
    hw.style.display = 'block';
    hb.textContent   = q.hint;
    hb.classList.remove('open');
  } else {
    hw.style.display = 'none';
  }

  // Options
  const optContainer = document.getElementById('options');
  optContainer.innerHTML = '';
  const letters = Object.keys(q.options).sort();
  letters.forEach(letter => {
    const btn = document.createElement('button');
    btn.className  = 'option';
    btn.dataset.letter = letter;
    btn.onclick    = () => selectOption(letter);

    const rat  = q.rationales[letter] || '';
    btn.innerHTML = `
      <div class="opt-letter">${letter}</div>
      <div class="opt-body">
        <div class="opt-text">${escHtml(q.options[letter])}</div>
        ${rat ? `<div class="opt-rationale" id="rat-${letter}">${escHtml(rat)}</div>` : ''}
      </div>
      <div class="opt-icon" id="icon-${letter}"></div>
    `;
    optContainer.appendChild(btn);
  });

  // Footer
  const submitBtn = document.getElementById('submitBtn');
  submitBtn.disabled   = true;
  submitBtn.textContent = 'Check answer';
  submitBtn.onclick    = submitAnswer;
  document.getElementById('skipBtn').textContent = 'Skip →';
  document.getElementById('skipBtn').style.display = '';
  setFeedback('', '');

  updateSidebar();
  updateProgress();
  
  document.getElementById('quizCard').style.animation = 'none';
  requestAnimationFrame(() => {
    document.getElementById('quizCard').style.animation = 'fadeUp .3s ease both';
  });
}

function toggleHint() {
  const hb = document.getElementById('hintBody');
  const btn = document.querySelector('.hint-toggle');
  const isOpen = hb.classList.toggle('open');
  btn.textContent = isOpen ? '💡 Hide hint' : '💡 Show hint';
}

function toggleNote() {
  const noteBody = document.getElementById('noteBody');
  const isOpen = noteBody.classList.toggle('open');
  if (isOpen) {
    document.getElementById('noteTextarea').focus();
  }
}

function onNoteInput() {
  const idx = current;
  const text = document.getElementById('noteTextarea').value;
  notes[idx] = text;
  const btn = document.getElementById('noteToggleBtn');
  const hasNote = text.trim().length > 0;
  btn.textContent = hasNote ? '📝 View / edit note' : '📝 Add note';
  btn.classList.toggle('has-note', hasNote);
  document.getElementById('noteSaveStatus').textContent = 'Saving…';
  clearTimeout(_noteSaveTimer);
  _noteSaveTimer = setTimeout(() => {
    saveNote(idx);
    updateSidebar();
  }, 800);
}

function toggleFlag() {
  flagged[current] = !flagged[current];
  const flagBtn = document.getElementById('flagBtn');
  flagBtn.textContent = flagged[current] ? '🚩 Unflag' : '⚑ Flag';
  flagBtn.style.borderColor = flagged[current] ? 'var(--wrong-ring)' : 'var(--border)';
  flagBtn.style.color = flagged[current] ? 'var(--wrong)' : 'var(--text-2)';
  updateSidebar();
  saveState();
}

function selectOption(letter) {
  if (answered) return;
  selected = letter;
  document.querySelectorAll('.option').forEach(el => {
    el.classList.toggle('selected', el.dataset.letter === letter);
  });
  document.getElementById('submitBtn').disabled = false;
}

function submitAnswer() {
  if (!selected || answered) return;
  answered = true;

  const q = QUESTIONS[current];
  const isCorrect = selected === q.correct;

  // Save result to the fixed array index
  results[current] = { q: current, chosen: selected, correct: q.correct, wasCorrect: isCorrect, skipped: false };
  
  // Recalculate score safely
  score = results.filter(r => r && r.wasCorrect).length;

  // Lock options & colour them
  document.querySelectorAll('.option').forEach(el => {
    el.classList.add('locked');
    const l = el.dataset.letter;
    if (l === q.correct) {
      el.classList.add('correct');
      document.getElementById(`icon-${l}`).textContent = '✅';
    } else if (l === selected && !isCorrect) {
      el.classList.add('wrong');
      document.getElementById(`icon-${l}`).textContent = '❌';
    } else {
      el.classList.add('dimmed');
    }
    // Show rationale
    const rat = document.getElementById(`rat-${l}`);
    if (rat) rat.classList.add('visible');
  });

  if (isCorrect) setFeedback('✅ Correct!', 'correct');
  else setFeedback(`❌ The answer was ${q.correct}`, 'wrong');

  document.getElementById('submitBtn').textContent = current < QUESTIONS.length - 1 ? 'Next →' : 'See results';
  document.getElementById('submitBtn').onclick = nextQuestion;
  document.getElementById('submitBtn').disabled = false;
  document.getElementById('skipBtn').style.display = 'none';

  updateSidebar();
  updateProgress();
  saveState();
}

function nextQuestion() {
  if (!answered) {
    results[current] = { q: current, chosen: null, correct: QUESTIONS[current].correct, wasCorrect: false, skipped: true };
  }
  current++;
  saveState();
  if (current >= QUESTIONS.length) {
    showResults();
  } else {
    renderQuestion(current);
    document.getElementById('submitBtn').onclick = submitAnswer;
  }
}

// ── Progress & score ──────────────────────────────────────────────────────────
function updateProgress() {
  const answeredCount = results.filter(r => r !== null).length;
  const pct = Math.round((answeredCount / QUESTIONS.length) * 100);
  
  document.getElementById('progressFill').style.width  = pct + '%';
  document.getElementById('progressLabel').textContent = `Answered ${answeredCount} of ${QUESTIONS.length}`;
  document.getElementById('progressPct').textContent   = pct + '%';
  document.getElementById('scoreDisplay').textContent  = `${score} / ${answeredCount}`;
}

function setFeedback(msg, cls) {
  const el = document.getElementById('feedbackMsg');
  el.textContent  = msg;
  el.className    = 'feedback-msg' + (cls ? ' ' + cls : '');
  el.style.visibility = msg ? 'visible' : 'hidden';
}

// ── Results & Review Panel ────────────────────────────────────────────────────
function showResults() {
  document.getElementById('quizCard').classList.add('hidden');
  document.getElementById('progressWrap').classList.add('hidden');

  const total   = QUESTIONS.length;
  const correct = results.filter(r => r && r.wasCorrect).length;
  const wrong   = results.filter(r => r && !r.wasCorrect && !r.skipped).length;
  const skipped = results.filter(r => r === null || r.skipped).length;
  const pct     = Math.round((correct / total) * 100);

  document.getElementById('resultsGrade').textContent   = pct + '%';
  document.getElementById('correctCount').textContent   = correct;
  document.getElementById('wrongCount').textContent     = wrong;
  document.getElementById('skippedCount').textContent   = skipped;
  document.getElementById('totalQ').textContent         = total;

  let label = '';
  if (pct >= 90) label = '🏆 Outstanding performance!';
  else if (pct >= 75) label = '🎯 Great work — above pass mark!';
  else if (pct >= 60) label = '📚 Good effort — review the misses.';
  else label = "💪 Keep studying — you'll get there!";
  
  document.getElementById('resultsLabel').textContent = label;
  document.getElementById('resultsScreen').classList.add('visible');
}

function showReview() {
  const section = document.getElementById('reviewSection');
  section.classList.toggle('hidden');
  
  if (!section.classList.contains('hidden')) {
    const correctCount = results.filter(r => r && r.wasCorrect).length;
    filterReview(correctCount === QUESTIONS.length ? 'all' : 'wrong');
  }
}

function filterReview(type) {
  currentFilter = type;
  document.getElementById('filterAll').classList.toggle('active', type === 'all');
  document.getElementById('filterWrong').classList.toggle('active', type === 'wrong');
  document.getElementById('filterFlagged').classList.toggle('active', type === 'flagged');
  document.getElementById('filterNotes').classList.toggle('active', type === 'notes');
  renderReviewList();
}

function renderReviewList() {
  const list = document.getElementById('reviewList');
  list.innerHTML = '';
  
  QUESTIONS.forEach((q, i) => {
    const r = results[i];
    const isFlagged = flagged[i];
    const hasNote = notes[i] && notes[i].trim();
    const isCorrect = r && r.wasCorrect;
    const isUnanswered = !r || r.skipped;

    if (currentFilter === 'wrong' && isCorrect) return;
    if (currentFilter === 'flagged' && !isFlagged) return;
    if (currentFilter === 'notes' && !hasNote) return;

    const div = document.createElement('div');
    div.className = 'review-item';
    div.style.flexDirection = 'column';
    div.style.alignItems = 'stretch';
    const stemShort = q.stem.length > 100 ? q.stem.slice(0, 100) + '…' : q.stem;
    
    let statusText = isUnanswered ? 'Unanswered' : (isCorrect ? 'Correct' : 'Wrong');
    let displayDetail = isUnanswered ? '' : `(${r.chosen} → ${r.correct})`;
    let flagHTML = isFlagged ? '<span style="color:var(--wrong); font-size:0.8rem; margin-left:6px;">🚩</span>' : '';
    let noteIndicator = hasNote ? '<span style="font-size:0.8rem; margin-left:6px;">📝</span>' : '';

    div.innerHTML = `
      <div style="display:flex;align-items:flex-start;gap:14px;" onclick="jumpTo(${i})">
        <div class="review-dot ${isCorrect ? 'correct' : 'wrong'}" style="margin-top:6px;flex-shrink:0;"></div>
        <div class="review-text" style="flex:1;">Q${i + 1}. ${escHtml(stemShort)}${flagHTML}${noteIndicator}</div>
        <div class="review-answer" style="flex-shrink:0;"><span class="status-${statusText}">${statusText}</span> ${displayDetail}</div>
      </div>
      ${hasNote ? `<div class="review-note">${escHtml(notes[i])}</div>` : ''}
    `;
    list.appendChild(div);
  });
  
  if (list.innerHTML === '') {
    list.innerHTML = '<div style="color:var(--text-3);font-size:.9rem;padding:12px;">No questions match this filter.</div>';
  }
}

function copyResults() {
  let text = "Quiz Results Summary:\\n\\n";
  
  QUESTIONS.forEach((q, idx) => {
    const r = results[idx];
    let status = "Unanswered";
    if (r) {
      if (r.wasCorrect) status = "Correct";
      else if (!r.skipped) status = "Wrong";
    }
    let flagText = flagged[idx] ? " [FLAGGED]" : "";
    text += "Q" + (idx + 1) + ": " + status + flagText + "\\n";
  });

  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    const origText = btn.innerHTML;
    btn.innerHTML = '✅ Copied!';
    setTimeout(() => { btn.innerHTML = origText; }, 2000);
  }).catch(err => {
    alert("Failed to copy results: " + err);
  });
}

function jumpTo(idx) {
  document.getElementById('resultsScreen').classList.remove('visible');
  document.getElementById('quizCard').classList.remove('hidden');
  document.getElementById('progressWrap').classList.remove('hidden');
  
  current = idx;
  answered = false;
  selected = null;
  renderQuestion(idx);
  
  // Auto-replay the answer if it was previously answered
  const r = results[idx];
  if (r && !r.skipped) {
    selected = r.chosen;
    submitAnswer(); 
  }
}

function restartQuiz() {
  current  = 0;
  score    = 0;
  results  = new Array(QUESTIONS.length).fill(null);
  flagged  = new Array(QUESTIONS.length).fill(false);
  answered = false;
  selected = null;
  
  document.getElementById('resultsScreen').classList.remove('visible');
  document.getElementById('reviewSection').classList.add('hidden');
  document.getElementById('quizCard').classList.remove('hidden');
  document.getElementById('progressWrap').classList.remove('hidden');
  document.getElementById('submitBtn').onclick = submitAnswer;
  
  saveState();
  initSidebar();
  renderQuestion(0);
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Auth ──────────────────────────────────────────────────────────────────────
const provider = new firebase.auth.GoogleAuthProvider();

function signInWithGoogle() {
  document.getElementById('loginError').textContent = '';
  auth.signInWithPopup(provider).catch(err => {
    document.getElementById('loginError').textContent = 'Sign-in failed. Please try again.';
    console.error(err);
  });
}

function signOut() {
  auth.signOut();
}

async function startQuiz(user) {
  uid = user.uid;
  document.getElementById('loginScreen').classList.add('hidden');
  const restored = await loadState();
  await loadNotes();
  initSidebar();
  if (restored && results.some(r => r !== null)) {
    renderQuestion(current);
    const r = results[current];
    if (r && !r.skipped) {
      selected = r.chosen;
      submitAnswer();
    }
    updateProgress();
  } else {
    renderQuestion(0);
  }
}

// ── Boot ──────────────────────────────────────────────────────────────────────
initSidebar();

auth.onAuthStateChanged(user => {
  if (user) {
    startQuiz(user);
  } else {
    document.getElementById('loginScreen').classList.remove('hidden');
  }
});
</script>
