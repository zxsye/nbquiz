<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NB Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:      #f7f5f0;
  --surface: #ffffff;
  --border:  #e2ddd5;
  --text:    #1a1714;
  --text-2:  #5a534a;
  --text-3:  #9a8f83;
  --accent:  #2563a8;
  --accent-light: #dbeafe;
  --radius:  10px;
  --radius-lg: 16px;
  --shadow:  0 1px 3px rgba(0,0,0,.07), 0 4px 16px rgba(0,0,0,.06);
  --font-serif: 'Crimson Pro', Georgia, serif;
  --font-sans:  'DM Sans', system-ui, sans-serif;
  --font-mono:  'DM Mono', monospace;
}
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 48px 24px 80px;
}
.page-header {
  max-width: 720px;
  margin: 0 auto 48px;
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  padding-bottom: 20px;
  border-bottom: 1.5px solid var(--border);
}
.logo {
  font-family: var(--font-serif);
  font-size: 2rem;
  font-weight: 600;
  color: var(--text);
}
.logo span { color: var(--accent); }
.credit {
  font-size: .72rem;
  color: var(--text-3);
  font-family: var(--font-mono);
}
.grid {
  max-width: 720px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.week-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow);
  overflow: hidden;
}
.week-label {
  font-family: var(--font-mono);
  font-size: .7rem;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--text-3);
  padding: 14px 20px 10px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
}
.topic-list { padding: 8px 0; }
.topic-row {
  display: flex;
  align-items: center;
  padding: 10px 20px;
  gap: 16px;
  border-bottom: 1px solid var(--border);
}
.topic-row:last-child { border-bottom: none; }
.topic-name {
  font-size: .95rem;
  font-weight: 500;
  color: var(--text);
  min-width: 120px;
}
.ver-links {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.ver-link {
  font-family: var(--font-mono);
  font-size: .78rem;
  font-weight: 500;
  padding: 4px 14px;
  border: 1.5px solid var(--border);
  border-radius: 99px;
  color: var(--accent);
  text-decoration: none;
  transition: background .15s, border-color .15s;
}
.ver-link:hover {
  background: var(--accent-light);
  border-color: var(--accent);
}
.empty {
  text-align: center;
  color: var(--text-3);
  font-size: .9rem;
  padding: 48px;
}
@media (max-width: 520px) {
  .topic-row { flex-direction: column; align-items: flex-start; gap: 8px; }
  .topic-name { min-width: unset; }
}
</style>
</head>
<body>
<header class="page-header">
  <div class="logo">NB <span>Quiz</span></div>
  <div class="credit">made by Zi Lin</div>
</header>
<main class="grid">

    <div class="week-card">
      <div class="week-label">W7</div>
      <div class="topic-list">
        <div class="topic-row">
          <span class="topic-name">Neuro</span>
          <div class="ver-links"><a href="W7/Neuro/v1.html" class="ver-link">v1</a></div>
        </div>
      </div>
    </div>
</main>
</body>
</html>
