name: Build Quiz Site

on:
  push:
    branches: [main]
    paths:
      - 'quizzes/**/*.html'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # ── Checkout main (source) ──────────────────────────────────────────────
      - name: Checkout main
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 2

      # ── Find HTML files to process ──────────────────────────────────────────
      # On manual trigger: process all. On push: process only changed ones.
      - name: Find quiz HTMLs to build
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            FILES=$(find quizzes -name '*.html' | tr '\n' ' ')
            echo "Manual trigger — building all: $FILES"
          else
            FILES=$(git diff --name-only HEAD~1 HEAD -- 'quizzes/**/*.html' | tr '\n' ' ')
            echo "Push trigger — changed: $FILES"
          fi
          echo "files=$FILES" >> $GITHUB_OUTPUT

      # ── Checkout gh-pages into a subfolder ─────────────────────────────────
      - name: Checkout gh-pages
        uses: actions/checkout@v4.2.2
        with:
          ref: gh-pages
          path: gh-pages-out

      # ── Extract + Build ─────────────────────────────────────────────────────
      - name: Extract and build quizzes
        run: |
          chmod +x extract_notebooklm_quiz_json.sh
          chmod +x build_quiz_site.sh

          for src_html in ${{ steps.changed.outputs.files }}; do
            echo "──────────────────────────────────────"
            echo "Processing: $src_html"

            # Step 1: Extract JSON from NotebookLM HTML
            TEMP_JSON=$(mktemp /tmp/quiz_XXXX.json)
            ./extract_notebooklm_quiz_json.sh "$src_html" "$TEMP_JSON"

            # Step 2: Build quiz HTML
            # Mirror path: quizzes/W7/Neuro/SAH.html → gh-pages-out/W7/Neuro/SAH.html
            rel="${src_html#quizzes/}"
            out_html="gh-pages-out/${rel}"
            mkdir -p "$(dirname "$out_html")"

            # Pass src_html as path hint so title/ID is derived correctly
            ./build_quiz_site.sh "$TEMP_JSON" "$out_html" "$src_html"

            rm -f "$TEMP_JSON"
            echo "Built → $out_html"
          done

      # ── Regenerate index.html ───────────────────────────────────────────────
      - name: Regenerate index.html
        run: python3 generate_index.py gh-pages-out

      # ── Commit and push to gh-pages ─────────────────────────────────────────
      - name: Commit to gh-pages
        run: |
          cd gh-pages-out
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "Build: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
