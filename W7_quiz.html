nants can interfere, the primary clinical pitfall in fires is the chemical interference of CO.", "E": "Shock can prevent a reading from being taken, but it wouldn't consistently cause a false 'normal' in this context."}, "hint": "Consider the common toxic gas produced during the combustion of organic materials.", "part": 1}, {"stem": "Following a splenectomy for a Grade V splenic injury, a patient is being prepared for discharge. Which of the following is essential for their long-term management?", "options": {"A": "Daily low-dose aspirin for life", "B": "Vaccinations against encapsulated organisms", "C": "A low-protein diet to prevent urea accumulation", "D": "Avoidance of all travel to tropical climates", "E": "Monthly B12 injections"}, "correct": "B", "rationales": {"A": "Aspirin is not standard; the primary concern after splenectomy is immune function.", "B": "Asplenic patients are at high risk for Overwhelming Post-Splenectomy Infection (OPSI), primarily from encapsulated bacteria.", "C": "The spleen has no role in protein metabolism or urea clearance.", "D": "While malaria is a risk, travel is not forbidden if appropriate prophylaxis and education are provided.", "E": "The spleen is not involved in B12 absorption; this is related to the stomach and terminal ileum."}, "hint": "The spleen plays a vital role in filtering specific types of bacteria.", "part": 1}, {"stem": "An elderly patient with an acute subdural haematoma is currently taking Dabigatran for stroke prevention. Which agent is the specific reversal agent for this medication?", "options": {"A": "Vitamin K", "B": "Prothrombinex (PCC)", "C": "Idarucizumab", "D": "Protamine Sulfate", "E": "Andexanet alfa"}, "correct": "C", "rationales": {"A": "Vitamin K is used for Warfarin reversal by promoting the synthesis of clotting factors.", "B": "PCC is used for Warfarin or sometimes factor Xa inhibitors, but not as the specific primary agent for Dabigatran.", "C": "Idarucizumab (Praxbind) is the specific monoclonal antibody fragment that reverses Dabigatran.", "D": "Protamine is used to reverse the effects of Heparin.", "E": "Andexanet alfa is the reversal agent for factor Xa inhibitors like Rivaroxaban or Apixaban."}, "hint": "This is a direct thrombin inhibitor and requires a targeted monoclonal antibody for reversal.", "part": 1}, {"stem": "A patient complains of leg pain that is relieved by sitting or leaning forward while pushing a shopping trolley, but not by simply standing still. What is the most likely diagnosis?", "options": {"A": "Vascular claudication", "B": "Neurogenic claudication", "C": "Acute compartment syndrome", "D": "Dermatomal radiculopathy", "E": "Plantar fasciitis"}, "correct": "B", "rationales": {"A": "Vascular claudication is usually relieved by standing still and is not typically affected by spine position.", "B": "Spinal stenosis causes neurogenic claudication, which improves with spinal flexion (which opens the canal).", "C": "Compartment syndrome causes constant, severe pain that is not relieved by position and is an acute emergency.", "D": "Radiculopathy usually presents with 'shooting' pain in a single nerve distribution rather than walking-related heaviness.", "E": "This causes heel pain that is worst with the first steps in the morning."}, "hint": "Consider the effect of spinal flexion on the space available in the spinal canal.", "part": 1}, {"stem": "A 20-year-old student is punched in the side of the head during a fight. He was briefly unconscious, then woke up and felt completely fine, deciding to go home. Two hours later, he is found unconscious in his bed. What is the most likely diagnosis?", "options": {"A": "Acute Subdural Haematoma", "B": "Extradural Haematoma", "C": "Diffuse Axonal Injury", "D": "Chronic Subdural Haematoma", "E": "Post-concussion syndrome"}, "correct": "B", "rationales": {"A": "Acute SDH usually presents with immediate and persistent loss of consciousness due to high-energy trauma.", "B": "The classic 'lucid interval' is characteristic of an arterial bleed (Middle Meningeal Artery) in the extradural space.", "C": "DAI typically causes immediate, prolonged coma from the moment of impact.", "D": "Chronic SDH develops over weeks and is more common in the elderly or those on anticoagulants.", "E": "This syndrome involves persistent headaches and cognitive issues but not a sudden drop in GCS."}, "hint": "This pattern is often referred to as the 'talk and die' phenomenon.", "part": 1}, {"stem": "Which of the following is the most sensitive and earliest clinical sign of acute compartment syndrome?", "options": {"A": "Absence of distal pulses", "B": "Pain out of proportion to the injury", "C": "Pallor of the overlying skin", "D": "A drop in the serum Creatine Kinase (CK)", "E": "Hypercalcaemia on blood tests"}, "correct": "B", "rationales": {"A": "Pulselessness is a very late sign; waiting for it will result in irreversible muscle death.", "B": "Disproportionate pain, especially if poorly controlled by opioids, is the hallmark early sign of compartment syndrome.", "C": "Pallor and paralysis are late signs indicating that severe ischaemia has already occurred.", "D": "CK rises as muscle breaks down; it does not fall and is not the earliest sign.", "E": "Rhabdomyolysis actually causes hypocalcaemia as calcium is deposited in damaged muscle."}, "hint": "The most important diagnostic tool is a thorough clinical assessment of the patient's symptoms.", "part": 1}, {"stem": "A patient with a confirmed SAH becomes increasingly drowsy on day 6 of her admission. She has a serum sodium of 122 mmol/L and appears clinically dehydrated with low central venous pressure. What is the most likely diagnosis and appropriate treatment?", "options": {"A": "SIADH; treat with fluid restriction", "B": "Cerebral Salt Wasting (CSW); treat with IV saline", "C": "Diabetes Insipidus; treat with Desmopressin", "D": "Acute Hyponatraemia; treat with rapid IV water bolus", "E": "Psychogenic polydipsia; treat with fluid restriction"}, "correct": "B", "rationales": {"A": "Fluid restriction in a dehydrated SAH patient will worsen vasospasm and lead to cerebral infarction.", "B": "CSW involves hypovolaemia and hyponatraemia; it must be treated with volume replacement to prevent vasospasm.", "C": "DI causes hypernatraemia and polyuria, not hyponatraemia.", "D": "Free water boluses would worsen hyponatraemia; hypertonic or isotonic saline is needed.", "E": "This is a psychiatric condition unrelated to the specific physiological shifts of SAH."}, "hint": "Determine whether the patient is euvolaemic or hypovolaemic to distinguish between the two main causes of low sodium in neurosurgery.", "part": 1}, {"stem": "A polytrauma patient is noted to have a pH of 7.1, a temperature of 34.5^{\\circ}C, and an INR of 2.1. What is the clinical significance of these findings?", "options": {"A": "This is the 'Monro-Kellie' exhaustion; they require an EVD", "B": "This is the 'Lethal Triad'; the patient requires Damage Control Surgery", "C": "This is 'Cushing’s Triad'; they require immediate osmotherapy", "D": "The patient has SIADH and requires fluid restriction", "E": "The patient has simple haemorrhagic shock; they only require crystalloids"}, "correct": "B", "rationales": {"A": "Monro-Kellie relates to intracranial volumes, not systemic physiology.", "B": "The lethal triad of acidosis, hypothermia, and coagulopathy indicates a high risk of death and the need for abbreviated surgery to allow physiological recovery.", "C": "Cushing's triad relates to vital sign changes in raised ICP.", "D": "These findings represent metabolic and coagulation failure, not a water balance issue.", "E": "This degree of physiological disturbance requires massive transfusion (blood products) and surgical control, not just crystalloids."}, "hint": "These three factors create a self-perpetuating cycle of uncontrollable haemorrhage.", "part": 1}, {"stem": "An injury to the flexor tendons between the A1 pulley and the insertion of the Flexor Digitorum Superficialis (FDS) is classified as being in which zone?", "options": {"A": "Zone I", "B": "Zone II", "C": "Zone III", "D": "Zone IV", "E": "Zone V"}, "correct": "B", "rationales": {"A": "Zone I is distal to the FDS insertion, involving only the FDP.", "B": "Known as 'No Man's Land', Zone II involves both FDS and FDP within the fibro-osseous sheath.", "C": "Zone III is located in the palm, proximal to the pulleys.", "D": "Zone IV is located within the carpal tunnel.", "E": "Zone V is proximal to the carpal tunnel in the forearm."}, "hint": "This area is historically difficult to repair due to the risk of adhesions.", "part": 1}, {"stem": "A 24-year-old male is brought to the emergency department after a high-speed motorcycle accident. Initially, he has a GCS of 15, but over the next hour, his GCS drops to 10 and his right pupil becomes fixed and dilated. What is the most appropriate immediate pharmacological intervention?", "options": {"A": "Intravenous Dexamethasone 16mg", "B": "Intravenous Mannitol 20% 1 g/kg", "C": "Intravenous Phenytoin loading dose", "D": "Intravenous Furosemide 40mg", "E": "Intravenous Nimodipine 60mg"}, "correct": "B", "rationales": {"A": "Steroids are specifically contraindicated in traumatic brain injury as they increase mortality.", "B": "Osmotherapy is the first-line medical treatment to rapidly reduce intracranial pressure in the setting of acute herniation.", "C": "While seizure prophylaxis is important, it does not address the immediate life-threatening mass effect and herniation.", "D": "Loop diuretics are not the standard of care for acute intracranial pressure management compared to osmotic agents.", "E": "This medication is used to prevent vasospasm in subarachnoid haemorrhage, not to treat acute traumatic mass effect."}, "hint": "Consider the need to rapidly shift fluid out of the cranial vault to prevent further brainstem compression.", "part": 1}, {"stem": "A 78-year-old female with atrial fibrillation on warfarin presents with three weeks of worsening confusion and a fluctuating level of consciousness. She recalls a minor fall onto carpet a month ago. A non-contrast CT head shows a crescent-shaped hypodense collection crossing suture lines. What is the most likely diagnosis?", "options": {"A": "Acute Subdural Haematoma", "B": "Extradural Haematoma", "C": "Chronic Subdural Haematoma", "D": "Intracerebral Contusion", "E": "Ischaemic Stroke"}, "correct": "C", "rationales": {"A": "Acute subdural collections appear hyperdense (white) on CT, whereas this chronic presentation is hypodense.", "B": "Extradural bleeds are typically biconvex/lens-shaped and usually present acutely in younger patients after significant trauma.", "C": "This is common in elderly, anticoagulated patients with minor trauma, presenting insidiously with hypodense crescentic collections.", "D": "Contusions are parenchymal injuries often showing mixed density and do not typically follow the crescentic subdural space.", "E": "While confusion occurs in stroke, the CT description of a crescent-shaped extra-axial collection confirms a haemorrhagic etiology."}, "hint": "Focus on the timing of the symptoms and the specific density of the collection on the CT scan.", "part": 1}, {"stem": "A 45-year-old female presents with the 'worst headache of her life' which reached peak intensity within 30 seconds. A CT head performed 8 hours after onset is negative for blood. What is the next most appropriate step in management?", "options": {"A": "Discharge with migraine advice", "B": "Repeat CT head in 24 hours", "C": "Lumbar puncture for xanthochromia", "D": "Immediate Cerebral Angiogram", "E": "Start oral Nimodipine 60mg"}, "correct": "C", "rationales": {"A": "A negative CT after 6 hours is not sensitive enough to exclude a subarachnoid haemorrhage.", "B": "Repeating the CT is unlikely to increase sensitivity as blood degrades and becomes less visible over time.", "C": "In CT-negative suspected SAH, a lumbar puncture must be performed at least 12 hours after onset to check for breakdown products of blood.", "D": "Angiography is used to find the source once the haemorrhage is confirmed, rather than as a primary screening tool for CT-negative patients.", "E": "Pharmacological treatment should follow a confirmed diagnosis of SAH."}, "hint": "The sensitivity of CT for blood decreases significantly after the first 6 hours.", "part": 1}, {"stem": "During a primary survey of a trauma patient, you note absent breath sounds on the right side, hyper-resonance to percussion on the right, and a blood pressure of 85/50 mmHg. What is the most immediate priority?", "options": {"A": "Order an urgent portable Chest X-ray", "B": "Perform needle decompression in the 2nd intercostal space", "C": "Insert a 32Fr chest drain in the safe triangle", "D": "Intubate the patient and start positive pressure ventilation", "E": "Activate the Massive Transfusion Protocol"}, "correct": "B", "rationales": {"A": "Waiting for imaging in a clinically diagnosed tension pneumothorax with hypotension can lead to cardiac arrest.", "B": "This is a life-saving clinical diagnosis requiring immediate decompression before any imaging is obtained.", "C": "While this is the definitive treatment, needle decompression is often faster for immediate relief of obstructive shock.", "D": "Positive pressure ventilation can actually worsen a tension pneumothorax and accelerate cardiovascular collapse.", "E": "The hypotension here is likely obstructive (tension) rather than haemorrhagic, though both may coexist in trauma."}, "hint": "Identify the signs of obstructive shock and the immediate bedside procedure used to relieve it.", "part": 1}, {"stem": "A 30-year-old male is brought in after a steering wheel injury to the abdomen. He is pale and tachycardic (HR 130). FAST ultrasound shows free fluid in the splenorenal recess. His blood pressure remains 80/40 mmHg despite 1 L of crystalloid. What is the next best step?", "options": {"A": "CT Abdomen and Pelvis with contrast", "B": "Emergency Laparotomy", "C": "Diagnostic Peritoneal Lavage", "D": "Angioembolisation of the splenic artery", "E": "Repeat FAST ultrasound in 15 minutes"}, "correct": "B", "rationales": {"A": "Hemodynamically unstable patients should never be taken to the CT scanner; they require immediate operative control.", "B": "The combination of hemodynamic instability and a positive FAST scan in blunt trauma is a mandatory indication for immediate surgery.", "C": "Since the FAST scan is already positive for fluid, this invasive procedure is redundant and delays definitive care.", "D": "Interventional radiology is only appropriate for hemodynamically stable patients with active blushes on CT.", "E": "Delaying treatment in a patient with ongoing shock and confirmed haemorrhage increases mortality."}, "hint": "Recall the cardinal rule regarding unstable patients and the radiology department.", "part": 1}, {"stem": "A 70kg adult male sustains partial thickness burns to his entire anterior trunk and both anterior upper limbs. Using the Parkland formula, what is the total volume of Hartmann's solution required in the first 24 hours?", "options": {"A": "5,040 mL", "B": "7,560 mL", "C": "10,080 mL", "D": "3,780 mL", "E": "15,120 mL"}, "correct": "B", "rationales": {"A": "This value assumes a lower %TBSA than the rule of nines dictates for the anterior trunk and both arms.", "B": "Anterior trunk (18%) + both anterior arms (4.5% + 4.5% = 9%) = 27%. 4 mL \\times 70 kg \\times 27 = 7,560 mL.", "C": "This calculation would be correct if the %TBSA was 36%, which overestimates the described burn area.", "D": "This represents only the volume for the first 8 hours, not the total 24-hour requirement.", "E": "This is an overestimation, likely doubling the standard Parkland calculation."}, "hint": "Calculate the %TBSA first: Anterior trunk is 18% and each entire upper limb is 9% (so anterior is 4.5% each).", "part": 1}, {"stem": "A patient with a mid-shaft tibial fracture reports severe pain that is not relieved by 10 mg of IV morphine. On examination, the leg is tense, and there is excruciating pain when the clinician passively plantarflexes the patient's foot. Distal pulses are present. What is the most likely diagnosis?", "options": {"A": "Deep Vein Thrombosis", "B": "Acute Compartment Syndrome", "C": "Acute Arterial Occlusion", "D": "Osteomyelitis", "E": "Fat Embolism Syndrome"}, "correct": "B", "rationales": {"A": "While DVT causes pain, it does not typically present with the 'woody' tension and severe pain on passive stretch seen here.", "B": "Pain out of proportion and pain on passive stretch are the earliest and most sensitive signs of this surgical emergency.", "C": "In arterial occlusion, pulses would be absent; in compartment syndrome, pulses are usually preserved until very late.", "D": "This is an inflammatory/infectious process that presents with fever and localized pain, not the acute tension of a closed compartment.", "E": "Fat embolism presents with respiratory distress, petechial rash, and neurological changes, not isolated limb tension."}, "hint": "Passive stretching of muscles within a high-pressure space causes hallmark ischaemic pain.", "part": 1}, {"stem": "Which of the following describes the most important modifiable risk factor for the development and rupture of berry aneurysms?", "options": {"A": "Alcohol consumption", "B": "Cigarette smoking", "C": "Hypercholesterolaemia", "D": "Sedentary lifestyle", "E": "Diet high in saturated fats"}, "correct": "B", "rationales": {"A": "While heavy use is a risk, it is not as strongly or directly linked to aneurysm dynamics as other vascular stressors.", "B": "Smoking is the strongest modifiable risk factor for both the formation and the rupture of intracranial aneurysms.", "C": "High cholesterol is more strongly associated with atherosclerotic fusiform aneurysms rather than saccular berry aneurysms.", "D": "While general health is important, this has no specific direct evidence linked to aneurysm rupture risk compared to smoking.", "E": "Dietary habits influence atherosclerosis, but smoking exerts a much more direct effect on aneurysm wall integrity."}, "hint": "This risk factor is frequently addressed in public health campaigns regarding vascular health.", "part": 1}, {"stem": "A 50-year-old male presents with a sudden onset of 'curtain-like' visual loss in his right eye, a drooping eyelid, and a fixed, dilated right pupil. He also reports a severe headache. What is the most likely underlying cause?", "options": {"A": "Diabetic CN III palsy", "B": "Posterior Communicating Artery (PComA) Aneurysm", "C": "Middle Cerebral Artery (MCA) Stroke", "D": "Pituitary Macroadenoma", "E": "Meningioma of the sphenoid wing"}, "correct": "B", "rationales": {"A": "Diabetic third nerve palsies typically spare the pupil because the parasympathetic fibers are on the periphery of the nerve.", "B": "A pupil-involving CN III palsy with a headache is an aneurysm of the PComA until proven otherwise.", "C": "Stroke usually presents with hemiparesis or aphasia rather than an isolated third nerve palsy with pupil involvement.", "D": "This typically presents with bitemporal hemianopia from chiasmal compression rather than acute oculomotor nerve palsy.", "E": "Meningiomas present chronically with slowly progressive deficits, not sudden headaches and acute nerve palsies."}, "hint": "A painful, pupil-involving third nerve palsy is a neurosurgical emergency involving the Circle of Willis.", "part": 1}, {"stem": "A 32-year-old woman is brought to the ED following a house fire. She is confused and has soot in her mouth. Her oxygen saturation is 100% on a non-rebreather mask, but her ABG shows a significant metabolic acidosis with a lactate of 8 mmol/L. What is the most appropriate next step?", "options": {"A": "Increase O_2 flow rate", "B": "Administer Hydroxocobalamin 5 g IV", "C": "Initiate IV Sodium Bicarbonate", "D": "Order a CT Chest to look for pneumonitis", "E": "Administer prophylactic antibiotics"}, "correct": "B", "rationales": {"A": "Oxygen saturation is falsely normal in carbon monoxide poisoning and will not resolve cyanide-induced metabolic acidosis.", "B": "The combination of smoke inhalation, altered consciousness, and severe lactic acidosis is highly suggestive of cyanide toxicity.", "C": "Bicarbonate treats the symptom of acidosis but does not address the underlying poisoning causing the cellular hypoxia.", "D": "While pneumonitis can occur, it doesn't explain the acute systemic toxicity and metabolic acidosis in this context.", "E": "Antibiotics are not indicated acutely for smoke inhalation and do not treat the immediate life-threatening metabolic crisis."}, "hint": "Consider the toxins found in smoke from burning synthetic materials that interfere with mitochondrial respiration.", "part": 1}, {"stem": "An 82-year-old male with lower back pain for two days presents with new urinary incontinence and numbness 'around his crotch'. On examination, he has reduced anal tone. What is the most appropriate timeframe for obtaining definitive imaging?", "options": {"A": "Within 1 hour", "B": "Within 4 hours", "C": "Within 12 hours", "D": "Within 24 hours", "E": "Elective MRI as an outpatient"}, "correct": "B", "rationales": {"A": "While urgent, the standard emergency timeframe for MRI in suspected CES is usually cited as within 4 hours.", "B": "Suspected Cauda Equina Syndrome is a surgical emergency requiring MRI within 4 hours to prevent permanent dysfunction.", "C": "Waiting 12 hours significantly increases the risk of irreversible bowel, bladder, and sexual dysfunction.", "D": "This delay is inappropriate for a patient already showing cardinal signs of cauda equina compression.", "E": "Saddle anaesthesia and sphincter disturbance are 'red flags' that mandate immediate inpatient investigation."}, "hint": "This is a surgical emergency where the 'time is nerve' principle applies to the lumbosacral roots.", "part": 1}, {"stem": "A 28-year-old is punched in the mouth during a fight, sustaining a small laceration over the 3rd MCP joint. He can move his finger fully and the X-ray is normal. What is the most appropriate management plan?", "options": {"A": "Suture the wound and give oral Penicillin", "B": "Wash with saline and apply a Steri-strip", "C": "IV Antibiotics and urgent surgical washout", "D": "Discharge with a 5-day course of Amoxicillin-clavulanate", "E": "Apply a splint and review in the hand clinic in 1 week"}, "correct": "C", "rationales": {"A": "Closing a 'fight bite' primarily is dangerous as it traps oral flora in the joint space, leading to severe infection.", "B": "Superficial cleaning is insufficient for a wound that likely penetrated the joint capsule during impact.", "C": "All 'fight bites' over joints require formal exploration, washout, and IV antibiotics due to the high risk of septic arthritis.", "D": "Oral antibiotics alone are inadequate for potential joint space contamination from human oral flora.", "E": "Delaying assessment of a potential septic joint can lead to rapid destruction of the articular cartilage."}, "hint": "Human oral flora introduced into a joint space via a 'fight bite' is an emergency that must not be closed primarily.", "part": 1}, {"stem": "A patient is 12 hours post-craniotomy for a brain tumour. The nurse notes that the patient is becoming increasingly drowsy (GCS drop from 15 to 12) and has a blood pressure of 170/90 mmHg and a heart rate of 55 bpm. What is the most likely cause?", "options": {"A": "Opioid-induced sedation", "B": "Post-operative delirium", "C": "Post-operative intracranial haemorrhage", "D": "Hospital-acquired pneumonia", "E": "Severe Hyponatraemia"}, "correct": "C", "rationales": {"A": "Opioids typically cause a low respiratory rate and pinpoint pupils, not the bradycardia/hypertension (Cushing's triad) seen here.", "B": "Delirium involves fluctuating attention but does not explain the classic physiological signs of raised intracranial pressure.", "C": "A GCS drop post-neurosurgery accompanied by Cushing's triad (hypertension + bradycardia) indicates a life-threatening haematoma.", "D": "Pneumonia usually presents with fever, hypoxia, and tachycardia, rather than the neurological signs described.", "E": "While SIADH can occur, the physiological pattern of hypertension and bradycardia strongly points to a mass effect/raised ICP."}, "hint": "This physiological pattern is a late and ominous sign of brainstem compression.", "part": 1}, {"stem": "Which finding on a lumbar puncture is most diagnostic of a subarachnoid haemorrhage occurring several hours prior?", "options": {"A": "Elevated opening pressure", "B": "High protein content", "C": "Visible xanthochromia in the CSF supernatant", "D": "Presence of more than 10,000 RBCs in the first tube", "E": "Low glucose levels in the CSF"}, "correct": "C", "rationales": {"A": "While ICP can be high in SAH, many other conditions (like idiopathic intracranial hypertension) also have high opening pressures.", "B": "Protein is non-specific and can be elevated in infection, inflammation, or even a traumatic tap.", "C": "Xanthochromia (yellow discoloration) indicates the presence of bilirubin from degraded red blood cells, confirming an older bleed.", "D": "A high RBC count in the first tube only can be caused by a 'traumatic tap' during the procedure itself.", "E": "Low CSF glucose is classically associated with bacterial meningitis, not typically with SAH."}, "hint": "Look for the term that describes the yellow color caused by the breakdown of hemoglobin.", "part": 1}, {"stem": "A 40-year-old male is admitted with a severe head injury. On the second day, his sodium level drops to 122 mmol/L, and he appears clinically hypovolaemic with a high urinary sodium. What is the most likely diagnosis?", "options": {"A": "SIADH", "B": "Cerebral Salt Wasting (CSW)", "C": "Diabetes Insipidus", "D": "Acute Renal Failure", "E": "Psychogenic Polydipsia"}, "correct": "B", "rationales": {"A": "Patients with SIADH are typically euvolaemic or slightly hypervolaemic, whereas this patient is clearly hypovolaemic.", "B": "Unlike SIADH, CSW involves true volume depletion alongside hyponatraemia and is common after neurological injury.", "C": "DI results in hypernatremia due to the loss of free water, which is the opposite of the findings in this case.", "D": "Acute renal failure would typically present with rising creatinine and potassium, not isolated severe hyponatremia and hypovolemia.", "E": "This would present with euvolemia or volume expansion and low urinary sodium as the body tries to retain salt."}, "hint": "Distinguish between the two causes of hyponatraemia in neurosurgery based on the patient's volume status.", "part": 1}, {"stem": "According to the CRASH trial, which of the following is true regarding the use of corticosteroids in traumatic brain injury?", "options": {"A": "They should be given to all patients with GCS < 8", "B": "They are only indicated if the patient has a brain tumour", "C": "They are contraindicated as they increase mortality", "D": "They help reduce vasogenic oedema in trauma", "E": "They are indicated only if given within 3 hours"}, "correct": "C", "rationales": {"A": "The trial showed that steroids actually increased the risk of death in patients with head injuries.", "B": "While steroids are used for tumours, the question asks specifically about the CRASH trial's findings on TBI.", "C": "The CRASH trial conclusively showed higher mortality in the steroid group compared to placebo for TBI patients.", "D": "Traumatic oedema is largely cytotoxic, and steroids have not been proven effective in this context.", "E": "Unlike TXA, steroids have no beneficial window in TBI and should be avoided entirely."}, "hint": "Think about whether a famous large-scale trial supported or discouraged this practice in trauma.", "part": 1}, {"stem": "A 19-year-old male is struck in the temporal region by a cricket ball. He was briefly unconscious but is now awake and talking (GCS 15). Two hours later, he becomes drowsy and rapidly deteriorates. What is the most likely vessel involved?", "options": {"A": "Bridging veins", "B": "Middle Meningeal Artery", "C": "Anterior Communicating Artery", "D": "Basilar Artery", "E": "Sigmoid Sinus"}, "correct": "B", "rationales": {"A": "Bridging veins are the source of subdural haematomas, which usually have a slower onset or more immediate severe presentation.", "B": "This is the classic source of an extradural haematoma, which typically presents with a 'lucid interval' after a temporal blow.", "C": "This is a common site for berry aneurysms causing SAH, not traumatic bleeds from temporal bone fractures.", "D": "Injury to the basilar artery usually results in immediate, devastating brainstem symptoms rather than a lucid interval.", "E": "Venous sinus bleeds can occur with skull fractures, but the arterial bleed of the MMA is the classic association with this presentation."}, "hint": "Consider the artery that runs deep to the pterion and is easily damaged by temporal fractures.", "part": 1}, {"stem": "Which of the following describes 'Beck's Triad', indicative of cardiac tamponade in a trauma patient?", "options": {"A": "Hypertension, bradycardia, irregular respirations", "B": "Hypotension, distended neck veins, muffled heart sounds", "C": "Tachycardia, hypotension, narrowed pulse pressure", "D": "Hyper-resonance, absent breath sounds, hypotension", "E": "Dullness to percussion, absent breath sounds, hypotension"}, "correct": "B", "rationales": {"A": "This is Cushing's Triad, which indicates severely raised intracranial pressure and impending herniation.", "B": "These three clinical findings suggest that fluid in the pericardial sac is compressing the heart and preventing diastolic filling.", "C": "While found in tamponade, this is a general description of shock and not the specific triad for tamponade.", " // ── State ─────────────────────────────────────────────────────────────────────
let current       = 0;
let selected      = null;
let answered      = false;
let score         = 0;
let results       = new Array(QUESTIONS.length).fill(null); 
let flagged       = new Array(QUESTIONS.length).fill(false);
let currentFilter = 'wrong';

// ── Firebase ──────────────────────────────────────────────────────────────────

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();
const QUIZ_ID = 'W7';
let uid = null;

function sessionRef() {
  return db.collection('quizSessions').doc(uid).collection('quizzes').doc(QUIZ_ID);
}

async function saveState() {
  if (!uid) return;
  try {
    await sessionRef().set({
      results,
      flagged,
      current,
      score,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  } catch (e) { console.warn('Save failed:', e); }
}

async function loadState() {
  if (!uid) return false;
  try {
    const snap = await sessionRef().get();
    if (!snap.exists) return false;
    const data = snap.data();
    results = data.results || new Array(QUESTIONS.length).fill(null);
    flagged = data.flagged || new Array(QUESTIONS.length).fill(false);
    current = typeof data.current === 'number' ? data.current : 0;
    score   = typeof data.score   === 'number' ? data.score   : 0;
    return true;
  } catch (e) { console.warn('Load failed:', e); return false; }
}

// ── Sidebar & Init ────────────────────────────────────────────────────────────
function initSidebar() {
  const grid = document.getElementById('qGrid');
  grid.innerHTML = '';
  QUESTIONS.forEach((q, i) => {
    const div = document.createElement('div');
    div.className = 'q-grid-item';
    div.id = `grid-item-${i}`;
    div.onclick = () => jumpTo(i);
    div.innerHTML = `${i + 1}<div class="flag-icon">🚩</div>`;
    grid.appendChild(div);
  });
}

function updateSidebar() {
  QUESTIONS.forEach((q, i) => {
    const el = document.getElementById(`grid-item-${i}`);
    if (!el) return;
    
    // Reset base classes
    el.className = 'q-grid-item';
    
    if (i === current) el.classList.add('active');
    if (flagged[i]) el.classList.add('flagged');
    
    const res = results[i];
    if (res) {
      if (res.skipped) el.classList.add('skipped');
      else if (res.wasCorrect) el.classList.add('correct');
      else el.classList.add('wrong');
    }
  });
  
  // Update answered count
  const answeredCount = results.filter(r => r !== null).length;
  document.getElementById('sidebarCount').textContent = `${answeredCount}/${QUESTIONS.length}`;
}

function copySidebarResults() {
  let text = "Quiz Status:\n\n";
  
  QUESTIONS.forEach((q, idx) => {
    const r = results[idx];
    let status = "unanswered";
    if (r) {
      if (r.wasCorrect) status = "correct";
      else if (!r.skipped) status = "wrong";
    }
    
    let flagText = flagged[idx] ? " (flagged)" : "";
    text += `${idx + 1}. ${status}${flagText}\n`;
  });

  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('sidebarCopyBtn');
    const origText = btn.innerHTML;
    btn.innerHTML = '✅ Copied!';
    setTimeout(() => { btn.innerHTML = origText; }, 2000);
  }).catch(err => {
    alert("Failed to copy status: " + err);
  });
}


function renderQuestion(idx) {
  const q   = QUESTIONS[idx];
  answered  = false;
  selected  = null;

  document.getElementById('qLabel').textContent = `Question ${idx + 1}`;
  document.getElementById('partTag').textContent = `Part ${q.part}`;
  document.getElementById('stem').textContent    = q.stem;
  
  // Update flag button state
  const flagBtn = document.getElementById('flagBtn');
  flagBtn.textContent = flagged[idx] ? '🚩 Unflag' : '⚑ Flag';
  flagBtn.style.borderColor = flagged[idx] ? 'var(--wrong-ring)' : 'var(--border)';
  flagBtn.style.color = flagged[idx] ? 'var(--wrong)' : 'var(--text-2)';

  // Hint
  const hw = document.getElementById('hintWrap');
  const hb = document.getElementById('hintBody');
  if (q.hint) {
    hw.style.display = 'block';
    hb.textContent   = q.hint;
    hb.classList.remove('open');
  } else {
    hw.style.display = 'none';
  }

  // Options
  const optContainer = document.getElementById('options');
  optContainer.innerHTML = '';
  const letters = Object.keys(q.options).sort();
  letters.forEach(letter => {
    const btn = document.createElement('button');
    btn.className  = 'option';
    btn.dataset.letter = letter;
    btn.onclick    = () => selectOption(letter);

    const rat  = q.rationales[letter] || '';
    btn.innerHTML = `
      <div class="opt-letter">${letter}</div>
      <div class="opt-body">
        <div class="opt-text">${escHtml(q.options[letter])}</div>
        ${rat ? `<div class="opt-rationale" id="rat-${letter}">${escHtml(rat)}</div>` : ''}
      </div>
      <div class="opt-icon" id="icon-${letter}"></div>
    `;
    optContainer.appendChild(btn);
  });

  // Footer
  document.getElementById('submitBtn').disabled  = true;
  document.getElementById('submitBtn').textContent = 'Check answer';
  document.getElementById('skipBtn').textContent = 'Skip →';
  document.getElementById('skipBtn').style.display = '';
  setFeedback('', '');

  updateSidebar();
  updateProgress();
  
  document.getElementById('quizCard').style.animation = 'none';
  requestAnimationFrame(() => {
    document.getElementById('quizCard').style.animation = 'fadeUp .3s ease both';
  });
}

function toggleFlag() {
  flagged[current] = !flagged[current];
  const flagBtn = document.getElementById('flagBtn');
  flagBtn.textContent = flagged[current] ? '🚩 Unflag' : '⚑ Flag';
  flagBtn.style.borderColor = flagged[current] ? 'var(--wrong-ring)' : 'var(--border)';
  flagBtn.style.color = flagged[current] ? 'var(--wrong)' : 'var(--text-2)';
  updateSidebar();
  saveState();
}

function selectOption(letter) {
  if (answered) return;
  selected = letter;
  document.querySelectorAll('.option').forEach(el => {
    el.classList.toggle('selected', el.dataset.letter === letter);
  });
  document.getElementById('submitBtn').disabled = false;
}

function submitAnswer() {
  if (!selected || answered) return;
  answered = true;

  const q = QUESTIONS[current];
  const isCorrect = selected === q.correct;

  // Save result to the fixed array index
  results[current] = { q: current, chosen: selected, correct: q.correct, wasCorrect: isCorrect, skipped: false };
  
  // Recalculate score safely
  score = results.filter(r => r && r.wasCorrect).length;

  // Lock options & colour them
  document.querySelectorAll('.option').forEach(el => {
    el.classList.add('locked');
    const l = el.dataset.letter;
    if (l === q.correct) {
      el.classList.add('correct');
      document.getElementById(`icon-${l}`).textContent = '✅';
    } else if (l === selected && !isCorrect) {
      el.classList.add('wrong');
      document.getElementById(`icon-${l}`).textContent = '❌';
    } else {
      el.classList.add('dimmed');
    }
    // Show rationale
    const rat = document.getElementById(`rat-${l}`);
    if (rat) rat.classList.add('visible');
  });

  if (isCorrect) setFeedback('✅ Correct!', 'correct');
  else setFeedback(`❌ The answer was ${q.correct}`, 'wrong');

  document.getElementById('submitBtn').textContent = current < QUESTIONS.length - 1 ? 'Next →' : 'See results';
  document.getElementById('submitBtn').onclick = nextQuestion;
  document.getElementById('submitBtn').disabled = false;
  document.getElementById('skipBtn').style.display = 'none';

  updateSidebar();
  updateProgress();
  saveState();
}

function nextQuestion() {
  if (!answered) {
    results[current] = { q: current, chosen: null, correct: QUESTIONS[current].correct, wasCorrect: false, skipped: true };
  }
  current++;
  saveState();
  if (current >= QUESTIONS.length) {
    showResults();
  } else {
    renderQuestion(current);
    document.getElementById('submitBtn').onclick = submitAnswer;
  }
}

// ── Progress & score ──────────────────────────────────────────────────────────
function updateProgress() {
  const answeredCount = results.filter(r => r !== null).length;
  const pct = Math.round((answeredCount / QUESTIONS.length) * 100);
  
  document.getElementById('progressFill').style.width  = pct + '%';
  document.getElementById('progressLabel').textContent = `Answered ${answeredCount} of ${QUESTIONS.length}`;
  document.getElementById('progressPct').textContent   = pct + '%';
  document.getElementById('scoreDisplay').textContent  = `${score} / ${answeredCount}`;
}

function setFeedback(msg, cls) {
  const el = document.getElementById('feedbackMsg');
  el.textContent  = msg;
  el.className    = 'feedback-msg' + (cls ? ' ' + cls : '');
  el.style.visibility = msg ? 'visible' : 'hidden';
}

// ── Results & Review Panel ────────────────────────────────────────────────────
function showResults() {
  document.getElementById('quizCard').classList.add('hidden');
  document.getElementById('progressWrap').classList.add('hidden');

  const total   = QUESTIONS.length;
  const correct = results.filter(r => r && r.wasCorrect).length;
  const wrong   = results.filter(r => r && !r.wasCorrect && !r.skipped).length;
  const skipped = results.filter(r => r === null || r.skipped).length;
  const pct     = Math.round((correct / total) * 100);

  document.getElementById('resultsGrade').textContent   = pct + '%';
  document.getElementById('correctCount').textContent   = correct;
  document.getElementById('wrongCount').textContent     = wrong;
  document.getElementById('skippedCount').textContent   = skipped;
  document.getElementById('totalQ').textContent         = total;

  let label = '';
  if (pct >= 90) label = '🏆 Outstanding performance!';
  else if (pct >= 75) label = '🎯 Great work — above pass mark!';
  else if (pct >= 60) label = '📚 Good effort — review the misses.';
  else label = "💪 Keep studying — you'll get there!";
  
  document.getElementById('resultsLabel').textContent = label;
  document.getElementById('resultsScreen').classList.add('visible');
}

function showReview() {
  const section = document.getElementById('reviewSection');
  section.classList.toggle('hidden');
  
  if (!section.classList.contains('hidden')) {
    const correctCount = results.filter(r => r && r.wasCorrect).length;
    filterReview(correctCount === QUESTIONS.length ? 'all' : 'wrong');
  }
}

function filterReview(type) {
  currentFilter = type;
  document.getElementById('filterAll').classList.toggle('active', type === 'all');
  document.getElementById('filterWrong').classList.toggle('active', type === 'wrong');
  document.getElementById('filterFlagged').classList.toggle('active', type === 'flagged');
  renderReviewList();
}

function renderReviewList() {
  const list = document.getElementById('reviewList');
  list.innerHTML = '';
  
  QUESTIONS.forEach((q, i) => {
    const r = results[i];
    const isFlagged = flagged[i];
    const isCorrect = r && r.wasCorrect;
    const isUnanswered = !r || r.skipped;

    if (currentFilter === 'wrong' && isCorrect) return;
    if (currentFilter === 'flagged' && !isFlagged) return;

    const div = document.createElement('div');
    div.className = 'review-item';
    div.onclick   = () => jumpTo(i);
    const stemShort = q.stem.length > 100 ? q.stem.slice(0, 100) + '…' : q.stem;
    
    let statusText = isUnanswered ? 'Unanswered' : (isCorrect ? 'Correct' : 'Wrong');
    let displayDetail = isUnanswered ? '' : `(${r.chosen} → ${r.correct})`;
    let flagHTML = isFlagged ? '<span style="color:var(--wrong); font-size:0.8rem; margin-left:6px;">🚩</span>' : '';

    div.innerHTML = `
      <div class="review-dot ${isCorrect ? 'correct' : 'wrong'}"></div>
      <div class="review-text">Q${i + 1}. ${escHtml(stemShort)}${flagHTML}</div>
      <div class="review-answer">
        <span class="status-${statusText}">${statusText}</span> ${displayDetail}
      </div>
    `;
    list.appendChild(div);
  });
  
  if (list.innerHTML === '') {
    list.innerHTML = '<div style="color:var(--text-3);font-size:.9rem;padding:12px;">No questions match this filter.</div>';
  }
}

function copyResults() {
  let text = "Quiz Results Summary:\n\n";
  
  QUESTIONS.forEach((q, idx) => {
    const r = results[idx];
    let status = "Unanswered";
    if (r) {
      if (r.wasCorrect) status = "Correct";
      else if (!r.skipped) status = "Wrong";
    }
    let flagText = flagged[idx] ? " [FLAGGED]" : "";
    text += "Q" + (idx + 1) + ": " + status + flagText + "\n";
  });

  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    const origText = btn.innerHTML;
    btn.innerHTML = '✅ Copied!';
    setTimeout(() => { btn.innerHTML = origText; }, 2000);
  }).catch(err => {
    alert("Failed to copy results: " + err);
  });
}

function jumpTo(idx) {
  document.getElementById('resultsScreen').classList.remove('visible');
  document.getElementById('quizCard').classList.remove('hidden');
  document.getElementById('progressWrap').classList.remove('hidden');
  
  current = idx;
  answered = false;
  selected = null;
  renderQuestion(idx);
  
  // Auto-replay the answer if it was previously answered
  const r = results[idx];
  if (r && !r.skipped) {
    selected = r.chosen;
    submitAnswer(); 
  }
}

function restartQuiz() {
  current  = 0;
  score    = 0;
  results  = new Array(QUESTIONS.length).fill(null);
  flagged  = new Array(QUESTIONS.length).fill(false);
  answered = false;
  selected = null;
  
  document.getElementById('resultsScreen').classList.remove('visible');
  document.getElementById('reviewSection').classList.add('hidden');
  document.getElementById('quizCard').classList.remove('hidden');
  document.getElementById('progressWrap').classList.remove('hidden');
  document.getElementById('submitBtn').onclick = submitAnswer;
  
  saveState();
  initSidebar();
  renderQuestion(0);
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Boot ──────────────────────────────────────────────────────────────────────
initSidebar();

auth.signInAnonymously()
  .then(async (cred) => {
    uid = cred.user.uid;
    const restored = await loadState();
    if (restored && results.some(r => r !== null)) {
      // Restore sidebar & progress from saved data
      initSidebar();
      renderQuestion(current);
      // Replay the answer state for the current question if it was already answered
      const r = results[current];
      if (r && !r.skipped) {
        selected = r.chosen;
        submitAnswer();
      }
      updateProgress();
    } else {
      renderQuestion(0);
    }
  })
  .catch(err => {
    console.error('Firebase sign-in failed, running offline:', err);
    renderQuestion(0);
  });
</script>
