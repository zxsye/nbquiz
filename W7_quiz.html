n SAH is neuroprotection against vasospasm, not antihypertensive therapy.", "D": "Hyponatremia is managed with fluid balance (maintaining euvolemia), not calcium channel blockers.", "E": "Anticonvulsants are used for seizure prophylaxis, not Nimodipine."}, "hint": "Think about the delayed arterial reaction to blood products in the subarachnoid space.", "part": 1}, {"stem": "A patient with a suspected splenic injury has a FAST scan. Which area is specifically being evaluated when the probe is placed in the Left Upper Quadrant (LUQ)?", "options": {"A": "Morrison's Pouch", "B": "Splenorenal Recess", "C": "Pouch of Douglas", "D": "Pericardial space", "E": "Paracolic gutter"}, "correct": "B", "rationales": {"A": "Morrison's Pouch is the hepatorenal recess located in the Right Upper Quadrant (RUQ).", "B": "The splenorenal recess is the potential space between the spleen and the left kidney where free fluid can accumulate.", "C": "The Pouch of Douglas is located in the pelvis, not the LUQ.", "D": "The pericardial space is assessed via a subxiphoid or parasternal view, not the LUQ.", "E": "While fluid can travel to the gutters, the primary LUQ view in FAST specifically looks at the spleen-kidney interface."}, "hint": "Identify the potential space where fluid collects between the organ and the kidney on the left.", "part": 1}, {"stem": "A 28-year-old male presents with a 'dropped' distal phalanx of his middle finger after a sporting injury. He is unable to actively extend the DIPJ. What is the most likely injury?", "options": {"A": "Flexor Digitorum Profundus rupture", "B": "Mallet Finger", "C": "Jersey Finger", "D": "Boutonniere deformity", "E": "Trigger Finger"}, "correct": "B", "rationales": {"A": "This would result in an inability to flex the joint, not extend it.", "B": "Mallet finger is caused by the disruption of the extensor tendon at the base of the distal phalanx.", "C": "Jersey finger is a rupture of the FDP tendon, preventing flexion.", "D": "A Boutonniere deformity involves the central slip of the extensor tendon, causing PIPJ flexion and DIPJ hyperextension.", "E": "Trigger finger is a stenosing tenosynovitis causing 'catching' or 'locking' of the finger, not a loss of extension."}, "hint": "This injury is the extensor equivalent of a distal tendon rupture.", "part": 1}, {"stem": "Which of the following intracranial tumors is most likely to show 'pseudopalisading necrosis' and microvascular proliferation on a histological slide?", "options": {"A": "Low-grade astrocytoma", "B": "Meningioma", "C": "Glioblastoma Multiforme (GBM)", "D": "Oligodendroglioma", "E": "Ependymoma"}, "correct": "C", "rationales": {"A": "Low-grade astrocytomas lack the malignant features of necrosis and vascular proliferation.", "B": "Meningiomas classically show whorls and psammoma bodies, not necrotic palisading.", "C": "GBM is characterized by its high-grade malignant features, including pseudopalisading necrosis and glomeruloid vascular proliferation.", "D": "Oligodendrogliomas are known for a 'fried-egg' cellular appearance and 'chicken-wire' vasculature.", "E": "Ependymomas show perivascular pseudorosettes, which are distinct from pseudopalisading necrosis."}, "hint": "Identify the hallmark pathological features of the most common WHO Grade IV primary brain tumor.", "part": 1}, {"stem": "A 50-year-old man with back pain reports that his leg pain improves significantly when he leans forward over a shopping cart while walking. What is the most likely diagnosis?", "options": {"A": "Acute disc herniation", "B": "Spondylolisthesis", "C": "Spinal Stenosis", "D": "Ankylosing spondylitis", "E": "Trochanteric bursitis"}, "correct": "C", "rationales": {"A": "Disc herniations usually worsen with flexion (leaning forward) as it increases pressure on the disc.", "B": "While it causes back pain, the 'shopping cart sign' is specifically pathognomonic for stenosis.", "C": "Neurogenic claudication caused by spinal stenosis is relieved by leaning forward, as this posture opens the spinal canal.", "D": "AS presents with morning stiffness that improves with exercise, not mechanical relief by flexion.", "E": "Bursitis causes lateral hip pain rather than the claudicant leg symptoms described."}, "hint": "Consider the mechanical changes in the spinal canal volume during flexion versus extension.", "part": 1}, {"stem": "In a patient with suspected raised ICP, which cranial nerve palsy is considered a 'false localizing sign'?", "options": {"A": "CN II (Optic Nerve)", "B": "CN III (Oculomotor Nerve)", "C": "CN VI (Abducens Nerve)", "D": "CN VII (Facial Nerve)", "E": "CN VIII (Vestibulocochlear Nerve)"}, "correct": "C", "rationales": {"A": "Optic nerve involvement causes papilledema or vision loss, which is a direct reflection of ICP, not a 'false localizer'.", "B": "CN III palsy in the setting of high ICP often correctly localizes to uncal herniation.", "C": "The abducens nerve has a long, vulnerable intracranial course; its palsy can be caused by generalized high ICP and does not necessarily localize the lesion.", "D": "CN VII palsies usually indicate a lesion in the pons or the cerebellopontine angle, not generalized ICP.", "E": "This nerve is typically affected by local lesions (like acoustic neuromas) rather than generalized pressure changes."}, "hint": "This nerve is easily stretched or compressed against the petrous ligament due to its long path.", "part": 1}, {"stem": "What is the standard recommended head elevation angle for patients with raised intracranial pressure to optimize venous drainage?", "options": {"A": "0^{\\circ} (Flat)", "B": "15^{\\circ}", "C": "30^{\\circ}", "D": "45^{\\circ}", "E": "90^{\\circ} (Sitting upright)"}, "correct": "C", "rationales": {"A": "Lying flat can increase ICP by impeding venous return from the brain.", "B": "While better than flat, 15^{\\circ} is less effective than the standard recommended angle for ICP management.", "C": "Elevating the head to 30^{\\circ} is the gold standard for reducing ICP by facilitating venous outflow through the jugular veins.", "D": "Elevating the head too high can potentially reduce MAP and CPP, making 30^{\\circ} the ideal balance.", "E": "This is impractical in the ICU setting for trauma patients and does not provide superior benefit over the 30^{\\circ} incline."}, "hint": "This specific angle is part of the standard 'neuro-protective' nursing bundle.", "part": 1}, {"stem": "A 40-year-old male is brought to the ED after a bar fight. He has a 'fusiform' swelling of his index finger, which is held in a slightly flexed position. There is severe pain on passive extension. Which condition does this constellation of signs suggest?", "options": {"A": "Gouty arthritis", "B": "Flexor Tenosynovitis", "C": "Dupuytren's Contracture", "D": "Colles Fracture", "E": "Paronychia"}, "correct": "B", "rationales": {"A": "Gout usually affects the MCP joint or the base of the thumb and would not typically show Kanavel's signs along the tendon sheath.", "B": "These are the classic Kanavel's signs of flexor tenosynovitis, a surgical emergency.", "C": "Dupuytren's is a chronic, painless thickening of the palmar fascia, not an acute painful infection.", "D": "A Colles fracture involves the distal radius and would not present with isolated finger sheath symptoms.", "E": "Paronychia is a localized infection around the nail fold, not the entire flexor sheath."}, "hint": "Recall the four Kanavel's signs that indicate an infection within the finger's synovial sheath.", "part": 1}, {"stem": "A patient suffers a traumatic brain injury and has a CT scan that appears relatively normal, but he remains in a deep coma (GCS  4). What is the most likely diagnosis?", "options": {"A": "Epidural hematoma", "B": "Subdural hematoma", "C": "Diffuse Axonal Injury (DAI)", "D": "Acute Hydrocephalus", "E": "Cerebral Contusion"}, "correct": "C", "rationales": {"A": "An epidural hematoma would be clearly visible on CT as a biconvex, hyperdense mass.", "B": "A subdural hematoma would appear as a crescentic hyperdensity on CT.", "C": "DAI is characterized by a mismatch between the patient's poor clinical state (coma) and a normal-looking CT scan.", "D": "Hydrocephalus would show ventricular enlargement, which is easily detectable on CT.", "E": "Contusions appear as hyperdense 'salt and pepper' areas of hemorrhage and edema on a CT scan."}, "hint": "This injury involves microscopic shearing of white matter tracts that is often invisible on standard CT.", "part": 1}, {"stem": "In a patient with a circumferential full-thickness burn to the chest that is impeding ventilation, what is the most appropriate surgical intervention?", "options": {"A": "Skin grafting", "B": "Debridement", "C": "Escharotomy", "D": "Fasciotomy", "E": "Tracheostomy"}, "correct": "C", "rationales": {"A": "Grafting is a reconstructive step performed later, not an acute emergency measure for breathing.", "B": "Debridement removes dead tissue but does not immediately release the constrictive 'tourniquet' effect of a leathery eschar.", "C": "An escharotomy involves cutting through the burnt, non-elastic tissue (eschar) to release pressure and allow for adequate chest expansion or distal perfusion.", "D": "Fasciotomy involves cutting through muscle fascia for compartment syndrome; escharotomy is the procedure for burn-related constriction.", "E": "A tracheostomy may bypass a secondary airway obstruction, but it will not fix the primary problem of a constricted chest wall."}, "hint": "This procedure involves making incisions through the leathery, burnt skin to restore mechanical function.", "part": 1}, {"stem": "Which of the following is the single most common site for the formation of saccular (berry) aneurysms?", "options": {"A": "Posterior Communicating Artery (PCom)", "B": "Anterior Communicating Artery (ACom)", "C": "Internal Carotid Artery (ICA)", "D": "Middle Cerebral Artery (MCA) bifurcation", "E": "Basilar Artery Tip"}, "correct": "B", "rationales": {"A": "PCom is a common site (%) but is not the most common.", "B": "The ACom is the most frequent location for berry aneurysms, accounting for approximately 30--35% of cases.", "C": "While common, aneurysms here are less frequent than those at the ACom junction.", "D": "The MCA bifurcation is the third most common site.", "E": "Posterior circulation aneurysms are less common overall than anterior circulation aneurysms."}, "hint": "Look for the vessel that connects the two anterior cerebral arteries.", "part": 1}, {"stem": "A patient with multiple metastases to the brain is found to have a primary tumor in the lung. What is the most common cause of death in patients with extensive brain metastases?", "options": {"A": "Status epilepticus", "B": "Brain herniation from mass effect", "C": "Pulmonary embolism", "D": "Chemotherapy toxicity", "E": "Respiratory failure from the primary lung cancer"}, "correct": "B", "rationales": {"A": "Seizures are common but are usually manageable with medications and rarely the primary cause of death.", "B": "Uncontrolled increase in ICP and subsequent herniation is the terminal event for many patients with progressive brain tumors.", "C": "While brain tumor patients are prothrombotic, direct neurological failure from mass effect is a more common terminal cause.", "D": "Modern palliative care aims to balance toxicity, and it is rarely the leading cause of death compared to disease progression.", "E": "While the primary cancer is significant, neurological progression (herniation) is the specific cause of death related to the brain involvement."}, "hint": "Consider the mechanical consequences of an unyielding skull containing expanding mass lesions.", "part": 1}, {"stem": "A surgeon is considering surgery for a patient with persistent back pain. Statistically, which symptom is most likely to improve following a surgical decompression?", "options": {"A": "Isolated axial lower back pain", "B": "Radicular leg pain (sciatica)", "C": "Psychosocial 'Yellow Flags'", "D": "Fibromyalgia-related tenderness", "E": "General morning stiffness"}, "correct": "B", "rationales": {"A": "Isolated back pain (without radiculopathy) has much lower surgical success rates than radicular pain.", "B": "Decompression surgery is highly effective for relieving leg pain caused by nerve root compression.", "C": "Yellow flags refer to psychosocial predictors of chronic pain and are not addressed by surgery.", "D": "Fibromyalgia is a systemic pain disorder and is a contraindication for spinal surgery.", "E": "Morning stiffness is often inflammatory or degenerative and does not reliably respond to focal decompression."}, "hint": "Think about the 'Leg vs. Back' rule in spinal surgery outcomes.", "part": 1}, {"stem": "What is the recommended duration of cooling for a fresh thermal burn using tap water?", "options": {"A": "2 minutes", "B": "5 minutes", "C": "10 minutes", "D": "20 minutes", "E": "60 minutes"}, "correct": "D", "rationales": {"A": "Two minutes is insufficient to dissipate the heat stored in the dermal layers.", "B": "While better than nothing, 5 minutes does not provide the maximum benefit for wound stabilization.", "C": "Ten minutes is a common misconception, but the guidelines recommend a longer duration.", "D": "Running cool tap water for 20 minutes is the standard of care for immediate burn first aid and is effective up to 3 hours post-injury.", "E": "Sixty minutes of cooling can lead to hypothermia, especially in children or patients with large surface area burns."}, "hint": "This duration is often cited in first-aid protocols and has been shown to reduce the need for skin grafting.", "part": 1}, {"stem": "A 'Sentinel Bleed' is a high-yield concept in neurosurgery. What does it typically represent in clinical practice?", "options": {"A": "A minor bleed from a skin laceration before a major hemorrhage", "B": "A small, 'warning' headache caused by a minor aneurysmal leak", "C": "The first drop of blood seen during a craniotomy", "D": "A nosebleed that precedes a base of skull fracture diagnosis", "E": "The bleeding from a scalp wound that 'sentinels' a brain injury"}, "correct": "B", "rationales": {"A": "This is unrelated to the neurosurgical definition of a sentinel bleed.", "B": "A sentinel bleed is a warning headache that occurs days or weeks before a catastrophic subarachnoid hemorrhage.", "C": "This is an intraoperative observation, not a clinical warning sign of rupture.", "D": "While rhinorrhea can occur, it is not referred to as a 'sentinel bleed'.", "E": "Scalp wounds are common and do not serve as a specific warning for an underlying aneurysm."}, "hint": "It is a 'warning' event that should never be ignored, even if the pain resolves.", "part": 1}, {"stem": "Which of the following describes the shape and characteristics of an Extradural (Epidural) Hematoma on a CT scan?", "options": {"A": "Crescent-shaped and crosses suture lines", "B": "Biconvex (lens-shaped) and does not cross suture lines", "C": "Star-shaped and fills the basal cisterns", "D": "Diffuse punctate hemorrhages at the grey-white junction", "E": "A ring-enhancing mass with surrounding edema"}, "correct": "B", "rationales": {"A": "This describes a subdural hematoma.", "B": "An EDH is biconvex because it is constrained by the firm dural attachments at the skull's suture lines.", "C": "This describes a subarachnoid hemorrhage.", "D": "This is characteristic of diffuse axonal injury or multiple contusions.", "E": "This describes a tumor or abscess, not an acute hematoma."}, "hint": "Think of the 'Lemon' vs. 'Banana' analogy.", "part": 1}, {"stem": "A patient is diagnosed with 'Cerebral Salt Wasting' following a subarachnoid hemorrhage. Which biochemical finding would best support this diagnosis over SIADH?", "options": {"A": "Hyponatremia", "B": "High urine sodium", "C": "Hypovolaemia (Low fluid status)", "D": "Low serum osmolality", "E": "Hypernatremia"}, "correct": "C", "rationales": {"A": "Hyponatremia is seen in both SIADH and CSW, so it does not differentiate them.", "B": "Both conditions can have high urine sodium concentration.", "C": "The key differentiator is that CSW causes hypovolemia, whereas SIADH causes euvolemia or mild hypervolemia.", "D": "Both SIADH and CSW result in low serum osmolality due to the low sodium.", "E": "Both conditions involve low, not high, sodium levels."}, "hint": "The differentiation between these two SAH complications relies on the assessment of the patient's volume status.", "part": 1}, {"stem": "Which of the following primary malignancies is the most common source of brain metastases in adults?", "options": {"A": "Prostate Cancer", "B": "Lung Cancer", "C": "Melanoma", "D": "Colorectal Cancer", "E": "Renal Cell Carcinoma"}, "correct": "B", "rationales": {"A": "Prostate cancer commonly spreads to bone but rarely to the brain.", "B": "Lung cancer is the most common primary source of brain metastases.", "C": "Melanoma has a high propensity to spread to the brain, but it is less common overall than lung cancer.", "D": "Colorectal cancer more commonly metastasizes to the liver and lung.", "E": "Renal cell carcinoma is a common source, but lung and breast are more frequent."}, "hint": "Consider the organ that receives the entire cardiac output and is a frequent site of primary malignancy.", "part": 1}, {"stem": "A patient has a traumatic pneumothorax. Where is the 'Triangle of Safety' located for the insertion of a chest drain?", "options": {"A": "2nd intercostal space, mid-clavicular line", "B": "5th intercostal space, anterior to the mid-axillary line", "C": "4th intercostal space, mid-scapular line", "D": "7th intercostal space, mid-axillary line", "E": "1st intercostal space, just below the clavicle"}, "correct": "B", "rationales": {"A": "This is the traditional site for needle decompression, not for a formal chest drain.", "B": "The triangle of safety is bounded by the latissimus dorsi, pectoralis major, and the line superior to the 5th intercostal space.", "C": "The posterior approach is avoided due to the risk of injuring the scapula and major muscles.", "D": "This is too low and increases the risk of injuring the liver or spleen.", "E": "This site risks injury to the subclavian vessels."}, "hint": "It is bounded by the pectoralis major and latissimus dorsi.", "part": 1}, {"stem": "What is the 'Lethal Triad' that trauma surgeons strive to prevent in patients with massive intra-abdominal bleeding?", "options": {"A": "Hypertension, Bradycardia, Irregular breathing", "B": "Muffled heart sounds, High JVP, Low BP", "C": "Acidosis, Hypothermia, and Coagulopathy", "D": "Tachycardia, Tachypnea, and Hypotension", "E": "Anemia, Thrombocytopenia, and Leukopenia"}, "correct": "C", "rationales": {"A": "This describes Cushing's Triad for raised ICP.", "B": "This describes Beck's Triad for cardiac tamponade.", "C": "The lethal triad in trauma refers to the self-reinforcing cycle of acidosis, hypothermia, and coagulopathy that leads to death.", "D": "These are signs of shock, but they do not define the specific 'lethal triad' of metabolic failure.", "E": "These describe pancytopenia, not the physiologic lethal triad of trauma."}, "hint": "Think about the metabolic and temperature-related failures that occur during massive hemorrhage.", "part": 1}, {"stem": "Which of the following is an absolute indication for emergency surgical intervention (laparotomy) in a patient with abdominal trauma?", "options": {"A": "A Grade III splenic laceration on CT scan", "B": "The presence of a small amount of free fluid on a FAST scan in a stable patient", "C": "Hemodynamic instability despite adequate fluid resuscitation", "D": "A seatbelt sign (bruising) across the abdomen", "E": "Isolated hematuria"}, "correct": "C", "rationales": {"A": "Stable Grade III injuries can often be managed non-operatively with observation.", "B": "Stable patients with fluid on FAST should go to CT to characterize the injury, not necessarily to the OR.", "C": "Unresponsiveness to resuscitation in the setting of trauma suggests active, massive internal bleeding requiring surgery.", "D": "A seatbelt sign is an indication for careful assessment (CT scan) but is not an absolute indication for immediate surgery on its own.", "E": "Hematuria suggests a urological injury, which is usually investigated with a CT urogram first."}, "hint": "Focus on the patient's physiology rather than the suspected anatomy.", "part": 1}, {"stem": "Which of the following is true regarding a '90% lacerated' tendon in the hand?", "options": {"A": "It will always cause an immediate loss of joint movement", "B": "It can still demonstrate a full range of motion against no resistance", "C": "It should be left to heal by secondary intention", "D": "It is not a surgical emergency because the tendon is not fully snapped", "E": "It will show Kanavel's signs on examination"}, "correct": "B", "rationales": {"A": "A tendon can be mostly lacerated and still move the joint, which is why testing against resistance is vital.", "B": "The '90% rule' states that a significantly lacerated tendon can still function against no gravity, necessitating resistance testing.", "C": "Tendon lacerations usually require surgical repair within 7-14 days to restore full strength and prevent snapping.", "D": "While not an immediate 'life-or-limb' emergency, it is a surgical case that should not be missed as it will eventually fail.", "E": "Kanavel's signs indicate infection (tenosynovitis), not the mechanical integrity of the tendon."}, "hint": "Consider why you must test muscle function against a load during a hand exam.", "part": 1}, {"stem": "A 22-year-old female presents with a severe headache and papilledema. Her CT scan is normal. A lumbar puncture shows an opening pressure of 35 cm  H_2O. What is the most likely diagnosis?", "options": {"A": "Meningitis", "B": "Idiopathic Intracranial Hypertension (IIH)", "C": "Subarachnoid Hemorrhage", "D": "Migraine with aura", "E": "Normal Pressure Hydrocephalus"}, "correct": "B", "rationales": {"A": "Meningitis would involve fever and altered CSF chemistry (low glucose/high protein).", "B": "IIH (Pseudotumor Cerebri) presents with raised ICP (papilledema, high opening pressure) in the absence of a mass lesion or hydrocephalus.", "C": "SAH would typically show blood on CT or xanthochromia in the CSF.", "D": "Migraines do not cause papilledema or elevated opening pressure on LP.", "E": "NPH involves dilated ventricles and a normal opening pressure, unlike this case."}, "hint": "This condition is often associated with young, overweight females and mimics a tumor's pressure without a mass.", "part": 1}, {"stem": "A 22-year-old male is brought to the emergency department after being struck in the temporal region by a cricket ball. He had a brief loss of consciousness at the scene but is currently alert and oriented (GCS 15). Two hours later, while awaiting review, he becomes increasingly agitated and his GCS drops to 11. Which of the following is the most likely underlying pathology?", "options": {"A": "Extradural haematoma", "B": "Acute subdural haematoma", "C": "Diffuse axonal injury", "D": "Cerebral contusion", "E": "Post-concussive syndrome"}, "correct": "A", "rationales": {"A": "The 'lucid interval' followed by rapid deterioration is the classic presentation of an arterial bleed into the extradural space, typically from the middle meningeal artery.", "B": "While possible in trauma, subdural haematomas usually involve high-energy deceleration and present with immediate and persistent neurological depression rather than a lucid interval.", "C": "This pathology typically causes immediate, prolonged unconsciousness that does not correlate with focal findings on an initial CT scan.", "D": "Contusions often show delayed 'blossoming' on imaging, but the classic temporal strike and lucid interval point specifically toward an arterial collection.", "E": "This refers to lingering symptoms like headache and dizziness following mild TBI, but it does not involve an acute, significant drop in GCS."}, "hint": "Consider the classic clinical sequence of injury, recovery, and sudden decline in a young patient with focal temporal trauma.", "part": 1}, {"stem": "An 82-year-old female with a history of atrial fibrillation on warfarin presents with 3 weeks of progressive confusion and two recent falls. A non-contrast CT head shows a crescent-shaped, hypodense collection crossing suture lines with 4 mm of midline shift. What is the most appropriate next step in her management?", "options": {"A": "Urgently reverse anticoagulation with Vitamin K and Prothrombinex", "B": "Immediate emergency craniotomy for evacuation", "C": "Administer high-dose dexamethasone to reduce mass effect", "D": "Perform a lumbar puncture to exclude normal pressure hydrocephalus", "E": "Discharge with a referral to the memory clinic for dementia workup"}, "correct": "A", "rationales": {"A": "In any patient with intracranial bleeding on anticoagulants, immediate reversal is the highest priority to prevent haematoma expansion, regardless of immediate surgical plans.", "B": "A shift of less than 5 mm in a stable patient with a chronic subdural haematoma usually allows time for medical optimization and reversal of coagulopathy first.", "C": "Steroids are generally not indicated for traumatic collections or chronic subdurals and can increase morbidity.", "D": "Lumbar puncture is contraindicated in the presence of a mass lesion with midline shift due to the risk of herniation.", "E": "While she presents with confusion, the CT clearly identifies a structural, treatable cause for her symptoms."}, "hint": "This patient has a 'great mimic' pathology and a critical medication-related risk factor that must be addressed before any intervention.", "part": 1}, {"stem": "A 28-year-old male is involved in a high-speed motor vehicle accident. On primary survey, he is tachypnoeic, tachycardic, and hypotensive (BP 85/50 mmHg). He has absent breath sounds on the right side with hyper-resonance to percussion and distended neck veins. What is the most appropriate immediate action?", "options": {"A": "Needle decompression in the 2nd intercostal space, midclavicular line", "B": "Urgently transport the patient to the CT scanner for a 'Pan-scan'", "C": "Perform a FAST ultrasound to look for pericardial tamponade", "D": "Insert a large-bore intercostal chest drain (28-32Fr) immediately", "E": "Intubate and start positive pressure ventilation"}, "correct": "A", "rationales": {"A": "Tension pneumothorax is a clinical diagnosis requiring immediate decompression to resolve obstructive shock; waiting for imaging is life-threatening.", "B": "Unstable patients should never be taken to CT; life-threatening thoracic injuries must be managed during the primary survey.", "C": "While tamponade is in the differential, the presence of hyper-resonance and absent breath sounds strongly identifies tension pneumothorax as the priority.", "D": "While a chest drain is the definitive treatment, needle decompression is the faster immediate 'bridge' to stabilize the patient's blood pressure.", "E": "Initiating positive pressure ventilation in an undressed tension pneumothorax will worsen the intra-thoracic pressure and rapidly lead to cardiac arrest."}, "hint": "This is a clinical diagnosis of obstructive shock where percussion and auscultation findings guide immediate bedside intervention.", "part": 1}, {"stem": "A 45-year-old female is brought to the trauma bay after a fall from a height. She is hemodynamically unstable (BP 80/40 mmHg, HR 130). A FAST exam is performed and shows anechoic fluid in Morrison’s pouch. What is the next best step in management?", "options": {"A": "Immediate transfer to the operating theatre for laparotomy", "B": "Transfer to CT for grading of the solid organ injury", "C": "Aggressive fluid resuscitation with 2L of normal saline", "D": "Diagnostic peritoneal lavage (DPL) to confirm the FAST findings", "E": "Angioembolisation of the splenic artery"}, "correct": "A", "rationales": {"A": "An unstable patient with a positive FAST (indicating haemoperitoneum) requires immediate surgical haemorrhage control.", "B": "CT is only for hemodynamically stable patients; taking an unstable patient to CT risks an unmanaged arrest in the scanner.", "C": "Modern trauma guidelines favor 'permissive hypotension' and early blood products (MTP) over large volumes of crystalloid which can worsen coagulopathy.", "D": "DPL is largely historical and redundant if a FAST has already demonstrated free fluid in an unstable patient.", "E": "Angiography is an option for stable patients with active blushes on CT, but cannot support an unstable patient needing multi-quadrant exploration."}, "hint": "Consider the 'golden rule' regarding the location of the unstable trauma patient with a positive screening tool for bleeding.", "part": 1}, {"stem": "A 70 kg male sustains thermal burns to his entire anterior trunk and both anterior upper limbs. Using the Parkland formula, what is the total volume of Hartmann's solution required in the first 8 hours following the injury?", "options": {"A": "3,780 mL", "B": "7,560 mL", "C": "5,040 mL", "D": "1,890 mL", "E": "2,520 mL"}, "correct": "A", "rationales": {"A": "TBSA is 18% (ant. trunk) + 9% (both ant. arms) = 27%. Calculation: 4 mL \\times 70 kg \\times 27 = 7,560 mL total; half (3,780 mL) is given in the first 8 hours.", "B": "This represents the total fluid for the first 24 hours, whereas the question asks specifically for the first 8-hour portion.", "C": "This results from an incorrect TBSA calculation or using 3 mL/kg instead of the standard 4 mL/kg for thermal burns.", "D": "This is a quarter of the total 24-hour requirement, likely reflecting a misunderstanding of the fluid delivery schedule.", "E": "This might be calculated using only the trunk TBSA and ignoring the involvement of the upper limbs."}, "hint": "First, calculate the Total Body Surface Area (TBSA) using the Rule of Nines, then apply the 4 mL/kg formula and determine the 50% split.", "part": 1}, {"stem": "A 35-year-old chef presents with a deep laceration to the volar aspect of his right index finger. On examination, he is unable to flex the distal interphalangeal (DIP) joint while the proximal interphalangeal (PIP) joint is held in extension. Which structure is most likely injured?", "options": {"A": "Flexor digitorum profundus (FDP)", "B": "Flexor digitorum superficialis (FDS)", "C": "Lumbrical muscles", "D": "Digital nerve", "E": "Extensor indicis proprius"}, "correct": "A", "rationales": {"A": "The FDP is the only muscle responsible for flexion at the DIP joint; its function is tested by stabilizing the PIP in extension.", "B": "The FDS inserts on the middle phalanx and flexes the PIP joint, not the DIP joint.", "C": "Lumbricals flex the MCP joints and extend the IP joints; they do not perform isolated DIP flexion.", "D": "A nerve injury would cause sensory loss or two-point discrimination deficit but would not explain an isolated loss of DIP flexion if the muscle is intact.", "E": "This is an extensor muscle located on the dorsal aspect of the hand/forearm, unrelated to volar flexion."}, "hint": "Identify the specific tendon that inserts onto the distal phalanx.", "part": 1}, {"stem": "A 19-year-old male presents with severe pain in his left leg following a mid-shaft tibial fracture. Despite immobilization and IV opioids, his pain is worsening. On exam, the leg is tense and he has excruciating pain when the clinician passively plantarflexes his foot. Distal pulses are palpable. What is the most appropriate next step?", "options": {"A": "Emergency surgical consultation for four-compartment fasciotomy", "B": "Elevation of the limb above the level of the heart", "C": "Administer an additional dose of IV morphine and reassess in 1 hour", "D": "Apply a tight compression bandage to reduce swelling", "E": "Wait for the Serum Creatine Kinase (CK) result to confirm muscle damage"}, "correct": "A", "rationales": {"A": "Clinical signs of compartment syndrome, especially pain out of proportion and pain on passive stretch, mandate immediate surgical decompression even if pulses are present.", "B": "Elevation above the heart can reduce arterial inflow and worsen ischaemia in compartment syndrome; the limb should be kept at heart level.", "C": "Delaying treatment in suspected compartment syndrome leads to irreversible myonecrosis and nerve damage within hours.", "D": "External pressure from tight dressings or bandages is a known cause and aggravator of compartment syndrome.", "E": "CK takes hours to rise and a normal level does not exclude the diagnosis; management is based on clinical findings."}, "hint": "The clinical diagnosis of this condition is primary; do not wait for late signs like pulselessness or laboratory evidence.", "part": 1}, {"stem": "A 55-year-old male presents with the 'worst headache of his life' which began suddenly while he was lifting heavy boxes. A non-contrast CT head performed 4 hours after the onset of symptoms is unremarkable. What is the most appropriate next step to exclude a subarachnoid haemorrhage?", "options": {"A": "Perform a lumbar puncture 12 hours after the onset of the headache", "B": "Repeat the non-contrast CT head in 24 hours", "C": "Start oral Nimodipine 60 mg every 4 hours", "D": "Discharge the patient with a diagnosis of tension headache", "E": "Perform a carotid ultrasound to look for dissection"}, "correct": "A", "rationales": {"A": "If CT is negative and suspicion remains high, LP is the gold standard; it must be done at \\ge 12 hours to allow for the development of xanthochromia.", "B": "CT sensitivity for SAH decreases over time as blood is resorbed or redistributed; repeating the same test is unlikely to be more sensitive.", "C": "Nimodipine is used to prevent vasospasm once SAH is confirmed; it is not a diagnostic tool.", "D": "A thunderclap headache is SAH until proven otherwise; a negative early CT does not 100% exclude the diagnosis.", "E": "While dissection is in the differential for headache, it does not address the primary concern of a ruptured aneurysm suggested by a thunderclap onset."}, "hint": "Consider the diagnostic sequence when the initial first-line imaging is negative in a high-suspicion case.", "part": 1}, {"stem": "Which of the following interventions is contraindicated in the management of a patient with an acute traumatic brain injury and raised intracranial pressure?", "options": {"A": "Administration of high-dose Dexamethasone", "B": "Elevating the head of the bed to 30^{\\circ}", "C": "IV bolus of 20% Mannitol", "D": "Short-term hyperventilation to a PaCO_{2} of 30-35 mmHg", "E": "Insertion of an External Ventricular Drain (EVD)"}, "correct": "A", "rationales": {"A": "The CRASH trial demonstrated that steroids increase mortality in TBI and they are specifically contraindicated in this context.", "B": "This is a standard first-line measure to promote venous drainage and reduce ICP.", "C": "Osmotherapy with Mannitol or hypertonic saline is a standard treatment for reducing cerebral oedema and ICP.", "D": "While not for long-term use, brief hyperventilation is an acceptable bridge for acute herniation by causing cerebral vasoconstriction.", "E": "An EVD is both a monitoring and therapeutic tool that allows for CSF drainage to lower ICP."}, "hint": "Recall which medication class is useful for tumor-related oedema but harmful in trauma.", "part": 1}, {"stem": "A 60-year-old female presents with a new-onset ptosis, a dilated and non-reactive pupil, and the right eye is deviated 'down and out'. She also complains of a severe headache. Where is the most likely site of an intracranial aneurysm?", "options": {"A": "Posterior communicating artery (PComA)", "B": "Anterior communicating artery (AComA)", "C": "Middle cerebral artery (MCA)", "D": "Ophthalmic artery", "E": "Basilar artery tip"}, "correct": "A", "rationales": {"A": "A PComA aneurysm can compress the adjacent CN III, leading to the classic 'pupil-involving' third nerve palsy.", "B": "AComA aneurysms are more likely to cause visual field defects or personality changes due to frontal lobe effects, rather than CN III compression.", "C": "MCA aneurysms often present with hemiparesis or dysphasia if they rupture and cause an intracerebral haematoma.", "D": "Aneurysms here are more likely to cause monocular vision loss rather than a complete third nerve palsy.", "E": "While basilar aneurysms can affect cranial nerves, the specific association with isolated CN III palsy is most classic for PComA."}, "hint": "Identify the vessel that lies in close anatomical proximity to the oculomotor nerve.", "part": 1}, {"stem": "A 45-year-old patient with a known history of a large non-secreting pituitary macroadenoma presents with a sudden, agonizing headache and bilateral visual loss. She is hypotensive and tachycardic. What is the most critical immediate medical intervention?", "options": {"A": "IV Hydrocortisone 100 mg", "B": "Urgent transsphenoidal decompression", "C": "High-flow oxygen and IV fluid bolus", "D": "IV Mannitol to reduce intracranial pressure", "E": "Emergency CT Angiogram to exclude an aneurysm"}, "correct": "A", "rationales": {"A": "Pituitary apoplexy can cause acute ACTH deficiency and life-threatening adrenal crisis; hydrocortisone must be given immediately, often before imaging.", "B": "While surgical decompression is needed for visual loss, the immediate life-threat is cardiovascular collapse from adrenal crisis.", "C": "Standard resuscitation is important, but without steroid replacement, the hypotension in an adrenal crisis will remain refractory.", "D": "The primary issue is acute haemorrhage/infarction within the gland and endocrine failure, not generalized cerebral oedema.", "E": "While CTA is useful for differentials, the clinical picture of a known adenoma and shock strongly points to apoplexy requiring steroids first."}, "hint": "Focus on the life-threatening endocrine complication of sudden pituitary failure.", "part": 1}, {"stem": "A 75-year-old male is 2 days post-hip replacement surgery and becomes acutely confused and drowsy. His respiratory rate is 6 breaths/minute and his pupils are 1 mm and non-reactive. What is the most appropriate initial action?", "options": {"A": "Check capillary blood glucose level", "B": "Administer IV Naloxone and provide oxygen", "C": "Urgent non-contrast CT head to exclude a stroke", "D": "Commence a 10% Dextrose infusion", "E": "Start an aggressive IV fluid bolus for suspected sepsis"}, "correct": "B", "rationales": {"A": "While BSL is always a priority in LOC, the specific signs of bradypnoea and pinpoint pupils make opioid toxicity the most immediate likely cause.", "B": "The triad of decreased LOC, bradypnoea, and pinpoint pupils is pathognomonic for opioid toxicity, a common post-operative complication in the elderly.", "C": "While stroke is a differential, the reversible toxidrome must be addressed first, especially given the life-threatening respiratory depression.", "D": "This would treat hypoglycaemia, but the clinical findings specifically suggest a different metabolic/toxic cause.", "E": "Sepsis causes confusion but typically presents with tachycardia and tachypnoea, rather than bradypnoea and pinpoint pupils."}, "hint": "Look for the classic triad of symptoms indicating a specific medication overdose.", "part": 1}, {"stem": "A 40-year-old female presents with severe lower back pain, bilateral leg weakness, and numbness in her 'saddle area'. She mentions she hasn't been able to urinate for 8 hours. What is the required timeframe for definitive imaging in this patient?", "options": {"A": "Within 4 hours", "B": "Within 24 hours", "C": "Electively within 1-2 weeks", "D": "Within 48 hours after a trial of conservative management", "E": "Only if symptoms do not improve after 6 weeks"}, "correct": "A", "rationales": {"A": "Suspected Cauda Equina Syndrome is a surgical emergency requiring MRI within 4 hours to prevent permanent neurological and sphincter dysfunction.", "B": "Waiting 24 hours for imaging is insufficient for a condition where outcome is highly dependent on the speed of decompression.", "C": "Elective imaging is for non-specific back pain without red flags; this patient has multiple 'red flag' symptoms.", "D": "Conservative management is contraindicated when focal neurological deficits or sphincter involvement are present.", "E": "The 6-week rule applies only to mechanical back pain without neurological involvement."}, "hint": "This condition involves 'red flags' and is considered one of the most time-critical neurosurgical emergencies.", "part": 1}, {"stem": "During the primary survey of a trauma patient, you find a 'sucking' chest wound. After applying a three-sided occlusive dressing, what is the next best step for this specific injury?", "options": {"A": "Insertion of a chest drain at a separate site", "B": "Suturing the wound closed immediately in the trauma bay", "C": "Immediate transport to theatre for a thoracotomy", "D": "Performing a needle decompression on the contralateral side", "E": "Intubation and initiation of high-frequency oscillatory ventilation"}, "correct": "A", "rationales": {"A": "An open pneumothorax is managed with a three-sided dressing to create a one-way valve, followed by a formal chest drain to re-expand the lung.", "B": "Closing the wound completely without a chest drain can convert an open pneumothorax into a tension pneumothorax.", "C": "Most open pneumothoraces can be managed with a dressing and a drain; thoracotomy is reserved for massive bleeding or specific hilar injuries.", "D": "Decompressing the 'normal' side is unnecessary and harmful; intervention must be directed at the injured side.", "E": "Standard ABCDE management applies; high-frequency ventilation is not a standard first-line trauma intervention for this injury."}, "hint": "Preventing the conversion of this injury into a tension pneumothorax is the primary goal after the dressing is applied.", "part": 1}, {"stem": "An elderly patient presents with fluctuating levels of consciousness, personality changes, and memory impairment following a minor fall a month ago. CT head reveals a crescentic collection that is isodense to the brain parenchyma. What is the most likely diagnosis?", "options": {"A": "Subacute to chronic subdural haematoma", "B": "Acute extradural haematoma", "C": "Alzheimer's dementia", "D": "Glioblastoma multiforme", "E": "Cerebral abscess"}, "correct": "A", "rationales": {"A": "Subdural haematomas change density over time, becoming isodense (equal to brain) around 1-3 weeks and then hypodense (darker).", "B": "Extradural haematomas are hyperdense (bright white) and biconvex (lens-shaped), and usually present acutely.", "C": "While the symptoms overlap, the presence of a structural collection on CT following trauma points to a surgical cause.", "D": "Tumors typically appear as irregular, ring-enhancing masses (with contrast) rather than crescent-shaped collections following the contour of the brain.", "E": "Abscesses are typically ring-enhancing and associated with systemic signs of infection like fever."}, "hint": "Consider the timing of the injury and how the density of blood on CT changes over several weeks.", "part": 1}, {"stem": "A patient with a traumatic brain injury is found to have a blood pressure of 170/90 mmHg, a heart rate of 45 beats/minute, and irregular respirations. This constellation of signs is known as:", "options": {"A": "Cushing's triad", "B": "Beck's triad", "C": "Virchow's triad", "D": "The Lethal Triad", "E": "Horner's syndrome"}, "correct": "A", "rationales": {"A": "Cushing's triad (hypertension, bradycardia, irregular breathing) is a late sign of severely raised intracranial pressure and impending herniation.", "B": "Beck's triad consists of hypotension, muffled heart sounds, and distended neck veins, indicating cardiac tamponade.", "C": "Virchow's triad describes the three factors contributing to thrombosis: stasis, hypercoagulability, and endothelial injury.", "D": "The lethal triad in trauma refers to acidosis, coagulopathy, and hypothermia.", "E": "Horner's syndrome involves miosis, ptosis, and anhidrosis due to sympathetic nerve chain disruption."}, "hint": "This eponym describes the physiological response to terminal intracranial hypertension.", "part": 1}, {"stem": "A trauma patient has a suspected massive haemothorax. A chest drain is inserted and immediately drains 1,600 mL of blood. What is the most appropriate next management step?", "options": {"A": "Immediate emergency thoracotomy", "B": "Clamping the chest tube to stop the bleeding", "C": "Observation and repeat CXR in 4 hours", "D": "Administration of 1 unit of packed red blood cells and reassessment", "E": "Transfer to CT Angiogram to find the bleeding vessel"}, "correct": "A", "rationales": {"A": "An initial drain output of > 1,500 mL (or > 200 mL/hr for 2-4 hours) is a standard indication for operative intervention in trauma.", "B": "Clamping the tube will simply cause the blood to accumulate in the chest, potentially leading to tension physiology or cardiac compression.", "C": "A massive haemothorax is a surgical emergency; 'watchful waiting' after such a high output is inappropriate.", "D": "While transfusion is needed, the volume of loss indicates a surgical source that will not be managed by simple transfusion alone.", "E": "The patient meets the physiological criteria for surgery; delays for imaging in the setting of massive haemorrhage are dangerous."}, "hint": "Identify the quantitative threshold for immediate surgical exploration in thoracic trauma.", "part": 1}, {"stem": "An adult patient is involved in a house fire and presents with singed nasal hairs, carbonaceous sputum, and a hoarse voice. He is currently breathing comfortably with an SpO_{2} of 98% on room air. What is the most appropriate next step?", "options": {"A": "Early endotracheal intubation", "B": "Administer nebulised adrenaline and observe", "C": "Perform a peak flow test to assess lower airway function", "D": "Discharge with advice to return if he develops difficulty breathing", "E": "Start the Parkland formula based on the facial burns only"}, "correct": "A", "rationales": {"A": "Clinical indicators of inhalation injury (facial burns, hoarseness, soot) predict rapid upper airway oedema; early intubation is safer than waiting for stridor.", "B": "Nebulisers may provide temporary relief but do not secure the airway against the progressive swelling characteristic of thermal airway burns.", "C": "Peak flow is not useful for assessing the risk of upper airway obstruction due to oedema.", "D": "Inhalation injury is dynamic; the airway can close completely within hours, making 'watch and see' at home extremely dangerous.", "E": "The priority is the airway; fluid resuscitation is secondary and superficial burns (common on the face) are not included in the formula."}, "hint": "Thermal injuries to the airway are dynamic and can lead to sudden, total obstruction.", "part": 1}, {"stem": "A 24-year-old male sustained a 'fight bite' laceration over his 3rd MCP joint during an altercation 6 hours ago. On exam, the wound is 1 cm and appears clean. What is the most appropriate management?", "options": {"A": "Formal surgical washout in theatre and IV antibiotics", "B": "Primary closure with 4-0 Nylon sutures", "C": "Simple irrigation in the ED and discharge with oral Amoxicillin", "D": "Apply a Steri-Strip and refer to the outpatient hand clinic", "E": "Observe for 24 hours and only treat if signs of infection develop"}, "correct": "A", "rationales": {"A": "Human bites over joints ('fight bites') are high-risk for septic arthritis; they require surgical exploration, irrigation, and should never be closed primarily.", "B": "Primary closure of a 'fight bite' traps oral flora in the joint space, leading to catastrophic infection.", "C": "Superficial irrigation is insufficient for potential joint penetration; these injuries require specialist hand surgery review.", "D": "This ignores the high risk of infection and the need for urgent aggressive management of joint-threatening bacteria.", "E": "Wait-and-see is inappropriate; the goal is to prevent the established infection (flexor tenosynovitis or septic arthritis) before it occurs."}, "hint": "These specific wounds are 'never close' injuries due to the risk of deep space infection.", "part": 1}, {"stem": "Which of the following is considered the most reliable threshold for diagnosing acute compartment syndrome when using manometric pressure monitoring?", "options": {"A": "Delta pressure (Diastolic BP - Compartment Pressure) < 30 mmHg", "B": "Absolute compartment pressure > 20 mmHg", "C": "Mean Arterial Pressure - Compartment Pressure < 40 mmHg", "D": "Absence of distal pulses on Doppler examination", "E": "A Serum Creatine Kinase level > 10,000 U/L"}, "correct": "A", "rationales": {"A": "The Delta pressure accounts for the patient's systemic perfusion pressure and is more accurate than an absolute pressure value alone.", "B": "This value is too low; normal compartment pressure can be up to 15 mmHg, and treatment thresholds are generally higher.", "C": "While related to perfusion, the standard clinical threshold uses the diastolic blood pressure for the 'Delta' calculation.", "D": "Pulselessness is a very late sign and is not used as a threshold for diagnosis, as irreversible damage has likely already occurred.", "E": "CK is a marker of muscle breakdown (rhabdomyolysis) but is not a manometric threshold for compartment syndrome."}, "hint": "Consider the relationship between the patient's systemic blood pressure and the pressure within the limb.", "part": 1}, {"stem": "A patient with a confirmed subarachnoid haemorrhage develops new-onset left-sided weakness on day 7 of admission. Her aneurysm was coiled on day 1. What is the most likely cause and the first-line medical treatment?", "options": {"A": "Vasospasm; induced hypertension", "B": "Aneurysm re-rupture; immediate neurosurgery", "C": "Hydrocephalus; EVD insertion", "D": "Hyponatraemia; fluid restriction", "E": "Cerebral abscess; IV antibiotics"}, "correct": "A", "rationales": {"A": "Vasospasm typically occurs between days 4-14 (peak 7-10). Once the aneurysm is secured, hypertension is induced to maintain cerebral perfusion.", "B": "Re-rupture is most common in the first 24 hours and is less likely once the aneurysm has been secured by coiling or clipping.", "C": "While hydrocephalus causes decreased LOC, it usually presents with more global symptoms rather than a new focal motor deficit like hemiparesis.", "D": "Hyponatraemia is common but the first-line treatment in SAH is not fluid restriction (which worsens vasospasm), and it wouldn't typically cause a sudden focal deficit.", "E": "Abscess is a very rare complication of endovascular coiling and would typically present later with systemic symptoms."}, "hint": "Think about the common 'delayed' vascular complication of SAH that occurs during the second week.", "part": 1}, {"stem": "Which of the following describes the correct usage of the ABC/2 rule in neurosurgery?", "options": {"A": "Calculating the volume of an intracranial haematoma on CT", "B": "Determining the dose of Mannitol for raised ICP", "C": "Assessing the severity of a burn injury", "D": "Estimating the risk of aneurysm rupture", "E": "Grading the severity of a splenic laceration"}, "correct": "A", "rationales": {"A": "The ABC/2 rule is a rapid way to estimate haematoma volume: A (max diameter), B (90 degrees to A), and C (number of slices \\times thickness).", "B": "Mannitol is dosed based on weight (0.25-1 g/kg), not using the ABC/2 formula.", "C": "Burn severity is assessed by the Rule of Nines or the Palm Method for TBSA.", "D": "Aneurysm rupture risk is based on size, location, and factors like the PHASES score, not ABC/2.", "E": "Solid organ injuries are graded using the AAST scale based on anatomical disruption, not ABC/2."}, "hint": "This rule involves three spatial dimensions to provide a volumetric measurement.", "part": 1}, {"stem": "A 42-year-old male presents with a first-time generalized tonic-clonic seizure. He has had morning headaches for 2 months. CT head shows a 3 cm ring-enhancing lesion in the right frontal lobe with significant surrounding vasogenic oedema. What is the most appropriate first-line medication to manage the oedema?", "options": {"A": "Dexamethasone", "B": "Mannitol", "C": "Phenytoin", "D": "Furosemide", "E": "Hydrocortisone"}, "correct": "A", "rationales": {"A": "Steroids are highly effective at reducing vasogenic oedema associated with brain tumors and abscesses.", "B": "Mannitol is used for acute ICP crises and 'herniation' events, rather than the stable management of peritumoural oedema.", "C": "Phenytoin is an anti-epileptic drug; it treats the seizure but does not address the underlying peritumoural oedema.", "D": "Loop diuretics do not have a significant role in reducing vasogenic brain oedema compared to steroids.", "E": "Dexamethasone is preferred in neuro-oncology because of its minimal mineralocorticoid activity and high potency."}, "hint": "Identify the standard steroid used for vasogenic (not traumatic) brain oedema.", "part": 1}, {"stem": "A patient is brought in with a suspected 'Handlebar injury' to the upper abdomen. Which two organs are most classically injured in this mechanism?", "options": {"A": "Pancreas and Duodenum", "B": "Spleen and Liver", "C": "Kidneys and Bladder", "D": "Stomach and Gallbladder", "E": "Aorta and Inferior Vena Cava"}, "correct": "A", "rationales": {"A": "The focal impact of a handlebar against the vertebral column classically causes pancreatic transection or duodenal haematoma/rupture.", "B": "These are the most common organs injured in blunt trauma overall, but 'handlebar' injuries are more specific for midline retroperitoneal structures.", "C": "These are lower or more lateral structures less likely to be compressed against the spine by a handlebar.", "D": "While possible, these are not the 'classic' structures associated with the specific high-pressure midline focal impact of a handlebar.", "E": "While these can be injured in high-energy deceleration, they are less characteristic of the pediatric/cyclist handlebar mechanism than the pancreas."}, "hint": "Think of midline, retroperitoneal structures that can be compressed against the spine.", "part": 1}, {"stem": "Which of the following features on a lumbar puncture would be most diagnostic of a subarachnoid haemorrhage rather than a traumatic tap?", "options": {"A": "Presence of xanthochromia on spectrophotometry", "B": "High opening pressure (> 25 cm H_{2}O)", "C": "A high white cell count in the CSF", "D": "Decreasing red cell counts from Tube 1 to Tube 3", "E": "Low CSF glucose levels"}, "correct": "A", "rationales": {"A": "Xanthochromia results from the breakdown of haemoglobin into bilirubin, which only occurs if blood has been in the CSF for several hours (> 12h).", "B": "Raised opening pressure can occur in SAH, but also in meningitis, pseudotumor cerebri, or even from patient positioning/agitation.", "C": "This suggests an inflammatory or infectious process (meningitis) rather than an acute haemorrhage.", "D": "A 'clearing' of blood across the tubes is highly characteristic of a traumatic tap (needle-induced bleeding) rather than SAH.", "E": "Low glucose (hypoglycorrhachia) is typical of bacterial meningitis or certain fungal infections, not usually SAH."}, "hint": "This finding relies on the chemical breakdown of red blood cells over time.", "part": 1}, {"stem": "A 24-year-old male is brought to the Emergency Department following a high-speed motorcycle accident. On arrival, his GCS is 13 (E3, V4, M6). A non-contrast CT head reveals a biconvex, hyperdense collection in the right temporal region with a 3 mm midline shift. One hour later, his GCS drops to 8, and his right pupil becomes fixed and dilated. What is the most appropriate next step in management?", "options": {"A": "Administer IV dexamethasone 16 mg", "B": "Immediate neurosurgical consultation for craniotomy", "C": "Repeat the CT head to assess for haematoma expansion", "D": "Perform a lumbar puncture to exclude associated subarachnoid blood", "E": "Start an urgent IV infusion of 0.9% saline at 250 mL/hr"}, "correct": "B", "rationales": {"A": "Steroids are contraindicated in the management of traumatic brain injury based on the CRASH trial.", "B": "A deteriorating GCS and a blown pupil in the context of an extradural haematoma represent a surgical emergency requiring immediate evacuation.", "C": "Clinical deterioration with signs of herniation is a mandate for action rather than further diagnostic imaging which delays treatment.", "D": "Lumbar puncture is strictly contraindicated in the presence of a mass lesion due to the risk of tonsillar herniation.", "E": "While fluid resuscitation is important, it does not address the primary issue of uncal herniation from the mass effect."}, "hint": "Consider the significance of a 'blown pupil' and a rapid decline in GCS following a temporal blow.", "part": 1}, {"stem": "A 55-year-old female presents with the 'worst headache of her life' that reached maximal intensity within 30 seconds. A non-contrast CT head performed 8 hours after the onset of symptoms is negative for subarachnoid haemorrhage. What is the next best step to definitively exclude the diagnosis?", "options": {"A": "Perform a lumbar puncture immediately", "B": "Perform a lumbar puncture 12 hours after symptom onset", "C": "Discharge the patient with migraine advice", "D": "Order a stat MRI brain with FLAIR sequences", "E": "Start oral Nimodipine 60 mg and reassess in the morning"}, "correct": "B", "rationales": {"A": "Xanthochromia takes at least 12 hours to develop; performing an LP earlier may yield a false negative.", "B": "Spectrophotometry for xanthochromia is the gold standard for CT-negative SAH but requires time for haemoglobin breakdown.", "C": "CT sensitivity for SAH drops after 6 hours, so a negative scan at 8 hours is insufficient to rule out the condition.", "D": "While MRI is useful in subacute stages, LP for xanthochromia remains the standard diagnostic step following a negative acute CT.", "E": "Medical management should not be initiated until the diagnosis is confirmed or highly suspected after appropriate investigations."}, "hint": "The detection of bilirubin in the CSF is time-dependent.", "part": 1}, {"stem": "A 45-year-old construction worker presents with acute-on-chronic lower back pain after lifting a heavy box. He reports 'numbness when wiping' and difficulty initiating urination. On examination, he has reduced anal tone and 3/5 power in bilateral plantarflexion. What is the most appropriate timeframe for obtaining definitive imaging?", "options": {"A": "Within 4 hours", "B": "Within 24 hours", "C": "After a trial of 6 weeks of conservative management", "D": "Only if symptoms do not improve with high-dose NSAIDs", "E": "Within 48 hours as an outpatient"}, "correct": "A", "rationales": {"A": "Suspected Cauda Equina Syndrome is a surgical emergency requiring MRI within 4 hours to prevent permanent neurological deficit.", "B": "Delaying imaging for 24 hours increases the risk of irreversible bowel and bladder dysfunction.", "C": "Conservative management is appropriate for non-specific back pain, but red flags like saddle anaesthesia require immediate investigation.", "D": "Neurological deficits take precedence over pain response when determining the urgency of imaging.", "E": "Cauda Equina Syndrome requires inpatient assessment and emergency surgical pathways."}, "hint": "Saddle anaesthesia and urinary retention indicate a time-critical surgical emergency.", "part": 1}, {"stem": "A 70 kg adult male sustains partial-thickness burns to his entire anterior trunk and the entirety of both upper limbs. Using the Parkland formula (4 mL \\times weight in kg \\times %TBSA), calculate the total volume of Hartmann's solution required in the first 8 hours from the time of the injury.", "options": {"A": "5,040 mL", "B": "10,080 mL", "C": "2,520 mL", "D": "7,560 mL", "E": "3,800 mL"}, "correct": "A", "rationales": {"A": "Total TBSA is 18% (trunk) + 18% (arms) = 36%. Total 24h fluid is 4 \\times 70 \\times 36 = 10,080 mL; half (5,040 mL) is given in the first 8 hours.", "B": "This represents the total 24-hour fluid requirement, not the initial 8-hour volume.", "C": "This calculation likely uses an incorrect TBSA percentage or represents a 4-hour volume.", "D": "This does not align with the standard 50/50 distribution of the Parkland formula.", "E": "This is an incorrect calculation of the percentage or the weight-based formula."}, "hint": "Calculate the total 24-hour requirement first, then determine the portion for the first time interval.", "part": 1}, {"stem": "A 30-year-old female is involved in a motor vehicle accident. She is tachycardic (HR 125) and hypotensive (BP 85/50). On primary survey, the FAST exam is positive for free fluid in Morrison's pouch. What is the most appropriate next step?", "options": {"A": "Transfer immediately to the CT scanner for a pan-scan", "B": "Emergency laparotomy in the operating theatre", "C": "Administer 2 L of Hartmann's solution and reassess the BP", "D": "Perform a diagnostic peritoneal lavage (DPL)", "E": "Apply a pelvic binder and obtain a pelvic X-ray"}, "correct": "B", "rationales": {"A": "Unstable patients with a positive FAST should never go to the CT scanner; they require immediate operative intervention.", "B": "Haemodynamic instability with evidence of intra-abdominal haemorrhage (positive FAST) is an absolute indication for immediate surgery.", "C": "Aggressive crystalloid resuscitation should not delay definitive surgical control of bleeding in an unstable trauma patient.", "D": "DPL is largely superseded by FAST and is unnecessary if the FAST has already confirmed free fluid.", "E": "While pelvic stabilization is part of trauma care, the positive abdominal FAST points to an abdominal source of shock."}, "hint": "Recall the rule about taking unstable patients to the radiology department.", "part": 1}, {"stem": "A patient presents with respiratory distress after a stab wound to the chest. Examination reveals distended neck veins, absent breath sounds on the right, and hyper-resonance to percussion on the right side. His blood pressure is 80/40 mmHg. What is the immediate priority?", "options": {"A": "Obtain an urgent portable chest X-ray", "B": "Perform needle decompression in the 2nd intercostal space", "C": "Intubate and start positive pressure ventilation", "D": "Perform an emergency bedside thoracotomy", "E": "Insert a 28Fr chest tube in the safe triangle"}, "correct": "B", "rationales": {"A": "Tension pneumothorax is a clinical diagnosis; waiting for an X-ray can lead to cardiac arrest.", "B": "Immediate decompression is required for tension pneumothorax to resolve obstructive shock before definitive chest tube insertion.", "C": "Positive pressure ventilation can actually worsen a tension pneumothorax by increasing intrathoracic pressure.", "D": "Thoracotomy is indicated for massive haemothorax or cardiac tamponade, not primarily for a tension pneumothorax.", "E": "While a chest tube is definitive, needle decompression is the faster immediate life-saving 'bridge' in an unstable patient."}, "hint": "Obstructive shock in this context requires an immediate clinical maneuver, not a scan.", "part": 1}, {"stem": "An 18-year-old male with a closed tibial fracture reports increasing pain despite escalating doses of morphine. On examination, the leg is tense, and he has excruciating pain when the great toe is passively plantarflexed. His BP is 110/70 mmHg and the intracompartmental pressure is 45 mmHg. What is the calculated \\Delta P and the required management?", "options": {"A": "\\Delta P is 65 mmHg; continue observation", "B": "\\Delta P is 25 mmHg; immediate fasciotomy", "C": "\\Delta P is 35 mmHg; bivalve the cast and elevate the limb", "D": "\\Delta P is 15 mmHg; immediate fasciotomy", "E": "\\Delta P is 25 mmHg; apply a tight compression bandage"}, "correct": "B", "rationales": {"A": "The \\Delta P is calculated using the diastolic pressure, not the systolic or mean pressure.", "B": "\\Delta P = Diastolic BP (70) - Compartment Pressure (45) = 25 mmHg. A \\Delta P < 30 mmHg is an indication for surgery.", "C": "Elevation is avoided in compartment syndrome as it can further reduce arterial perfusion pressure.", "D": "The calculation is incorrect, though the management choice (fasciotomy) would be correct for that value.", "E": "Compression is contraindicated as it increases the pressure within the closed compartment."}, "hint": "The formula for perfusion safety involves the diastolic blood pressure.", "part": 1}, {"stem": "A 35-year-old female with a known pituitary macroadenoma presents with a sudden 'thunderclap' headache, bilateral vision loss, and ptosis. She is found to be hypotensive and confused. What is the most critical initial intervention?", "options": {"A": "Urgent MRI of the pituitary gland", "B": "Administration of 100 mg IV hydrocortisone", "C": "Immediate transsphenoidal surgical decompression", "D": "Stat dose of oral Cabergoline", "E": "Aspirin 300 mg to treat suspected ischaemic stroke"}, "correct": "B", "rationales": {"A": "Imaging is necessary but should follow the management of life-threatening adrenal crisis.", "B": "Pituitary apoplexy causes acute ACTH deficiency; treating the resulting adrenal crisis is life-saving and takes priority.", "C": "Surgery is the definitive treatment for vision loss but the patient must be stabilized medically first.", "D": "Dopamine agonists are used for prolactinomas but have no role in the acute management of pituitary apoplexy.", "E": "The presentation strongly suggests apoplexy; aspirin could worsen haemorrhage into the tumour."}, "hint": "Think about the hormonal deficiency that could cause sudden cardiovascular collapse.", "part": 1}, {"stem": "A 60-year-old patient presents with a new-onset headache and an isolated right-sided third cranial nerve palsy with a fixed, dilated pupil. Which of the following is the most likely underlying pathology?", "options": {"A": "Aneurysm of the Posterior Communicating Artery (PComA)", "B": "Diabetic mononeuropathy of the oculomotor nerve", "C": "Aneurysm of the Anterior Communicating Artery (AComA)", "D": "Ischaemic stroke in the occipital lobe", "E": "Tension-type headache"}, "correct": "A", "rationales": {"A": "PComA aneurysms are anatomically located near CN III; a pupil-involving palsy suggests external compression of the nerve's parasympathetic fibers.", "B": "Diabetic CN III palsies are typically 'pupil-sparing' because they affect the internal vasa nervorum rather than external fibers.", "C": "AComA aneurysms more commonly present with visual field defects or frontal lobe symptoms rather than CN III palsy.", "D": "Occipital strokes cause visual field defects (hemianopia) rather than ocular motility or pupil issues.", "E": "Tension headaches do not present with focal neurological deficits like cranial nerve palsies."}, "hint": "This specific artery is a common site for berry aneurysms and lies in close proximity to the third nerve.", "part": 1}, {"stem": "A 68-year-old man underwent an elective laminectomy yesterday. This morning, the nurse finds him difficult to rouse. His GCS is 11 (E3, V3, M5). What is the first investigation that should be performed at the bedside?", "options": {"A": "Blood Glucose Level (BSL)", "B": "Urgent CT Head", "C": "Arterial Blood Gas (ABG)", "D": "Full Blood Count (FBC)", "E": "C-reactive protein (CRP)"}, "correct": "A", "rationales": {"A": "Hypoglycaemia is a rapidly reversible cause of altered consciousness and should be excluded first in any post-operative GCS decline.", "B": "A CT may be needed, but bedside exclusions for metabolic or respiratory causes come first.", "C": "ABG is useful for detecting hypercapnia or hypoxia, but BSL is faster and more immediately treatable.", "D": "FBC will not provide an immediate explanation for an acute drop in level of consciousness.", "E": "CRP is a marker of inflammation and does not assist in the acute diagnosis of decreased LOC."}, "hint": "Identify the most easily reversible and common metabolic cause of altered awareness.", "part": 1}, {"stem": "Which of the following statements regarding the use of steroids in neurosurgery is correct according to the provided material?", "options": {"A": "Dexamethasone is indicated in traumatic brain injury to reduce oedema", "B": "Dexamethasone should be used in ischaemic stroke to prevent herniation", "C": "Dexamethasone is effective for reducing vasogenic oedema in brain tumours", "D": "Steroids should be administered immediately in cases of suspected CNS lymphoma", "E": "Hydrocortisone is the steroid of choice for treating cerebral contusions"}, "correct": "C", "rationales": {"A": "The CRASH trial demonstrated increased mortality when steroids were used for TBI.", "B": "Steroids are contraindicated in ischaemic stroke as they can increase the risk of haemorrhagic transformation.", "C": "Steroids are highly effective at stabilizing the blood-brain barrier and reducing oedema caused by tumours and abscesses.", "D": "Steroids can cause lymphoma to regress, making it difficult to obtain a definitive tissue diagnosis via biopsy.", "E": "Steroids are generally avoided in trauma settings regardless of the specific injury type (contusion vs haematoma)."}, "hint": "Steroids have different effects depending on whether the oedema is cytotoxic or vasogenic.", "part": 1}, {"stem": "A 72-year-old female presents to the ED after a fall. She has no loss of consciousness but cannot remember the events immediately following the fall. She is currently on Warfarin for atrial fibrillation. According to NICE criteria, which of the following is correct regarding her imaging?", "options": {"A": "She does not require a CT head as she did not lose consciousness", "B": "She requires a CT head within 1 hour", "C": "She requires a CT head within 8 hours", "D": "She only requires an X-ray of the skull to look for fractures", "E": "She can be discharged if her GCS is 15 at 2 hours"}, "correct": "C", "rationales": {"A": "Anticoagulant use is a significant risk factor that mandates imaging regardless of LOC if there is any amnesia or clinical concern.", "B": "While she needs a scan, 'within 1 hour' is reserved for GCS <13, focal deficits, or signs of skull fracture.", "C": "Amnesia plus age \\ge 65 or coagulopathy/anticoagulant use meets the criteria for a CT head within 8 hours.", "D": "Skull X-rays are not used for assessing intracranial pathology in TBI; CT is the standard of care.", "E": "Patients on anticoagulants with any head injury symptoms require a scan before discharge due to the risk of delayed bleeding."}, "hint": "Medication history and age play a key role in the urgency of TBI imaging.", "part": 1}, {"stem": "In a patient with a confirmed aneurysmal subarachnoid haemorrhage, what is the primary purpose of administering Nimodipine for 21 days?", "options": {"A": "To dissolve the existing subarachnoid clot", "B": "To maintain a Mean Arterial Pressure (MAP) above 80 mmHg", "C": "To reduce the incidence and severity of delayed cerebral ischaemia", "D": "To prevent re-bleeding from the unsecured aneurysm", "E": "To treat acute hydrocephalus by increasing CSF absorption"}, "correct": "C", "rationales": {"A": "Nimodipine is a calcium channel blocker, not a thrombolytic agent.", "B": "Nimodipine can actually lower blood pressure; its benefit is neuroprotection/vasospasm reduction.", "C": "Nimodipine reduces the impact of vasospasm, which typically peaks 4–14 days after the initial haemorrhage.", "D": "Aneurysm securing (coiling/clipping) is the only way to effectively prevent re-bleeding.", "E": "Nimodipine has no effect on CSF dynamics or the treatment of hydrocephalus."}, "hint": "Focus on the secondary injury that typically occurs about a week after the bleed.", "part": 1}, {"stem": "A 22-year-old male presents with a painful, swollen left index finger two days after a minor laceration. On examination, the finger is held in slight flexion, there is fusiform swelling, and he experiences intense pain when you attempt to straighten the finger. What is the most likely diagnosis?", "options": {"A": "Ulnar nerve entrapment", "B": "Acute flexor tenosynovitis", "C": "Trigger finger", "D": "Mallet finger", "E": "Dupuytren’s contracture"}, "correct": "B", "rationales": {"A": "Ulnar nerve issues cause specific sensory/motor deficits but not the localized inflammatory signs of a finger infection.", "B": "The description matches Kanavel's cardinal signs, which indicate an infection within the tendon sheath.", "C": "Trigger finger involves mechanical catching of the tendon, not usually systemic/localized infection signs and fusiform swelling.", "D": "Mallet finger involves the distal extensor tendon and results in an inability to extend the DIPJ, not painful passive extension.", "E": "This is a chronic fibrotic condition of the palmar fascia, not an acute painful infection."}, "hint": "Look for the collective clinical findings known as Kanavel's signs.", "part": 1}, {"stem": "A patient arrives with a 3 cm laceration on the palm of his hand after breaking a glass bottle. What is the most important imaging consideration before closing the wound?", "options": {"A": "No imaging is needed if the wound is thoroughly irrigated", "B": "X-ray of the hand to look for radio-opaque foreign bodies", "C": "Ultrasound of the palm to check for wood fragments", "D": "MRI to assess for occult tendon damage", "E": "CT hand with contrast to check for vascular injury"}, "correct": "B", "rationales": {"A": "Visual inspection alone can miss deep foreign bodies, especially when glass is involved.", "B": "Glass is almost always radio-opaque on plain film X-rays and should be excluded before closure.", "C": "While ultrasound is good for wood, the specific mechanism here (glass) is better evaluated first with X-ray.", "D": "Tendon damage is a clinical diagnosis confirmed by examination or direct visualization, not acute MRI.", "E": "CTA is reserved for suspected major arterial injuries with hard signs of ischaemia."}, "hint": "Consider the radiological properties of common materials like glass.", "part": 1}, {"stem": "Regarding the administration of Tranexamic Acid (TXA) in trauma patients with significant haemorrhage, which of the following is correct?", "options": {"A": "It should be given regardless of the time since injury", "B": "The first dose is 1 g IV over 10 minutes", "C": "It is only indicated if the patient is over the age of 65", "D": "It works by directly promoting platelet aggregation", "E": "It must be avoided in patients with a history of DVT"}, "correct": "B", "rationales": {"A": "TXA given more than 3 hours after injury may actually increase the risk of death.", "B": "The CRASH-2 protocol specifies a 1 g bolus followed by a 1 g maintenance infusion over 8 hours.", "C": "TXA is used in any trauma patient with significant bleeding regardless of age.", "D": "TXA is an antifibrinolytic that prevents the breakdown of clots by inhibiting plasminogen.", "E": "In the setting of life-threatening trauma, the benefit of TXA outweighs the potential risk of thromboembolism."}, "hint": "The timing of this medication is critical for its efficacy.", "part": 1}, {"stem": "A patient is unable to extend their great toe (Extensor Hallucis Longus) following a lumbar disc herniation. Sensation is reduced on the dorsum of the foot. Which nerve root is most likely affected?", "options": {"A": "L3", "B": "L4", "C": "L5", "D": "S1", "E": "S2"}, "correct": "C", "rationales": {"A": "L3 is associated with knee extension and sensation over the distal thigh/knee.", "B": "L4 is primarily associated with the knee-jerk reflex and foot dorsiflexion.", "C": "L5 controls EHL (great toe extension) and provides sensation to the dorsum of the foot.", "D": "S1 is associated with the ankle-jerk reflex, plantarflexion, and the lateral border of the foot.", "E": "S2-S4 are primarily involved in pelvic floor, bladder, and bowel function."}, "hint": "Think of the dermatome and myotome for the most common site of lumbar disc herniation.", "part": 1}, {"stem": "A patient with a traumatic brain injury is noted to have a blood pressure of 180/90 mmHg, a heart rate of 45 beats/min, and an irregular respiratory pattern. What is this clinical triad called, and what does it indicate?", "options": {"A": "Beck’s Triad; cardiac tamponade", "B": "Virchow’s Triad; high risk of DVT", "C": "Cushing’s Triad; severely raised ICP", "D": "Whipple’s Triad; insulinoma", "E": "The Lethal Triad; coagulopathy, acidosis, hypothermia"}, "correct": "C", "rationales": {"A": "Beck’s triad includes muffled heart sounds, JVP distension, and hypotension.", "B": "Virchow’s triad describes factors contributing to thrombosis (stasis, injury, hypercoagulability).", "C": "Cushing's triad is a physiological response to life-threatening intracranial pressure and impending herniation.", "D": "Whipple’s triad involves symptoms of hypoglycaemia, low BSL, and relief upon glucose administration.", "E": "The lethal triad refers to trauma-induced physiological failure, not specifically these neuro-vital signs."}, "hint": "This response is a brainstem reflex to maintain cerebral perfusion pressure.", "part": 1}, {"stem": "A 50-year-old male presents with a ring-enhancing lesion on MRI. The neurosurgical team suspects Primary CNS Lymphoma (PCNSL). Why is it important to withhold dexamethasone in this patient until after a biopsy is performed?", "options": {"A": "Steroids will worsen the peritumoural oedema", "B": "Steroids can cause the tumour to disappear on imaging and pathology", "C": "Steroids increase the risk of post-operative infection", "D": "Steroids interfere with the immunohistochemistry used for GBM", "E": "The patient's blood pressure will become too high for surgery"}, "correct": "B", "rationales": {"A": "Steroids actually reduce vasogenic oedema, which is why they are used for other tumours.", "B": "Lymphoma is 'steroid-sensitive' and can rapidly regress, leading to a non-diagnostic 'ghost' biopsy.", "C": "While true, this is not the specific diagnostic concern in suspected lymphoma cases.", "D": "This is not a recognized problem with GBM diagnosis, which usually requires resection or biopsy regardless.", "E": "While steroids can affect BP, this is manageable and not a contraindication to biopsy."}, "hint": "The 'vanishing tumour' phenomenon is associated with this specific malignancy.", "part": 1}, {"stem": "A victim of a house fire is brought to the hospital. He has soot around his nostrils and a hoarse voice. His pulse oximetry reading is 99% on room air. Why is this pulse oximetry reading potentially misleading?", "options": {"A": "Pulse oximeters cannot detect hypoxia in the elderly", "B": "The patient is likely hyperventilating, which masks the true oxygen saturation", "C": "Pulse oximeters cannot distinguish between oxyhaemoglobin and carboxyhaemoglobin", "D": "Soot on the skin prevents the light from the probe from penetrating", "E": "The patient is in circulatory shock, rendering the probe inaccurate"}, "correct": "C", "rationales": {"A": "Pulse oximetry works across all age groups but has specific biochemical limitations.", "B": "Hyperventilation affects CO_2 and pH, but the SpO2 measures haemoglobin saturation directly.", "C": "In carbon monoxide poisoning, the sensor reads carboxyhaemoglobin as oxyhaemoglobin, giving a falsely high saturation.", "D": "While skin surface contami
