<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>W7 Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:           #f7f5f0;
  --surface:      #ffffff;
  --surface-2:    #f0ede6;
  --border:       #e2ddd5;
  --text:         #1a1714;
  --text-2:       #5a534a;
  --text-3:       #9a8f83;
  --accent:       #2563a8;
  --accent-light: #dbeafe;
  --correct:      #166534;
  --correct-bg:   #dcfce7;
  --correct-ring: #4ade80;
  --wrong:        #991b1b;
  --wrong-bg:     #fee2e2;
  --wrong-ring:   #f87171;
  --hint:         #92400e;
  --hint-bg:      #fef3c7;
  --radius:       10px;
  --radius-lg:    16px;
  --shadow:       0 1px 3px rgba(0,0,0,.07), 0 4px 16px rgba(0,0,0,.06);
  --shadow-lg:    0 4px 6px rgba(0,0,0,.07), 0 12px 32px rgba(0,0,0,.1);
  --font-serif:   'Crimson Pro', Georgia, serif;
  --font-sans:    'DM Sans', system-ui, sans-serif;
  --font-mono:    'DM Mono', monospace;
  --transition:   200ms cubic-bezier(.4,0,.2,1);
}

body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: row;
  align-items: flex-start;
  overflow: hidden;
}

/* ── Sidebar ── */
.sidebar {
  width: 320px;
  height: 100vh;
  overflow-y: auto;
  background: var(--surface);
  border-right: 1.5px solid var(--border);
  padding: 24px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
}
.sidebar-header {
  font-family: var(--font-serif);
  font-size: 1.3rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.q-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(42px, 1fr));
  gap: 8px;
  margin-bottom: 24px;
}
.q-grid-item {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 6px;
  border: 1.5px solid var(--border);
  font-family: var(--font-mono);
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  position: relative;
  color: var(--text-2);
  background: var(--bg);
  transition: all 0.2s;
}
.q-grid-item:hover { border-color: var(--text-3); }
.q-grid-item.active { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); color: var(--accent); }
.q-grid-item.correct { background: var(--correct-bg); border-color: var(--correct-ring); color: var(--correct); }
.q-grid-item.wrong { background: var(--wrong-bg); border-color: var(--wrong-ring); color: var(--wrong); }
.q-grid-item.skipped { background: var(--surface-2); border-color: var(--text-3); color: var(--text-2); opacity: 0.8; }

.flag-icon {
  position: absolute;
  top: -6px;
  right: -6px;
  font-size: 12px;
  background: #fff;
  border-radius: 50%;
  box-shadow: 0 1px 2px rgba(0,0,0,0.2);
  display: none;
  width: 16px;
  height: 16px;
  align-items: center;
  justify-content: center;
}
.q-grid-item.flagged .flag-icon { display: flex; }

/* ── Main Content ── */
.main-content {
  flex: 1;
  height: 100vh;
  overflow-y: auto;
  padding: 24px 32px 80px;
}

/* ── Header ── */
.app-header {
  width: 100%;
  max-width: 780px;
  margin: 0 auto 32px auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 0 24px;
  border-bottom: 1.5px solid var(--border);
}
.app-title {
  font-family: var(--font-serif);
  font-size: 1.5rem;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -.01em;
}
.app-title span { color: var(--accent); }
.score-badge {
  font-family: var(--font-mono);
  font-size: .8rem;
  font-weight: 500;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 99px;
  padding: 6px 14px;
  color: var(--text-2);
  display: flex;
  gap: 6px;
  align-items: center;
}
.score-badge .score-num { color: var(--text); font-weight: 600; }

/* ── Progress bar ── */
.progress-wrap { 
  width: 100%; 
  max-width: 780px; 
  margin: 0 auto 28px auto; 
}
.progress-meta { display: flex; justify-content: space-between; font-size: .78rem; color: var(--text-3); margin-bottom: 7px; font-family: var(--font-mono); }
.progress-track { height: 5px; background: var(--border); border-radius: 99px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width 400ms cubic-bezier(.4,0,.2,1); }

/* ── Card ── */
.card {
  width: 100%;
  max-width: 780px;
  margin: 0 auto;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow);
  overflow: hidden;
  animation: fadeUp .3s ease both;
}
@keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

.card-header { padding: 20px 28px 0; display: flex; align-items: center; gap: 10px; }
.q-label { font-family: var(--font-mono); font-size: .7rem; font-weight: 500; color: var(--text-3); text-transform: uppercase; letter-spacing: .08em; }
.part-tag { font-family: var(--font-mono); font-size: .65rem; font-weight: 500; background: var(--surface-2); border: 1px solid var(--border); border-radius: 4px; padding: 2px 7px; color: var(--text-3); }

.stem { font-family: var(--font-serif); font-size: 1.25rem; line-height: 1.65; color: var(--text); padding: 16px 28px 24px; border-bottom: 1px solid var(--border); }

/* ── Hint ── */
.hint-wrap { padding: 0 28px; margin-top: 20px; }
.hint-toggle { display: inline-flex; align-items: center; gap: 7px; font-size: .8rem; font-weight: 500; color: var(--hint); cursor: pointer; background: none; border: 1.5px solid #d97706; border-radius: 99px; padding: 5px 14px; transition: background var(--transition); }
.hint-toggle:hover { background: var(--hint-bg); }
.hint-body { margin-top: 10px; padding: 12px 16px; background: var(--hint-bg); border-left: 3px solid #f59e0b; border-radius: 0 var(--radius) var(--radius) 0; font-size: .9rem; color: var(--hint); line-height: 1.55; display: none; }
.hint-body.open { display: block; animation: fadeIn .2s ease; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

/* ── Options ── */
.options { padding: 20px 28px 28px; display: flex; flex-direction: column; gap: 10px; }
.option { display: flex; align-items: flex-start; gap: 14px; padding: 14px 16px; border: 1.5px solid var(--border); border-radius: var(--radius); cursor: pointer; background: var(--surface); transition: border-color var(--transition), background var(--transition), box-shadow var(--transition); text-align: left; width: 100%; position: relative; }
.option:hover:not(.locked) { border-color: var(--accent); background: var(--accent-light); box-shadow: 0 0 0 3px rgba(37,99,168,.1); }
.option.selected:not(.locked) { border-color: var(--accent); background: var(--accent-light); box-shadow: 0 0 0 3px rgba(37,99,168,.15); }
.option.correct { border-color: var(--correct-ring); background: var(--correct-bg); box-shadow: 0 0 0 3px rgba(74,222,128,.2); }
.option.wrong { border-color: var(--wrong-ring); background: var(--wrong-bg); box-shadow: 0 0 0 3px rgba(248,113,113,.2); }
.option.dimmed { opacity: .5; }

.opt-letter { flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%; background: var(--surface-2); border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: .78rem; font-weight: 500; color: var(--text-2); transition: background var(--transition), border-color var(--transition), color var(--transition); }
.option.correct .opt-letter { background:#4ade80; border-color:#4ade80; color:#14532d; }
.option.wrong   .opt-letter { background:#f87171; border-color:#f87171; color:#7f1d1d; }
.option.selected:not(.locked) .opt-letter { background:var(--accent); border-color:var(--accent); color:#fff; }

.opt-body { flex: 1; }
.opt-text { font-size: .95rem; line-height: 1.5; color: var(--text); }
.opt-rationale { margin-top: 8px; font-size: .83rem; color: var(--text-2); line-height: 1.5; padding-top: 8px; border-top: 1px solid rgba(0,0,0,.06); display: none; }
.opt-rationale.visible { display: block; animation: fadeIn .25s ease; }

.opt-icon { flex-shrink: 0; font-size: 1.1rem; margin-top: 2px; display: none; }
.option.correct .opt-icon, .option.wrong .opt-icon { display:block; }

/* ── Actions ── */
.card-footer { padding: 0 28px 28px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.btn { font-family: var(--font-sans); font-size: .9rem; font-weight: 600; border-radius: 99px; padding: 11px 26px; cursor: pointer; border: 1.5px solid transparent; transition: all var(--transition); display: inline-flex; align-items: center; gap: 8px; justify-content: center; }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover { background: #1d4f8a; border-color: #1d4f8a; box-shadow: 0 4px 14px rgba(37,99,168,.3); }
.btn-primary:disabled { opacity:.4; cursor:not-allowed; box-shadow:none; }
.btn-ghost { background: transparent; color: var(--text-2); border-color: var(--border); }
.btn-ghost:hover { background: var(--surface-2); color: var(--text); }

.feedback-msg { font-size: .88rem; font-weight: 600; display: flex; align-items: center; gap: 6px; }
.feedback-msg.correct { color: var(--correct); }
.feedback-msg.wrong   { color: var(--wrong); }

/* ── Results screen ── */
.results-screen { 
  width: 100%; 
  max-width: 780px; 
  margin: 0 auto;
  display: none; 
  flex-direction: column; 
  gap: 24px; 
  animation: fadeUp .4s ease both; 
}
.results-screen.visible { display: flex; }
.results-hero { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); padding: 48px 40px; text-align: center; }
.results-grade { font-family: var(--font-serif); font-size: 5rem; font-weight: 600; line-height: 1; margin-bottom: 8px; background: linear-gradient(135deg, #1a1714 0%, #2563a8 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.results-label { font-size: 1.05rem; color: var(--text-2); margin-bottom: 32px; }
.results-stats { display: flex; justify-content: center; gap: 40px; flex-wrap: wrap; }
.stat { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.stat-num { font-family: var(--font-mono); font-size: 1.8rem; font-weight: 500; color: var(--text); }
.stat-num.green { color: var(--correct); }
.stat-num.red   { color: var(--wrong); }
.stat-label { font-size: .78rem; color: var(--text-3); text-transform: uppercase; letter-spacing: .06em; }
.results-actions { display: flex; justify-content: center; gap: 12px; margin-top: 32px; flex-wrap: wrap; }

/* Review list */
.filter-btn { padding: 5px 14px; font-size: 0.8rem; font-weight: 600; border-radius: 99px; cursor: pointer; border: 1.5px solid var(--border); background: transparent; color: var(--text-2); transition: all var(--transition); }
.filter-btn.active { background: var(--surface-2); color: var(--text); border-color: var(--text-3); }
.review-list { display: flex; flex-direction: column; gap: 12px; }
.review-item { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 16px 20px; cursor: pointer; display: flex; align-items: flex-start; gap: 14px; transition: box-shadow var(--transition); }
.review-item:hover { box-shadow: var(--shadow); }
.review-dot { flex-shrink: 0; width: 10px; height: 10px; border-radius: 50%; margin-top: 6px; }
.review-dot.correct { background: var(--correct-ring); }
.review-dot.wrong   { background: var(--wrong-ring); }
.review-text { flex: 1; font-size: .9rem; color: var(--text-2); line-height: 1.4; }
.review-answer { font-size: .8rem; font-weight: 600; font-family: var(--font-mono); color: var(--text-3); flex-shrink: 0; }
.status-Unanswered { color: var(--text-3); }
.status-Correct { color: var(--correct); }
.status-Wrong { color: var(--wrong); }

/* ── Utility ── */
.hidden { display: none !important; }

/* ── Responsive ── */
@media (max-width: 800px) {
  body { flex-direction: column; overflow-y: auto; }
  .sidebar { width: 100%; height: auto; max-height: 250px; border-right: none; border-bottom: 1.5px solid var(--border); padding: 16px; flex-shrink: 0; }
  .main-content { width: 100%; height: auto; overflow: visible; padding: 20px 16px 80px; }
}
@media (max-width: 520px) {
  .stem { font-size: 1.1rem; padding: 14px 20px 20px; }
  .options { padding: 16px 20px 20px; }
  .card-footer { padding: 0 20px 20px; flex-wrap: wrap; }
  .card-header { padding: 16px 20px 0; }
  .hint-wrap { padding: 0 20px; }
  .results-grade { font-size: 3.5rem; }
  .results-stats { gap: 24px; }
}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-header">
    <span>Quiz Status</span>
    <span style="font-size:0.8rem; color:var(--text-3); font-family:var(--font-mono);" id="sidebarCount">0/158</span>
  </div>
  <div class="q-grid" id="qGrid"></div>
  
  <div style="margin-top:auto; display:flex; flex-direction:column; gap:10px;">
    <button class="btn btn-ghost" id="sidebarCopyBtn" style="width:100%; border: 1.5px solid var(--border); padding: 8px; font-size: 0.85rem;" onclick="copySidebarResults()">📋 Copy Status</button>
    <button class="btn btn-primary" style="width:100%; margin-top:0;" onclick="showResults()">Finish Quiz</button>
  </div>
</aside>

<div class="main-content">
  <header class="app-header">
    <div class="app-title">🧠 <span>Neuro</span>Quiz</div>
    <div class="score-badge">
      Score&nbsp;<span class="score-num" id="scoreDisplay">0 / 0</span>
    </div>
  </header>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-meta">
      <span id="progressLabel">Question 1 of 158</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>

  <div class="card" id="quizCard">
    <div class="card-header">
      <span class="q-label" id="qLabel">Question 1</span>
      <span class="part-tag" id="partTag">Part 1</span>
    </div>
    <div class="stem" id="stem"></div>
    <div class="hint-wrap" id="hintWrap">
      <button class="hint-toggle" onclick="toggleHint()">💡 Show hint</button>
      <div class="hint-body" id="hintBody"></div>
    </div>
    <div class="options" id="options"></div>
    
    <div class="card-footer">
      <div style="display:flex; align-items:center; gap: 12px;">
        <button class="btn btn-ghost" id="flagBtn" onclick="toggleFlag()" style="padding: 6px 14px; font-size: 0.8rem;">⚑ Flag</button>
        <div id="feedbackMsg" class="feedback-msg" style="visibility:hidden">–</div>
      </div>
      <div style="display:flex;gap:10px;margin-left:auto;">
        <button class="btn btn-ghost" id="skipBtn" onclick="nextQuestion()">Skip →</button>
        <button class="btn btn-primary" id="submitBtn" onclick="submitAnswer()" disabled>Check answer</button>
      </div>
    </div>
  </div>

  <div class="results-screen" id="resultsScreen">
    <div class="results-hero">
      <div class="results-grade" id="resultsGrade">—</div>
      <div class="results-label" id="resultsLabel">Calculating...</div>
      <div class="results-stats">
        <div class="stat">
          <div class="stat-num" id="totalQ">158</div>
          <div class="stat-label">Questions</div>
        </div>
        <div class="stat">
          <div class="stat-num green" id="correctCount">0</div>
          <div class="stat-label">Correct</div>
        </div>
        <div class="stat">
          <div class="stat-num red" id="wrongCount">0</div>
          <div class="stat-label">Incorrect</div>
        </div>
        <div class="stat">
          <div class="stat-num" id="skippedCount">0</div>
          <div class="stat-label">Skipped</div>
        </div>
      </div>
      <div class="results-actions">
        <button class="btn btn-ghost" onclick="restartQuiz()">↺ Restart</button>
        <button class="btn btn-primary" onclick="showReview()">Review answers</button>
      </div>
    </div>
    
    <div id="reviewSection" class="hidden" style="margin-top: 16px;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
        <h3 style="font-family:var(--font-serif);font-size:1.3rem;padding:0 4px;">Review Panel</h3>
        <button class="btn btn-ghost" id="copyBtn" onclick="copyResults()" style="padding:6px 14px; font-size:.8rem; border: 1.5px solid var(--border);">📋 Copy Results Summary</button>
      </div>
      
      <div class="review-filters" style="margin-bottom: 16px; display: flex; gap: 8px; padding: 0 4px; flex-wrap:wrap;">
        <button class="filter-btn" id="filterWrong" onclick="filterReview('wrong')">Incorrect / Skipped</button>
        <button class="filter-btn" id="filterFlagged" onclick="filterReview('flagged')">🚩 Flagged</button>
        <button class="filter-btn" id="filterAll" onclick="filterReview('all')">All Questions</button>
      </div>
      
      <div class="review-list" id="reviewList"></div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
// ── Quiz data ─────────────────────────────────────────────────────────────────
const QUESTIONS = [{"stem": "A 45-year-old female presents with a sudden-onset \"thunderclap\" headache. A non-contrast CT brain performed 4 hours after symptom onset is unremarkable. What is the most appropriate next step in management?", "options": {"A": "Perform a lumbar puncture immediately to look for xanthochromia.", "B": "Perform a lumbar puncture at least 12 hours after the onset of the headache.", "C": "Discharge the patient with analgesia as the CT is highly sensitive within the first 6 hours.", "D": "Proceed directly to Digital Subtraction Angiography (DSA).", "E": "Request an MRI Brain with gadolinium to identify occult blood."}, "correct": "B", "rationales": {"A": "Performing the procedure too early may result in a false negative because the enzymatic breakdown of hemoglobin into bilirubin takes time.", "B": "Allowing sufficient time ensures that red blood cells have lysed and converted to bilirubin, which is the gold standard for detecting subarachnoid hemorrhage when imaging is negative.", "C": "While the sensitivity is high, a negative CT does not definitively rule out the condition in a high-suspicion case.", "D": "This is an invasive procedure typically reserved for identifying the source once the diagnosis of hemorrhage is confirmed.", "E": "MRI is generally not the preferred follow-up for acute subarachnoid hemorrhage in the emergency setting compared to CSF analysis."}, "hint": "Consider the 'Rule of Sixes' and the physiological timeline for bilirubin production in the CSF.", "part": 1}, {"stem": "A 68-year-old male with a history of chronic alcoholism and hypertension is admitted with progressive confusion and a headache. CT imaging reveals a crescent-shaped hyperdensity crossing the coronal suture line. Which of the following vessels is most likely responsible for this finding?", "options": {"A": "Middle meningeal artery", "B": "Bridging cortical veins", "C": "Anterior communicating artery", "D": "Internal carotid artery", "E": "Great cerebral vein of Galen"}, "correct": "B", "rationales": {"A": "This vessel typically causes biconvex, lens-shaped hematomas that do not cross suture lines.", "B": "These vessels are stretched in the setting of brain atrophy, making them susceptible to tearing during acceleration-deceleration injuries, resulting in a subdural hematoma.", "C": "Rupture here would lead to subarachnoid hemorrhage rather than a localized crescent-shaped collection in the subdural space.", "D": "Large arterial ruptures of this nature typically present with rapid intracranial catastrophe or subarachnoid patterns rather than a subdural collection.", "E": "Injury to deep venous structures usually presents with different radiological patterns and deep-seated involvement."}, "hint": "Focus on the classic anatomical source of a subdural hematoma in an elderly or atrophied brain.", "part": 1}, {"stem": "A patient is admitted with a traumatic brain injury and has an ICP monitor placed. The MAP is 90 mmHg and the ICP is 25 mmHg. According to standard neurocritical care targets, what is the best interpretation of the current CPP?", "options": {"A": "The CPP is 115 mmHg, which is dangerously high.", "B": "The CPP is 65 mmHg, which is within the typical target range.", "C": "The CPP is 3.6 mmHg, indicating imminent brain death.", "D": "The CPP is 65 mmHg, but the target should be >100 mmHg.", "E": "The CPP cannot be calculated without the heart rate."}, "correct": "B", "rationales": {"A": "This calculation incorrectly adds the pressures rather than subtracting the intracranial resistance from the systemic pressure.", "B": "Using the formula CPP = MAP - ICP, the result is 65 mmHg, which aligns with the goal of maintaining perfusion between 60--70 mmHg in trauma.", "C": "This represents a calculation error using division rather than subtraction.", "D": "Targets above 100 mmHg are generally avoided as they can lead to increased cerebral edema and pulmonary complications.", "E": "Cerebral perfusion pressure depends solely on the relationship between mean arterial pressure and intracranial pressure."}, "hint": "Apply the primary formula for cerebral perfusion and recall the standard neurotrauma targets.", "part": 1}, {"stem": "A 75kg man sustains partial-thickness burns to his entire right arm and his entire anterior trunk. Using the Parkland formula, calculate the volume of fluid required in the first 8 hours of resuscitation.", "options": {"A": "4050 mL", "B": "8100 mL", "C": "2700 mL", "D": "5400 mL", "E": "2025 mL"}, "correct": "A", "rationales": {"A": "The TBSA is 27% (arm 9% + anterior trunk 18%); the total 24h fluid is 4 mL \\times 75 kg \\times 27 = 8100 mL, half of which is 4050 mL.", "B": "This represents the total volume for the first 24 hours, not the volume for the initial 8-hour window.", "C": "This is a miscalculation likely using 2 mL as the multiplier in the Parkland formula.", "D": "This volume would correspond to a different TBSA calculation or incorrect timing of administration.", "E": "This is a calculation error representing only a quarter of the total 24-hour requirement."}, "hint": "Sum the TBSA for the arm and anterior trunk, calculate the 24-hour total, and then divide by two.", "part": 1}, {"stem": "A 32-year-old male presents with a deep laceration to the palm of his hand. On examination, he is unable to flex the distal interphalangeal (DIP) joint of his ring finger while the proximal joints are stabilized. Which structure is most likely injured?", "options": {"A": "Flexor Digitorum Superficialis (FDS)", "B": "Flexor Digitorum Profundus (FDP)", "C": "Lumbrical muscles", "D": "Extensor Digitorum Communis", "E": "Palmar interossei"}, "correct": "B", "rationales": {"A": "This muscle is primarily responsible for flexion at the proximal interphalangeal (PIP) joint.", "B": "The FDP is the only tendon that inserts on the distal phalanx and provides flexion at the DIP joint.", "C": "The lumbricals primarily flex the MCP joints and extend the interphalangeal joints.", "D": "This muscle facilitates extension of the digits, not flexion.", "E": "These muscles are involved in adduction of the fingers rather than flexion of the distal joints."}, "hint": "Identify the specific tendon that inserts onto the distal phalanx to facilitate distal flexion.", "part": 1}, {"stem": "A patient presents with a complete third nerve palsy (ptosis, 'down and out' eye) and a fixed, dilated pupil. Which of the following is the most urgent concern?", "options": {"A": "Microvascular ischemia due to Diabetes Mellitus", "B": "Compressive aneurysm of the Posterior Communicating Artery (PCom)", "C": "Atherosclerotic occlusion of the ophthalmic artery", "D": "Pituitary macroadenoma with cavernous sinus invasion", "E": "Myasthenia Gravis exacerbation"}, "correct": "B", "rationales": {"A": "Medical causes like diabetes typically spare the superficially located parasympathetic pupillary fibers, leading to a pupil-sparing palsy.", "B": "The parasympathetic fibers are located on the outside of the third nerve; compression by an aneurysm typically involves the pupil, signaling an impending rupture.", "C": "This would present more prominently with sudden vision loss rather than a specific extraocular muscle palsy with pupillary involvement.", "D": "While possible, this is usually more chronic and would likely involve other cranial nerves (IV, V, VI) simultaneously.", "E": "This condition causes fluctuating weakness and ptosis but does not affect the pupillary reflex."}, "hint": "The presence of pupillary involvement in a CN III palsy suggests external compression rather than an internal medical (ischemic) issue.", "part": 1}, {"stem": "In the management of raised intracranial pressure (ICP), which mechanism explains the benefit of head-of-bed elevation to 30^{\\circ}?", "options": {"A": "It increases arterial inflow to prevent cerebral ischemia.", "B": "It optimizes venous drainage through the jugular veins.", "C": "It induces hypocapnic vasoconstriction.", "D": "It promotes the shunting of CSF into the lumbar cistern.", "E": "It prevents cytotoxic edema by stabilizing the blood-brain barrier."}, "correct": "B", "rationales": {"A": "Elevation can actually decrease mean arterial pressure at the level of the head, potentially lowering inflow.", "B": "Gravity-assisted drainage reduces the venous blood volume component of the Monro-Kellie doctrine, thereby lowering overall ICP.", "C": "Vasoconstriction via CO_2 levels is a result of hyperventilation, not physical positioning.", "D": "While positioning affects CSF dynamics, the primary and immediate acute benefit for ICP is related to the venous system.", "E": "Positioning has no direct cellular effect on the integrity of the blood-brain barrier or the metabolic state of neurons."}, "hint": "Think about the Monro-Kellie doctrine and how gravity affects the fluid volume within the non-compliant skull.", "part": 1}, {"stem": "A 55-year-old male with new-onset seizures and morning headaches undergoes an MRI, which shows a large, ring-enhancing mass in the right frontal lobe that crosses the corpus callosum. Which histological feature is most characteristic of this suspected diagnosis?", "options": {"A": "Psammoma bodies", "B": "Pseudopalisading necrosis", "C": "Whorled pattern of spindle cells", "D": "Fried-egg appearance of cells", "E": "Rosenthal fibers"}, "correct": "B", "rationales": {"A": "These are laminated calcifications classically found in meningiomas, not aggressive glial tumors.", "B": "This is the hallmark pathological finding of Glioblastoma Multiforme (GBM), reflecting rapid growth outstripping the blood supply.", "C": "This description is characteristic of a benign meningioma.", "D": "This is the classic description for oligodendrogliomas, which are generally less aggressive than the tumor described.", "E": "These are thick, elongated eosinophilic structures found in pilocytic astrocytomas, which are typically WHO Grade I and seen in children."}, "hint": "The imaging description of crossing the corpus callosum suggests a 'Butterfly Glioma' (GBM).", "part": 1}, {"stem": "A trauma patient is found to have absent breath sounds on the right side, hyper-resonance to percussion, and a blood pressure of 85/50 mmHg. What is the most appropriate immediate action?", "options": {"A": "Obtain a portable chest X-ray to confirm the diagnosis.", "B": "Perform immediate needle decompression.", "C": "Perform an emergency bedside thoracotomy.", "D": "Insert an intercostal chest drain in the triangle of safety.", "E": "Auscultate the left side to ensure the endotracheal tube is not misplaced."}, "correct": "B", "rationales": {"A": "In a hemodynamically unstable patient with clinical signs of tension, waiting for imaging can lead to cardiac arrest.", "B": "Tension pneumothorax is a clinical diagnosis requiring immediate release of pressure to restore venous return to the heart.", "C": "Thoracotomy is a major surgical procedure reserved for massive hemorrhage or cardiac arrest in penetrating trauma, not the first-line for air decompression.", "D": "While this is the definitive treatment, needle decompression is faster and should be performed first in the setting of hypotension.", "E": "While important, the clinical signs clearly point to a right-sided tension pneumothorax causing obstructive shock."}, "hint": "Tension pneumothorax is a clinical emergency where the 'next best step' is governed by the need for rapid decompression.", "part": 1}, {"stem": "A patient with a suspected splenic injury from blunt abdominal trauma is hemodynamically unstable despite resuscitation with 2 L of crystalloid. The FAST scan is positive for free fluid in Morrison's pouch and the splenorenal recess. What is the next best step?", "options": {"A": "CT Abdomen and Pelvis with IV contrast", "B": "Immediate exploratory laparotomy", "C": "Urgent splenic artery embolization in interventional radiology", "D": "Serial hemoglobin monitoring and ICU admission", "E": "Repeat FAST scan in 30 minutes"}, "correct": "B", "rationales": {"A": "Unstable patients should not be sent to the CT scanner as it delays definitive surgical control of bleeding.", "B": "Hemodynamic instability with a positive FAST scan is an absolute indication for emergency surgery to control hemorrhage.", "C": "Embolization is only appropriate for stable patients with a localized 'blush' on CT.", "D": "Non-operative management is only suitable for patients who remain hemodynamically stable.", "E": "Repeating a positive test in an unstable patient provides no additional information and wastes critical time."}, "hint": "Stability is the deciding factor in the trauma algorithm for whether to image further or go to the operating theatre.", "part": 1}, {"stem": "Which of the following is considered a 'false localizing sign' in the context of raised intracranial pressure?", "options": {"A": "Ipsilateral third nerve palsy", "B": "Contralateral hemiparesis", "C": "Abducens (CN VI) nerve palsy", "D": "Bilateral papilloedema", "E": "Anosmia"}, "correct": "C", "rationales": {"A": "This usually indicates uncal herniation, which is a specific anatomical localization of a mass effect.", "B": "This localizes the lesion to the motor cortex or internal capsule on the opposite side.", "C": "Because of its long intracranial course, this nerve can be stretched by global pressure, mimicking a focal lesion where none exists.", "D": "This is a general sign of increased pressure and does not 'localize' a lesion to a specific cranial nerve pathway.", "E": "This would suggest a lesion specific to the olfactory bulbs or the cribriform plate area."}, "hint": "Identify the cranial nerve that is most vulnerable to traction due to its length and anatomical path.", "part": 1}, {"stem": "Regarding subarachnoid hemorrhage, which medication is specifically indicated for 21 days to reduce the risk of delayed cerebral ischemia?", "options": {"A": "Amlodipine", "B": "Nimodipine", "C": "Mannitol", "D": "Levetiracetam", "E": "Phenylephrine"}, "correct": "B", "rationales": {"A": "This is a dihydropyridine calcium channel blocker used for systemic hypertension, not specifically for vasospasm.", "B": "This lipophilic calcium channel blocker crosses the blood-brain barrier to reduce the incidence and severity of ischemic deficits caused by vasospasm.", "C": "This is an osmotic diuretic used for acute ICP reduction, not for the prevention of delayed vasospasm.", "D": "This is an antiepileptic used for seizure prophylaxis, not for preventing cerebral ischemia.", "E": "This is a vasopressor that might be used as part of 'triple-H' therapy to treat vasospasm, but it is not the standard preventative prophylactic agent."}, "hint": "Think of a specific calcium channel blocker that is lipophilic and crosses into the central nervous system.", "part": 1}, {"stem": "A 24-year-old male is brought to the ED after a motor vehicle accident. He opens his eyes to pain, makes incomprehensible sounds, and withdraws from painful stimuli. What is his Glasgow Coma Scale (GCS) score?", "options": {"A": "GCS\\ 6", "B": "GCS\\ 8", "C": "GCS\\ 9", "D": "GCS\\ 7", "E": "GCS\\ 10"}, "correct": "B", "rationales": {"A": "This would represent a significantly more depressed neurological status than described.", "B": "Eyes = 2 (pain), Verbal = 2 (incomprehensible), Motor = 4 (withdraws); 2+2+4=8.", "C": "This score would be achieved if the patient localized pain (Motor 5) rather than withdrawing from it.", "D": "This would occur if the patient exhibited abnormal flexion (decorticate posturing) rather than withdrawing.", "E": "This would imply a higher level of verbal response (e.g., confused conversation)."}, "hint": "Add the components: eyes to pain, incomprehensible verbal, and withdrawal motor.", "part": 1}, {"stem": "Which of the following findings is most strongly suggestive of a base of skull fracture, making the insertion of a nasogastric tube potentially dangerous?", "options": {"A": "Subhyaloid hemorrhage", "B": "Battle's sign", "C": "Projectile vomiting", "D": "Fixed and dilated pupil", "E": "Kernig's sign"}, "correct": "B", "rationales": {"A": "This is a sign of sudden, severe intracranial pressure increase, classically seen in subarachnoid hemorrhage (Terson syndrome).", "B": "Ecchymosis over the mastoid process indicates a fracture of the petrous temporal bone, part of the skull base.", "C": "This is a non-specific sign of generally raised intracranial pressure.", "D": "This indicates herniation or third nerve compression, not necessarily a skull base fracture.", "E": "This is a sign of meningeal irritation, typically seen in meningitis or subarachnoid hemorrhage."}, "hint": "Look for a sign involving bruising behind the ear or around the eyes (raccoon eyes).", "part": 1}, {"stem": "A patient with a full-thickness circumferential burn to the right arm develops cool fingers and an absent radial pulse. What is the most appropriate immediate surgical intervention?", "options": {"A": "Fasciotomy", "B": "Escharotomy", "C": "Debridement and skin grafting", "D": "Amputation at the level of the burn", "E": "Primary closure of the burn wound"}, "correct": "B", "rationales": {"A": "Fasciotomy involves cutting the muscle fascia and is used for compartment syndrome, whereas this case is caused by the constricting burn eschar.", "B": "This involves incising the non-compliant, leathery burnt tissue to release pressure and restore distal circulation.", "C": "While eventually necessary, this is not an emergency procedure for restoring immediate vascular flow.", "D": "This is an extreme measure that is not indicated before attempting to release the constricting eschar.", "E": "Burns are not primarily closed; they require grafting or secondary healing, and closure would worsen the pressure."}, "hint": "Distinguish between a procedure that cuts through the burnt skin versus one that cuts through the muscle fascia.", "part": 1}, {"stem": "Which set of clinical signs constitutes 'Beck's Triad', which helps differentiate cardiac tamponade from a tension pneumothorax?", "options": {"A": "Hypertension, Bradycardia, and Irregular respirations", "B": "Hypotension, Distended neck veins, and Muffled heart sounds", "C": "Tracheal deviation, Hyper-resonance, and Hypotension", "D": "Fever, Nuchal rigidity, and Altered mental status", "E": "Tachycardia, Tachypnoea, and Narrow pulse pressure"}, "correct": "B", "rationales": {"A": "These three signs make up Cushing's Triad, which is associated with severely raised intracranial pressure.", "B": "These constitute Beck's Triad, pointing specifically to fluid accumulation in the pericardium.", "C": "These are the hallmark signs of a tension pneumothorax, not cardiac tamponade.", "D": "These are signs typical of meningitis.", "E": "These are general signs of shock and are not specific enough to diagnose tamponade."}, "hint": "One of these triads involves the character of the heart sounds as a defining feature.", "part": 1}, {"stem": "A 40-year-old construction worker presents with severe lower back pain radiating down his left leg to the top of his foot. He has weakness in dorsiflexion of the foot. Which nerve root is most likely compressed?", "options": {"A": "L3", "B": "L4", "C": "L5", "D": "S1", "E": "S2"}, "correct": "C", "rationales": {"A": "Compression of L3 typically presents with weakness in knee extension and an impaired patellar reflex.", "B": "While L4 can be involved in dorsiflexion, it is more characteristically associated with the patellar reflex and inversion.", "C": "L5 is the primary root responsible for foot dorsiflexion and great toe extension; its dermatome covers the top of the foot.", "D": "S1 compression typically presents with weakness in plantarflexion and a loss of the ankle (Achilles) reflex.", "E": "S2 is primarily involved in pelvic floor and intrinsic foot function, not major ankle movements."}, "hint": "Consider the myotome for 'foot drop' and the dermatomal distribution to the dorsal surface of the foot.", "part": 1}, {"stem": "During the management of a trauma patient with a possible thoracic injury, a chest drain is inserted. The initial output is 1600 mL of blood. What is the most appropriate next step in management?", "options": {"A": "Clamp the chest drain to prevent further blood loss.", "B": "Administer 2 L of crystalloid and monitor for an hour.", "C": "Prepare the patient for an emergency thoracotomy.", "D": "Perform a CT Angiogram of the chest to find the bleeding source.", "E": "Give 2 units of uncrossmatched blood and repeat the chest X-ray."}, "correct": "C", "rationales": {"A": "Clamping the drain can lead to a tension hemothorax and does not stop the underlying hemorrhage.", "B": "Massive initial output indicates a major vessel injury that crystalloid alone cannot stabilize.", "C": "According to ATLS guidelines, an immediate output of >1500 mL is an indication for surgical exploration.", "D": "With this volume of loss, the patient is likely to be or become unstable, making transport to CT unsafe.", "E": "While blood is needed, the threshold for surgery has already been met by the volume of initial drainage."}, "hint": "Recall the numeric threshold for immediate surgical intervention based on initial chest drain output.", "part": 1}, {"stem": "Which phase of Jackson's burn zones describes the area of potentially salvageable tissue that is at risk of irreversible loss if resuscitation is inadequate?", "options": {"A": "Zone of Coagulation", "B": "Zone of Stasis", "C": "Zone of Hyperaemia", "D": "Zone of Fibrosis", "E": "Zone of Demarcation"}, "correct": "B", "rationales": {"A": "This central area has already suffered irreversible tissue necrosis.", "B": "This area has impaired perfusion; with good resuscitation, it may recover, but it can progress to necrosis if ischemia persists.", "C": "This outermost zone has increased blood flow and is expected to heal without intervention.", "D": "This is not one of the three classic physiological zones of a burn described by Jackson.", "E": "This term refers to the later visual boundary between necrotic and healthy tissue, not the acute physiological zones."}, "hint": "This zone is 'in between' the central dead tissue and the outer healthy tissue.", "part": 1}, {"stem": "A patient with a known intracranial mass presents with a headache and progressive drowsiness. On examination, they have a heart rate of 48 bpm, a blood pressure of 180/95 mmHg, and irregular breathing. What is the most likely underlying physiological process?", "options": {"A": "Hypovolaemic shock due to internal bleeding", "B": "Acute meningitis", "C": "Severely raised intracranial pressure with impending herniation", "D": "Pulmonary embolism with obstructive shock", "E": "Opioid overdose"}, "correct": "C", "rationales": {"A": "Shock usually presents with tachycardia and hypotension, the opposite of the signs described.", "B": "While it can cause headache and altered consciousness, the triad of hypertension and bradycardia is more specific to pressure effects.", "C": "Cushing's triad (hypertension, bradycardia, irregular breathing) is a late sign of dangerously high ICP.", "D": "This typically causes hypotension and tachycardia, often with low oxygen saturations.", "E": "While this causes respiratory depression and bradycardia, it usually results in hypotension and miosis."}, "hint": "This triad of signs is the clinical hallmark of critical intracranial hypertension.", "part": 1}, {"stem": "A 28-year-old male is evaluated in the ED following a bar fight. He has a small laceration over his right 3rd metacarpophalangeal (MCP) joint. He states he hit someone in the mouth. What is the most appropriate management strategy?", "options": {"A": "Suture the wound immediately to prevent scarring.", "B": "Prescribe oral Amoxicillin and discharge with GP follow-up.", "C": "Irrigate the wound, provide Tetanus prophylaxis, and start Co-amoxiclav.", "D": "Perform an X-ray to look for a fracture but do not give antibiotics.", "E": "Reassure the patient that the wound is superficial and needs only a dressing."}, "correct": "C", "rationales": {"A": "Closing a human bite wound primarily carries an extremely high risk of trapping infection.", "B": "Oral monotherapy is insufficient for the polymicrobial flora of a 'fight bite,' and GP follow-up is not aggressive enough.", "C": "This approach addresses the high risk of infection (including Eikenella\\ corrodens) associated with human bites.", "D": "Antibiotics are mandatory in human bite injuries due to the high rate of subsequent septic arthritis or tenosynovitis.", "E": "Ignoring a fight bite can lead to rapid destruction of the joint or tendon sheath."}, "hint": "The mechanism of hitting someone's teeth suggests a highly contaminated 'human bite' scenario.", "part": 1}, {"stem": "A patient is diagnosed with a large meningioma. Which of the following imaging features on a contrast-enhanced MRI would be most classic for this tumor?", "options": {"A": "A 'Dural Tail' sign", "B": "A 'Popcorn' appearance", "C": "Massive vasogenic edema crossing the midline", "D": "Multiple lesions at the grey-white matter junction", "E": "An intensely calcified lesion within the ventricle"}, "correct": "A", "rationales": {"A": "This represents thickening and enhancement of the dura mater adjacent to the tumor, a characteristic finding in meningiomas.", "B": "This is the classic description of a cavernous malformation (cavernoma), not a meningioma.", "C": "While meningiomas can cause edema, this pattern is much more characteristic of a high-grade glioma.", "D": "This pattern is highly suggestive of metastatic disease.", "E": "Intraventricular tumors like choroid plexus papillomas or ependymomas would be more likely in this location."}, "hint": "Look for a sign that indicates the tumor's origin from the arachnoid cap cells attached to the dura.", "part": 1}, {"stem": "What is the primary mechanism of injury in 'Diffuse Axonal Injury' (DAI), and how does it typically appear on an initial CT brain?", "options": {"A": "Direct impact to the skull; presents with a large midline shift.", "B": "Rotational shearing forces; often appears relatively normal or with small punctate hemorrhages.", "C": "Bursting of bridging veins; appears as a crescent-shaped hyperdensity.", "D": "Low-pressure venous oozing; appears as a hypodense collection over weeks.", "E": "High-pressure arterial rupture; appears as a biconvex hematoma."}, "correct": "B", "rationales": {"A": "Direct impact usually causes contusions or hematomas rather than diffuse shearing.", "B": "DAI involves the shearing of axons at the grey-white matter junction and often shows a discrepancy between a poor clinical state and a near-normal CT.", "C": "This describes the pathophysiology of a subdural hematoma.", "D": "This describes a chronic subdural hematoma.", "E": "This describes the pathophysiology of an extradural hematoma."}, "hint": "Consider the 'GCS-CT mismatch' where the patient looks much worse than the scan suggests.", "part": 1}, {"stem": "Which of the following is an absolute contraindication to performing a lumbar puncture in a patient with suspected meningitis or subarachnoid hemorrhage?", "options": {"A": "Fever and neck stiffness", "B": "A platelet count of 150 \\times 10^9/L", "C": "Signs of a mass lesion or obstructive hydrocephalus on CT", "D": "A history of previous back surgery", "E": "Patient is taking low-dose Aspirin"}, "correct": "C", "rationales": {"A": "These are indications for a lumbar puncture to diagnose the cause of the symptoms.", "B": "This is a normal platelet count and poses no increased risk for the procedure.", "C": "Performing an LP in the presence of a pressure gradient can cause brain herniation (coning).", "D": "This may make the procedure technically more difficult, but it is not a contraindication.", "E": "Low-dose Aspirin is generally not a contraindication for a lumbar puncture, unlike therapeutic anticoagulation."}, "hint": "Think about the risk of 'coning' when there is a significant pressure difference between the head and the spine.", "part": 1}, {"stem": "A patient with a suspected splenic laceration is being managed non-operatively in the ICU. Which of the following would be the most common cause of death in this patient if they were to undergo a splenectomy later?", "options": {"A": "Re-bleeding from the splenic bed", "B": "Overwhelming Post-Splenectomy Infection (OPSI)", "C": "Small bowel obstruction from adhesions", "D": "Liver failure due to portal vein thrombosis", "E": "Pulmonary embolism"}, "correct": "B", "rationales": {"A": "While a risk, it is rarely the most common cause of late mortality following a successful surgery.", "B": "Loss of the spleen's immune function against encapsulated organisms like Streptococcus\\ pneumoniae leads to a life-threatening sepsis risk.", "C": "This is a general complication of any abdominal surgery but not specific to splenectomy.", "D": "Splenectomy increases the risk of portal vein thrombosis, but it is not the most common cause of death.", "E": "Trauma and surgery increase VTE risk, but OPSI is a more specific and classic risk for asplenic patients."}, "hint": "Consider the immunological role of the spleen in filtering encapsulated bacteria.", "part": 1}, {"stem": "A 45-year-old female presents to the Emergency Department with the sudden onset of a 'thunderclap' headache that reached peak intensity within 30 seconds. A non-contrast CT brain performed 4 hours after the onset of symptoms is negative for any intracranial hemorrhage. What is the most appropriate next step in her management?", "options": {"A": "Discharge with outpatient neurology follow-up", "B": "Perform a lumbar puncture immediately", "C": "Wait until 12 hours post-headache onset to perform a lumbar puncture", "D": "Perform a CT Angiogram (CTA) of the brain", "E": "Repeat the non-contrast CT brain in 24 hours"}, "correct": "C", "rationales": {"A": "Discharging the patient prematurely would be dangerous, as a CT scan is not 100% sensitive, especially if symptoms persist or the suspicion remains high.", "B": "Performing a lumbar puncture too early (before 6-12 hours) may result in a false negative for xanthochromia, as bilirubin takes time to form from broken-down red blood cells.", "C": "The 'Rule of Sixes' suggests waiting 6-12 hours for xanthochromia to develop, which is the gold standard for diagnosing SAH when CT is negative.", "D": "While a CTA can identify an aneurysm, it does not confirm if a hemorrhage has actually occurred; the diagnostic pathway for SAH requires CSF analysis if CT is negative.", "E": "Sensitivity of CT for SAH actually decreases over time as blood is cleared from the subarachnoid space, making a repeat CT less useful than a lumbar puncture."}, "hint": "Think about the biochemical timeline required for the breakdown of hemoglobin into bilirubin in the CSF.", "part": 1}, {"stem": "A 72-year-old male on warfarin for atrial fibrillation is brought in after a fall. He is confused but has no focal neurological deficits. His CT scan shows a crescent-shaped, hyperdense collection that crosses the coronal suture line. What is the most likely source of this bleeding?", "options": {"A": "Middle meningeal artery", "B": "Bridging cortical veins", "C": "Anterior communicating artery", "D": "Internal carotid artery", "E": "Basilar artery"}, "correct": "B", "rationales": {"A": "Rupture of the middle meningeal artery typically causes an extradural hematoma, which is biconvex and does not cross suture lines.", "B": "Subdural hemorrhages result from the tearing of bridging veins, often due to brain atrophy in the elderly or acceleration-deceleration forces.", "C": "Rupture of the anterior communicating artery typically results in a subarachnoid hemorrhage rather than a subdural collection.", "D": "Large arterial ruptures like the ICA are more likely to cause devastating intraparenchymal or subarachnoid bleeds rather than the classic crescentic SDH.", "E": "Basilar artery issues usually present with brainstem symptoms or subarachnoid hemorrhage, not a subdural hematoma."}, "hint": "This anatomical structure connects the surface of the brain to the dural sinuses and is prone to shearing.", "part": 1}, {"stem": "A patient with a traumatic brain injury has an intracranial pressure (ICP) of 25 mmHg and a mean arterial pressure (MAP) of 85 mmHg. What is the calculated Cerebral Perfusion Pressure (CPP)?", "options": {"A": "110 mmHg", "B": "3.4 mmHg", "C": "60 mmHg", "D": "70 mmHg", "E": "50 mmHg"}, "correct": "C", "rationales": {"A": "This value incorrectly adds ICP and MAP instead of subtracting the resistance from the driving pressure.", "B": "This result stems from dividing the MAP by ICP, which is not the physiological formula for perfusion pressure.", "C": "CPP is calculated as MAP - ICP; in this case, 85 - 25 = 60 mmHg.", "D": "This is often the target CPP in TBI management, but it is not the result of the values provided in this specific scenario.", "E": "This value would be below the recommended threshold for maintaining adequate brain perfusion in trauma patients."}, "hint": "The formula involves finding the difference between the systemic pressure and the resistance within the skull.", "part": 1}, {"stem": "A 25-year-old male is admitted with 30% Total Body Surface Area (TBSA) burns involving his legs and trunk. He weighs 70 kg. Using the Parkland Formula, how much fluid should he receive in the first 8 hours of his resuscitation?", "options": {"A": "8,400 mL", "B": "4,200 mL", "C": "2,100 mL", "D": "1,050 mL", "E": "16,800 mL"}, "correct": "B", "rationales": {"A": "This represents the total fluid volume calculated for the entire first 24 hours, not just the first 8-hour window.", "B": "The Parkland Formula is 4mL \\times kg \\times TBSA%; total 24h fluid is 4 \\times 70 \\times 30 = 8400mL, with half (4200mL) given in the first 8 hours.", "C": "This would be the amount given in a 4-hour window if the fluid were distributed evenly, which contradicts the standard resuscitation protocol.", "D": "This is a significant under-resuscitation and does not align with the weight-based needs of a major burn patient.", "E": "This would be double the calculated 24-hour total, putting the patient at severe risk for fluid overload and edema."}, "hint": "Calculate the 24-hour total first, then determine the requirement for the initial intensive period.", "part": 1}, {"stem": "A 30-year-old carpenter presents with a deep laceration to the palm of his hand. On examination, he is unable to flex the distal interphalangeal joint (DIPJ) of his index finger while the proximal joint is held in extension. Which structure is most likely damaged?", "options": {"A": "Flexor Digitorum Superficialis (FDS)", "B": "Flexor Digitorum Profundus (FDP)", "C": "Flexor Pollicis Longus", "D": "Median nerve", "E": "Lumbrical muscles"}, "correct": "B", "rationales": {"A": "FDS is responsible for flexing the proximal interphalangeal joint (PIPJ), not the distal joint.", "B": "The FDP is the only muscle responsible for flexion at the distal interphalangeal joint (DIPJ).", "C": "This muscle is responsible for thumb flexion and would not affect the index finger's distal joint.", "D": "While the median nerve innervates these muscles, a direct laceration causing isolated loss of DIPJ flexion suggests a tendon injury rather than a proximal nerve lesion.", "E": "Lumbricals assist in flexing the MCP joints and extending the IP joints, not in flexing the DIPJ."}, "hint": "Identify the specific tendon responsible for the final joint of the digit.", "part": 1}, {"stem": "A 55-year-old patient is found to have a dilated right pupil that is non-reactive to light, associated with ptosis and a 'down and out' eye position. An urgent MRA is performed. Which aneurysm location is most likely responsible for these findings?", "options": {"A": "Anterior Communicating Artery (ACom)", "B": "Posterior Communicating Artery (PCom)", "C": "Middle Cerebral Artery (MCA)", "D": "Basilar Artery Tip", "E": "Ophthalmic Artery"}, "correct": "B", "rationales": {"A": "ACom aneurysms are common but typically present with visual field defects or frontal lobe symptoms rather than a isolated CN III palsy.", "B": "PCom aneurysms can compress the adjacent Third Cranial Nerve (Oculomotor), classically causing a pupil-involving palsy.", "C": "MCA aneurysms often cause mass effect on the temporal lobe or hemiparesis but rarely compress the oculomotor nerve directly.", "D": "Basilar tip aneurysms can cause midbrain syndromes but are less classically associated with an isolated, pupil-involving third nerve palsy compared to PCom.", "E": "Ophthalmic artery aneurysms are more likely to compress the optic nerve (CN II), causing visual loss rather than extraocular movement deficits."}, "hint": "Consider the proximity of the Circle of Willis vessels to the Third Cranial Nerve.", "part": 1}, {"stem": "A 60-year-old smoker presents with a 2-month history of headaches that are worse in the morning and when bending over. He recently had a new-onset generalized tonic-clonic seizure. An MRI shows a 'ring-enhancing' lesion in the right frontal lobe with significant surrounding vasogenic edema. Which medication should be started immediately to address the edema?", "options": {"A": "Mannitol", "B": "Phenytoin", "C": "Dexamethasone", "D": "Temozolomide", "E": "Furosemide"}, "correct": "C", "rationales": {"A": "Mannitol is used for acute, life-threatening ICP elevation and cytotoxic edema (like in stroke), but it is not the standard maintenance treatment for tumor-related vasogenic edema.", "B": "While an anticonvulsant is needed for his seizure, it does not treat the underlying cerebral edema.", "C": "High-dose corticosteroids like dexamethasone are the gold standard for reducing vasogenic edema associated with brain tumors by stabilizing the blood-brain barrier.", "D": "Temozolomide is a chemotherapy agent used for GBM, but it is not an acute treatment for edema.", "E": "Loop diuretics have a negligible effect on brain edema compared to their systemic effects."}, "hint": "This class of drug is used to stabilize 'leaky' capillaries in the setting of malignancy.", "part": 1}, {"stem": "A 40-year-old man presents with severe lower back pain radiating down his left leg to the foot. He reports difficulty starting urination and 'numbness' when wiping after a bowel movement. What is the most urgent next step?", "options": {"A": "Prescribe high-dose NSAIDs and bed rest", "B": "Refer for urgent outpatient physiotherapy", "C": "Perform an urgent MRI of the lumbar spine", "D": "Arrange for an elective CT myelogram", "E": "Administer an epidural steroid injection"}, "correct": "C", "rationales": {"A": "This approach ignores red flag symptoms of cauda equina syndrome, which require immediate surgical evaluation.", "B": "Physiotherapy is appropriate for simple radiculopathy, but saddle anesthesia indicates an emergency situation.", "C": "The patient has 'red flags' for Cauda Equina Syndrome (urinary retention and saddle anesthesia), which is a surgical emergency requiring immediate imaging and decompression.", "D": "Elective procedures are inappropriate for a patient with progressive neurological deficits and sphincter dysfunction.", "E": "Injections are used for pain management in chronic stable cases, but they do not resolve the mechanical compression in Cauda Equina Syndrome."}, "hint": "Identify the symptoms that suggest an immediate threat to the nerves governing the pelvic floor.", "part": 1}, {"stem": "Following a motor vehicle accident, a 30-year-old male is brought to the trauma bay with respiratory distress. Examination reveals absent breath sounds and hyper-resonance on the right side, with a blood pressure of 85/50 mmHg and distended neck veins. What is the immediate priority?", "options": {"A": "Obtain an erect chest X-ray", "B": "Insert a large-bore intercostal chest drain in the triangle of safety", "C": "Perform immediate needle decompression", "D": "Perform an emergency thoracotomy", "E": "Perform an eFAST scan to check for pericardial fluid"}, "correct": "C", "rationales": {"A": "Waiting for an X-ray in the setting of clinical tension pneumothorax and hypotension can lead to cardiac arrest.", "B": "While a chest drain is the definitive treatment, needle decompression is a faster temporary measure to restore hemodynamics in an unstable patient.", "C": "Tension pneumothorax is a clinical diagnosis; immediate decompression is required to relieve the pressure and restore venous return to the heart.", "D": "Thoracotomy is indicated for massive hemothorax or cardiac arrest, but not as the first step for a tension pneumothorax.", "E": "While FAST is part of the trauma protocol, the clinical signs (absent breath sounds) strongly point to a tension pneumothorax over cardiac tamponade."}, "hint": "In an unstable patient with absent breath sounds and hypotension, you must act before confirming with imaging.", "part": 1}, {"stem": "A 20-year-old football player is struck in the abdomen. He is hemodynamically stable but complains of left-sided abdominal pain and left shoulder tip pain. A FAST scan shows free fluid in the splenorenal recess. What is the name of the sign describing his shoulder pain?", "options": {"A": "Battle's sign", "B": "Cullen's sign", "C": "Kehr's sign", "D": "Kernig's sign", "E": "Grey Turner's sign"}, "correct": "C", "rationales": {"A": "Battle's sign refers to bruising over the mastoid process, indicating a base of skull fracture.", "B": "Cullen's sign is periumbilical bruising seen in retroperitoneal hemorrhage or pancreatitis.", "C": "Kehr's sign is referred pain to the left shoulder due to irritation of the diaphragm by blood, classically from a splenic rupture.", "D": "Kernig's sign is used to assess for meningeal irritation, not abdominal trauma.", "E": "Grey Turner's sign refers to bruising in the flanks, usually associated with severe pancreatitis."}, "hint": "This eponym describes referred pain caused by the phrenic nerve.", "part": 1}, {"stem": "Which of the following is strictly contraindicated in a patient with a suspected brain abscess and clinical signs of papilledema?", "options": {"A": "Non-contrast CT Brain", "B": "Intravenous antibiotics", "C": "Lumbar Puncture", "D": "MRI with Gadolinium", "E": "Stereotactic biopsy"}, "correct": "C", "rationales": {"A": "CT is a safe and necessary first-line imaging modality to identify the lesion.", "B": "Antibiotics are a cornerstone of management for a brain abscess once the diagnosis is suspected.", "C": "Performing an LP in the presence of a mass lesion and raised ICP can cause a pressure gradient that leads to fatal brain herniation.", "D": "MRI is the gold standard for characterizing the abscess and planning surgical intervention.", "E": "Biopsy or aspiration is often required to identify the causative organism and decompress the abscess."}, "hint": "This procedure involves removing fluid from the spinal canal, which can be dangerous when intracranial pressure is high.", "part": 1}, {"stem": "A 19-year-old male is involved in a high-speed collision. He initially loses consciousness but is awake and talking on arrival at the hospital (GCS 15). One hour later, his GCS drops to 8, and his right pupil becomes fixed and dilated. What is the most likely diagnosis?", "options": {"A": "Acute Subdural Haemorrhage", "B": "Extradural Haemorrhage", "C": "Diffuse Axonal Injury", "D": "Subarachnoid Haemorrhage", "E": "Concussion"}, "correct": "B", "rationales": {"A": "While SDH causes deterioration, the 'lucid interval' followed by rapid decline and a pupil-involving palsy is the hallmark of an EDH.", "B": "The classic 'lucid interval' occurs as a high-pressure arterial bleed (EDH) expands, eventually causing uncal herniation and CN III compression.", "C": "DAI typically presents with immediate and persistent coma rather than a lucid interval.", "D": "SAH presents with a sudden thunderclap headache rather than the traumatic lucid interval sequence.", "E": "Concussion involves a temporary loss of function without the severe, rapid deterioration and focal signs seen in this scenario."}, "hint": "Focus on the 'lucid interval' and the rapid progression of mass effect.", "part": 1}, {"stem": "During the management of a severe traumatic brain injury, the patient develops a heart rate of 45 bpm, a blood pressure of 180/100 mmHg, and an irregular breathing pattern. What does this 'triad' indicate?", "options": {"A": "Neurogenic shock", "B": "Hypovolaemic shock", "C": "Cushing's Triad", "D": "Beck's Triad", "E": "Serotonin Syndrome"}, "correct": "C", "rationales": {"A": "Neurogenic shock involves hypotension and bradycardia, not the hypertension seen in this triad.", "B": "Hypovolaemic shock involves tachycardia and hypotension, which is the opposite of these findings.", "C": "Cushing's triad (hypertension, bradycardia, and irregular respirations) is a late sign of dangerously raised intracranial pressure.", "D": "Beck's triad (muffled heart sounds, low BP, high JVP) is associated with cardiac tamponade.", "E": "Serotonin syndrome involves autonomic instability but is unrelated to intracranial pressure or trauma."}, "hint": "This is a late physiological response to brainstem compression and terminal ICP rise.", "part": 1}, {"stem": "A patient is brought in with a GCS of 6 after falling from a height. According to the ATLS guidelines, what is the most important first step in his management?", "options": {"A": "Perform a head CT", "B": "Endotracheal intubation", "C": "Administer IV Mannitol", "D": "Check a blood glucose level", "E": "Apply a cervical collar"}, "correct": "B", "rationales": {"A": "Imaging should only occur after the patient is stabilized and the airway is secured.", "B": "The rule 'GCS 8, intubate' highlights that patients with a GCS of 8 or less cannot protect their airway and require definitive management.", "C": "Mannitol may be used later to manage ICP, but securing the airway (ABC) is always the first priority.", "D": "While important, metabolic checks follow the primary survey and airway stabilization.", "E": "Spine protection is part of 'A' (Airway), but providing a patent and secure airway is the critical action for a comatose patient."}, "hint": "Remember the pneumonic for the primary survey and the threshold for airway protection.", "part": 1}, {"stem": "A 35-year-old male is rescued from a house fire. He has singed nasal hairs and soot in his sputum. Despite an SpO2 of 100% on high-flow oxygen, he appears confused. What is the most likely cause of his confusion?", "options": {"A": "Hypovolaemic shock", "B": "Sepsis", "C": "Carbon Monoxide (CO) poisoning", "D": "Cerebral edema from heat", "E": "Pain"}, "correct": "C", "rationales": {"A": "Confusion can occur in shock, but the soot and high oxygen saturation despite confusion strongly suggest carbon monoxide poisoning.", "B": "Sepsis from burns typically takes 24 hours or more to develop and would not be the cause of acute confusion at the scene.", "C": "CO binds to hemoglobin with higher affinity than oxygen; standard pulse oximetry cannot distinguish between oxyhemoglobin and carboxyhemoglobin, giving a false 100% reading.", "D": "Heat stroke can cause confusion, but in a fire victim, CO and cyanide toxicity are far more common causes of neurological symptoms.", "E": "Severe pain causes agitation, but persistent confusion in the context of smoke inhalation is a medical emergency suggesting toxicity or hypoxia."}, "hint": "Pulse oximeters often provide a 'perfect' reading even when the blood is saturated with a toxic gas from fires.", "part": 1}, {"stem": "A patient presents with a laceration on the knuckle (MCP joint) after an altercation. What is the most critical management step for this specific injury type?", "options": {"A": "Simple primary closure with sutures in the ED", "B": "Apply a steristrip and discharge with simple analgesia", "C": "Surgical washout and IV antibiotics", "D": "Tetanus vaccine only", "E": "X-ray followed by outpatient hand clinic referral"}, "correct": "C", "rationales": {"A": "Primary closure of a 'fight bite' is contraindicated due to the high risk of trapping aggressive oral bacteria in the joint space.", "B": "This fails to address the high infection risk associated with human bites over a joint.", "C": "A 'fight bite' (laceration over the MCPJ) is contaminated with human oral flora and requires aggressive irrigation and antibiotic coverage.", "D": "Tetanus is necessary, but it does not prevent the acute cellulitis or tenosynovitis caused by oral bacteria.", "E": "Delaying treatment of a potential joint-penetrating bite can lead to permanent loss of hand function."}, "hint": "Consider the high risk of polymicrobial infection when a joint space is potentially involved.", "part": 1}, {"stem": "Which of the following describes the 'Zone of Stasis' in Jackson's Burn Zones model?", "options": {"A": "The central area of irreversible tissue loss", "B": "The outer area characterized by vasodilation", "C": "The area of impaired perfusion that is potentially salvageable", "D": "The area where nerves are completely destroyed", "E": "The area that will always require a skin graft"}, "correct": "C", "rationales": {"A": "This describes the Zone of Coagulation, where cells are already dead.", "B": "This describes the Zone of Hyperemia, which typically recovers without intervention.", "C": "The Zone of Stasis is the surrounding area of compromised blood flow that may recover with proper resuscitation or progress to necrosis.", "D": "Nerve destruction refers to the depth of the burn (full-thickness) rather than the concentric zones of a single burn wound.", "E": "The requirement for a graft depends on the depth and healing capacity of the stasis and coagulation zones, but the definition of the zone itself is about salvageability."}, "hint": "Focus on the zone that is most affected by the quality of medical resuscitation.", "part": 1}, {"stem": "A 65-year-old male presents with urinary incontinence, gait disturbance, and cognitive decline. A CT scan shows dilated ventricles without a corresponding increase in CSF pressure on lumbar puncture. What is the most likely diagnosis?", "options": {"A": "Obstructive Hydrocephalus", "B": "Alzheimer's Disease", "C": "Normal Pressure Hydrocephalus (NPH)", "D": "Pseudotumor Cerebri", "E": "Glioblastoma Multiforme"}, "correct": "C", "rationales": {"A": "Obstructive hydrocephalus would typically show a clear point of blockage and elevated pressure on an LP.", "B": "While cognitive decline occurs, the triad of symptoms ('wet, wobbly, and wacky') is classic for NPH.", "C": "NPH presents with the triad of dementia, ataxia, and urinary incontinence, and is characterized by ventricular enlargement with normal opening pressures.", "D": "Also known as IIH, this typically involves high opening pressure and occurs in younger, often overweight females.", "E": "GBM would show a mass lesion on CT rather than isolated ventricular enlargement."}, "hint": "The mnemonic for this condition is 'Wet, Wobbly, and Wacky'.", "part": 1}, {"stem": "A patient with a suspected splenic laceration is hemodynamically unstable (BP   70/40 mmHg) despite 2L of crystalloid resuscitation. The FAST scan is positive. What is the next best step?", "options": {"A": "CT Abdomen and Pelvis with contrast", "B": "Laparotomy", "C": "Angio-embolization", "D": "Serial FAST scans every 30 minutes", "E": "Observation in the ICU"}, "correct": "B", "rationales": {"A": "An unstable patient should never be sent to the CT scanner; they belong in the operating theater.", "B": "In the setting of hemodynamic instability and a positive FAST scan, the patient requires immediate surgical control of bleeding.", "C": "Angiography is reserved for stable patients with 'active blush' on CT, not for patients in decompensated shock.", "D": "Waiting and repeating tests is inappropriate when the patient is actively bleeding out and has already failed fluid resuscitation.", "E": "Non-operative management is only for stable patients; this patient's vitals indicate an ongoing surgical emergency."}, "hint": "Stability determines the diagnostic pathway: stability allows for imaging, while instability requires immediate surgery.", "part": 1}, {"stem": "A 'Dural Tail' sign on a contrast-enhanced MRI is most characteristic of which intracranial tumor?", "options": {"A": "Glioblastoma Multiforme (GBM)", "B": "Meningioma", "C": "Acoustic Neuroma", "D": "Brain Metastasis", "E": "Pituitary Adenoma"}, "correct": "B", "rationales": {"A": "GBM is an intra-axial tumor and does not typically show a dural tail, appearing instead as a ring-enhancing lesion with central necrosis.", "B": "A dural tail represents thickening and enhancement of the dura adjacent to a tumor, which is a classic feature of meningiomas.", "C": "Acoustic neuromas occur in the cerebellopontine angle and involve the 8th cranial nerve, without the classic dural tail of meningiomas.", "D": "Metastases are usually well-circumscribed and at the grey-white matter junction, not primarily dural-based.", "E": "Pituitary adenomas are located in the sella turcica and do not exhibit dural tailing."}, "hint": "This tumor arises from the arachnoid cap cells and is usually benign.", "part": 1}, {"stem": "A patient with a traumatic hemothorax has a chest drain inserted. An initial 1,600 mL of blood is drained immediately. What is the definitive management step?", "options": {"A": "Clamp the chest drain to prevent further loss", "B": "Immediate Thoracotomy", "C": "Repeat a chest X-ray in 4 hours", "D": "Administer Tranexamic Acid and observe", "E": "Replace the volume with 3L of saline"}, "correct": "B", "rationales": {"A": "Clamping a drain in the presence of an active bleed can lead to a tension hemothorax or lung compression.", "B": "According to trauma protocols, drainage of >1500mL of blood initially (or >200mL/hr for 2-4 hours) is an indication for emergency surgery.", "C": "Imaging is redundant when the massive volume of drained blood already confirms a life-threatening high-pressure hemorrhage.", "D": "TXA is a helpful adjunct but cannot stop a massive arterial bleed that meets surgical criteria.", "E": "Fluid replacement is necessary but does not solve the underlying surgical problem of a major vascular injury."}, "hint": "Specific volume thresholds in trauma dictate the transition from bedside drainage to the operating room.", "part": 1}, {"stem": "Which complication is a patient at highest risk for during the window of 3 to 14 days following a subarachnoid hemorrhage?", "options": {"A": "Re-bleeding", "B": "Delayed Cerebral Ischaemia (Vasospasm)", "C": "Acute obstructive hydrocephalus", "D": "Brainstem herniation", "E": "Terson Syndrome"}, "correct": "B", "rationales": {"A": "The highest risk of re-bleeding occurs within the first 24 hours, not during the 3-14 day window.", "B": "Vasospasm typically peaks between 3-14 days post-SAH as blood breakdown products irritate the arterial walls.", "C": "Acute hydrocephalus occurs almost immediately as blood clots block the drainage of CSF.", "D": "Herniation is an acute complication related to the initial surge in ICP or a massive re-bleed.", "E": "Terson syndrome (intraocular hemorrhage) occurs at the time of the initial bleed due to the sudden rise in ICP."}, "hint": "This delayed complication is treated with the calcium channel blocker nimodipine.", "part": 1}, {"stem": "A 50-year-old female presents with a new-onset headache and a 'down and out' eye with a dilated, non-reactive pupil. She has a history of ADPKD. What is the most likely underlying cause?", "options": {"A": "Ischemic stroke", "B": "Diabetic neuropathy", "C": "Berry aneurysm", "D": "Migraine", "E": "Meningitis"}, "correct": "C", "rationales": {"A": "Ischemic strokes typically present with hemiparesis or aphasia rather than an isolated, pupil-involving third nerve palsy.", "B": "Diabetic third nerve palsy classically spares the pupil because the parasympathetic fibers are on the periphery and less affected by microvascular ischemia.", "C": "Patients with ADPKD are at increased risk for berry aneurysms, which can cause mass effect on CN III at the PCom junction.", "D": "While migraines cause headaches, they do not cause a fixed dilated pupil and down-and-out eye position.", "E": "Meningitis causes neck stiffness and fever, not isolated focal cranial nerve compression."}, "hint": "Consider the common vascular associations with Autosomal Dominant Polycystic Kidney Disease.", "part": 1}, {"stem": "A patient with a severe head injury and an initial GCS of 4 has a blood pressure of 88/40 mmHg. Why is this hypotension particularly dangerous in the context of traumatic brain injury?", "options": {"A": "It indicates a concurrent spinal cord injury", "B": "It increases the risk of intracranial hypertension", "C": "It significantly increases mortality by causing secondary brain injury", "D": "It interferes with the accuracy of the GCS assessment", "E": "It makes surgical intervention impossible"}, "correct": "C", "rationales": {"A": "While it can occur in neurogenic shock, hypotension is primarily dangerous because it exacerbates secondary brain injury by reducing perfusion.", "B": "Hypotension actually reduces intracranial pressure slightly but is detrimental because it starves the brain of oxygen and nutrients.", "C": "A single episode of SBP < 90 mmHg in a TBI patient is proven to double the mortality rate due to decreased cerebral perfusion.", "D": "Hypotension can alter GCS, but the primary clinical concern is the irreversible damage caused by ischemia.", "E": "Surgical intervention is possible, but the prognosis is much worse if the patient has suffered prolonged hypotension."}, "hint": "Focus on the effect of systemic pressure on the delivery of blood to a damaged brain.", "part": 1}, {"stem": "In the context of the Monro-Kellie doctrine, which of the following is the first component to be displaced to compensate for an expanding intracranial mass?", "options": {"A": "Arterial blood", "B": "Brain tissue", "C": "Cerebrospinal Fluid (CSF)", "D": "Intracellular fluid", "E": "Venous blood and CSF"}, "correct": "C", "rationales": {"A": "Arterial blood is under high pressure and is not easily displaced; reducing it would cause immediate ischemia.", "B": "Brain tissue is non-compressible; its displacement leads to herniation, which is a late and pathological event.", "C": "CSF is the primary buffering component; it is easily displaced into the spinal subarachnoid space when intracranial pressure rises.", "D": "Intracellular fluid remains constant; movement of water across cells is part of edema pathology, not early compensation.", "E": "While both can be displaced, the combined answer is less specific than identifying CSF as the primary, most mobile reservoir."}, "hint": "Think of the most mobile fluid within the cranial and spinal cavities.", "part": 1}, {"stem": "A patient with a suspected base of skull fracture presents with Battle's sign and Raccoon eyes. Which of the following procedures is strictly contraindicated?", "options": {"A": "Oral endotracheal intubation", "B": "Nasogastric tube (NGT) insertion", "C": "Lumbar puncture", "D": "Application of a cervical collar", "E": "Venous cannulation"}, "correct": "B", "rationales": {"A": "Oral intubation is safe and often necessary to protect the airway.", "B": "In base of skull fractures, NGT insertion carries the risk of accidental intracranial placement through the fractured cribriform plate.", "C": "While generally avoided in trauma, an NGT insertion is the classic 'mechanical' contraindication for a base of skull fracture.", "D": "A collar is mandatory until the C-spine is cleared, regardless of the skull fracture.", "E": "Obtaining IV access is a standard part of the primary survey."}, "hint": "Consider the risk of a tube entering the cranium through a fractured bony floor.", "part": 1}, {"stem": "A 10-year-old child presents with a 'scald' burn to the chest after spilling hot tea. The area is pale pink, very painful, and covered in blisters with brisk capillary refill. How would you classify the depth of this burn?", "options": {"A": "Superficial (1st degree)", "B": "Superficial Partial-Thickness (2nd degree)", "C": "Deep Partial-Thickness (2nd degree)", "D": "Full-Thickness (3rd degree)", "E": "Fourth-degree burn"}, "correct": "B", "rationales": {"A": "Superficial burns (like sunburn) are red but do not have blisters.", "B": "Blistering, brisk capillary refill, and severe pain are the hallmarks of a superficial partial-thickness burn.", "C": "Deep partial-thickness burns typically have slow capillary refill and may appear fixed red or white.", "D": "Full-thickness burns are typically painless (as nerves are destroyed) and lack capillary refill.", "E": "Fourth-degree burns extend into muscle or bone and would not present with blisters and brisk refill."}, "hint": "The presence of blisters and preserved sensation with fast refill points to a specific layer of the dermis.", "part": 1}, {"stem": "What is the primary purpose of administering Nimodipine for 21 days following an aneurysmal subarachnoid hemorrhage?", "options": {"A": "To dissolve the blood clot in the subarachnoid space", "B": "To prevent delayed cerebral ischaemia due to vasospasm", "C": "To lower the systemic blood pressure to prevent re-bleeding", "D": "To treat associated hyponatremia", "E": "To reduce the risk of post-traumatic epilepsy"}, "correct": "B", "rationales": {"A": "Nimodipine is a calcium channel blocker, not a thrombolytic agent.", "B": "Nimodipine is clinically proven to improve neurological outcomes by reducing the incidence of vasospasm after SAH.", "C": "While it can slightly lower BP, its primary purpose i
